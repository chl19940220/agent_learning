<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 620" width="640" height="620">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e74c3c"/>
    </marker>
  </defs>
  <rect width="640" height="620" rx="14" fill="#f0f4f8"/>
  <text x="320" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">六阶段权限决策流水线</text>

  <!-- 入口 -->
  <rect x="220" y="42" width="200" height="32" rx="16" fill="#2c3e50"/>
  <text x="320" y="63" text-anchor="middle" font-size="11" font-weight="bold" fill="white">工具调用请求进入权限系统</text>
  <line x1="320" y1="74" x2="320" y2="93" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 阶段1 -->
  <rect x="80" y="96" width="480" height="52" rx="8" fill="#fff9e6" stroke="#FFC107" stroke-width="1.5"/>
  <text x="320" y="116" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">阶段 1：静态规则检查</text>
  <text x="320" y="133" text-anchor="middle" font-size="11" fill="#7f8c8d">检查 settings.json 中的 allowedTools / deniedTools 及项目级规则</text>
  <text x="320" y="147" text-anchor="middle" font-size="10" fill="#e67e22">→ Allow / Deny 直接结束 · Ask 继续判断</text>
  <line x1="320" y1="148" x2="320" y2="167" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 阶段2 -->
  <rect x="80" y="170" width="480" height="52" rx="8" fill="#fff9e6" stroke="#FFC107" stroke-width="1.5"/>
  <text x="320" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">阶段 2：工具自检</text>
  <text x="320" y="207" text-anchor="middle" font-size="11" fill="#7f8c8d">调用工具自身的 checkPermissions · BashTool 分析命令危险程度</text>
  <text x="320" y="221" text-anchor="middle" font-size="10" fill="#7f8c8d">Read only 工具检查是否在禁止目录</text>
  <line x1="320" y1="222" x2="320" y2="241" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 阶段3 -->
  <rect x="80" y="244" width="480" height="52" rx="8" fill="#fff9e6" stroke="#FFC107" stroke-width="1.5"/>
  <text x="320" y="264" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">阶段 3：Always Allow 模式判断</text>
  <text x="320" y="281" text-anchor="middle" font-size="11" fill="#7f8c8d">bypassPermissions 模式 → 直接 Allow</text>
  <text x="320" y="295" text-anchor="middle" font-size="10" fill="#7f8c8d">只读工具 Read/Glob/Grep → 通常直接 Allow</text>
  <line x1="320" y1="296" x2="320" y2="315" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 阶段4 -->
  <rect x="80" y="318" width="480" height="52" rx="8" fill="#fff9e6" stroke="#FFC107" stroke-width="1.5"/>
  <text x="320" y="338" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">阶段 4：标准化决策结果</text>
  <text x="320" y="355" text-anchor="middle" font-size="11" fill="#7f8c8d">将各阶段结果统一为标准格式</text>
  <text x="320" y="369" text-anchor="middle" font-size="10" fill="#7f8c8d">{ decision: allow/deny/ask, reason: string }</text>
  <line x1="320" y1="370" x2="320" y2="389" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 阶段5 -->
  <rect x="80" y="392" width="480" height="52" rx="8" fill="#fff9e6" stroke="#FFC107" stroke-width="1.5"/>
  <text x="320" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">阶段 5：外层后处理</text>
  <text x="320" y="429" text-anchor="middle" font-size="11" fill="#7f8c8d">dontAsk 模式：非危险操作自动 Allow</text>
  <text x="320" y="443" text-anchor="middle" font-size="10" fill="#7f8c8d">Headless 模式 fallback：自动 Deny 危险操作</text>
  <line x1="320" y1="444" x2="320" y2="463" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 阶段6 -->
  <rect x="80" y="466" width="480" height="52" rx="8" fill="#fce8e8" stroke="#F44336" stroke-width="1.5"/>
  <text x="320" y="486" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">阶段 6：Auto 模式 AI 分类器（内部功能）</text>
  <text x="320" y="503" text-anchor="middle" font-size="11" fill="#7f8c8d">需要 TRANSCRIPT_CLASSIFIER feature gate 开启</text>
  <text x="320" y="517" text-anchor="middle" font-size="10" fill="#7f8c8d">用轻量 AI 模型判断操作是否安全（外部用户无法使用）</text>
  <line x1="320" y1="518" x2="320" y2="537" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 最终决策 -->
  <rect x="180" y="540" width="280" height="36" rx="18" fill="#2c3e50"/>
  <text x="320" y="563" text-anchor="middle" font-size="12" font-weight="bold" fill="white">最终决策：执行 / 拒绝 / 弹窗询问</text>

  <!-- Allow 标注 -->
  <line x1="560" y1="270" x2="590" y2="270" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="595" y="274" font-size="10" fill="#27ae60" font-weight="bold">Allow</text>
  <line x1="560" y1="270" x2="560" y2="558" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="560" y1="558" x2="462" y2="558" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
</svg>
