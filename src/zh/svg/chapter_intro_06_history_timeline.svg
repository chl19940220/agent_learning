<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8eef5;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <rect width="1100" height="500" fill="url(#bgGrad)" rx="12"/>
  
  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">智能体发展史：四大范式演进</text>
  
  <!-- Timeline line -->
  <line x1="80" y1="100" x2="1020" y2="100" stroke="#4a90d9" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Era 1: Symbolism -->
  <circle cx="150" cy="100" r="12" fill="#e74c3c" stroke="white" stroke-width="2"/>
  <text x="150" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#e74c3c">1950s-1980s</text>
  <rect x="60" y="130" width="180" height="180" rx="14" fill="white" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">符号主义</text>
  <text x="150" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#555">逻辑规则 + 知识推理</text>
  <line x1="80" y1="190" x2="220" y2="190" stroke="#eee" stroke-width="1"/>
  <text x="80" y="210" font-family="system-ui, sans-serif" font-size="10" fill="#666">• ELIZA (1966)</text>
  <text x="80" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#666">• SHRDLU (1970)</text>
  <text x="80" y="246" font-family="system-ui, sans-serif" font-size="10" fill="#666">• STRIPS (1971)</text>
  <text x="80" y="264" font-family="system-ui, sans-serif" font-size="10" fill="#666">• MYCIN (1976)</text>
  <text x="80" y="290" font-family="system-ui, sans-serif" font-size="10" fill="#999" font-style="italic">手写规则，封闭领域</text>
  
  <!-- Era 2: Society of Mind -->
  <circle cx="390" cy="100" r="12" fill="#f39c12" stroke="white" stroke-width="2"/>
  <text x="390" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#f39c12">1980s-1990s</text>
  <rect x="300" y="130" width="180" height="180" rx="14" fill="white" stroke="#f39c12" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f39c12">分布式智能</text>
  <text x="390" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#555">多 Agent 协作涌现</text>
  <line x1="320" y1="190" x2="460" y2="190" stroke="#eee" stroke-width="1"/>
  <text x="320" y="210" font-family="system-ui, sans-serif" font-size="10" fill="#666">• 心智社会 (1986)</text>
  <text x="320" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#666">• BDI 架构 (1991)</text>
  <text x="320" y="246" font-family="system-ui, sans-serif" font-size="10" fill="#666">• Multi-Agent Systems</text>
  <text x="320" y="264" font-family="system-ui, sans-serif" font-size="10" fill="#666">• 理性 Agent 理论</text>
  <text x="320" y="290" font-family="system-ui, sans-serif" font-size="10" fill="#999" font-style="italic">协作涌现，理论框架</text>
  
  <!-- Era 3: Deep Learning -->
  <circle cx="630" cy="100" r="12" fill="#27ae60" stroke="white" stroke-width="2"/>
  <text x="630" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">1990s-2020s</text>
  <rect x="540" y="130" width="180" height="180" rx="14" fill="white" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="630" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#27ae60">联结主义</text>
  <text x="630" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#555">数据驱动 + 统计学习</text>
  <line x1="560" y1="190" x2="700" y2="190" stroke="#eee" stroke-width="1"/>
  <text x="560" y="210" font-family="system-ui, sans-serif" font-size="10" fill="#666">• AlexNet (2012)</text>
  <text x="560" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#666">• AlphaGo (2016)</text>
  <text x="560" y="246" font-family="system-ui, sans-serif" font-size="10" fill="#666">• Transformer (2017)</text>
  <text x="560" y="264" font-family="system-ui, sans-serif" font-size="10" fill="#666">• GPT/BERT (2018-19)</text>
  <text x="560" y="290" font-family="system-ui, sans-serif" font-size="10" fill="#999" font-style="italic">数据学习，神经网络</text>
  
  <!-- Era 4: LLM Agents -->
  <circle cx="870" cy="100" r="14" fill="#3498db" stroke="white" stroke-width="3"/>
  <text x="870" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#3498db">2023-至今</text>
  <rect x="780" y="130" width="180" height="180" rx="14" fill="white" stroke="#3498db" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="870" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#3498db">LLM 驱动</text>
  <text x="870" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#555">通用推理 + 工具调用</text>
  <line x1="800" y1="190" x2="940" y2="190" stroke="#eee" stroke-width="1"/>
  <text x="800" y="210" font-family="system-ui, sans-serif" font-size="10" fill="#666">• ReAct (2023)</text>
  <text x="800" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#666">• AutoGPT (2023)</text>
  <text x="800" y="246" font-family="system-ui, sans-serif" font-size="10" fill="#666">• MCP/A2A (2024)</text>
  <text x="800" y="264" font-family="system-ui, sans-serif" font-size="10" fill="#666">• Devin/SWE-Agent (2024)</text>
  <text x="800" y="290" font-family="system-ui, sans-serif" font-size="10" fill="#999" font-style="italic">通用智能，跨域Agent</text>
  
  <!-- Arrows between eras -->
  <path d="M240,210 Q270,210 300,210" fill="none" stroke="#ccc" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M480,210 Q510,210 540,210" fill="none" stroke="#ccc" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M720,210 Q750,210 780,210" fill="none" stroke="#ccc" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ccc"/>
    </marker>
  </defs>
  
  <!-- Bottom summary -->
  <rect x="60" y="340" width="980" height="140" rx="14" fill="white" stroke="#4a90d9" stroke-width="1.5" opacity="0.9" filter="url(#shadow)"/>
  <text x="550" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a365d">核心演进主线</text>
  
  <text x="100" y="395" font-family="system-ui, sans-serif" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#e74c3c">能力来源：</tspan>
    <tspan>人工编写规则</tspan>
    <tspan fill="#999"> → </tspan>
    <tspan>多Agent协作涌现</tspan>
    <tspan fill="#999"> → </tspan>
    <tspan>数据驱动学习</tspan>
    <tspan fill="#999"> → </tspan>
    <tspan font-weight="bold" fill="#3498db">预训练知识+语言推理</tspan>
  </text>
  
  <text x="100" y="420" font-family="system-ui, sans-serif" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#27ae60">交互方式：</tspan>
    <tspan>结构化指令</tspan>
    <tspan fill="#999"> → </tspan>
    <tspan>消息传递</tspan>
    <tspan fill="#999"> → </tspan>
    <tspan>数值向量</tspan>
    <tspan fill="#999"> → </tspan>
    <tspan font-weight="bold" fill="#3498db">自然语言</tspan>
  </text>
  
  <text x="100" y="445" font-family="system-ui, sans-serif" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#f39c12">泛化能力：</tspan>
    <tspan>单一领域</tspan>
    <tspan fill="#999"> → </tspan>
    <tspan>多Agent协同</tspan>
    <tspan fill="#999"> → </tspan>
    <tspan>单一任务</tspan>
    <tspan fill="#999"> → </tspan>
    <tspan font-weight="bold" fill="#3498db">跨领域通用</tspan>
  </text>
  
  <text x="550" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#999" font-style="italic">
    "从写规则到学规则，再到用语言替代规则 —— Agent的能力来源在不断抽象化和通用化"
  </text>
</svg>
