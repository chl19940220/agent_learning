<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
  </defs>
  <rect width="640" height="420" rx="14" fill="#f0f4f8"/>
  <text x="320" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Skills vs /commands vs Prompt Template 选择决策</text>

  <!-- 起点 -->
  <rect x="220" y="45" width="200" height="36" rx="8" fill="#2c3e50"/>
  <text x="320" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="white">有新的工作流需求</text>
  <line x1="320" y1="81" x2="320" y2="105" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 菱形1：是否跨项目 -->
  <polygon points="320,107 400,132 320,157 240,132" fill="#f39c12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="320" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="white">是否跨多个</text>
  <text x="320" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="white">项目复用？</text>

  <!-- 否 → /commands -->
  <line x1="400" y1="132" x2="520" y2="132" stroke="#2c3e50" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="460" y="125" text-anchor="middle" font-size="11" fill="#7f8c8d">否</text>
  <rect x="522" y="112" width="100" height="40" rx="8" fill="#3498db"/>
  <text x="572" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="white">/commands</text>
  <text x="572" y="145" text-anchor="middle" font-size="10" fill="#d6eaf8">.claude/commands/</text>

  <!-- 是 → 继续 -->
  <line x1="320" y1="157" x2="320" y2="181" stroke="#2c3e50" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="335" y="172" font-size="11" fill="#7f8c8d">是</text>

  <!-- 菱形2：多步骤 -->
  <polygon points="320,183 400,208 320,233 240,208" fill="#f39c12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="320" y="204" text-anchor="middle" font-size="11" font-weight="bold" fill="white">是否包含多步骤</text>
  <text x="320" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="white">或引用附属文件？</text>

  <!-- 是 → Skills（多步骤） -->
  <line x1="240" y1="208" x2="120" y2="208" stroke="#27ae60" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="180" y="201" text-anchor="middle" font-size="11" fill="#27ae60">是</text>
  <rect x="18" y="188" width="100" height="40" rx="8" fill="#27ae60"/>
  <text x="68" y="206" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Skills</text>
  <text x="68" y="221" text-anchor="middle" font-size="10" fill="#d5f5e3">支持完整目录</text>

  <!-- 否 → 继续 -->
  <line x1="320" y1="233" x2="320" y2="257" stroke="#2c3e50" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="335" y="248" font-size="11" fill="#7f8c8d">否</text>

  <!-- 菱形3：需要脚本 -->
  <polygon points="320,259 400,284 320,309 240,284" fill="#f39c12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="320" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="white">是否需要附带</text>
  <text x="320" y="294" text-anchor="middle" font-size="11" font-weight="bold" fill="white">脚本 .sh/.py？</text>

  <!-- 是 → Skills（脚本） -->
  <line x1="240" y1="284" x2="120" y2="284" stroke="#27ae60" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="180" y="277" text-anchor="middle" font-size="11" fill="#27ae60">是</text>
  <rect x="18" y="264" width="100" height="40" rx="8" fill="#27ae60"/>
  <text x="68" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Skills</text>
  <text x="68" y="297" text-anchor="middle" font-size="10" fill="#d5f5e3">可引用脚本</text>

  <!-- 否 → Prompt Template -->
  <line x1="320" y1="309" x2="320" y2="333" stroke="#2c3e50" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="335" y="324" font-size="11" fill="#7f8c8d">否</text>
  <rect x="220" y="336" width="200" height="40" rx="8" fill="#9b59b6"/>
  <text x="320" y="354" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Prompt Template</text>
  <text x="320" y="369" text-anchor="middle" font-size="10" fill="#e8daef">在 CLAUDE.md 中写说明即可</text>

  <!-- 说明框 -->
  <rect x="40" y="395" width="560" height="18" rx="6" fill="#e8f4fd"/>
  <text x="320" y="408" text-anchor="middle" font-size="11" fill="#2980b9">Skills 存储在 ~/.claude-internal/skills/，全局可用；/commands 存储在 .claude/commands/，项目级</text>
</svg>
