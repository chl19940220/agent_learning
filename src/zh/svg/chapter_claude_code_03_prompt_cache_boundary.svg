<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="600" height="400" rx="14" fill="#f0f4f8"/>
  <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">System Prompt 静态区 / 动态区分离</text>

  <!-- 静态区 -->
  <rect x="40" y="45" width="520" height="155" rx="10" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="300" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#155724">静态区 Static Zone</text>

  <rect x="60" y="78" width="480" height="28" rx="6" fill="#28a745"/>
  <text x="300" y="97" text-anchor="middle" font-size="12" fill="white">身份定义：You are Claude Code...</text>

  <rect x="60" y="112" width="480" height="28" rx="6" fill="#28a745"/>
  <text x="300" y="131" text-anchor="middle" font-size="12" fill="white">系统规则：代码操作规范、安全约束</text>

  <rect x="60" y="146" width="480" height="28" rx="6" fill="#28a745"/>
  <text x="300" y="165" text-anchor="middle" font-size="12" fill="white">编码规范：文件操作原则、工具使用指南</text>

  <text x="300" y="192" text-anchor="middle" font-size="11" fill="#155724">跨用户、跨会话完全不变 · ✅ 被 Prompt Cache 缓存，下次调用直接复用</text>

  <!-- CACHE BOUNDARY -->
  <rect x="40" y="208" width="520" height="28" rx="6" fill="#6c757d"/>
  <text x="300" y="227" text-anchor="middle" font-size="13" font-weight="bold" fill="white">── CACHE BOUNDARY ──</text>

  <!-- 动态区 -->
  <rect x="40" y="244" width="520" height="145" rx="10" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="300" y="267" text-anchor="middle" font-size="14" font-weight="bold" fill="#856404">动态区 Dynamic Zone</text>

  <rect x="60" y="277" width="480" height="28" rx="6" fill="#ffc107"/>
  <text x="300" y="296" text-anchor="middle" font-size="12" fill="#212529">当前工作目录和环境信息</text>

  <rect x="60" y="311" width="480" height="28" rx="6" fill="#ffc107"/>
  <text x="300" y="330" text-anchor="middle" font-size="12" fill="#212529">会话级指导（从 memdir 加载）</text>

  <rect x="60" y="345" width="480" height="28" rx="6" fill="#ffc107"/>
  <text x="300" y="364" text-anchor="middle" font-size="12" fill="#212529">MCP 工具描述（每次连接时变化）</text>

  <text x="300" y="383" text-anchor="middle" font-size="11" fill="#856404">每次会话都不同 · ❌ 无法缓存，每次都消耗 token</text>
</svg>
