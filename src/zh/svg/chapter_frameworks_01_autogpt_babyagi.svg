<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrow1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e74c3c"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3498db"/>
    </marker>
  </defs>
  <rect width="800" height="480" rx="12" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">AutoGPT vs BabyAGI：自主Agent先驱的核心循环</text>

  <!-- AutoGPT 区域 -->
  <rect x="30" y="55" width="360" height="400" rx="10" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="2"/>
  <text x="210" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#e74c3c">AutoGPT 核心循环</text>

  <rect x="130" y="95" width="160" height="36" rx="8" fill="#e74c3c" opacity="0.9"/>
  <text x="210" y="118" text-anchor="middle" font-size="13" fill="white" font-weight="bold">设定目标 Goal</text>

  <line x1="210" y1="131" x2="210" y2="148" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow1)"/>

  <rect x="110" y="150" width="200" height="36" rx="8" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="210" y="173" text-anchor="middle" font-size="12" fill="#e74c3c">① 思考：分析当前状态</text>

  <line x1="210" y1="186" x2="210" y2="203" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow1)"/>

  <rect x="110" y="205" width="200" height="36" rx="8" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="210" y="228" text-anchor="middle" font-size="12" fill="#e74c3c">② 推理：选择下一步行动</text>

  <line x1="210" y1="241" x2="210" y2="258" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow1)"/>

  <rect x="110" y="260" width="200" height="36" rx="8" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="210" y="283" text-anchor="middle" font-size="12" fill="#e74c3c">③ 行动：执行（搜索/代码…）</text>

  <line x1="210" y1="296" x2="210" y2="313" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow1)"/>

  <rect x="110" y="315" width="200" height="36" rx="8" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="210" y="338" text-anchor="middle" font-size="12" fill="#e74c3c">④ 观察：评估结果</text>

  <!-- 循环箭头 -->
  <path d="M310,333 Q360,333 360,240 Q360,170 310,170" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow1)"/>
  <text x="372" y="250" font-size="10" fill="#e74c3c">循环</text>

  <rect x="70" y="370" width="280" height="70" rx="8" fill="#fff3f3" stroke="#e74c3c" stroke-width="1"/>
  <text x="210" y="390" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">特点</text>
  <text x="210" y="408" text-anchor="middle" font-size="10" fill="#555">• 完全自主执行，无需人工干预</text>
  <text x="210" y="423" text-anchor="middle" font-size="10" fill="#555">• 支持网页搜索、文件读写、代码执行</text>
  <text x="210" y="438" text-anchor="middle" font-size="10" fill="#c0392b">⚠ 容易陷入无限循环，缺乏终止判断</text>

  <!-- BabyAGI 区域 -->
  <rect x="410" y="55" width="360" height="400" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="590" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#3498db">BabyAGI 任务驱动循环</text>

  <rect x="490" y="95" width="200" height="36" rx="8" fill="#3498db" opacity="0.9"/>
  <text x="590" y="118" text-anchor="middle" font-size="13" fill="white" font-weight="bold">任务列表 Task List</text>

  <line x1="590" y1="131" x2="590" y2="148" stroke="#3498db" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow2)"/>

  <rect x="470" y="150" width="240" height="36" rx="8" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <text x="590" y="173" text-anchor="middle" font-size="12" fill="#3498db">① 执行：完成优先级最高的任务</text>

  <line x1="590" y1="186" x2="590" y2="203" stroke="#3498db" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow2)"/>

  <rect x="470" y="205" width="240" height="36" rx="8" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <text x="590" y="228" text-anchor="middle" font-size="12" fill="#3498db">② 创建：根据结果生成新任务</text>

  <line x1="590" y1="241" x2="590" y2="258" stroke="#3498db" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow2)"/>

  <rect x="470" y="260" width="240" height="36" rx="8" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <text x="590" y="283" text-anchor="middle" font-size="12" fill="#3498db">③ 优先级排序：重新排列任务</text>

  <!-- 循环箭头 -->
  <path d="M710,278 Q740,278 740,200 Q740,130 710,130" fill="none" stroke="#3498db" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow2)"/>
  <text x="750" y="200" font-size="10" fill="#3498db">循环</text>

  <rect x="440" y="315" width="300" height="36" rx="8" fill="#e8f4fd" stroke="#3498db" stroke-width="1"/>
  <text x="590" y="338" text-anchor="middle" font-size="12" fill="#2980b9">核心创新：向量数据库存储任务上下文</text>

  <rect x="440" y="370" width="300" height="70" rx="8" fill="#e8f4fd" stroke="#3498db" stroke-width="1"/>
  <text x="590" y="390" text-anchor="middle" font-size="11" fill="#2980b9" font-weight="bold">特点</text>
  <text x="590" y="408" text-anchor="middle" font-size="10" fill="#555">• 任务驱动，动态生成子任务</text>
  <text x="590" y="423" text-anchor="middle" font-size="10" fill="#555">• 简洁优雅，代码仅 ~140 行</text>
  <text x="590" y="438" text-anchor="middle" font-size="10" fill="#2980b9">💡 启发了后续所有 Agent 框架的设计</text>
</svg>
