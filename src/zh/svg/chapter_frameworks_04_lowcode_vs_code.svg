<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="640" height="300">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="640" height="300" rx="14" fill="#f0f4f8"/>
  <text x="320" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">低代码 vs 代码开发</text>

  <!-- 低代码平台 -->
  <rect x="20" y="50" width="280" height="220" rx="12" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <rect x="20" y="50" width="280" height="40" rx="12" fill="#27ae60"/>
  <rect x="20" y="76" width="280" height="14" fill="#27ae60"/>
  <text x="160" y="76" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🎨 低代码平台</text>
  <text x="160" y="92" text-anchor="middle" font-size="11" fill="#d5f5e3">Dify / Coze / n8n</text>

  <text x="40" y="118" font-size="12" fill="#27ae60" font-weight="bold">✅ 优势</text>
  <text x="40" y="136" font-size="11" fill="#2c3e50">• 快速上手，无需编程基础</text>
  <text x="40" y="152" font-size="11" fill="#2c3e50">• 可视化，直观展示工作流</text>
  <text x="40" y="168" font-size="11" fill="#2c3e50">• 内置大量组件，开箱即用</text>
  <text x="40" y="184" font-size="11" fill="#2c3e50">• 适合业务人员自助搭建</text>

  <line x1="30" y1="196" x2="290" y2="196" stroke="#ecf0f1" stroke-width="1"/>
  <text x="40" y="214" font-size="12" fill="#e74c3c" font-weight="bold">❌ 局限</text>
  <text x="40" y="232" font-size="11" fill="#7f8c8d">• 定制化能力有限</text>
  <text x="40" y="248" font-size="11" fill="#7f8c8d">• 复杂逻辑难以表达</text>
  <text x="40" y="264" font-size="11" fill="#7f8c8d">• 厂商锁定风险</text>

  <!-- 代码开发 -->
  <rect x="340" y="50" width="280" height="220" rx="12" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <rect x="340" y="50" width="280" height="40" rx="12" fill="#3498db"/>
  <rect x="340" y="76" width="280" height="14" fill="#3498db"/>
  <text x="480" y="76" text-anchor="middle" font-size="14" font-weight="bold" fill="white">💻 代码开发</text>
  <text x="480" y="92" text-anchor="middle" font-size="11" fill="#d6eaf8">LangChain / LangGraph</text>

  <text x="360" y="118" font-size="12" fill="#3498db" font-weight="bold">✅ 优势</text>
  <text x="360" y="136" font-size="11" fill="#2c3e50">• 完全自定义，灵活度高</text>
  <text x="360" y="152" font-size="11" fill="#2c3e50">• 可处理复杂业务逻辑</text>
  <text x="360" y="168" font-size="11" fill="#2c3e50">• 性能和扩展性更好</text>
  <text x="360" y="184" font-size="11" fill="#2c3e50">• 无厂商锁定</text>

  <line x1="350" y1="196" x2="610" y2="196" stroke="#ecf0f1" stroke-width="1"/>
  <text x="360" y="214" font-size="12" fill="#e74c3c" font-weight="bold">❌ 局限</text>
  <text x="360" y="232" font-size="11" fill="#7f8c8d">• 需要编程基础</text>
  <text x="360" y="248" font-size="11" fill="#7f8c8d">• 开发周期较长</text>
  <text x="360" y="264" font-size="11" fill="#7f8c8d">• 维护成本较高</text>

  <!-- 底部建议 -->
  <text x="320" y="288" text-anchor="middle" font-size="11" fill="#e67e22" font-weight="bold">💡 最佳实践：用低代码快速验证业务价值，用代码做精细实现</text>
</svg>
