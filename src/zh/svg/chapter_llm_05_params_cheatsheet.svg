<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" width="640" height="260">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="640" height="260" rx="14" fill="#f0f4f8"/>
  <text x="320" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">模型参数速查卡</text>

  <!-- temperature -->
  <rect x="20" y="50" width="180" height="190" rx="10" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <rect x="20" y="50" width="180" height="36" rx="10" fill="#3498db"/>
  <rect x="20" y="72" width="180" height="14" fill="#3498db"/>
  <text x="110" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="white">temperature (0-2)</text>
  <text x="110" y="106" text-anchor="middle" font-size="11" fill="#2980b9" font-weight="bold">0.0 - 0.3</text>
  <text x="110" y="120" text-anchor="middle" font-size="10" fill="#7f8c8d">确定性输出</text>
  <text x="110" y="134" text-anchor="middle" font-size="10" fill="#7f8c8d">代码 / 提取 / 推理</text>
  <line x1="30" y1="142" x2="190" y2="142" stroke="#ecf0f1" stroke-width="1"/>
  <text x="110" y="158" text-anchor="middle" font-size="11" fill="#f39c12" font-weight="bold">0.5 - 0.8</text>
  <text x="110" y="172" text-anchor="middle" font-size="10" fill="#7f8c8d">平衡输出</text>
  <text x="110" y="186" text-anchor="middle" font-size="10" fill="#7f8c8d">对话 / 摘要</text>
  <line x1="30" y1="194" x2="190" y2="194" stroke="#ecf0f1" stroke-width="1"/>
  <text x="110" y="210" text-anchor="middle" font-size="11" fill="#e74c3c" font-weight="bold">1.0 - 2.0</text>
  <text x="110" y="224" text-anchor="middle" font-size="10" fill="#7f8c8d">创意输出</text>
  <text x="110" y="238" text-anchor="middle" font-size="10" fill="#7f8c8d">写作 / 头脑风暴</text>

  <!-- max_tokens -->
  <rect x="215" y="50" width="130" height="110" rx="10" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <rect x="215" y="50" width="130" height="36" rx="10" fill="#27ae60"/>
  <rect x="215" y="72" width="130" height="14" fill="#27ae60"/>
  <text x="280" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="white">max_tokens</text>
  <text x="280" y="106" text-anchor="middle" font-size="10" fill="#7f8c8d">控制输出长度上限</text>
  <text x="280" y="120" text-anchor="middle" font-size="10" fill="#7f8c8d">同时影响成本</text>
  <line x1="225" y1="128" x2="335" y2="128" stroke="#ecf0f1" stroke-width="1"/>
  <text x="280" y="144" text-anchor="middle" font-size="10" fill="#27ae60">建议：比预期</text>
  <text x="280" y="158" text-anchor="middle" font-size="10" fill="#27ae60">输出多 20%</text>

  <!-- top_p -->
  <rect x="215" y="175" width="130" height="65" rx="10" fill="white" stroke="#8e44ad" stroke-width="1.5"/>
  <rect x="215" y="175" width="130" height="30" rx="10" fill="#8e44ad"/>
  <rect x="215" y="191" width="130" height="14" fill="#8e44ad"/>
  <text x="280" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="white">top_p (0-1)</text>
  <text x="280" y="220" text-anchor="middle" font-size="10" fill="#7f8c8d">通常不需要调整</text>
  <text x="280" y="234" text-anchor="middle" font-size="10" fill="#7f8c8d">与 temperature 二选一</text>

  <!-- presence_penalty -->
  <rect x="360" y="50" width="130" height="110" rx="10" fill="white" stroke="#e67e22" stroke-width="1.5"/>
  <rect x="360" y="50" width="130" height="36" rx="10" fill="#e67e22"/>
  <rect x="360" y="72" width="130" height="14" fill="#e67e22"/>
  <text x="425" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="white">presence_penalty</text>
  <text x="425" y="84" text-anchor="middle" font-size="10" fill="#fdebd0">(-2 to 2)</text>
  <text x="425" y="106" text-anchor="middle" font-size="10" fill="#7f8c8d">正值：减少重复主题</text>
  <text x="425" y="120" text-anchor="middle" font-size="10" fill="#7f8c8d">适合列举场景</text>
  <line x1="370" y1="128" x2="480" y2="128" stroke="#ecf0f1" stroke-width="1"/>
  <text x="425" y="144" text-anchor="middle" font-size="10" fill="#e67e22">推荐值：0.3-0.6</text>
  <text x="425" y="158" text-anchor="middle" font-size="10" fill="#7f8c8d">（需要多样性时）</text>

  <!-- frequency_penalty -->
  <rect x="360" y="175" width="130" height="65" rx="10" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <rect x="360" y="175" width="130" height="30" rx="10" fill="#e74c3c"/>
  <rect x="360" y="191" width="130" height="14" fill="#e74c3c"/>
  <text x="425" y="193" text-anchor="middle" font-size="11" font-weight="bold" fill="white">frequency_penalty</text>
  <text x="425" y="220" text-anchor="middle" font-size="10" fill="#7f8c8d">正值：减少重复词汇</text>
  <text x="425" y="234" text-anchor="middle" font-size="10" fill="#7f8c8d">适合长文本生成</text>

  <!-- n -->
  <rect x="505" y="50" width="115" height="190" rx="10" fill="white" stroke="#2c3e50" stroke-width="1.5"/>
  <rect x="505" y="50" width="115" height="36" rx="10" fill="#2c3e50"/>
  <rect x="505" y="72" width="115" height="14" fill="#2c3e50"/>
  <text x="562" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="white">n (1-N)</text>
  <text x="562" y="106" text-anchor="middle" font-size="10" fill="#7f8c8d">生成多个候选</text>
  <text x="562" y="120" text-anchor="middle" font-size="10" fill="#7f8c8d">成本 × n</text>
  <line x1="515" y1="128" x2="610" y2="128" stroke="#ecf0f1" stroke-width="1"/>
  <text x="562" y="148" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="bold">适合场景：</text>
  <text x="562" y="164" text-anchor="middle" font-size="10" fill="#7f8c8d">标题生成</text>
  <text x="562" y="178" text-anchor="middle" font-size="10" fill="#7f8c8d">创意方案</text>
  <text x="562" y="192" text-anchor="middle" font-size="10" fill="#7f8c8d">A/B 测试</text>
  <text x="562" y="206" text-anchor="middle" font-size="10" fill="#7f8c8d">多样性输出</text>
</svg>
