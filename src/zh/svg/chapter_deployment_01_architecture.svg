<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420">
  <rect width="760" height="420" fill="#f0f4f8" rx="14"/>
  <text x="380" y="32" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Agent 生产部署架构</text>

  <!-- 用户层 -->
  <rect x="220" y="50" width="320" height="40" rx="14" fill="#9b59b6"/>
  <text x="380" y="75" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="white">👤 客户端（Web / App / API）</text>

  <!-- 箭头 -->
  <line x1="380" y1="90" x2="380" y2="110" stroke="#95a5a6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 网关层 -->
  <rect x="140" y="110" width="480" height="50" rx="14" fill="#3498db"/>
  <text x="380" y="140" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="white">🌐 API 网关 / 负载均衡（Nginx / Kong）</text>

  <line x1="380" y1="160" x2="380" y2="180" stroke="#95a5a6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 应用层 -->
  <rect x="40" y="180" width="680" height="80" rx="14" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="1.5"/>
  <text x="60" y="205" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">🚀 应用层（FastAPI / Flask）</text>
  <rect x="60" y="215" width="150" height="35" rx="8" fill="#27ae60"/>
  <text x="135" y="237" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="white">Agent 实例 #1</text>
  <rect x="230" y="215" width="150" height="35" rx="8" fill="#27ae60"/>
  <text x="305" y="237" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="white">Agent 实例 #2</text>
  <rect x="400" y="215" width="150" height="35" rx="8" fill="#27ae60"/>
  <text x="475" y="237" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="white">Agent 实例 #N</text>
  <text x="600" y="237" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#27ae60">水平扩展 →</text>

  <line x1="380" y1="260" x2="380" y2="280" stroke="#95a5a6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 基础设施层 -->
  <rect x="40" y="280" width="680" height="70" rx="14" fill="#e67e22" opacity="0.15" stroke="#e67e22" stroke-width="1.5"/>
  <text x="60" y="305" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#e67e22">🗄️ 基础设施层</text>
  <rect x="60" y="315" width="120" height="28" rx="8" fill="#e67e22"/>
  <text x="120" y="334" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="white">Redis 缓存</text>
  <rect x="200" y="315" width="120" height="28" rx="8" fill="#e67e22"/>
  <text x="260" y="334" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="white">向量数据库</text>
  <rect x="340" y="315" width="120" height="28" rx="8" fill="#e67e22"/>
  <text x="400" y="334" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="white">PostgreSQL</text>
  <rect x="480" y="315" width="120" height="28" rx="8" fill="#e67e22"/>
  <text x="540" y="334" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="white">消息队列</text>

  <!-- 外部服务 -->
  <rect x="40" y="365" width="680" height="40" rx="14" fill="#95a5a6" opacity="0.2" stroke="#95a5a6" stroke-width="1"/>
  <text x="380" y="390" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#7f8c8d">☁️ 外部 LLM API（OpenAI / Anthropic / DeepSeek） · MCP Servers · 第三方工具</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#95a5a6"/>
    </marker>
  </defs>
</svg>
