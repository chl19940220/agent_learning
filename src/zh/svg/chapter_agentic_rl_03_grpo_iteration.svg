<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 420" width="550" height="420">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="550" height="420" fill="#f8f9fa" rx="12"/>
  <text x="250" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">GRPO 单次训练迭代流程</text>

  <!-- Step 1 -->
  <rect x="120" y="45" width="260" height="38" rx="10" fill="#4dabf7" opacity="0.15" stroke="#4dabf7" stroke-width="2"/>
  <text x="135" y="62" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2980b9">1.</text>
  <text x="155" y="62" font-family="Arial, sans-serif" font-size="11" fill="#555">采样问题批次 {x₁, x₂, ..., x_B}</text>
  <text x="155" y="77" font-family="Arial, sans-serif" font-size="9" fill="#888">从训练集随机采样</text>

  <path d="M 250 85 L 250 100" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="80" y="103" width="340" height="45" rx="10" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <text x="95" y="122" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3498db">2.</text>
  <text x="115" y="122" font-family="Arial, sans-serif" font-size="11" fill="#555">每个问题采样 G 个回答</text>
  <text x="115" y="140" font-family="Arial, sans-serif" font-size="9" fill="#888">{y₁, ..., y_G} ~ π_θ_old(·|xⱼ)，temperature > 0 确保多样性</text>

  <path d="M 250 150 L 250 165" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="120" y="168" width="260" height="38" rx="10" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="2"/>
  <text x="135" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e67e22">3.</text>
  <text x="155" y="185" font-family="Arial, sans-serif" font-size="11" fill="#555">计算每个回答的奖励</text>
  <text x="155" y="200" font-family="Arial, sans-serif" font-size="9" fill="#888">rᵢ = R(xⱼ, yᵢ)　i = 1, ..., G</text>

  <path d="M 250 208 L 250 223" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="100" y="226" width="300" height="38" rx="10" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="2"/>
  <text x="115" y="243" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9b59b6">4.</text>
  <text x="135" y="243" font-family="Arial, sans-serif" font-size="11" fill="#555">组内标准化计算优势</text>
  <text x="135" y="258" font-family="Arial, sans-serif" font-size="9" fill="#888">Âᵢ = (rᵢ - μ_r) / (σ_r + ε)</text>

  <path d="M 250 266 L 250 281" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <rect x="80" y="284" width="340" height="38" rx="10" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="2"/>
  <text x="95" y="301" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e74c3c">5.</text>
  <text x="115" y="301" font-family="Arial, sans-serif" font-size="11" fill="#555">计算 GRPO 损失</text>
  <text x="115" y="316" font-family="Arial, sans-serif" font-size="9" fill="#888">L = policy_loss(clip) + β · KL(π_θ ‖ π_ref)</text>

  <path d="M 250 324 L 250 339" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6 -->
  <rect x="100" y="342" width="300" height="45" rx="10" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="2"/>
  <text x="115" y="361" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">6.</text>
  <text x="135" y="361" font-family="Arial, sans-serif" font-size="11" fill="#555">梯度更新</text>
  <text x="135" y="379" font-family="Arial, sans-serif" font-size="9" fill="#888">θ ← θ - α · ∇_θ L，然后 π_θ_old ← π_θ</text>

  <!-- Loop arrow -->
  <path d="M 402 364 L 465 364 L 465 66 L 382 66" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow)"/>
  <text x="500" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c" transform="rotate(90, 500, 220)">下一迭代</text>
</svg>
