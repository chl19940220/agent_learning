<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="760" height="360">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
  </defs>
  <rect width="760" height="360" fill="#f8f9fa" rx="12"/>
  <text x="380" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">第二代：意图识别系统处理流程</text>

  <!-- User Input -->
  <rect x="30" y="65" width="120" height="55" rx="10" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <text x="90" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3498db">用户输入</text>
  <text x="90" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">"查北京天气"</text>

  <!-- Arrow -->
  <path d="M 153 92 L 190 92" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Intent Model -->
  <rect x="193" y="60" width="130" height="65" rx="10" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="2"/>
  <text x="258" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9b59b6">意图识别模型</text>
  <text x="258" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">NLP 分类器</text>
  <text x="258" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">识别用户意图</text>

  <!-- Arrow to decision -->
  <path d="M 323 92 L 365 92" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision diamond -->
  <polygon points="390,65 440,92 390,119 340,92" fill="#f39c12" opacity="0.2" stroke="#f39c12" stroke-width="2"/>
  <text x="390" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#f39c12">识别</text>
  <text x="390" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#f39c12">结果</text>

  <!-- Branch: Weather -->
  <path d="M 440 80 L 510 60" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="480" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">查天气</text>
  <rect x="513" y="40" width="120" height="45" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.5"/>
  <text x="573" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">槽位填充</text>
  <text x="573" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">城市: 北京 / 日期</text>

  <!-- Branch: Flight -->
  <path d="M 440 92 L 510 92" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="475" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">订机票</text>
  <rect x="513" y="72" width="120" height="45" rx="8" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="1.5"/>
  <text x="573" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3498db">槽位填充</text>
  <text x="573" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">出发/到达/日期</text>

  <!-- Branch: Unknown -->
  <path d="M 440 105 L 510 130" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="480" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">未知意图</text>
  <rect x="513" y="115" width="120" height="35" rx="8" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="573" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e74c3c">❌ 兜底处理</text>

  <!-- Arrows to API -->
  <path d="M 636 62 L 680 62" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 636 94 L 680 94" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- API calls -->
  <rect x="683" y="45" width="60" height="30" rx="6" fill="#27ae60" opacity="0.2" stroke="#27ae60" stroke-width="1.5"/>
  <text x="713" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">天气API</text>
  <rect x="683" y="80" width="60" height="30" rx="6" fill="#3498db" opacity="0.2" stroke="#3498db" stroke-width="1.5"/>
  <text x="713" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">机票系统</text>

  <!-- Result -->
  <line x1="743" y1="78" x2="743" y2="160" stroke="#7f8c8d" stroke-width="1.5" fill="none"/>
  <line x1="743" y1="160" x2="680" y2="160" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <rect x="540" y="145" width="135" height="35" rx="8" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="2"/>
  <text x="607" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">✅ 返回结果</text>

  <!-- Comparison section -->
  <rect x="30" y="210" width="330" height="130" rx="10" fill="#27ae60" opacity="0.06" stroke="#27ae60" stroke-width="1.5"/>
  <text x="195" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">✅ 比第一代的进步</text>
  <text x="50" y="255" font-family="Arial, sans-serif" font-size="11" fill="#555">• 有了"理解"的雏形（意图识别）</text>
  <text x="50" y="275" font-family="Arial, sans-serif" font-size="11" fill="#555">• 能提取关键信息（槽位填充）</text>
  <text x="50" y="295" font-family="Arial, sans-serif" font-size="11" fill="#555">• 更结构化的对话管理</text>
  <text x="50" y="315" font-family="Arial, sans-serif" font-size="11" fill="#555">• 可以调用外部 API 执行操作</text>

  <rect x="390" y="210" width="340" height="130" rx="10" fill="#e74c3c" opacity="0.06" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="560" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e74c3c">🔴 依然存在的问题</text>
  <text x="410" y="255" font-family="Arial, sans-serif" font-size="11" fill="#555">• 意图是预定义的，无法处理意外请求</text>
  <text x="410" y="275" font-family="Arial, sans-serif" font-size="11" fill="#555">• 多轮对话能力有限</text>
  <text x="410" y="295" font-family="Arial, sans-serif" font-size="11" fill="#555">• 不能执行复杂的多步骤任务</text>
  <text x="410" y="315" font-family="Arial, sans-serif" font-size="11" fill="#555">• 新场景需要重新训练模型</text>
</svg>
