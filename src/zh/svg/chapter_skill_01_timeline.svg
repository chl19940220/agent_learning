<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="720" height="440">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="720" height="440" fill="#f0f4f8" rx="14"/>
  <text x="360" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">技能系统发展脉络</text>

  <!-- 时间线主轴 -->
  <line x1="100" y1="55" x2="100" y2="420" stroke="#bdc3c7" stroke-width="3"/>

  <!-- 2023: 初始探索 -->
  <circle cx="100" cy="70" r="10" fill="#3498db"/>
  <text x="120" y="75" font-size="15" font-weight="bold" fill="#3498db">2023：初始探索</text>

  <rect x="140" y="88" width="540" height="30" rx="6" fill="#3498db" opacity="0.08"/>
  <text x="155" y="108" font-size="12" fill="#2c3e50">Voyager (NVIDIA) — 首次提出 Agent 技能库概念（Minecraft 中的代码技能）</text>

  <rect x="140" y="125" width="540" height="30" rx="6" fill="#3498db" opacity="0.08"/>
  <text x="155" y="145" font-size="12" fill="#2c3e50">Semantic Kernel (微软) — Plugin/Skill 封装思想（企业级）</text>

  <rect x="140" y="162" width="540" height="30" rx="6" fill="#3498db" opacity="0.08"/>
  <text x="155" y="182" font-size="12" fill="#2c3e50">HuggingGPT / JARVIS (微软) — 跨模型的任务路由（技能发现雏形）</text>

  <!-- 2024: 体系化 -->
  <circle cx="100" cy="215" r="10" fill="#e67e22"/>
  <text x="120" y="220" font-size="15" font-weight="bold" fill="#e67e22">2024：体系化</text>

  <rect x="140" y="235" width="540" height="30" rx="6" fill="#e67e22" opacity="0.08"/>
  <text x="155" y="255" font-size="12" fill="#2c3e50">CRAFT (ICLR 2024) — 自动创建和检索专用工具集</text>

  <rect x="140" y="272" width="540" height="30" rx="6" fill="#e67e22" opacity="0.08"/>
  <text x="155" y="292" font-size="12" fill="#2c3e50">Anthropic Skills — SKILL.md 声明式技能框架</text>

  <rect x="140" y="309" width="540" height="30" rx="6" fill="#e67e22" opacity="0.08"/>
  <text x="155" y="329" font-size="12" fill="#2c3e50">A2A Protocol (Google) — Agent Card 中的技能声明标准</text>

  <!-- 2025: 生态化 -->
  <circle cx="100" cy="362" r="10" fill="#27ae60"/>
  <text x="120" y="367" font-size="15" font-weight="bold" fill="#27ae60">2025：生态化</text>

  <rect x="140" y="378" width="540" height="26" rx="6" fill="#27ae60" opacity="0.08"/>
  <text x="155" y="396" font-size="11" fill="#2c3e50">Claude Code Skills (Anthropic) — 开源 16 个示范技能 | OpenAI Agents SDK — Handoff + Tool 技能组合 | add-skill CLI — 跨平台技能安装</text>
</svg>
