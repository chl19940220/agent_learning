<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" width="680" height="280" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="680" height="280" rx="12" fill="#f8f9fa"/>
  <!-- 根节点 -->
  <rect x="220" y="16" width="240" height="36" rx="8" fill="#2c3e50"/>
  <text x="340" y="39" text-anchor="middle" font-size="14" font-weight="bold" fill="white">第1章 什么是 Agent？</text>
  <!-- 根到主干 -->
  <line x1="340" y1="52" x2="340" y2="72" stroke="#7f8c8d" stroke-width="2"/>
  <!-- 主干竖线 -->
  <line x1="80" y1="72" x2="80" y2="252" stroke="#7f8c8d" stroke-width="2"/>
  <!-- 横线到各节点 -->
  <line x1="80" y1="88" x2="120" y2="88" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="80" y1="130" x2="120" y2="130" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="80" y1="172" x2="120" y2="172" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="80" y1="214" x2="120" y2="214" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="80" y1="252" x2="120" y2="252" stroke="#7f8c8d" stroke-width="2"/>
  <!-- 连接根到主干 -->
  <line x1="340" y1="72" x2="80" y2="72" stroke="#7f8c8d" stroke-width="2"/>

  <!-- 节点1 -->
  <rect x="120" y="70" width="520" height="36" rx="6" fill="#3498db" opacity="0.15"/>
  <rect x="120" y="70" width="4" height="36" rx="2" fill="#3498db"/>
  <text x="136" y="84" font-size="12" font-weight="bold" fill="#2980b9">1.1 从聊天机器人到智能体的演进</text>
  <text x="136" y="100" font-size="11" fill="#7f8c8d">了解 AI 交互方式的发展历程</text>

  <!-- 节点2 -->
  <rect x="120" y="112" width="520" height="36" rx="6" fill="#9b59b6" opacity="0.15"/>
  <rect x="120" y="112" width="4" height="36" rx="2" fill="#9b59b6"/>
  <text x="136" y="126" font-size="12" font-weight="bold" fill="#8e44ad">1.2 Agent 的核心概念与定义</text>
  <text x="136" y="142" font-size="11" fill="#7f8c8d">掌握 Agent 的正式定义和关键特征</text>

  <!-- 节点3 -->
  <rect x="120" y="154" width="520" height="36" rx="6" fill="#27ae60" opacity="0.15"/>
  <rect x="120" y="154" width="4" height="36" rx="2" fill="#27ae60"/>
  <text x="136" y="168" font-size="12" font-weight="bold" fill="#27ae60">1.3 Agent 的典型架构：感知-思考-行动循环</text>
  <text x="136" y="184" font-size="11" fill="#7f8c8d">理解 Agent 内部的工作机制</text>

  <!-- 节点4 -->
  <rect x="120" y="196" width="520" height="36" rx="6" fill="#e67e22" opacity="0.15"/>
  <rect x="120" y="196" width="4" height="36" rx="2" fill="#e67e22"/>
  <text x="136" y="210" font-size="12" font-weight="bold" fill="#e67e22">1.4 Agent 与传统程序的区别</text>
  <text x="136" y="226" font-size="11" fill="#7f8c8d">明确 Agent 的独特优势</text>

  <!-- 节点5 -->
  <rect x="120" y="234" width="520" height="36" rx="6" fill="#e74c3c" opacity="0.15"/>
  <rect x="120" y="234" width="4" height="36" rx="2" fill="#e74c3c"/>
  <text x="136" y="248" font-size="12" font-weight="bold" fill="#e74c3c">1.5 Agent 的应用场景全景图</text>
  <text x="136" y="264" font-size="11" fill="#7f8c8d">探索 Agent 的实际应用可能性</text>
</svg>
