<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="700" height="380">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4dabf7"/>
    </marker>
  </defs>
  <rect width="700" height="380" fill="#f8f9fa" rx="12"/>
  <text x="350" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">AI Agent 核心组成要素</text>

  <!-- LLM Brain - center top -->
  <rect x="240" y="60" width="220" height="75" rx="12" fill="#4dabf7" opacity="0.25" stroke="#4dabf7" stroke-width="2.5"/>
  <text x="350" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2980b9">🧠 大脑（LLM）</text>
  <text x="350" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">负责理解、推理、决策、生成回复</text>
  <text x="350" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">GPT-4 / Claude / 通义千问 等</text>

  <!-- Three components below LLM -->
  <!-- Prompt -->
  <rect x="50" y="185" width="170" height="80" rx="10" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="2"/>
  <text x="135" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e74c3c">📝 提示词</text>
  <text x="135" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">定义角色和规则</text>
  <text x="135" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">给出示例</text>

  <!-- Tools -->
  <rect x="265" y="185" width="170" height="80" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="350" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">🔧 工具集</text>
  <text x="350" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">搜索引擎 / API</text>
  <text x="350" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">代码执行 / 文件读写</text>

  <!-- Memory -->
  <rect x="480" y="185" width="170" height="80" rx="10" fill="#9b59b6" opacity="0.12" stroke="#9b59b6" stroke-width="2"/>
  <text x="565" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9b59b6">💾 记忆</text>
  <text x="565" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">短期：对话历史</text>
  <text x="565" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">长期：向量数据库</text>

  <!-- Arrows from LLM to components -->
  <path d="M 290 135 L 175 183" stroke="#4dabf7" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <path d="M 350 135 L 350 183" stroke="#4dabf7" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <path d="M 410 135 L 525 183" stroke="#4dabf7" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- Orchestration layer -->
  <rect x="100" y="310" width="500" height="50" rx="10" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="2"/>
  <text x="350" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e67e22">🔄 编排层（Orchestration）</text>
  <text x="350" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">决定何时思考、何时行动、何时结束</text>

  <!-- Arrows from components to orchestration -->
  <path d="M 135 267 L 200 308" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 350 267 L 350 308" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 565 267 L 500 308" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Formula at bottom -->
  <rect x="50" y="370" width="600" height="0" rx="0"/>
</svg>
