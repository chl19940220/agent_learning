<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <marker id="arr-ev03" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
    <filter id="sh-ev03">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="350" fill="#f8f9fa" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Prompt 调优迭代闭环</text>
  <text x="400" y="48" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#777">系统化的四步迭代法，持续提升 Agent 表现</text>

  <!-- 中心闭环 -->
  <!-- 步骤1：明确问题 -->
  <rect x="300" y="70" width="200" height="65" rx="10" fill="#e74c3c" filter="url(#sh-ev03)"/>
  <text x="400" y="92" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">① 🔍 明确问题</text>
  <text x="400" y="110" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#f5c6cb">Agent 在哪些任务上</text>
  <text x="400" y="126" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#f5c6cb">表现不好？收集失败案例</text>

  <!-- 步骤2：分析原因 -->
  <rect x="560" y="170" width="200" height="65" rx="10" fill="#e67e22" filter="url(#sh-ev03)"/>
  <text x="660" y="192" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">② 🔬 分析原因</text>
  <text x="660" y="210" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#fde2c4">指令不清？上下文不够？</text>
  <text x="660" y="226" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#fde2c4">格式有误？定位根因</text>

  <!-- 步骤3：修改 Prompt -->
  <rect x="300" y="260" width="200" height="65" rx="10" fill="#27ae60" filter="url(#sh-ev03)"/>
  <text x="400" y="282" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">③ ✏️ 修改 Prompt</text>
  <text x="400" y="300" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#d4f0e0">针对性调整特定部分</text>
  <text x="400" y="316" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#d4f0e0">每次只改一个变量</text>

  <!-- 步骤4：对比评估 -->
  <rect x="40" y="170" width="200" height="65" rx="10" fill="#3498db" filter="url(#sh-ev03)"/>
  <text x="140" y="192" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">④ 📊 对比评估</text>
  <text x="140" y="210" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#d4e6f9">用基准测试验证是否改善</text>
  <text x="140" y="226" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#d4e6f9">对比 A/B 版本结果</text>

  <!-- 箭头：1 → 2 -->
  <path d="M500,102 Q535,102 555,150 L558,168" fill="none" stroke="#e74c3c" stroke-width="2" marker-end="url(#arr-ev03)"/>

  <!-- 箭头：2 → 3 -->
  <path d="M660,235 Q660,255 555,270 L500,280" fill="none" stroke="#e67e22" stroke-width="2" marker-end="url(#arr-ev03)"/>

  <!-- 箭头：3 → 4 -->
  <path d="M300,293 Q260,293 245,260 L242,235" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-ev03)"/>

  <!-- 箭头：4 → 1（循环） -->
  <path d="M140,170 Q140,130 240,100 L298,88" fill="none" stroke="#3498db" stroke-width="2" marker-end="url(#arr-ev03)"/>

  <!-- 中心：循环标识 -->
  <circle cx="400" cy="195" r="30" fill="#2c3e50" opacity="0.9"/>
  <text x="400" y="192" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="white">🔄 迭代</text>
  <text x="400" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#bdc3c7">直到满意</text>

  <!-- 右下角 tip -->
  <rect x="560" y="270" width="210" height="60" rx="6" fill="white" stroke="#f39c12" stroke-width="1"/>
  <text x="665" y="290" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#f39c12">📌 调优原则</text>
  <text x="665" y="306" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#555">• 每次只改一个变量</text>
  <text x="665" y="320" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#555">• 用数据说话，不凭感觉</text>
</svg>