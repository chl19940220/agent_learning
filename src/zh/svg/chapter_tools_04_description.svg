<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="800" height="350" rx="12" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">工具描述编写六要素</text>

  <!-- 六个要素 -->
  <rect x="30" y="50" width="230" height="80" rx="8" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="145" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#3498db">1️⃣ 功能描述（一句话）</text>
  <text x="145" y="90" text-anchor="middle" font-size="9" fill="#555">动词 + 操作对象 + 核心特征</text>
  <text x="145" y="106" text-anchor="middle" font-size="8" fill="#27ae60">✅ "在互联网上搜索实时信息"</text>
  <text x="145" y="120" text-anchor="middle" font-size="8" fill="#e74c3c">❌ "搜索东西"</text>

  <rect x="285" y="50" width="230" height="80" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">2️⃣ 适用场景</text>
  <text x="400" y="90" text-anchor="middle" font-size="9" fill="#555">列出"适合用于"的场景</text>
  <text x="400" y="106" text-anchor="middle" font-size="8" fill="#555">查询最新新闻、获取实时数据</text>
  <text x="400" y="120" text-anchor="middle" font-size="8" fill="#555">获取产品价格和评价</text>

  <rect x="540" y="50" width="230" height="80" rx="8" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="655" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">3️⃣ 不适用场景</text>
  <text x="655" y="90" text-anchor="middle" font-size="9" fill="#555">列出"不适合用于"的情况</text>
  <text x="655" y="106" text-anchor="middle" font-size="8" fill="#555">已知的历史知识（直接回答）</text>
  <text x="655" y="120" text-anchor="middle" font-size="8" fill="#555">减少模型误用工具</text>

  <rect x="30" y="150" width="230" height="80" rx="8" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="2"/>
  <text x="145" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">4️⃣ 参数说明</text>
  <text x="145" y="190" text-anchor="middle" font-size="9" fill="#555">类型 + 格式 + 示例</text>
  <text x="145" y="206" text-anchor="middle" font-size="8" fill="#27ae60">✅ "搜索关键词，如'北京天气'"</text>
  <text x="145" y="220" text-anchor="middle" font-size="8" fill="#e74c3c">❌ "query: string"</text>

  <rect x="285" y="150" width="230" height="80" rx="8" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="2"/>
  <text x="400" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c">5️⃣ 返回格式</text>
  <text x="400" y="190" text-anchor="middle" font-size="9" fill="#555">描述返回值的结构</text>
  <text x="400" y="206" text-anchor="middle" font-size="8" fill="#555">JSON 格式：{title, url, snippet}</text>
  <text x="400" y="220" text-anchor="middle" font-size="8" fill="#555">帮助模型正确解析结果</text>

  <rect x="540" y="150" width="230" height="80" rx="8" fill="#2980b9" opacity="0.12" stroke="#2980b9" stroke-width="2"/>
  <text x="655" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">6️⃣ 限制与注意事项</text>
  <text x="655" y="190" text-anchor="middle" font-size="9" fill="#555">速率限制、数据范围等</text>
  <text x="655" y="206" text-anchor="middle" font-size="8" fill="#555">"最多返回10条结果"</text>
  <text x="655" y="220" text-anchor="middle" font-size="8" fill="#555">"仅支持简体中文查询"</text>

  <!-- 对比 -->
  <rect x="60" y="255" width="300" height="70" rx="8" fill="#e74c3c" opacity="0.06" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="210" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c">❌ 糟糕的描述</text>
  <text x="210" y="293" text-anchor="middle" font-size="10" fill="#555">name: "search"</text>
  <text x="210" y="308" text-anchor="middle" font-size="10" fill="#555">description: "搜索东西"</text>

  <rect x="440" y="255" width="300" height="70" rx="8" fill="#27ae60" opacity="0.06" stroke="#27ae60" stroke-width="1.5"/>
  <text x="590" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">✅ 优质的描述</text>
  <text x="590" y="293" text-anchor="middle" font-size="10" fill="#555">name: "search_web"</text>
  <text x="590" y="308" text-anchor="middle" font-size="10" fill="#555">description: "在互联网上搜索实时信息..."</text>

  <text x="400" y="345" text-anchor="middle" font-size="10" fill="#95a5a6">LLM 完全依赖工具描述来选择和使用工具——它无法"看到"工具的代码实现</text>
</svg>
