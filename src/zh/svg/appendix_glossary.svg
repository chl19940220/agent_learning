<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="800" height="280" rx="12" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Agent 核心术语关系图</text>

  <!-- 核心层 -->
  <rect x="300" y="50" width="200" height="40" rx="8" fill="#e74c3c" opacity="0.25" stroke="#e74c3c" stroke-width="2"/>
  <text x="400" y="76" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">🤖 Agent (智能体)</text>

  <!-- 四大支柱 -->
  <rect x="20" y="110" width="175" height="55" rx="8" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="107" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#3498db">🧠 LLM / 推理</text>
  <text x="107" y="152" text-anchor="middle" font-size="10" fill="#666">Prompt · CoT · ReAct</text>

  <rect x="210" y="110" width="175" height="55" rx="8" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="2"/>
  <text x="297" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">🔧 工具 / 技能</text>
  <text x="297" y="152" text-anchor="middle" font-size="10" fill="#666">Function Calling · MCP</text>

  <rect x="400" y="110" width="175" height="55" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="487" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">💾 记忆 / 上下文</text>
  <text x="487" y="152" text-anchor="middle" font-size="10" fill="#666">短期 · 长期 · 工作记忆</text>

  <rect x="590" y="110" width="190" height="55" rx="8" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="685" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">📋 规划 / 反思</text>
  <text x="685" y="152" text-anchor="middle" font-size="10" fill="#666">分解 · 反思 · 重规划</text>

  <!-- 连接线 -->
  <line x1="350" y1="90" x2="107" y2="108" stroke="#ccc" stroke-width="1"/>
  <line x1="380" y1="90" x2="297" y2="108" stroke="#ccc" stroke-width="1"/>
  <line x1="420" y1="90" x2="487" y2="108" stroke="#ccc" stroke-width="1"/>
  <line x1="450" y1="90" x2="685" y2="108" stroke="#ccc" stroke-width="1"/>

  <!-- 扩展层 -->
  <rect x="20" y="180" width="125" height="45" rx="6" fill="#2980b9" opacity="0.10" stroke="#2980b9" stroke-width="1"/>
  <text x="82" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#2980b9">RAG</text>
  <text x="82" y="216" text-anchor="middle" font-size="9" fill="#666">检索增强生成</text>

  <rect x="155" y="180" width="125" height="45" rx="6" fill="#2980b9" opacity="0.10" stroke="#2980b9" stroke-width="1"/>
  <text x="217" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#2980b9">Multi-Agent</text>
  <text x="217" y="216" text-anchor="middle" font-size="9" fill="#666">多Agent协作</text>

  <rect x="290" y="180" width="125" height="45" rx="6" fill="#2980b9" opacity="0.10" stroke="#2980b9" stroke-width="1"/>
  <text x="352" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#2980b9">Agentic-RL</text>
  <text x="352" y="216" text-anchor="middle" font-size="9" fill="#666">强化学习训练</text>

  <rect x="425" y="180" width="125" height="45" rx="6" fill="#2980b9" opacity="0.10" stroke="#2980b9" stroke-width="1"/>
  <text x="487" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#2980b9">Evaluation</text>
  <text x="487" y="216" text-anchor="middle" font-size="9" fill="#666">评估与可观测</text>

  <rect x="560" y="180" width="110" height="45" rx="6" fill="#2980b9" opacity="0.10" stroke="#2980b9" stroke-width="1"/>
  <text x="615" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#2980b9">Security</text>
  <text x="615" y="216" text-anchor="middle" font-size="9" fill="#666">安全与对齐</text>

  <rect x="680" y="180" width="100" height="45" rx="6" fill="#2980b9" opacity="0.10" stroke="#2980b9" stroke-width="1"/>
  <text x="730" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#2980b9">Deploy</text>
  <text x="730" y="216" text-anchor="middle" font-size="9" fill="#666">部署与生产化</text>

  <!-- 底部标注 -->
  <rect x="20" y="240" width="760" height="28" rx="6" fill="#e74c3c" opacity="0.06"/>
  <text x="400" y="259" text-anchor="middle" font-size="11" fill="#888">完整术语表覆盖 50+ 核心概念，按字母序排列，每个术语包含中英文对照和简明定义</text>
</svg>