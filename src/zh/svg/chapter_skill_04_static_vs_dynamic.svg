<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" width="700" height="230">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arr11" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="700" height="230" fill="#f0f4f8" rx="14"/>
  <text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">静态发现 vs 动态发现</text>

  <!-- 静态发现 -->
  <rect x="20" y="42" width="320" height="82" rx="10" fill="#e74c3c" opacity="0.08" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="180" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">🔤 静态发现（关键词匹配）</text>
  <text x="40" y="82" font-size="11" fill="#555">查询："分析一下客户流失率"</text>
  <text x="40" y="100" font-size="11" fill="#555">匹配：tags 含 "分析" → 找到 3 个 Agent</text>
  <text x="40" y="118" font-size="11" fill="#e74c3c">⚠️ 不够精确，可能返回无关的"文本分析"</text>

  <!-- 动态发现 -->
  <rect x="360" y="42" width="320" height="82" rx="10" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="1.5"/>
  <text x="520" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">🧠 动态发现（语义检索）</text>
  <text x="380" y="82" font-size="11" fill="#555">查询："分析一下客户流失率"</text>
  <text x="380" y="100" font-size="11" fill="#555">嵌入向量 → 语义相似度计算</text>
  <text x="380" y="118" font-size="11" fill="#27ae60">✅ 精确匹配"客户行为分析"（0.92）</text>

  <!-- 对比结果 -->
  <rect x="20" y="140" width="320" height="75" rx="10" fill="#e74c3c" opacity="0.05"/>
  <text x="40" y="165" font-size="11" fill="#555">结果："文本分析 Agent" ❌</text>
  <text x="40" y="185" font-size="11" fill="#555">结果："数据分析 Agent" 🤷</text>
  <text x="40" y="205" font-size="11" fill="#555">结果："客户分析 Agent" ✅</text>

  <rect x="360" y="140" width="320" height="75" rx="10" fill="#27ae60" opacity="0.05"/>
  <text x="380" y="165" font-size="11" fill="#27ae60">→ "客户行为分析" (相似度 0.92) ✅</text>
  <text x="380" y="185" font-size="11" fill="#888">→ "销售数据分析" (相似度 0.71)</text>
  <text x="380" y="205" font-size="11" fill="#ccc">→ "文本情感分析" (相似度 0.45) ✘</text>
</svg>
