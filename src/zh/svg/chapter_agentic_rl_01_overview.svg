<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#f0f4f8"/>
      <stop offset="100%" style="stop-color:#e8eef5"/>
    </linearGradient>
  </defs>
  
  <rect width="900" height="520" fill="url(#bgGrad)" rx="16"/>
  
  <!-- 标题 -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a365d" font-family="system-ui">Agentic-RL 训练架构总览</text>
  
  <!-- 左侧：Prompt 方式 -->
  <rect x="30" y="70" width="260" height="420" rx="14" fill="#fff5f5" stroke="#fc8181" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#c53030" font-family="system-ui">Prompt 方式</text>
  
  <rect x="55" y="120" width="210" height="50" rx="10" fill="#fff" stroke="#fc8181" stroke-width="1"/>
  <text x="160" y="150" text-anchor="middle" font-size="13" fill="#2d3748" font-family="system-ui">通用基座模型 (GPT-4/Qwen)</text>
  
  <text x="160" y="195" text-anchor="middle" font-size="20" fill="#c53030">＋</text>
  
  <rect x="55" y="210" width="210" height="50" rx="10" fill="#fff" stroke="#fc8181" stroke-width="1"/>
  <text x="160" y="240" text-anchor="middle" font-size="13" fill="#2d3748" font-family="system-ui">精心设计的 Prompt</text>
  
  <text x="160" y="285" text-anchor="middle" font-size="20" fill="#c53030">＋</text>
  
  <rect x="55" y="300" width="210" height="50" rx="10" fill="#fff" stroke="#fc8181" stroke-width="1"/>
  <text x="160" y="330" text-anchor="middle" font-size="13" fill="#2d3748" font-family="system-ui">工具定义 / 示例</text>
  
  <text x="160" y="380" text-anchor="middle" font-size="20" fill="#c53030">↓</text>
  
  <rect x="55" y="395" width="210" height="50" rx="10" fill="#fed7d7" stroke="#fc8181" stroke-width="1.5"/>
  <text x="160" y="415" text-anchor="middle" font-size="12" font-weight="bold" fill="#c53030" font-family="system-ui">天花板 = 基座模型能力</text>
  <text x="160" y="435" text-anchor="middle" font-size="11" fill="#742a2a" font-family="system-ui">无法针对特定任务优化</text>
  
  <!-- 中间箭头 -->
  <text x="340" y="290" text-anchor="middle" font-size="28" fill="#4a5568">→</text>
  
  <!-- 右侧：Agentic-RL 方式 -->
  <rect x="380" y="70" width="490" height="420" rx="14" fill="#f0fff4" stroke="#68d391" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="625" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#276749" font-family="system-ui">Agentic-RL 方式</text>
  
  <!-- SFT 阶段 -->
  <rect x="405" y="120" width="200" height="150" rx="12" fill="#fff" stroke="#4299e1" stroke-width="1.5"/>
  <text x="505" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6cb0" font-family="system-ui">阶段一：SFT</text>
  <text x="505" y="170" text-anchor="middle" font-size="11" fill="#4a5568" font-family="system-ui">监督微调 + LoRA</text>
  
  <rect x="420" y="185" width="170" height="24" rx="6" fill="#ebf8ff" stroke="#4299e1" stroke-width="0.5"/>
  <text x="505" y="202" text-anchor="middle" font-size="10" fill="#2b6cb0" font-family="system-ui">📋 高质量 Agent 轨迹数据</text>
  
  <rect x="420" y="215" width="170" height="24" rx="6" fill="#ebf8ff" stroke="#4299e1" stroke-width="0.5"/>
  <text x="505" y="232" text-anchor="middle" font-size="10" fill="#2b6cb0" font-family="system-ui">🎯 学会 Agent 行为格式</text>
  
  <rect x="420" y="245" width="170" height="18" rx="6" fill="#bee3f8"/>
  <text x="505" y="258" text-anchor="middle" font-size="10" fill="#2b6cb0" font-family="system-ui">模仿"正确的做法"</text>
  
  <!-- 箭头 -->
  <line x1="605" y1="195" x2="640" y2="195" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <!-- GRPO 阶段 -->
  <rect x="645" y="120" width="200" height="150" rx="12" fill="#fff" stroke="#48bb78" stroke-width="1.5"/>
  <text x="745" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#276749" font-family="system-ui">阶段二：GRPO</text>
  <text x="745" y="170" text-anchor="middle" font-size="11" fill="#4a5568" font-family="system-ui">强化学习优化</text>
  
  <rect x="660" y="185" width="170" height="24" rx="6" fill="#f0fff4" stroke="#48bb78" stroke-width="0.5"/>
  <text x="745" y="202" text-anchor="middle" font-size="10" fill="#276749" font-family="system-ui">🏆 奖励函数评估</text>
  
  <rect x="660" y="215" width="170" height="24" rx="6" fill="#f0fff4" stroke="#48bb78" stroke-width="0.5"/>
  <text x="745" y="232" text-anchor="middle" font-size="10" fill="#276749" font-family="system-ui">🔄 组内比较优化</text>
  
  <rect x="660" y="245" width="170" height="18" rx="6" fill="#c6f6d5"/>
  <text x="745" y="258" text-anchor="middle" font-size="10" fill="#276749" font-family="system-ui">超越模仿，探索最优策略</text>
  
  <!-- 六大能力 -->
  <text x="625" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#276749" font-family="system-ui">训练提升的六大核心能力</text>
  
  <rect x="405" y="315" width="140" height="30" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="0.5"/>
  <text x="475" y="335" text-anchor="middle" font-size="11" fill="#276749" font-family="system-ui">🎯 指令遵循</text>
  
  <rect x="555" y="315" width="140" height="30" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="0.5"/>
  <text x="625" y="335" text-anchor="middle" font-size="11" fill="#276749" font-family="system-ui">🔧 工具使用</text>
  
  <rect x="705" y="315" width="140" height="30" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="0.5"/>
  <text x="775" y="335" text-anchor="middle" font-size="11" fill="#276749" font-family="system-ui">🧠 多步推理</text>
  
  <rect x="405" y="355" width="140" height="30" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="0.5"/>
  <text x="475" y="375" text-anchor="middle" font-size="11" fill="#276749" font-family="system-ui">🔄 自我纠错</text>
  
  <rect x="555" y="355" width="140" height="30" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="0.5"/>
  <text x="625" y="375" text-anchor="middle" font-size="11" fill="#276749" font-family="system-ui">🔍 探索策略</text>
  
  <rect x="705" y="355" width="140" height="30" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="0.5"/>
  <text x="775" y="375" text-anchor="middle" font-size="11" fill="#276749" font-family="system-ui">⚡ 效率优化</text>
  
  <!-- 最终结果 -->
  <rect x="455" y="405" width="340" height="55" rx="12" fill="#276749" filter="url(#shadow)"/>
  <text x="625" y="428" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="system-ui">✅ 能力内化到模型权重</text>
  <text x="625" y="448" text-anchor="middle" font-size="11" fill="#c6f6d5" font-family="system-ui">可持续优化 · 推理高效 · 针对任务深度定制</text>
  
  <!-- 底部说明 -->
  <text x="450" y="508" text-anchor="middle" font-size="11" fill="#718096" font-family="system-ui">图 18-1  Agentic-RL 训练架构：从 Prompt 方式到 SFT+GRPO 两阶段训练</text>
</svg>
