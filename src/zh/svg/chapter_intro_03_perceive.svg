<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="700" height="200" fill="#f8f9fa" rx="12"/>
  <text x="350" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">感知阶段：信息整合流程</text>

  <!-- Input sources -->
  <rect x="30" y="55" width="110" height="45" rx="8" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="1.5"/>
  <text x="85" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3498db">用户消息</text>
  <text x="85" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">自然语言输入</text>

  <rect x="30" y="115" width="110" height="45" rx="8" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="1.5"/>
  <text x="85" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">工具结果</text>
  <text x="85" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">API / 搜索返回</text>

  <rect x="155" y="85" width="110" height="45" rx="8" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="210" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9b59b6">系统事件</text>
  <text x="210" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">错误 / 状态变化</text>

  <!-- Arrows to integration -->
  <path d="M 143 77 L 310 107" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 143 137 L 310 117" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 268 107 L 310 112" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Integration box -->
  <rect x="313" y="70" width="160" height="70" rx="10" fill="#e67e22" opacity="0.15" stroke="#e67e22" stroke-width="2"/>
  <text x="393" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e67e22">信息整合与格式化</text>
  <text x="393" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">统一为文本形式</text>
  <text x="393" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">构建上下文</text>

  <!-- Arrow to state update -->
  <path d="M 475 105 L 515 105" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- State update box -->
  <rect x="518" y="70" width="155" height="70" rx="10" fill="#4dabf7" opacity="0.15" stroke="#4dabf7" stroke-width="2"/>
  <text x="595" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2980b9">更新 Agent 状态</text>
  <text x="595" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">记录观察结果</text>
  <text x="595" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">准备进入思考阶段</text>

  <!-- Stage label -->
  <rect x="30" y="165" width="640" height="25" rx="6" fill="#e3f2fd"/>
  <text x="350" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2980b9">👁️ 感知阶段：将所有外部信息统一整合，为 LLM 的思考做准备</text>
</svg>
