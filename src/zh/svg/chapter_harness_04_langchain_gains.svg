<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="720" height="340">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>

  <rect width="720" height="340" fill="#f8f9fa" rx="14"/>
  <text x="360" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">LangChain Terminal Bench 2.0：+13.7% 来自哪里？</text>
  <text x="360" y="48" text-anchor="middle" font-size="11" fill="#7f8c8d">不换模型，不微调，纯 Harness 改进  |  52.8% → 66.5%（排名 30+ → Top 5）</text>

  <!-- Y axis -->
  <line x1="80" y1="65" x2="80" y2="280" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="72" y="70" text-anchor="end" font-size="9" fill="#7f8c8d">+14%</text>
  <text x="72" y="100" text-anchor="end" font-size="9" fill="#7f8c8d">+12%</text>
  <text x="72" y="130" text-anchor="end" font-size="9" fill="#7f8c8d">+10%</text>
  <text x="72" y="160" text-anchor="end" font-size="9" fill="#7f8c8d">+8%</text>
  <text x="72" y="190" text-anchor="end" font-size="9" fill="#7f8c8d">+6%</text>
  <text x="72" y="220" text-anchor="end" font-size="9" fill="#7f8c8d">+4%</text>
  <text x="72" y="250" text-anchor="end" font-size="9" fill="#7f8c8d">+2%</text>
  <text x="72" y="280" text-anchor="end" font-size="9" fill="#7f8c8d">0%</text>
  <!-- grid lines -->
  <line x1="80" y1="280" x2="700" y2="280" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="80" y1="220" x2="700" y2="220" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="80" y1="160" x2="700" y2="160" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="80" y1="100" x2="700" y2="100" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Stacked bar starts from 280 (0%) going up -->
  <!-- Each 1% = (280-65)/14 ≈ 15.36px -->
  <!-- Let's use 14px per 1% for clean math -->
  <!-- +7.1% = 99px; +2.8% = 39px; +1.9% = 27px; +1.4% = 20px; +0.5% = 7px -->

  <!-- Improvement 1: PBVF +7.1% (largest, bottom of stack) -->
  <rect x="130" y="181" width="100" height="99" rx="6" fill="#27ae60" opacity="0.85"/>
  <text x="180" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">+7.1%</text>
  <text x="180" y="243" text-anchor="middle" font-size="8" fill="#fff">PBVF</text>
  <text x="180" y="256" text-anchor="middle" font-size="8" fill="#fff">验证循环</text>

  <!-- Improvement 2: Reasoning Sandwich +2.8% -->
  <rect x="250" y="241" width="100" height="39" rx="6" fill="#3498db" opacity="0.85"/>
  <text x="300" y="258" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">+2.8%</text>
  <text x="300" y="272" text-anchor="middle" font-size="8" fill="#fff">推理三明治</text>

  <!-- Improvement 3: Env Context +1.9% -->
  <rect x="370" y="253" width="100" height="27" rx="6" fill="#e67e22" opacity="0.85"/>
  <text x="420" y="265" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">+1.9%</text>
  <text x="420" y="278" text-anchor="middle" font-size="8" fill="#fff">环境上下文</text>

  <!-- Improvement 4: Loop Detection +1.4% -->
  <rect x="490" y="260" width="100" height="20" rx="6" fill="#9b59b6" opacity="0.85"/>
  <text x="540" y="274" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">+1.4%  死循环检测</text>

  <!-- Improvement 5: Meta +0.5% -->
  <rect x="610" y="273" width="70" height="7" rx="3" fill="#e74c3c" opacity="0.85"/>
  <text x="645" y="271" text-anchor="middle" font-size="8" fill="#e74c3c">+0.5% Meta</text>

  <!-- Annotations with lines -->
  <line x1="180" y1="181" x2="180" y2="160" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="180" y="155" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="bold">最大单项改进</text>
  <text x="180" y="143" text-anchor="middle" font-size="8" fill="#27ae60">强制验证步骤</text>

  <line x1="300" y1="241" x2="300" y2="215" stroke="#3498db" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="300" y="210" text-anchor="middle" font-size="9" fill="#3498db">规划/验证高预算</text>
  <text x="300" y="198" text-anchor="middle" font-size="8" fill="#3498db">实现低预算</text>

  <line x1="420" y1="253" x2="420" y2="225" stroke="#e67e22" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="420" y="220" text-anchor="middle" font-size="9" fill="#e67e22">最高 ROI</text>
  <text x="420" y="208" text-anchor="middle" font-size="8" fill="#e67e22">改动最小效果显著</text>

  <!-- Total bar outline -->
  <rect x="110" y="181" width="140" height="99" rx="6" fill="none" stroke="#27ae60" stroke-width="0.5" stroke-dasharray="2,2"/>

  <!-- Total label -->
  <rect x="160" y="290" width="400" height="40" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="360" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">总提升：52.8% → 66.5%（+13.7 个百分点）</text>
  <text x="360" y="323" text-anchor="middle" font-size="10" fill="#2c3e50">排名从 30+ → Top 5  |  不换模型，不微调，纯 Harness 改进</text>
</svg>
