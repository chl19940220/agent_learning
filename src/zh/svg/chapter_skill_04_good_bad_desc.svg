<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="700" height="280" fill="#f0f4f8" rx="14"/>
  <text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Agent Card 技能描述最佳实践</text>

  <!-- 好的描述 -->
  <rect x="20" y="42" width="320" height="140" rx="10" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="1.5"/>
  <text x="180" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">✅ 好的技能描述</text>
  <text x="40" y="88" font-size="11" fill="#555" font-weight="bold">name: "CSV 数据分析"</text>
  <text x="40" y="108" font-size="10" fill="#555">description: "对 CSV 格式的表格数据进行</text>
  <text x="40" y="123" font-size="10" fill="#555">数据清洗、描述统计、趋势分析和相关性分析"</text>
  <text x="40" y="143" font-size="11" fill="#555" font-weight="bold">tags: [csv, data, analysis, statistics, trend]</text>
  <text x="40" y="168" font-size="10" fill="#27ae60">→ 具体、丰富、区分输入/输出</text>

  <!-- 差的描述 -->
  <rect x="360" y="42" width="320" height="140" rx="10" fill="#e74c3c" opacity="0.08" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="520" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">❌ 差的技能描述</text>
  <text x="380" y="88" font-size="11" fill="#555" font-weight="bold">name: "分析"</text>
  <text x="380" y="108" font-size="10" fill="#555">description: "分析数据"</text>
  <text x="380" y="133" font-size="11" fill="#555" font-weight="bold">tags: [data]</text>
  <text x="380" y="168" font-size="10" fill="#e74c3c">→ 模糊、简单、缺乏细节</text>

  <!-- 关键原则 -->
  <rect x="20" y="200" width="660" height="65" rx="10" fill="#f39c12" opacity="0.08" stroke="#f39c12" stroke-width="1"/>
  <text x="350" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#f39c12">📌 关键原则</text>
  <text x="120" y="248" text-anchor="middle" font-size="11" fill="#555">1. 描述要具体</text>
  <text x="320" y="248" text-anchor="middle" font-size="11" fill="#555">2. 标签要丰富</text>
  <text x="540" y="248" text-anchor="middle" font-size="11" fill="#555">3. 区分输入/输出模式</text>
</svg>
