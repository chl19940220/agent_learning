<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" width="560" height="160" font-family="'Courier New', 'PingFang SC', monospace">
  <rect width="560" height="160" rx="12" fill="#1e1e2e"/>
  <text x="24" y="30" font-size="13" font-weight="bold" fill="#cdd6f4">hello_agent/</text>
