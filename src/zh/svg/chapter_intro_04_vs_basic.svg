<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" width="760" height="220">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="760" height="220" fill="#f8f9fa" rx="12"/>
  <text x="380" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">传统程序 vs Agent：根本区别</text>

  <!-- 传统程序 box -->
  <rect x="30" y="55" width="320" height="140" rx="12" fill="#e3f2fd" stroke="#3498db" stroke-width="2"/>
  <text x="190" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2980b9">💻 传统程序</text>
  <rect x="50" y="92" width="80" height="40" rx="8" fill="#3498db" opacity="0.2" stroke="#3498db" stroke-width="1.5"/>
  <text x="90" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2980b9">输入</text>
  <path d="M 133 112 L 165 112" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="168" y="92" width="110" height="40" rx="8" fill="#3498db" opacity="0.2" stroke="#3498db" stroke-width="1.5"/>
  <text x="223" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2980b9">固定逻辑</text>
  <text x="223" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">if/else/switch</text>
  <path d="M 281 112 L 295 112" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="298" y="92" width="46" height="40" rx="4" fill="#3498db" opacity="0.2" stroke="#3498db" stroke-width="1.5"/>
  <text x="321" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2980b9">输出</text>
  <text x="190" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">✅ 确定性的</text>
  <text x="190" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">✅ 人写的每一步逻辑</text>

  <!-- Arrow between -->
  <text x="380" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#bdc3c7">⟷</text>
  <text x="380" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">互补</text>

  <!-- Agent box -->
  <rect x="410" y="55" width="320" height="140" rx="12" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
  <text x="570" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">🧠 Agent</text>
  <rect x="430" y="92" width="80" height="40" rx="8" fill="#27ae60" opacity="0.2" stroke="#27ae60" stroke-width="1.5"/>
  <text x="470" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#27ae60">目标</text>
  <path d="M 513 112 L 540 112" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="543" y="88" width="110" height="48" rx="8" fill="#27ae60" opacity="0.2" stroke="#27ae60" stroke-width="1.5"/>
  <text x="598" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">自主决策</text>
  <text x="598" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">LLM 推理</text>
  <text x="598" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">+ 工具调用</text>
  <path d="M 656 112 L 668 112" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="671" y="92" width="46" height="40" rx="4" fill="#27ae60" opacity="0.2" stroke="#27ae60" stroke-width="1.5"/>
  <text x="694" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">动作</text>
  <text x="694" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">输出</text>
  <text x="570" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">🔀 非确定性的</text>
  <text x="570" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">🤖 AI 自己决定每一步</text>
</svg>
