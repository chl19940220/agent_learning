<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#27ae60"/>
    </marker>
  </defs>

  <rect width="760" height="420" fill="#f8f9fa" rx="14"/>
  <text x="380" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">六大工程支柱全景图</text>

  <!-- Center label -->
  <ellipse cx="380" cy="215" rx="72" ry="42" fill="#2c3e50" opacity="0.9"/>
  <text x="380" y="209" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Harness</text>
  <text x="380" y="225" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Engineering</text>

  <!-- ── Pillar 1: Context Architecture (top-left) ── -->
  <rect x="30" y="48" width="210" height="110" rx="12" fill="#e8f4fd" stroke="#3498db" stroke-width="2"/>
  <rect x="30" y="48" width="210" height="30" rx="12" fill="#3498db" opacity="0.85"/>
  <rect x="30" y="65" width="210" height="13" fill="#3498db" opacity="0.85"/>
  <text x="135" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">① 上下文架构</text>
  <text x="135" y="94" text-anchor="middle" font-size="10" font-weight="bold" fill="#3498db">Context Architecture</text>
  <text x="45" y="112" font-size="9" fill="#555">精准设计进入模型的信息</text>
  <text x="45" y="127" font-size="9" fill="#555">生命周期：注入→监控→压缩→归档</text>
  <text x="45" y="142" font-size="9" fill="#555">40% 利用率触发自动压缩</text>
  <!-- connector line to center -->
  <line x1="240" y1="103" x2="310" y2="185" stroke="#3498db" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- ── Pillar 2: Arch Constraints (top-right) ── -->
  <rect x="520" y="48" width="210" height="110" rx="12" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <rect x="520" y="48" width="210" height="30" rx="12" fill="#f39c12" opacity="0.85"/>
  <rect x="520" y="65" width="210" height="13" fill="#f39c12" opacity="0.85"/>
  <text x="625" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">② 架构约束</text>
  <text x="625" y="94" text-anchor="middle" font-size="10" font-weight="bold" fill="#e67e22">Architectural Constraints</text>
  <text x="535" y="112" font-size="9" fill="#555">工具白名单与权限分层</text>
  <text x="535" y="127" font-size="9" fill="#555">强类型参数约束（防注入）</text>
  <text x="535" y="142" font-size="9" fill="#555">最小权限暴露原则</text>
  <line x1="520" y1="103" x2="450" y2="185" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- ── Pillar 3: Self-Verify Loop (middle-left) ── -->
  <rect x="30" y="180" width="210" height="110" rx="12" fill="#f0fdf4" stroke="#27ae60" stroke-width="2"/>
  <rect x="30" y="180" width="210" height="30" rx="12" fill="#27ae60" opacity="0.85"/>
  <rect x="30" y="197" width="210" height="13" fill="#27ae60" opacity="0.85"/>
  <text x="135" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">③ 自验证循环</text>
  <text x="135" y="226" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">Self-Verification Loop</text>
  <text x="45" y="244" font-size="9" fill="#555">Plan → Build → Verify → Fix</text>
  <text x="45" y="259" font-size="9" fill="#555">防作弊检查（不可删测试）</text>
  <text x="45" y="274" font-size="9" fill="#555">强制完成前通过验证门控</text>
  <line x1="240" y1="235" x2="310" y2="225" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- ── Pillar 4: Context Isolation (middle-right) ── -->
  <rect x="520" y="180" width="210" height="110" rx="12" fill="#fdf2fb" stroke="#9b59b6" stroke-width="2"/>
  <rect x="520" y="180" width="210" height="30" rx="12" fill="#9b59b6" opacity="0.85"/>
  <rect x="520" y="197" width="210" height="13" fill="#9b59b6" opacity="0.85"/>
  <text x="625" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">④ 上下文隔离</text>
  <text x="625" y="226" text-anchor="middle" font-size="10" font-weight="bold" fill="#9b59b6">Context Isolation</text>
  <text x="535" y="244" font-size="9" fill="#555">每个 Agent 独立上下文</text>
  <text x="535" y="259" font-size="9" fill="#555">消息总线结构化传递</text>
  <text x="535" y="274" font-size="9" fill="#555">子 Agent 错误不污染主 Agent</text>
  <line x1="520" y1="235" x2="452" y2="225" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- ── Pillar 5: Entropy Management (bottom-left) ── -->
  <rect x="30" y="310" width="210" height="95" rx="12" fill="#fef5f5" stroke="#e74c3c" stroke-width="2"/>
  <rect x="30" y="310" width="210" height="30" rx="12" fill="#e74c3c" opacity="0.85"/>
  <rect x="30" y="327" width="210" height="13" fill="#e74c3c" opacity="0.85"/>
  <text x="135" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">⑤ 熵治理</text>
  <text x="135" y="355" text-anchor="middle" font-size="10" font-weight="bold" fill="#e74c3c">Entropy Management</text>
  <text x="45" y="372" font-size="9" fill="#555">定期扫描代码库质量漂移</text>
  <text x="45" y="387" font-size="9" fill="#555">自动提交清洁 PR</text>
  <line x1="190" y1="358" x2="330" y2="258" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- ── Pillar 6: Detachability (bottom-right) ── -->
  <rect x="520" y="310" width="210" height="95" rx="12" fill="#f0f4ff" stroke="#2c3e50" stroke-width="2"/>
  <rect x="520" y="310" width="210" height="30" rx="12" fill="#2c3e50" opacity="0.85"/>
  <rect x="520" y="327" width="210" height="13" fill="#2c3e50" opacity="0.85"/>
  <text x="625" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">⑥ 可拆卸性</text>
  <text x="625" y="355" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Detachability</text>
  <text x="535" y="372" font-size="9" fill="#555">随模型能力提升优雅精简</text>
  <text x="535" y="387" font-size="9" fill="#555">组件元数据记录拆除理由</text>
  <line x1="520" y1="358" x2="430" y2="258" stroke="#2c3e50" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- Pillar priority labels -->
  <text x="380" y="275" text-anchor="middle" font-size="8" fill="#fff" opacity="0.7">优先级 ⭐⭐⭐⭐⭐</text>
</svg>
