<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" width="520" height="340">
  <rect width="520" height="340" fill="#f8f9fa" rx="12"/>
  <text x="260" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Generative Agents 三LayerMemory Architecture</text>

  <!-- Layer 1: Memory Stream -->
  <rect x="30" y="48" width="460" height="80" rx="10" fill="#3498db" opacity="0.1" stroke="#3498db" stroke-width="2"/>
  <text x="50" y="70" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498db">📝 1. MemoryStream Memory Stream</text>
  <text x="50" y="88" font-family="Arial, sans-serif" font-size="10" fill="#555">├── 记录 Agent 的所有经历（Observe、Dialogue、Act）</text>
  <text x="50" y="104" font-family="Arial, sans-serif" font-size="10" fill="#555">├── 每条Memory附带时间戳、Importance Scoring</text>
  <text x="50" y="120" font-family="Arial, sans-serif" font-size="10" fill="#888">└── 是MemorySystem的"原始DataLayer"</text>

  <!-- Layer 2: Reflection -->
  <rect x="30" y="138" width="460" height="80" rx="10" fill="#9b59b6" opacity="0.1" stroke="#9b59b6" stroke-width="2"/>
  <text x="50" y="160" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9b59b6">🧠 2. Reflection Reflection</text>
  <text x="50" y="178" font-family="Arial, sans-serif" font-size="10" fill="#555">├── 定期Trigger（when积累的Memory重要性超过阈值时）</text>
  <text x="50" y="194" font-family="Arial, sans-serif" font-size="10" fill="#555">├── from近期MemoryCenter提炼高Layer次洞察</text>
  <text x="50" y="210" font-family="Arial, sans-serif" font-size="10" fill="#888">└── ReflectionResult也存入MemoryStream（可Layer次化Reflection）</text>

  <!-- Example -->
  <rect x="310" y="164" width="170" height="40" rx="6" fill="#9b59b6" opacity="0.08"/>
  <text x="395" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9b59b6">多次Observe "Klausin画画"</text>
  <text x="395" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9b59b6">→ "Klaus对艺术充满热情"</text>

  <!-- Layer 3: Retrieval -->
  <rect x="30" y="228" width="460" height="100" rx="10" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="2"/>
  <text x="50" y="250" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">🔍 3. Retrieval Retrieval</text>
  <text x="50" y="268" font-family="Arial, sans-serif" font-size="10" fill="#555">├── when Agent 需要做Decision时，fromMemoryStreamCenterRetrieval相关Memory</text>
  <text x="50" y="284" font-family="Arial, sans-serif" font-size="10" fill="#555">└── Retrievalbased on三个维度的加权组合：</text>

  <!-- Three dimensions -->
  <rect x="70" y="292" width="130" height="28" rx="6" fill="#e74c3c" opacity="0.1" stroke="#e74c3c" stroke-width="1"/>
  <text x="135" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">⏱️ 时效性 Recency</text>

  <rect x="210" y="292" width="130" height="28" rx="6" fill="#f39c12" opacity="0.1" stroke="#f39c12" stroke-width="1"/>
  <text x="275" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e67e22">⭐ 重要性 Importance</text>

  <rect x="350" y="292" width="130" height="28" rx="6" fill="#3498db" opacity="0.1" stroke="#3498db" stroke-width="1"/>
  <text x="415" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3498db">🎯 相关性 Relevance</text>
</svg>
