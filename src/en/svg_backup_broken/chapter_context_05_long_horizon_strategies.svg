<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8eef5;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9"/>
    </marker>
  </defs>
  
  <rect width="900" height="440" fill="url(#bgGrad)" rx="12"/>
  
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">长时程Task的三大ContextPolicy</text>
  <text x="450" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#718096">from被动应对to主动管理，再toArchitecture级解决</text>
  
  <!-- Strategy 1: Compaction -->
  <rect x="30" y="80" width="270" height="280" rx="14" fill="white" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="80" width="270" height="45" rx="14" fill="#e74c3c"/>
  <rect x="30" y="111" width="270" height="14" fill="#e74c3c"/>
  <text x="165" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="white">📦 压缩整合</text>
  
  <text x="50" y="150" font-family="system-ui, sans-serif" font-size="11" fill="#555" font-weight="bold">Compaction</text>
  <text x="50" y="170" font-family="system-ui, sans-serif" font-size="10" fill="#666">定期将冗长Context Compression为Summarization</text>
  
  <!-- Compaction diagram -->
  <rect x="55" y="185" width="100" height="25" rx="4" fill="#fff5f5" stroke="#e74c3c" stroke-width="1"/>
  <text x="105" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#e74c3c">长Dialogue历史</text>
  <text x="175" y="202" font-family="system-ui, sans-serif" font-size="14" fill="#999">→</text>
  <rect x="195" y="185" width="80" height="25" rx="4" fill="#fff5f5" stroke="#e74c3c" stroke-width="1"/>
  <text x="235" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#e74c3c">精炼Summarization</text>
  
  <text x="50" y="235" font-family="system-ui, sans-serif" font-size="10" fill="#666">✅ 实现简单，Cost低</text>
  <text x="50" y="252" font-family="system-ui, sans-serif" font-size="10" fill="#666">✅ 5:1 ~ 10:1 压缩比</text>
  <text x="50" y="269" font-family="system-ui, sans-serif" font-size="10" fill="#666">⚠️ 细节可能丢失</text>
  <text x="50" y="286" font-family="system-ui, sans-serif" font-size="10" fill="#666">⚠️ 被动Trigger（事Back补救）</text>
  
  <rect x="45" y="302" width="240" height="22" rx="4" fill="#fff5f5"/>
  <text x="165" y="317" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#e74c3c" font-weight="bold">代表：ChatGPT Dialogue压缩</text>
  
  <rect x="45" y="330" width="240" height="20" rx="4" fill="#fce4ec"/>
  <text x="165" y="344" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#c62828">适合：20~50 轮的Center等Task</text>
  
  <!-- Strategy 2: Structured Notes -->
  <rect x="315" y="80" width="270" height="280" rx="14" fill="white" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <rect x="315" y="80" width="270" height="45" rx="14" fill="#27ae60"/>
  <rect x="315" y="111" width="270" height="14" fill="#27ae60"/>
  <text x="450" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="white">📓 结构化笔记</text>
  
  <text x="335" y="150" font-family="system-ui, sans-serif" font-size="11" fill="#555" font-weight="bold">Structured Notes</text>
  <text x="335" y="170" font-family="system-ui, sans-serif" font-size="10" fill="#666">Agent 主动维护关键Info笔记</text>
  
  <!-- Notes diagram -->
  <rect x="340" y="185" width="220" height="60" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="350" y="200" font-family="monospace" font-size="9" fill="#2d7a3a">📌 Goal: AnalysisRetention Rate</text>
  <text x="350" y="214" font-family="monospace" font-size="9" fill="#2d7a3a">✅ 步骤1: DataQuery</text>
  <text x="350" y="228" font-family="monospace" font-size="9" fill="#2d7a3a">🔄 步骤2: 趋势Analysis</text>
  <text x="350" y="240" font-family="monospace" font-size="9" fill="#2d7a3a">📊 7日留存: 38% (↓12%)</text>
  
  <text x="335" y="268" font-family="system-ui, sans-serif" font-size="10" fill="#666">✅ ~500 tokens 替代 10K+</text>
  <text x="335" y="285" font-family="system-ui, sans-serif" font-size="10" fill="#666">✅ Info精确可控</text>
  <text x="335" y="302" font-family="system-ui, sans-serif" font-size="10" fill="#666">✅ 主动提炼（Real-timeUpdate）</text>
  
  <rect x="330" y="314" width="240" height="22" rx="4" fill="#eafaf1"/>
  <text x="450" y="329" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#27ae60" font-weight="bold">代表：Claude Agent NoteTool</text>
  
  <rect x="330" y="342" width="240" height="20" rx="4" fill="#e8f5e9"/>
  <text x="450" y="356" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1b5e20">适合：多步骤Analysisand持续Task</text>
  
  <!-- Strategy 3: Sub-agent -->
  <rect x="600" y="80" width="270" height="280" rx="14" fill="white" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
  <rect x="600" y="80" width="270" height="45" rx="14" fill="#3498db"/>
  <rect x="600" y="111" width="270" height="14" fill="#3498db"/>
  <text x="735" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="white">🤖 子代理Architecture</text>
  
  <text x="620" y="150" font-family="system-ui, sans-serif" font-size="11" fill="#555" font-weight="bold">Sub-agent Architecture</text>
  <text x="620" y="170" font-family="system-ui, sans-serif" font-size="10" fill="#666">分while治之，独立Context</text>
  
  <!-- Sub-agent diagram -->
  <rect x="690" y="185" width="70" height="25" rx="4" fill="#ebf8ff" stroke="#3498db" stroke-width="1"/>
  <text x="725" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#3498db">主 Agent</text>
  
  <line x1="690" y1="210" x2="650" y2="225" stroke="#3498db" stroke-width="1"/>
  <line x1="725" y1="210" x2="725" y2="225" stroke="#3498db" stroke-width="1"/>
  <line x1="760" y1="210" x2="800" y2="225" stroke="#3498db" stroke-width="1"/>
  
  <rect x="620" y="225" width="65" height="20" rx="3" fill="#ebf8ff" stroke="#3498db" stroke-width="1"/>
  <text x="652" y="239" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#3498db">Search Agent</text>
  <rect x="693" y="225" width="65" height="20" rx="3" fill="#ebf8ff" stroke="#3498db" stroke-width="1"/>
  <text x="725" y="239" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#3498db">Analysis Agent</text>
  <rect x="766" y="225" width="65" height="20" rx="3" fill="#ebf8ff" stroke="#3498db" stroke-width="1"/>
  <text x="798" y="239" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#3498db">写作 Agent</text>
  
  <text x="620" y="268" font-family="system-ui, sans-serif" font-size="10" fill="#666">✅ 每个子 Agent 零腐蚀</text>
  <text x="620" y="285" font-family="system-ui, sans-serif" font-size="10" fill="#666">✅ day然支持Parallel Execution</text>
  <text x="620" y="302" font-family="system-ui, sans-serif" font-size="10" fill="#666">⚠️ 实现复杂度高</text>
  
  <rect x="615" y="314" width="240" height="22" rx="4" fill="#ebf8ff"/>
  <text x="735" y="329" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3498db" font-weight="bold">代表：Devin 多ModuleArchitecture</text>
  
  <rect x="615" y="342" width="240" height="20" rx="4" fill="#e3f2fd"/>
  <text x="735" y="356" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0d47a1">适合：可分解的复杂大型Task</text>
  
  <!-- Bottom: progression arrow -->
  <rect x="100" y="390" width="700" height="35" rx="8" fill="#edf2f7"/>
  <text x="160" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#e74c3c" font-weight="bold">被动应对</text>
  <text x="350" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#999">→</text>
  <text x="450" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#27ae60" font-weight="bold">主动管理</text>
  <text x="560" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#999">→</text>
  <text x="700" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3498db" font-weight="bold">Architecture级解决</text>
</svg>
