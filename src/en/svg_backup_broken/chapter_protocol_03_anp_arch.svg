<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440">
  <defs>
    <filter id="shadow5">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arr5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b46c1"/>
    </marker>
  </defs>
  
  <rect width="900" height="440" fill="#f0f4f8" rx="16"/>
  
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a365d" font-family="system-ui">ANP ProtocolArchitecture：Decentralization Agent Network</text>
  
  <!-- 三LayerProtocol栈 -->
  <rect x="30" y="55" width="250" height="350" rx="14" fill="#faf5ff" stroke="#9f7aea" stroke-width="1.5" filter="url(#shadow5)"/>
  <text x="155" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#6b46c1" font-family="system-ui">Protocol栈</text>
  
  <!-- 应用Layer -->
  <rect x="50" y="95" width="210" height="80" rx="10" fill="#e9d8fd" stroke="#9f7aea" stroke-width="1"/>
  <text x="155" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#6b46c1" font-family="system-ui">📱 应用Layer</text>
  <text x="155" y="138" text-anchor="middle" font-size="10" fill="#4a5568" font-family="system-ui">能力描述 · Task委派</text>
  <text x="155" y="155" text-anchor="middle" font-size="10" fill="#4a5568" font-family="system-ui">Result Return · Event通知</text>
  
  <!-- 协商Layer -->
  <rect x="50" y="185" width="210" height="80" rx="10" fill="#d6bcfa" stroke="#9f7aea" stroke-width="1"/>
  <text x="155" y="208" text-anchor="middle" font-size="12" font-weight="bold" fill="#553c9a" font-family="system-ui">🤝 协商Layer</text>
  <text x="155" y="228" text-anchor="middle" font-size="10" fill="#4a5568" font-family="system-ui">DID Identity Verification · 能力匹配</text>
  <text x="155" y="245" text-anchor="middle" font-size="10" fill="#4a5568" font-family="system-ui">Protocol协商 · SLA 商定</text>
  
  <!-- 传输Layer -->
  <rect x="50" y="275" width="210" height="80" rx="10" fill="#b794f4" stroke="#9f7aea" stroke-width="1"/>
  <text x="155" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff" font-family="system-ui">🔒 传输Layer</text>
  <text x="155" y="318" text-anchor="middle" font-size="10" fill="#faf5ff" font-family="system-ui">DID 解析 · EncryptionCommunication</text>
  <text x="155" y="335" text-anchor="middle" font-size="10" fill="#faf5ff" font-family="system-ui">MessageRouting · P2P Connection</text>
  
  <!-- DecentralizationNetwork -->
  <rect x="310" y="55" width="560" height="350" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow5)"/>
  <text x="590" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a365d" font-family="system-ui">Decentralization Agent Network</text>
  
  <!-- Agent Node -->
  <circle cx="420" cy="170" r="40" fill="#ebf8ff" stroke="#4299e1" stroke-width="2"/>
  <text x="420" y="165" text-anchor="middle" font-size="18" font-family="system-ui">🤖</text>
  <text x="420" y="185" text-anchor="middle" font-size="9" fill="#2b6cb0" font-family="system-ui">day气 Agent</text>
  
  <circle cx="600" cy="130" r="40" fill="#f0fff4" stroke="#48bb78" stroke-width="2"/>
  <text x="600" y="125" text-anchor="middle" font-size="18" font-family="system-ui">🤖</text>
  <text x="600" y="145" text-anchor="middle" font-size="9" fill="#276749" font-family="system-ui">Translation Agent</text>
  
  <circle cx="750" cy="170" r="40" fill="#faf5ff" stroke="#9f7aea" stroke-width="2"/>
  <text x="750" y="165" text-anchor="middle" font-size="18" font-family="system-ui">🤖</text>
  <text x="750" y="185" text-anchor="middle" font-size="9" fill="#6b46c1" font-family="system-ui">Search Agent</text>
  
  <circle cx="500" cy="280" r="40" fill="#fefcbf" stroke="#d69e2e" stroke-width="2"/>
  <text x="500" y="275" text-anchor="middle" font-size="18" font-family="system-ui">🤖</text>
  <text x="500" y="295" text-anchor="middle" font-size="9" fill="#975a16" font-family="system-ui">支付 Agent</text>
  
  <circle cx="680" cy="300" r="40" fill="#fff5f5" stroke="#fc8181" stroke-width="2"/>
  <text x="680" y="295" text-anchor="middle" font-size="18" font-family="system-ui">🤖</text>
  <text x="680" y="315" text-anchor="middle" font-size="9" fill="#c53030" font-family="system-ui">Customer Service Agent</text>
  
  <!-- Connection线 -->
  <line x1="455" y1="155" x2="565" y2="140" stroke="#9f7aea" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="635" y1="145" x2="715" y2="160" stroke="#9f7aea" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="440" y1="205" x2="480" y2="245" stroke="#9f7aea" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="535" y1="280" x2="645" y2="290" stroke="#9f7aea" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="720" y1="195" x2="695" y2="265" stroke="#9f7aea" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="590" y1="165" x2="520" y2="250" stroke="#9f7aea" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- DID 标识 -->
  <rect x="340" y="350" width="500" height="40" rx="8" fill="#e9d8fd"/>
  <text x="590" y="368" text-anchor="middle" font-size="10" fill="#553c9a" font-family="system-ui">每个 Agent 拥有唯一 DID 身份 (did:anp:xxx)  ·  P2P EncryptionCommunication  ·  DecentralizationService Discovery</text>
  <text x="590" y="383" text-anchor="middle" font-size="10" fill="#6b46c1" font-family="system-ui">无需Center央Server  ·  自主身份管理  ·  信任Evaluation机制</text>
  
  <!-- Bottom -->
  <text x="450" y="430" text-anchor="middle" font-size="10" fill="#718096" font-family="system-ui">图 14-3  ANP ProtocolArchitecture：三LayerProtocol栈 + Decentralization Agent Network拓扑</text>
</svg>
