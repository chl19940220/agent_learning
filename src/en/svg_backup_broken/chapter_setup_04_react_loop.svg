<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 360" width="500" height="360">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e74c3c"/>
    </marker>
  </defs>
  <rect width="500" height="360" fill="#f8f9fa" rx="12"/>
  <text x="250" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">ReAct 模式：Agent 核心Loop</text>

  <!-- User Input -->
  <rect x="175" y="45" width="150" height="40" rx="10" fill="#4dabf7" opacity="0.2" stroke="#4dabf7" stroke-width="2"/>
  <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2980b9">📝 UserInput</text>

  <path d="M 250 87 L 250 110" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM Reasoning -->
  <rect x="145" y="113" width="210" height="50" rx="10" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="2"/>
  <text x="250" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9b59b6">🧠 LLM Reasoning</text>
  <text x="250" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Decide是否需要Tools</text>

  <!-- Decision diamond -->
  <path d="M 250 165 L 250 185" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="250,188 315,215 250,242 185,215" fill="#fff3bf" stroke="#f39c12" stroke-width="2"/>
  <text x="250" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#e67e22">需要</text>
  <text x="250" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#e67e22">Tools？</text>

  <!-- No → Direct answer -->
  <path d="M 315 215 L 400 215" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="358" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">否</text>
  <rect x="403" y="200" width="80" height="30" rx="8" fill="#27ae60" opacity="0.2" stroke="#27ae60" stroke-width="1.5"/>
  <text x="443" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">🏁 回答</text>

  <!-- Yes → Tool Call -->
  <path d="M 250 244 L 250 268" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="268" y="260" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">是</text>

  <!-- Execute Tool -->
  <rect x="145" y="271" width="210" height="40" rx="10" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="2"/>
  <text x="250" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e74c3c">⚡ ExecutionTools</text>
  <text x="250" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="0" fill="#888"></text>

  <!-- Arrow to feedback -->
  <path d="M 250 313 L 250 328" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">📋 将Result反馈给 LLM</text>

  <!-- Loop back -->
  <line x1="143" y1="291" x2="80" y2="291" stroke="#3498db" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="80" y1="291" x2="80" y2="138" stroke="#3498db" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="80" y1="138" x2="143" y2="138" stroke="#3498db" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="62" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3498db" transform="rotate(-90, 62, 220)">继续Reasoning 🔄</text>
</svg>
