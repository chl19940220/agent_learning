  <text x="555" y="217" text-anchor="middle" font-size="16" fill="#e67e22">↓</text>
  <text x="555" y="237" text-anchor="middle" font-size="12" fill="#2c3e50">Analysis计算</text>
  <text x="555" y="257" text-anchor="middle" font-size="16" fill="#e67e22">↓</text>
  <text x="555" y="277" text-anchor="middle" font-size="12" fill="#2c3e50">Visualization</text>
  <text x="555" y="297" text-anchor="middle" font-size="16" fill="#e67e22">↓</text>
  <text x="555" y="315" text-anchor="middle" font-size="12" fill="#2c3e50">GenerationReport</text>
