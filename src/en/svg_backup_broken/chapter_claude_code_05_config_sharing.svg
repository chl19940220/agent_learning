<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280" width="620" height="280">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
  </defs>
  <rect width="620" height="280" rx="14" fill="#f0f4f8"/>
  <text x="310" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">TeamConfig SharingPolicy</text>

  <!-- Left Side：ProjectRepository（Commit Git） -->
  <rect x="30" y="48" width="270" height="210" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="165" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">📁 ProjectRepository（Commit Git）</text>
  <text x="165" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">Team共享，所有成员一致</text>

  <rect x="50" y="100" width="230" height="32" rx="6" fill="#3b82f6"/>
  <text x="165" y="121" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CLAUDE.md ✅</text>

  <rect x="50" y="140" width="230" height="32" rx="6" fill="#3b82f6"/>
  <text x="165" y="161" text-anchor="middle" font-size="12" font-weight="bold" fill="white">.mcp.json ✅</text>

  <rect x="50" y="180" width="230" height="32" rx="6" fill="#3b82f6"/>
  <text x="165" y="201" text-anchor="middle" font-size="12" font-weight="bold" fill="white">.claude/hooks/ ✅</text>

  <rect x="50" y="220" width="230" height="32" rx="6" fill="#3b82f6"/>
  <text x="165" y="241" text-anchor="middle" font-size="12" font-weight="bold" fill="white">.claude/commands/ ✅</text>

  <!-- Right Side：个人（不Commit） -->
  <rect x="320" y="48" width="270" height="210" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="455" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">👤 个人（不Commit Git）</text>
  <text x="455" y="88" text-anchor="middle" font-size="11" fill="#ca8a04">个人Private，不影响他人</text>

  <rect x="340" y="100" width="230" height="32" rx="6" fill="#ca8a04"/>
  <text x="455" y="121" text-anchor="middle" font-size="12" font-weight="bold" fill="white">~/.claude/CLAUDE.md</text>

  <rect x="340" y="140" width="230" height="32" rx="6" fill="#ca8a04"/>
  <text x="455" y="161" text-anchor="middle" font-size="12" font-weight="bold" fill="white">~/.claude/settings.json</text>

  <rect x="340" y="180" width="230" height="32" rx="6" fill="#ca8a04"/>
  <text x="455" y="201" text-anchor="middle" font-size="12" font-weight="bold" fill="white">API Key</text>

  <rect x="340" y="220" width="230" height="32" rx="6" fill="#ca8a04"/>
  <text x="455" y="241" text-anchor="middle" font-size="12" font-weight="bold" fill="white">个人快捷键Config</text>
</svg>
