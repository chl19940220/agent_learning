<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" width="560" height="220">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="560" height="220" fill="#f8f9fa" rx="12"/>
  <text x="280" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">LLM+P：LLM Translation + 传统Planning器Reasoning</text>

  <!-- Step 1: Natural Language -->
  <rect x="20" y="60" width="120" height="55" rx="10" fill="#4dabf7" opacity="0.2" stroke="#4dabf7" stroke-width="2"/>
  <text x="80" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2980b9">📝 自然语言</text>
  <text x="80" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">User的Planning问题</text>

  <!-- Arrow -->
  <path d="M 142 88 L 162 88" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: LLM Translate -->
  <rect x="165" y="60" width="110" height="55" rx="10" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="2"/>
  <text x="220" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9b59b6">🧠 LLM</text>
  <text x="220" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Translation为 PDDL</text>

  <!-- Arrow -->
  <path d="M 277 88 L 297 88" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Planner -->
  <rect x="300" y="60" width="110" height="55" rx="10" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="2"/>
  <text x="355" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">⚙️ 传统Planning器</text>
  <text x="355" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">PDDL 求解</text>

  <!-- Arrow -->
  <path d="M 412 88 L 432 88" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: LLM Translate back -->
  <rect x="435" y="60" width="110" height="55" rx="10" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="2"/>
  <text x="490" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9b59b6">🧠 LLM</text>
  <text x="490" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Translation回自然语言</text>

  <!-- Roles description -->
  <rect x="80" y="140" width="180" height="40" rx="8" fill="#9b59b6" opacity="0.1" stroke="#9b59b6" stroke-width="1"/>
  <text x="170" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9b59b6">LLM 做Translation（擅长语言理解）</text>

  <rect x="300" y="140" width="180" height="40" rx="8" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="1"/>
  <text x="390" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">Planning器做Reasoning（擅长精确Planning）</text>

  <text x="280" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">💡 核心思想：各司其职，LLM + 专业Tools</text>
</svg>
