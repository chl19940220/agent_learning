<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <rect width="760" height="400" fill="#f0f4f8" rx="14"/>
  <text x="380" y="32" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Agent Security防御分LayerArchitecture</text>

  <!-- OuterLayer：Input Filtering -->
  <rect x="40" y="50" width="680" height="310" rx="14" fill="#e74c3c" opacity="0.08" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="60" y="75" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#e74c3c">🛡️ 第1Layer：Input Filtering（Input Filtering）</text>
  <text x="60" y="93" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#7f8c8d">Prompt 注入检测 · 敏感WordFilter · 长度Limit · 格式校验</text>

  <!-- CenterLayer：Permission控制 -->
  <rect x="80" y="110" width="600" height="225" rx="14" fill="#e67e22" opacity="0.08" stroke="#e67e22" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="100" y="135" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#e67e22">🔒 第2Layer：Permission控制（Permission Control）</text>
  <text x="100" y="153" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#7f8c8d">Tools白名单 · 沙箱隔离 · Manipulation审批 · 速率Limit</text>

  <!-- InnerLayer：ModelAlignment -->
  <rect x="120" y="170" width="520" height="140" rx="14" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="140" y="195" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">🧠 第3Layer：ModelAlignment（Model Alignment）</text>
  <text x="140" y="213" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#7f8c8d">System Prompt Constraint · Output校验 · 幻觉检测 · 事实核查</text>

  <!-- 核心：Agent 逻辑 -->
  <rect x="200" y="230" width="360" height="60" rx="14" fill="#3498db"/>
  <text x="380" y="258" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">🤖 Agent 核心逻辑</text>
  <text x="380" y="278" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="white">Perceive → Reasoning → Act</text>

  <!-- Right Side标注 -->
  <text x="660" y="80" text-anchor="end" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#e74c3c">← 最OuterLayer防线</text>
  <text x="660" y="268" text-anchor="end" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#3498db">← 受保护核心</text>

  <!-- Bottom说明 -->
  <text x="380" y="385" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#95a5a6">Defense in Depth：攻击者需要突破所有Layer级才能影响 Agent Behavior</text>
</svg>
