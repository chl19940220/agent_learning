<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="700" height="200" fill="#f8f9fa" rx="12"/>
  <text x="350" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">Act阶段：Tool CallExecutionWorkflow</text>

  <!-- Step 1 -->
  <rect x="20" y="55" width="120" height="55" rx="8" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="1.5"/>
  <text x="80" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">接收Decision</text>
  <text x="80" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Think阶段的</text>
  <text x="80" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Act计划</text>

  <path d="M 143 82 L 163 82" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="166" y="55" width="120" height="55" rx="8" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="1.5"/>
  <text x="226" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3498db">解析参数</text>
  <text x="226" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Tools名称</text>
  <text x="226" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">调用参数</text>

  <path d="M 289 82 L 309 82" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="312" y="45" width="140" height="75" rx="8" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="2"/>
  <text x="382" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9b59b6">调用ToolsFunction</text>
  <text x="382" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">搜Index擎</text>
  <text x="382" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">数学计算 / API</text>
  <text x="382" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Code Execution</text>

  <path d="M 455 82 L 475 82" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="478" y="55" width="120" height="55" rx="8" fill="#e67e22" opacity="0.15" stroke="#e67e22" stroke-width="1.5"/>
  <text x="538" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e67e22">获取Result</text>
  <text x="538" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Tools返回值</text>
  <text x="538" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Success / Error</text>

  <path d="M 601 82 L 621 82" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <rect x="624" y="55" width="55" height="55" rx="8" fill="#4dabf7" opacity="0.15" stroke="#4dabf7" stroke-width="1.5"/>
  <text x="651" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2980b9">反馈</text>
  <text x="651" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">给Perceive</text>
  <text x="651" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">阶段</text>

  <!-- Stage label -->
  <rect x="20" y="140" width="660" height="45" rx="8" fill="#f3ffe3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="350" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">🦸 Act阶段：将 LLM 的Decision转化为真实的Tool Call，获取ResultBack反馈给Perceive阶段</text>
  <text x="350" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Tool Call是 Agent 与Outer部世界交互的唯一方式</text>
</svg>
