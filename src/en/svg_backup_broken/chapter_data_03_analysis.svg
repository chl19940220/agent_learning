<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="av" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8e44ad"/>
    </marker>
  </defs>
  <rect width="800" height="350" rx="12" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">AutomationData Analysis与VisualizationWorkflow</text>

  <!-- DataInput -->
  <rect x="30" y="60" width="130" height="45" rx="8" fill="#3498db" opacity="0.9"/>
  <text x="95" y="88" text-anchor="middle" font-size="12" fill="white" font-weight="bold">QueryResult</text>

  <line x1="160" y1="82" x2="195" y2="82" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#av)"/>

  <!-- Analysis器 -->
  <rect x="197" y="55" width="190" height="55" rx="10" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="292" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#8e44ad">DataAnalyzer</text>
  <text x="292" y="98" text-anchor="middle" font-size="10" fill="#555">描述Statistics + 趋势识别</text>

  <line x1="387" y1="82" x2="422" y2="82" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#av)"/>

  <!-- ChartGeneration -->
  <rect x="424" y="55" width="190" height="55" rx="10" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="2"/>
  <text x="519" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">ChartGenerator</text>
  <text x="519" y="98" text-anchor="middle" font-size="10" fill="#555">自动选择Chart类型</text>

  <line x1="614" y1="82" x2="649" y2="82" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#av)"/>

  <rect x="651" y="60" width="120" height="45" rx="8" fill="#27ae60" opacity="0.9"/>
  <text x="711" y="88" text-anchor="middle" font-size="12" fill="white" font-weight="bold">VisualizationReport</text>

  <!-- Analysis能力 -->
  <text x="400" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">AutomationAnalysis能力</text>

  <rect x="30" y="155" width="175" height="80" rx="8" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <text x="117" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#3498db">描述Statistics</text>
  <text x="117" y="198" text-anchor="middle" font-size="10" fill="#555">均值/Center位数/标准差</text>
  <text x="117" y="216" text-anchor="middle" font-size="10" fill="#555">最大/最小值/分位数</text>

  <rect x="220" y="155" width="175" height="80" rx="8" fill="white" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="307" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">趋势Analysis</text>
  <text x="307" y="198" text-anchor="middle" font-size="10" fill="#555">时序趋势检测</text>
  <text x="307" y="216" text-anchor="middle" font-size="10" fill="#555">增长率/环比/同比</text>

  <rect x="410" y="155" width="175" height="80" rx="8" fill="white" stroke="#e67e22" stroke-width="1.5"/>
  <text x="497" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">Exception检测</text>
  <text x="497" y="198" text-anchor="middle" font-size="10" fill="#555">离群值识别</text>
  <text x="497" y="216" text-anchor="middle" font-size="10" fill="#555">突变点检测</text>

  <rect x="600" y="155" width="175" height="80" rx="8" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="687" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">洞察提取</text>
  <text x="687" y="198" text-anchor="middle" font-size="10" fill="#555">LLM Generation业务洞察</text>
  <text x="687" y="216" text-anchor="middle" font-size="10" fill="#555">可Manipulation的建议</text>

  <!-- Chart类型 -->
  <text x="400" y="263" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">智能Chart类型选择</text>

  <rect x="50" y="278" width="130" height="50" rx="8" fill="#e8f4fd" stroke="#3498db" stroke-width="1"/>
  <text x="115" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#3498db">📊 Bar Chart</text>
  <text x="115" y="316" text-anchor="middle" font-size="9" fill="#555">Classification对比</text>

  <rect x="195" y="278" width="130" height="50" rx="8" fill="#f0e6f6" stroke="#8e44ad" stroke-width="1"/>
  <text x="260" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">📈 Line Chart</text>
  <text x="260" y="316" text-anchor="middle" font-size="9" fill="#555">时间趋势</text>

  <rect x="340" y="278" width="130" height="50" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1"/>
  <text x="405" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">🥧 Pie Chart</text>
  <text x="405" y="316" text-anchor="middle" font-size="9" fill="#555">占比分布</text>

  <rect x="485" y="278" width="130" height="50" rx="8" fill="#e8f8e8" stroke="#27ae60" stroke-width="1"/>
  <text x="550" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">📉 Scatter Plot</text>
  <text x="550" y="316" text-anchor="middle" font-size="9" fill="#555">相关性Analysis</text>

  <rect x="630" y="278" width="140" height="50" rx="8" fill="#fce4e4" stroke="#e74c3c" stroke-width="1"/>
  <text x="700" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c">🗺 Heatmap</text>
  <text x="700" y="316" text-anchor="middle" font-size="9" fill="#555">多维分布</text>
</svg>
