<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" width="700" height="180">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4dabf7"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e74c3c"/>
    </marker>
  </defs>
  <rect width="700" height="180" fill="#f8f9fa" rx="12"/>
  <text x="350" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">Context Window：Model的"Working Memory"</text>

  <!-- Context window box -->
  <rect x="30" y="45" width="480" height="80" rx="10" fill="#e3f2fd" stroke="#3498db" stroke-width="2"/>
  <text x="270" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2980b9">Context Window（128K Token）</text>

  <rect x="45" y="72" width="120" height="40" rx="6" fill="#3498db" opacity="0.2" stroke="#3498db" stroke-width="1.5"/>
  <text x="105" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2980b9">历史Dialogue</text>

  <rect x="180" y="72" width="120" height="40" rx="6" fill="#3498db" opacity="0.3" stroke="#3498db" stroke-width="1.5"/>
  <text x="240" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2980b9">whenFront问题</text>

  <rect x="315" y="72" width="180" height="40" rx="6" fill="#3498db" opacity="0.4" stroke="#3498db" stroke-width="1.5"/>
  <text x="405" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2980b9">DocumentInner容</text>

  <!-- Arrow to LLM -->
  <path d="M 513 85 L 548 85" stroke="#4dabf7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="551" y="60" width="120" height="50" rx="10" fill="#4dabf7" opacity="0.9"/>
  <text x="611" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">🧠 LLM</text>

  <!-- Out of window content -->
  <rect x="30" y="140" width="200" height="30" rx="8" fill="#ffe3e3" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="130" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">超出窗口的Inner容</text>

  <!-- Dashed arrow to LLM -->
  <path d="M 233 155 L 611 115" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-red)"/>
  <text x="430" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">❌ 完全遗忘</text>
</svg>
