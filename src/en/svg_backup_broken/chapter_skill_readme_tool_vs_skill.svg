<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" width="700" height="340">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
  </defs>
  <rect width="700" height="340" fill="#f0f4f8" rx="14"/>
  <text x="350" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Tool vs Skill 概念对比</text>

  <!-- Tool 区域 -->
  <rect x="30" y="50" width="300" height="260" rx="12" fill="#3498db" opacity="0.08" stroke="#3498db" stroke-width="2"/>
  <text x="180" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#3498db">🔧 Tools（Tool）</text>
  <text x="180" y="105" text-anchor="middle" font-size="12" fill="#555">单个、独立的Manipulation</text>

  <rect x="55" y="125" width="250" height="32" rx="6" fill="#3498db" opacity="0.15"/>
  <text x="180" y="146" text-anchor="middle" font-size="12" fill="#2c3e50">search_web("day气") → Search一个网页</text>

  <rect x="55" y="167" width="250" height="32" rx="6" fill="#3498db" opacity="0.15"/>
  <text x="180" y="188" text-anchor="middle" font-size="12" fill="#2c3e50">read_file("data.csv") → Read一个文件</text>

  <rect x="55" y="209" width="250" height="32" rx="6" fill="#3498db" opacity="0.15"/>
  <text x="180" y="230" text-anchor="middle" font-size="12" fill="#2c3e50">execute_sql("SELECT ...") → Execution一条 SQL</text>

  <!-- Skill 区域 -->
  <rect x="370" y="50" width="300" height="260" rx="12" fill="#e67e22" opacity="0.08" stroke="#e67e22" stroke-width="2"/>
  <text x="520" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#e67e22">🧠 Skills（Skill）</text>
  <text x="520" y="105" text-anchor="middle" font-size="12" fill="#555">解决一类问题的完整能力</text>

  <rect x="395" y="120" width="250" height="175" rx="6" fill="#e67e22" opacity="0.1"/>
  <text x="520" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">"Data AnalysisSkills"</text>
  <text x="410" y="170" font-size="11" fill="#555">• 知道何时该QueryDatabase vs Read文件</text>
  <text x="410" y="190" font-size="11" fill="#555">• 知道如何清洗and转换Data</text>
  <text x="410" y="210" font-size="11" fill="#555">• 知道如何选择合适的Visualization方式</text>
  <text x="410" y="230" font-size="11" fill="#555">• 知道如何Generation可读的AnalysisReport</text>
  <text x="410" y="250" font-size="11" fill="#555">• 遇toExceptionData时知道如何处理</text>
  <text x="410" y="275" font-size="11" fill="#888" font-style="italic">= Tools + Knowledge + Workflow + 经验</text>
</svg>
