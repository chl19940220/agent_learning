<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="da" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2980b9"/>
    </marker>
  </defs>
  <rect width="800" height="360" rx="12" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Data AnalysisAgent：Pipeline式 vs AgentLoopArchitecture</text>

  <!-- Pipeline式 -->
  <rect x="30" y="55" width="740" height="120" rx="10" fill="#3498db" opacity="0.08" stroke="#3498db" stroke-width="2"/>
  <text x="70" y="78" font-size="13" font-weight="bold" fill="#3498db">Pipeline式Architecture（Pipeline）— 本章选择</text>

  <rect x="50" y="90" width="90" height="35" rx="6" fill="#3498db" opacity="0.9"/>
  <text x="95" y="112" text-anchor="middle" font-size="9" fill="white">Text-to-SQL</text>
  <line x1="140" y1="107" x2="158" y2="107" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#da)"/>

  <rect x="160" y="90" width="90" height="35" rx="6" fill="#3498db" opacity="0.9"/>
  <text x="205" y="112" text-anchor="middle" font-size="9" fill="white">ExecutionQuery</text>
  <line x1="250" y1="107" x2="268" y2="107" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#da)"/>

  <rect x="270" y="90" width="90" height="35" rx="6" fill="#3498db" opacity="0.9"/>
  <text x="315" y="112" text-anchor="middle" font-size="9" fill="white">StatisticsAnalysis</text>
  <line x1="360" y1="107" x2="378" y2="107" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#da)"/>

  <rect x="380" y="90" width="90" height="35" rx="6" fill="#3498db" opacity="0.9"/>
  <text x="425" y="112" text-anchor="middle" font-size="9" fill="white">ChartGeneration</text>
  <line x1="470" y1="107" x2="488" y2="107" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#da)"/>

  <rect x="490" y="90" width="90" height="35" rx="6" fill="#3498db" opacity="0.9"/>
  <text x="535" y="112" text-anchor="middle" font-size="9" fill="white">洞察提取</text>
  <line x1="580" y1="107" x2="598" y2="107" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#da)"/>

  <rect x="600" y="90" width="90" height="35" rx="6" fill="#3498db" opacity="0.9"/>
  <text x="645" y="112" text-anchor="middle" font-size="9" fill="white">ReportGeneration</text>

  <text x="50" y="155" font-size="10" fill="#2980b9">✅ 可Prediction、易Debug、Latency可控</text>
  <text x="400" y="155" font-size="10" fill="#e74c3c">❌ Flexibility有限、无法自我纠错</text>

  <!-- AgentLoop -->
  <rect x="30" y="180" width="740" height="155" rx="10" fill="#8e44ad" opacity="0.08" stroke="#8e44ad" stroke-width="2"/>
  <text x="70" y="203" font-size="13" font-weight="bold" fill="#8e44ad">Agent LoopArchitecture — 更灵活</text>

  <rect x="280" y="215" width="240" height="45" rx="10" fill="#8e44ad" opacity="0.9"/>
  <text x="400" y="238" text-anchor="middle" font-size="12" fill="white" font-weight="bold">🧠 Agent Reasoning核心</text>
  <text x="400" y="253" text-anchor="middle" font-size="9" fill="#d2b4de">Observe → Think → 选择Tools → Act</text>

  <!-- Tools环绕 -->
  <rect x="50" y="220" width="100" height="35" rx="6" fill="white" stroke="#8e44ad" stroke-width="1"/>
  <text x="100" y="242" text-anchor="middle" font-size="9" fill="#8e44ad">SQL Generation器</text>

  <rect x="160" y="220" width="100" height="35" rx="6" fill="white" stroke="#8e44ad" stroke-width="1"/>
  <text x="210" y="242" text-anchor="middle" font-size="9" fill="#8e44ad">Data Analysis器</text>

  <rect x="540" y="220" width="100" height="35" rx="6" fill="white" stroke="#8e44ad" stroke-width="1"/>
  <text x="590" y="242" text-anchor="middle" font-size="9" fill="#8e44ad">ChartGeneration器</text>

  <rect x="650" y="220" width="100" height="35" rx="6" fill="white" stroke="#8e44ad" stroke-width="1"/>
  <text x="700" y="242" text-anchor="middle" font-size="9" fill="#8e44ad">ReportGeneration器</text>

  <!-- Loop标记 -->
  <path d="M400,260 Q400,290 350,290 Q300,290 300,270" fill="none" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="400" y="300" text-anchor="middle" font-size="10" fill="#8e44ad">🔄 动态多轮交互，可自我纠错</text>

  <text x="50" y="320" font-size="10" fill="#27ae60">✅ 灵活、可纠错、适应复杂Scenario</text>
  <text x="400" y="320" font-size="10" fill="#e74c3c">❌ Latency不确定、Cost较高、Debug困难</text>
</svg>
