<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
  </defs>
  <rect width="800" height="380" rx="12" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Tools学习Front沿论文三部曲</text>

  <!-- Toolformer -->
  <rect x="20" y="55" width="245" height="200" rx="8" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="2"/>
  <text x="142" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">Toolformer (2023)</text>
  <text x="142" y="96" text-anchor="middle" font-size="10" fill="#888">Meta AI · 自学Tool Use</text>
  <line x1="35" y1="104" x2="250" y2="104" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4"/>
  <text x="35" y="122" font-size="11" fill="#444">核心思想：</text>
  <text x="35" y="140" font-size="11" fill="#444">• LLM 自动标注TrainingData</text>
  <text x="35" y="158" font-size="11" fill="#444">• in文本Center插入 API Calls</text>
  <text x="35" y="176" font-size="11" fill="#444">• viaLoss FunctionFilter</text>
  <rect x="35" y="188" width="215" height="22" rx="4" fill="#e74c3c" opacity="0.15"/>
  <text x="142" y="204" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="bold">突破：无需人工标注</text>
  <text x="35" y="228" font-size="11" fill="#444">支持Tools：计算器、Search、</text>
  <text x="35" y="244" font-size="11" fill="#444">日历、Translation、QA</text>

  <!-- ToolkenGPT -->
  <rect x="278" y="55" width="245" height="200" rx="8" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="400" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#3498db">ToolkenGPT (2023)</text>
  <text x="400" y="96" text-anchor="middle" font-size="10" fill="#888">Tool Call = Token Generation</text>
  <line x1="293" y1="104" x2="508" y2="104" stroke="#3498db" stroke-width="1" stroke-dasharray="4"/>
  <text x="293" y="122" font-size="11" fill="#444">核心思想：</text>
  <text x="293" y="140" font-size="11" fill="#444">• 每个Tools = 一个特殊 Token</text>
  <text x="293" y="158" font-size="11" fill="#444">• ToolsEmbeddingVector学习</text>
  <text x="293" y="176" font-size="11" fill="#444">• 无缝融入GenerationWorkflow</text>
  <rect x="293" y="188" width="215" height="22" rx="4" fill="#3498db" opacity="0.15"/>
  <text x="400" y="204" text-anchor="middle" font-size="10" fill="#3498db" font-weight="bold">突破：Tools = VocabularyExtension</text>
  <text x="293" y="228" font-size="11" fill="#444">优势：支持Parallel调用</text>
  <text x="293" y="244" font-size="11" fill="#444">新Tools仅需 embedding Training</text>

  <!-- TALM -->
  <rect x="536" y="55" width="244" height="200" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="658" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">TALM / ART (2023)</text>
  <text x="658" y="96" text-anchor="middle" font-size="10" fill="#888">增强型ToolsReasoning</text>
  <line x1="549" y1="104" x2="765" y2="104" stroke="#27ae60" stroke-width="1" stroke-dasharray="4"/>
  <text x="549" y="122" font-size="11" fill="#444">核心思想：</text>
  <text x="549" y="140" font-size="11" fill="#444">• Few-shot ToolsExample</text>
  <text x="549" y="158" font-size="11" fill="#444">• 自动Task Decomposition</text>
  <text x="549" y="176" font-size="11" fill="#444">• Tool Call链Planning</text>
  <rect x="549" y="188" width="215" height="22" rx="4" fill="#27ae60" opacity="0.15"/>
  <text x="658" y="204" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">突破：无需Fine-tuning即可using</text>
  <text x="549" y="228" font-size="11" fill="#444">优势：通用性强</text>
  <text x="549" y="244" font-size="11" fill="#444">与 GPT-4 Function Calling 互补</text>

  <!-- 发展脉络 -->
  <rect x="20" y="270" width="760" height="95" rx="8" fill="#8e44ad" opacity="0.08" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="400" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#8e44ad">Tools学习发展脉络</text>
  
  <rect x="40" y="305" width="200" height="45" rx="6" fill="#e74c3c" opacity="0.12"/>
  <text x="140" y="323" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">阶段1：Self-Supervised Learning</text>
  <text x="140" y="340" text-anchor="middle" font-size="10" fill="#666">Toolformer 自动标注</text>

  <text x="260" y="328" font-size="14" fill="#888">→</text>

  <rect x="280" y="305" width="200" height="45" rx="6" fill="#3498db" opacity="0.12"/>
  <text x="380" y="323" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">阶段2：原生Integration</text>
  <text x="380" y="340" text-anchor="middle" font-size="10" fill="#666">ToolkenGPT Token化</text>

  <text x="500" y="328" font-size="14" fill="#888">→</text>

  <rect x="520" y="305" width="240" height="45" rx="6" fill="#27ae60" opacity="0.12"/>
  <text x="640" y="323" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">阶段3：Standardization (2024+)</text>
  <text x="640" y="340" text-anchor="middle" font-size="10" fill="#666">Function Calling + MCP Protocol</text>
</svg>