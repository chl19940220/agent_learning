<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 380" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="580" height="380" rx="12" fill="#f8f9fa"/>

  <!-- 标题 -->
  <text x="290" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">🛡️ 间接 Prompt Injection AttackScenario</text>

  <!-- 箭头 marker -->
  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#e74c3c"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3498db"/>
    </marker>
  </defs>

  <!-- Middle：LLM Agent -->
  <rect x="230" y="170" width="120" height="50" rx="10" fill="#3498db" fill-opacity="0.2" stroke="#3498db" stroke-width="2"/>
  <text x="290" y="192" text-anchor="middle" font-size="14" font-weight="bold" fill="#3498db">🤖 LLM Agent</text>
  <text x="290" y="208" text-anchor="middle" font-size="10" fill="#555">ReadOuter部Data</text>

  <!-- Scenario1：网页注入 -->
  <rect x="20" y="55" width="160" height="90" rx="10" fill="#e74c3c" fill-opacity="0.15" stroke="#e74c3c" stroke-width="2"/>
  <text x="100" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">🌐 Scenario1：网页注入</text>
  <text x="100" y="96" text-anchor="middle" font-size="10" fill="#555">攻击者in网页CenterEmbedding</text>
  <text x="100" y="110" text-anchor="middle" font-size="10" fill="#555">白色隐藏文字指令</text>
  <text x="100" y="126" text-anchor="middle" font-size="9" fill="#888">（人眼不可见，RAG 可Retrieval）</text>

  <!-- Scenario2：邮件注入 -->
  <rect x="400" y="55" width="160" height="90" rx="10" fill="#e74c3c" fill-opacity="0.15" stroke="#e74c3c" stroke-width="2"/>
  <text x="480" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">📧 Scenario2：邮件注入</text>
  <text x="480" y="96" text-anchor="middle" font-size="10" fill="#555">邮件正文看似Normal</text>
  <text x="480" y="110" text-anchor="middle" font-size="10" fill="#555">不可见区域contains恶意指令</text>
  <text x="480" y="126" text-anchor="middle" font-size="9" fill="#888">（窃取联系人等Sensitive Information）</text>

  <!-- Scenario3：Document注入 -->
  <rect x="210" y="270" width="160" height="90" rx="10" fill="#e74c3c" fill-opacity="0.15" stroke="#e74c3c" stroke-width="2"/>
  <text x="290" y="293" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">📄 Scenario3：Document注入</text>
  <text x="290" y="311" text-anchor="middle" font-size="10" fill="#555">PDF/Word Metadataor</text>
  <text x="290" y="325" text-anchor="middle" font-size="10" fill="#555">隐藏文本CenterEmbedding指令</text>
  <text x="290" y="341" text-anchor="middle" font-size="9" fill="#888">（Agent 解析Document时Center招）</text>

  <!-- 箭头：网页 → Agent -->
  <line x1="180" y1="130" x2="238" y2="175" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- 箭头：邮件 → Agent -->
  <line x1="400" y1="130" x2="342" y2="175" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- 箭头：Document → Agent -->
  <line x1="290" y1="270" x2="290" y2="226" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- 攻击效果Label -->
  <text x="195" y="160" text-anchor="middle" font-size="9" fill="#e74c3c" font-style="italic">恶意指令</text>
  <text x="385" y="160" text-anchor="middle" font-size="9" fill="#e74c3c" font-style="italic">恶意指令</text>
  <text x="310" y="252" text-anchor="middle" font-size="9" fill="#e74c3c" font-style="italic">恶意指令</text>

  <!-- Bottom关键发现 -->
  <text x="290" y="375" text-anchor="middle" font-size="10" fill="#888">⚠️ 核心挑战：LLM 难以区分"Data"与"指令"，任何Outer部Data源都可能成为攻击面</text>
</svg>