<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" width="700" height="240">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="arr14" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="700" height="240" fill="#f0f4f8" rx="14"/>
  <text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">CRAFT 方法原理</text>

  <!-- 传统方法 -->
  <rect x="20" y="42" width="660" height="45" rx="10" fill="#e74c3c" opacity="0.08" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="90" y="62" font-size="13" font-weight="bold" fill="#e74c3c">❌ 传统方法：</text>
  <text x="220" y="62" font-size="12" fill="#555">问题 → LLM 直接GenerationCode解决 → 可能出错</text>
  <text x="220" y="80" font-size="10" fill="#888">（Code长，容易有 bug）</text>

  <!-- CRAFT 方法 -->
  <rect x="20" y="98" width="660" height="85" rx="10" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="1.5"/>
  <text x="90" y="118" font-size="13" font-weight="bold" fill="#27ae60">✅ CRAFT 方法：</text>
  <text x="40" y="142" font-size="12" fill="#555">问题 → 阶段1：创造Tools（LLM Analysis问题模式、Abstraction为可复用Function、用Testing验证）</text>
  <text x="100" y="165" font-size="12" fill="#555">→ 阶段2：usingTools（fromTools库Retrieval、组合Tools解决问题）</text>

  <!-- 关键洞察 -->
  <rect x="20" y="195" width="660" height="35" rx="8" fill="#f39c12" opacity="0.1" stroke="#f39c12" stroke-width="1"/>
  <text x="350" y="217" text-anchor="middle" font-size="12" font-weight="bold" fill="#f39c12">💡 关键洞察："Abstraction化" 让 LLM 更少犯错 — 创造一个 "求and" Tools + 调用它，比直接写一大段求andCode更可靠</text>
</svg>
