<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="a4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/></marker>
  </defs>
  <rect width="800" height="380" rx="12" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Plan-and-Execute Task Decomposition模式</text>

  <!-- UserGoal -->
  <rect x="30" y="80" width="120" height="50" rx="8" fill="#2c3e50"/>
  <text x="90" y="102" text-anchor="middle" font-size="11" fill="white" font-weight="bold">🎯 复杂Goal</text>
  <text x="90" y="118" text-anchor="middle" font-size="9" fill="#bdc3c7">"Analysis竞品Data"</text>

  <line x1="150" y1="105" x2="190" y2="105" stroke="#2c3e50" stroke-width="1.8" marker-end="url(#a4)"/>

  <!-- Plan 阶段 -->
  <rect x="195" y="55" width="190" height="110" rx="10" fill="#3498db" opacity="0.08" stroke="#3498db" stroke-width="2"/>
  <text x="290" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498db">📋 Plan（Planning）</text>
  <text x="290" y="98" text-anchor="middle" font-size="10" fill="#555">LLM GenerationExecution计划</text>
  <rect x="210" y="108" width="160" height="18" rx="3" fill="#3498db" opacity="0.1"/><text x="290" y="121" text-anchor="middle" font-size="9" fill="#3498db">Step 1 → Step 2 → ... → Step N</text>
  <text x="290" y="148" text-anchor="middle" font-size="9" fill="#7f8c8d">含Dependenciesand预期产出</text>

  <line x1="385" y1="105" x2="420" y2="105" stroke="#2c3e50" stroke-width="1.8" marker-end="url(#a4)"/>

  <!-- Execute 阶段 -->
  <rect x="425" y="50" width="230" height="120" rx="10" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="2"/>
  <text x="540" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">⚡ Execute（Execution）</text>

  <rect x="440" y="82" width="95" height="35" rx="5" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="488" y="97" text-anchor="middle" font-size="9" font-weight="bold" fill="#27ae60">Step 1</text>
  <text x="488" y="110" text-anchor="middle" font-size="8" fill="#555">Search竞品</text>

  <rect x="545" y="82" width="95" height="35" rx="5" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="593" y="97" text-anchor="middle" font-size="9" font-weight="bold" fill="#27ae60">Step 2</text>
  <text x="593" y="110" text-anchor="middle" font-size="8" fill="#555">提取Data</text>

  <rect x="440" y="122" width="95" height="35" rx="5" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="488" y="137" text-anchor="middle" font-size="9" font-weight="bold" fill="#27ae60">Step 3</text>
  <text x="488" y="150" text-anchor="middle" font-size="8" fill="#555">对比Analysis</text>

  <rect x="545" y="122" width="95" height="35" rx="5" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="593" y="137" text-anchor="middle" font-size="9" font-weight="bold" fill="#27ae60">Step 4</text>
  <text x="593" y="150" text-anchor="middle" font-size="8" fill="#555">GenerationReport</text>

  <line x1="655" y1="105" x2="690" y2="105" stroke="#2c3e50" stroke-width="1.8" marker-end="url(#a4)"/>

  <!-- Result -->
  <rect x="695" y="80" width="80" height="50" rx="8" fill="#2c3e50"/>
  <text x="735" y="102" text-anchor="middle" font-size="11" fill="white" font-weight="bold">📊 Result</text>
  <text x="735" y="118" text-anchor="middle" font-size="9" fill="#bdc3c7">竞品AnalysisReport</text>

  <!-- Dependencies树 -->
  <rect x="100" y="195" width="600" height="140" rx="10" fill="#e67e22" opacity="0.06" stroke="#e67e22" stroke-width="1.5"/>
  <text x="400" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">🌳 TaskDependencies树（JSON Structured Output）</text>

  <rect x="320" y="232" width="160" height="25" rx="4" fill="#e67e22" opacity="0.2"/>
  <text x="400" y="249" text-anchor="middle" font-size="10" fill="#e67e22" font-weight="bold">Goal: 竞品Data Analysis</text>

  <rect x="120" y="275" width="130" height="22" rx="4" fill="white" stroke="#e67e22" stroke-width="1"/>
  <text x="185" y="290" text-anchor="middle" font-size="9" fill="#555">Step1: Search竞品Info</text>

  <rect x="260" y="275" width="130" height="22" rx="4" fill="white" stroke="#e67e22" stroke-width="1"/>
  <text x="325" y="290" text-anchor="middle" font-size="9" fill="#555">Step2: 提取关键Data</text>

  <rect x="400" y="275" width="130" height="22" rx="4" fill="white" stroke="#e67e22" stroke-width="1"/>
  <text x="465" y="290" text-anchor="middle" font-size="9" fill="#555">Step3: 对比Analysis</text>

  <rect x="540" y="275" width="130" height="22" rx="4" fill="white" stroke="#e67e22" stroke-width="1"/>
  <text x="605" y="290" text-anchor="middle" font-size="9" fill="#555">Step4: GenerationReport</text>

  <line x1="350" y1="257" x2="185" y2="275" stroke="#e67e22" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="380" y1="257" x2="325" y2="275" stroke="#e67e22" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="420" y1="257" x2="465" y2="275" stroke="#e67e22" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="450" y1="257" x2="605" y2="275" stroke="#e67e22" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="185" y="314" text-anchor="middle" font-size="8" fill="#7f8c8d">depends: []</text>
  <text x="325" y="314" text-anchor="middle" font-size="8" fill="#7f8c8d">depends: [1]</text>
  <text x="465" y="314" text-anchor="middle" font-size="8" fill="#7f8c8d">depends: [1,2]</text>
  <text x="605" y="314" text-anchor="middle" font-size="8" fill="#7f8c8d">depends: [3]</text>

  <text x="400" y="365" text-anchor="middle" font-size="11" fill="#95a5a6">先制定完整计划，再按Dependencies逐步Execution——可Prediction、可Debug</text>
</svg>
