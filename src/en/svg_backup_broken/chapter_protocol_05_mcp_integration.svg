<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="mi" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#27ae60"/>
    </marker>
  </defs>
  <rect width="800" height="340" rx="12" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">MCP ToolsIntegrationArchitecture：Server-Client 解耦</text>

  <!-- MCP Server -->
  <rect x="20" y="55" width="220" height="200" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="130" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">MCP Server</text>
  <text x="130" y="96" text-anchor="middle" font-size="10" fill="#666">（任意语言实现）</text>
  
  <rect x="35" y="108" width="190" height="25" rx="4" fill="#27ae60" opacity="0.2"/>
  <text x="130" y="126" text-anchor="middle" font-size="11" fill="#444">🔧 File OperationsTools</text>
  <rect x="35" y="140" width="190" height="25" rx="4" fill="#27ae60" opacity="0.2"/>
  <text x="130" y="158" text-anchor="middle" font-size="11" fill="#444">🗄 DatabaseQueryTools</text>
  <rect x="35" y="172" width="190" height="25" rx="4" fill="#27ae60" opacity="0.2"/>
  <text x="130" y="190" text-anchor="middle" font-size="11" fill="#444">🌐 HTTP RequestTools</text>
  <rect x="35" y="204" width="190" height="25" rx="4" fill="#27ae60" opacity="0.2"/>
  <text x="130" y="222" text-anchor="middle" font-size="11" fill="#444">📊 自定义AnalysisTools</text>

  <!-- 传输Layer -->
  <rect x="260" y="100" width="120" height="110" rx="8" fill="#e67e22" opacity="0.15" stroke="#e67e22" stroke-width="1.5"/>
  <text x="320" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">传输Layer</text>
  <text x="320" y="148" text-anchor="middle" font-size="11" fill="#444">stdio</text>
  <text x="320" y="168" text-anchor="middle" font-size="11" fill="#444">SSE</text>
  <text x="320" y="188" text-anchor="middle" font-size="11" fill="#444">WebSocket</text>
  
  <line x1="240" y1="155" x2="258" y2="155" stroke="#e67e22" stroke-width="1.5" marker-end="url(#mi)"/>
  <line x1="380" y1="155" x2="398" y2="155" stroke="#e67e22" stroke-width="1.5" marker-end="url(#mi)"/>

  <!-- MCP Client -->
  <rect x="400" y="55" width="180" height="200" rx="8" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="490" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#3498db">MCP Client</text>
  <text x="490" y="96" text-anchor="middle" font-size="10" fill="#666">（动态Tools发现）</text>
  
  <rect x="412" y="110" width="156" height="28" rx="4" fill="#3498db" opacity="0.2"/>
  <text x="490" y="129" text-anchor="middle" font-size="11" fill="#444">① list_tools()</text>
  <rect x="412" y="145" width="156" height="28" rx="4" fill="#3498db" opacity="0.2"/>
  <text x="490" y="164" text-anchor="middle" font-size="11" fill="#444">② 解析Tools Schema</text>
  <rect x="412" y="180" width="156" height="28" rx="4" fill="#3498db" opacity="0.2"/>
  <text x="490" y="199" text-anchor="middle" font-size="11" fill="#444">③ call_tool(name, args)</text>
  <rect x="412" y="215" width="156" height="28" rx="4" fill="#3498db" opacity="0.2"/>
  <text x="490" y="234" text-anchor="middle" font-size="11" fill="#444">④ 返回Result</text>

  <!-- Agent Framework -->
  <rect x="600" y="55" width="180" height="200" rx="8" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="690" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#8e44ad">Agent Framework</text>
  <text x="690" y="96" text-anchor="middle" font-size="10" fill="#666">（LangChain / 自定义）</text>
  
  <rect x="612" y="115" width="156" height="30" rx="4" fill="#8e44ad" opacity="0.15"/>
  <text x="690" y="135" text-anchor="middle" font-size="11" fill="#444">MCPTool 适配器</text>
  <text x="690" y="165" font-size="11" fill="#444" text-anchor="middle">↓ Package装为 BaseTool</text>
  <rect x="612" y="178" width="156" height="30" rx="4" fill="#8e44ad" opacity="0.15"/>
  <text x="690" y="198" text-anchor="middle" font-size="11" fill="#444">Agent ReasoningLoop</text>
  <text x="690" y="228" font-size="11" fill="#444" text-anchor="middle">↓ OutputResult</text>

  <line x1="580" y1="155" x2="598" y2="155" stroke="#8e44ad" stroke-width="1.5" marker-end="url(#mi)"/>

  <!-- Bottom核心Value -->
  <rect x="20" y="270" width="760" height="55" rx="8" fill="#e74c3c" opacity="0.08" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="400" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">MCP 核心Value</text>
  <text x="200" y="313" text-anchor="middle" font-size="11" fill="#555">Tools实现与using解耦</text>
  <text x="400" y="313" text-anchor="middle" font-size="11" fill="#555">一次实现，多Framework复用</text>
  <text x="600" y="313" text-anchor="middle" font-size="11" fill="#555">Standardization → 生态繁荣</text>
</svg>