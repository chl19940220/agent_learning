<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="640" height="200" rx="14" fill="#f0f4f8"/>
  <text x="320" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">AI EraEngineer Value转变</text>

  <!-- 过去 -->
  <rect x="30" y="50" width="260" height="120" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="160" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">⏮️ 过去的Engineer Value</text>
  <text x="160" y="100" text-anchor="middle" font-size="12" fill="#92400e">"我能写多快</text>
  <text x="160" y="118" text-anchor="middle" font-size="12" fill="#92400e">多好的Code"</text>
  <text x="160" y="148" text-anchor="middle" font-size="11" fill="#7f8c8d">手动编写每一行Code</text>
  <text x="160" y="163" text-anchor="middle" font-size="11" fill="#7f8c8d">个人编码能力为核心</text>

  <!-- 箭头 -->
  <line x1="292" y1="110" x2="348" y2="110" stroke="#2c3e50" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="320" y="103" text-anchor="middle" font-size="11" fill="#2c3e50" font-weight="bold">AI Era</text>

  <!-- 未来 -->
  <rect x="350" y="50" width="260" height="120" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="480" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">⏭️ 未来的Engineer Value</text>
  <text x="480" y="100" text-anchor="middle" font-size="12" fill="#15803d">"我能设计多聪明</text>
  <text x="480" y="118" text-anchor="middle" font-size="12" fill="#15803d">多鲁棒的System</text>
  <text x="480" y="133" text-anchor="middle" font-size="12" fill="#15803d">来可靠地驾驭 AI"</text>
  <text x="480" y="155" text-anchor="middle" font-size="11" fill="#7f8c8d">设计ConstraintSystem · 构建 AI Workflow</text>
  <text x="480" y="168" text-anchor="middle" font-size="11" fill="#7f8c8d">建立Team AI Collaboration规范</text>
</svg>
