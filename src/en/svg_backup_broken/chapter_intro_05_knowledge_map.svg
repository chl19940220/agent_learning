<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 280" width="840" height="280">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
  </defs>
  <rect width="840" height="280" rx="14" fill="#f0f4f8"/>
  <text x="420" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">第一章核心Knowledge Graph</text>

  <!-- CenterNode -->
  <rect x="310" y="50" width="200" height="44" rx="10" fill="#2c3e50"/>
  <text x="420" y="77" text-anchor="middle" font-size="14" font-weight="bold" fill="white">第1章 什么是 Agent？</text>

  <!-- Connection线 -->
  <line x1="420" y1="94" x2="420" y2="110" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="75" y1="110" x2="765" y2="110" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="75"  y1="110" x2="75"  y2="128" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="209" y1="110" x2="209" y2="128" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="343" y1="110" x2="343" y2="128" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="477" y1="110" x2="477" y2="128" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="611" y1="110" x2="611" y2="128" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="765" y1="110" x2="765" y2="128" stroke="#95a5a6" stroke-width="1.5"/>

  <!-- 6个子Node，每个宽120px，间距14px，fromx=15Start -->
  <rect x="15"  y="128" width="120" height="40" rx="8" fill="#3498db"/>
  <text x="75"  y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1.1 演进历程</text>
  <text x="75"  y="159" text-anchor="middle" font-size="10" fill="#d6eaf8">规则→意图→LLM→Agent</text>

  <rect x="149" y="128" width="120" height="40" rx="8" fill="#27ae60"/>
  <text x="209" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1.2 核心定义</text>
  <text x="209" y="159" text-anchor="middle" font-size="10" fill="#d5f5e3">LLM+Prompt+Tools+Memory</text>

  <rect x="283" y="128" width="120" height="40" rx="8" fill="#8e44ad"/>
  <text x="343" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1.3 核心Architecture</text>
  <text x="343" y="159" text-anchor="middle" font-size="10" fill="#e8daef">Perceive→Think→ActLoop</text>

  <rect x="417" y="128" width="120" height="40" rx="8" fill="#e67e22"/>
  <text x="477" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1.4 与Traditional Program区别</text>
  <text x="477" y="159" text-anchor="middle" font-size="10" fill="#fdebd0">确定性 vs Autonomous Decision</text>

  <rect x="551" y="128" width="120" height="40" rx="8" fill="#e74c3c"/>
  <text x="611" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1.5 应用Scenario</text>
  <text x="611" y="159" text-anchor="middle" font-size="10" fill="#fadbd8">Programming/Data/教育/办公...</text>

  <rect x="705" y="128" width="120" height="40" rx="8" fill="#16a085"/>
  <text x="765" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1.6 Development History</text>
  <text x="765" y="159" text-anchor="middle" font-size="10" fill="#d1f2eb">Symbolism→LLMEra</text>

  <!-- 详细说明 -->
  <rect x="30" y="195" width="780" height="65" rx="10" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <text x="420" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">核心公式</text>
  <text x="420" y="235" text-anchor="middle" font-size="13" fill="#8e44ad" font-weight="bold">Agent = LLM + Prompt + Tools + Memory + Orchestration</text>
  <text x="420" y="252" text-anchor="middle" font-size="11" fill="#7f8c8d">PerceiveEnvironment → LLM ReasoningDecision → 调用ToolsAct → ObserveResult → Loop直toGoal达成</text>
</svg>
