<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="720" height="340">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="arr10" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="720" height="340" fill="#f0f4f8" rx="14"/>
  <text x="360" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">企业多 Agent Skills全景图</text>

  <!-- 四个 Agent -->
  <rect x="20" y="45" width="155" height="130" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="1.5"/>
  <text x="97" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498db">💰 财务 Agent</text>
  <text x="40" y="90" font-size="11" fill="#555">· 报表Analysis</text>
  <text x="40" y="110" font-size="11" fill="#555">· BudgetPlanning</text>
  <text x="40" y="130" font-size="11" fill="#555">· 税务计算</text>

  <rect x="192" y="45" width="155" height="130" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.5"/>
  <text x="269" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">👥 HR Agent</text>
  <text x="212" y="90" font-size="11" fill="#555">· 简历筛选</text>
  <text x="212" y="110" font-size="11" fill="#555">· 面试安排</text>
  <text x="212" y="130" font-size="11" fill="#555">· 薪酬核算</text>

  <rect x="364" y="45" width="155" height="130" rx="10" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="441" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">💻 技术 Agent</text>
  <text x="384" y="90" font-size="11" fill="#555">· Code Review</text>
  <text x="384" y="110" font-size="11" fill="#555">· Architecture设计</text>
  <text x="384" y="130" font-size="11" fill="#555">· Troubleshooting</text>

  <rect x="536" y="45" width="165" height="130" rx="10" fill="#9b59b6" opacity="0.12" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="618" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#9b59b6">📈 Sales Agent</text>
  <text x="556" y="90" font-size="11" fill="#555">· 客户Analysis</text>
  <text x="556" y="110" font-size="11" fill="#555">· 报价Generation</text>
  <text x="556" y="130" font-size="11" fill="#555">· 趋势Prediction</text>

  <!-- UserRequest -->
  <rect x="60" y="195" width="600" height="38" rx="8" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="1.5"/>
  <text x="360" y="219" text-anchor="middle" font-size="12" fill="#2c3e50">👤 User：&quot;Analysis最近三个month的人力Cost变化趋势，并给出Bottom季度的招聘Budget建议&quot;</text>

  <!-- Coordination Agent -->
  <rect x="140" y="250" width="440" height="75" rx="10" fill="#2c3e50" opacity="0.08" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="360" y="272" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">🤖 Coordination Agent 需要知道：</text>
  <text x="160" y="295" font-size="11" fill="#27ae60">→ "薪酬核算" in HR Agent</text>
  <text x="340" y="295" font-size="11" fill="#9b59b6">→ "趋势Prediction" inSales Agent</text>
  <text x="520" y="295" font-size="11" fill="#3498db">→ "BudgetPlanning" in财务 Agent</text>

  <!-- 连线 -->
  <line x1="360" y1="233" x2="360" y2="248" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr10)"/>
