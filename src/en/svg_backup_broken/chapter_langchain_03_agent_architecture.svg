<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <marker id="arr-lc03" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
    <marker id="arr-blue-lc03" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
    <filter id="sh-lc03">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="380" fill="#f8f9fa" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">LangChain Agent Architecture：三LayerEncapsulation</text>
  <text x="400" y="50" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#777">@tool Tools定义 → Agent Create → AgentExecutor ExecutionLoop</text>

  <!-- ===== 最OuterLayer：AgentExecutor ===== -->
  <rect x="40" y="70" width="720" height="270" rx="14" fill="#e74c3c" opacity="0.05" stroke="#e74c3c" stroke-width="2"/>
  <text x="400" y="92" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#e74c3c">📦 AgentExecutor — ExecutionLoop管理器</text>

  <!-- Left SideUserInput -->
  <rect x="60" y="130" width="90" height="60" rx="8" fill="#2c3e50" filter="url(#sh-lc03)"/>
  <text x="105" y="154" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="white">👤 User</text>
  <text x="105" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#bdc3c7">InputMessage</text>
  <text x="105" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#bdc3c7">+ 历史</text>

  <line x1="150" y1="160" x2="188" y2="160" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr-lc03)"/>

  <!-- ===== MiddleLayer：Agent ===== -->
  <rect x="190" y="110" width="330" height="210" rx="12" fill="#3498db" opacity="0.08" stroke="#3498db" stroke-width="2"/>
  <text x="355" y="132" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#2980b9">🤖 Agent — Decision核心</text>

  <!-- Prompt -->
  <rect x="210" y="148" width="100" height="42" rx="6" fill="#9b59b6" filter="url(#sh-lc03)"/>
  <text x="260" y="166" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="white">📝 Prompt</text>
  <text x="260" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e8d5f5">System Prompt模板</text>

  <line x1="310" y1="169" x2="338" y2="169" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr-lc03)"/>

  <!-- LLM -->
  <rect x="340" y="148" width="80" height="42" rx="6" fill="#3498db" filter="url(#sh-lc03)"/>
  <text x="380" y="166" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="white">🧠 LLM</text>
  <text x="380" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#d4e6f9">GPT-4o</text>

  <line x1="420" y1="169" x2="448" y2="169" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr-lc03)"/>

  <!-- Output -->
  <rect x="450" y="148" width="55" height="42" rx="6" fill="#1abc9c" filter="url(#sh-lc03)"/>
  <text x="477" y="166" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="white">📤</text>
  <text x="477" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Decision</text>

  <!-- Tool Call区域 -->
  <rect x="210" y="210" width="295" height="95" rx="8" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="1.5"/>
  <text x="357" y="228" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#27ae60">🔧 Tools集 — @tool 装饰器定义</text>

  <!-- Tools列表 -->
  <rect x="225" y="240" width="80" height="28" rx="5" fill="#27ae60" opacity="0.8"/>
  <text x="265" y="258" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="white">🔍 Search</text>

  <rect x="315" y="240" width="80" height="28" rx="5" fill="#27ae60" opacity="0.8"/>
  <text x="355" y="258" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="white">🧮 计算</text>

  <rect x="405" y="240" width="80" height="28" rx="5" fill="#27ae60" opacity="0.8"/>
  <text x="445" y="258" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="white">📋 Query</text>

  <text x="357" y="288" text-anchor="middle" font-family="Courier New, monospace" font-size="8" fill="#555">llm.bind_tools([search, calc, query])</text>

  <!-- Loop箭头：ToolsResult → LLM -->
  <path d="M475,190 Q500,210 500,240 Q500,280 460,290 Q380,310 300,290 Q240,270 230,200 Q225,170 240,160 L255,156" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue-lc03)"/>
  <text x="295" y="315" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" fill="#3498db">ToolsResult → 继续Reasoning（Loop）</text>

  <!-- ===== Right Side：Output ===== -->
  <line x1="520" y1="160" x2="558" y2="160" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr-lc03)"/>

  <!-- 条件判断 -->
  <polygon points="600,130 640,160 600,190 560,160" fill="#f39c12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="600" y="157" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="bold" fill="white">Tools</text>
  <text x="600" y="168" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="bold" fill="white">调用？</text>

  <!-- 无Tools → 最终回复 -->
  <line x1="640" y1="160" x2="680" y2="160" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-lc03)"/>
  <text x="660" y="152" font-family="Arial, sans-serif" font-size="8" fill="#27ae60">No</text>

  <rect x="682" y="130" width="65" height="60" rx="8" fill="#27ae60" filter="url(#sh-lc03)"/>
  <text x="714" y="154" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="white">✅</text>
  <text x="714" y="168" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="white">最终</text>
  <text x="714" y="180" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="white">回复</text>

  <!-- 有Tools → 回toTools -->
  <line x1="600" y1="190" x2="600" y2="252" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M600,252 Q600,275 505,275 L475,268" fill="none" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-lc03)"/>
  <text x="625" y="220" font-family="Arial, sans-serif" font-size="8" fill="#e67e22">Yes</text>

  <!-- Bottom对比说明 -->
  <rect x="40" y="348" width="720" height="24" rx="6" fill="#e74c3c" opacity="0.05"/>
  <text x="400" y="364" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#e74c3c">AgentExecutor 自动管理：Tool CallLoop · Timeout Control (max_iterations) · Error Recovery (handle_parsing_errors) · 提Front终止</text>
</svg>