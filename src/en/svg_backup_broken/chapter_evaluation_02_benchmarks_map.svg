  <rect x="225" y="128" width="135" height="28" rx="8" fill="#fff" stroke="#d69e2e" stroke-width="0.8"/>
  <text x="293" y="147" text-anchor="middle" font-size="11" fill="#975a16" font-family="system-ui">MMLU / GSM8K</text>
