  <rect x="758" y="95" width="115" height="28" rx="8" fill="#fff" stroke="#fc8181" stroke-width="0.8"/>
  <text x="815" y="114" text-anchor="middle" font-size="11" fill="#c53030" font-family="system-ui">SWE-bench</text>
  <rect x="758" y="128" width="115" height="28" rx="8" fill="#fff" stroke="#fc8181" stroke-width="0.8"/>
  <text x="815" y="147" text-anchor="middle" font-size="11" fill="#c53030" font-family="system-ui">HumanEval</text>
  <rect x="758" y="161" width="115" height="22" rx="8" fill="#fed7d7"/>
  <text x="815" y="177" text-anchor="middle" font-size="9" fill="#c53030" font-family="system-ui">MBPP</text>
  
  <!-- Evaluation方法行 -->
  <text x="450" y="220" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a365d" font-family="system-ui">Evaluation方法</text>
  
  <rect x="60" y="240" width="200" height="60" rx="12" fill="#fff" stroke="#4a5568" stroke-width="1" filter="url(#shadow3)"/>
  <text x="160" y="263" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d3748" font-family="system-ui">📏 规则Evaluation</text>
  <text x="160" y="283" text-anchor="middle" font-size="10" fill="#718096" font-family="system-ui">精确匹配 / AST匹配 / 正则</text>
  
  <rect x="290" y="240" width="200" height="60" rx="12" fill="#fff" stroke="#4a5568" stroke-width="1" filter="url(#shadow3)"/>
  <text x="390" y="263" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d3748" font-family="system-ui">🤖 LLM-as-Judge</text>
  <text x="390" y="283" text-anchor="middle" font-size="10" fill="#718096" font-family="system-ui">打分 / 两两比较 / Win Rate</text>
  
  <rect x="520" y="240" width="200" height="60" rx="12" fill="#fff" stroke="#4a5568" stroke-width="1" filter="url(#shadow3)"/>
  <text x="620" y="263" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d3748" font-family="system-ui">👤 人工验证</text>
  <text x="620" y="283" text-anchor="middle" font-size="10" fill="#718096" font-family="system-ui">Expert评审 / A/B Testing / Gradio</text>
  
  <!-- Recommendation组合 -->
  <rect x="100" y="325" width="700" height="50" rx="12" fill="#1a365d" filter="url(#shadow3)"/>
  <text x="450" y="348" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="system-ui">✅ Recommendation组合：规则快速筛选 → LLM Judge 批量Evaluation → 人工抽检关键Case Study</text>
  <text x="450" y="366" text-anchor="middle" font-size="10" fill="#a0aec0" font-family="system-ui">三Layer递进Evaluation System，兼顾效率与准确性</text>
  
  <text x="450" y="393" text-anchor="middle" font-size="10" fill="#718096" font-family="system-ui">图 15-1  Agent Evaluation基准与方法全景图</text>
