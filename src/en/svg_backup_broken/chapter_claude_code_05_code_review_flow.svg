<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" width="680" height="300">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9333ea"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="680" height="300" rx="14" fill="#f0f4f8"/>
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Code Review FlowIntegration</text>

  <!-- DeveloperCommit PR -->
  <rect x="20" y="50" width="120" height="52" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">👨‍💻 Developer</text>
  <text x="80" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">Commit PR</text>
  <line x1="140" y1="76" x2="165" y2="76" stroke="#2c3e50" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Claude Code 自动Review -->
  <rect x="168" y="50" width="140" height="52" rx="10" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="238" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#7e22ce">🤖 Claude Code</text>
  <text x="238" y="88" text-anchor="middle" font-size="11" fill="#9333ea">自动Review（CI）</text>
  <line x1="308" y1="76" x2="333" y2="76" stroke="#2c3e50" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- GenerationReport -->
  <rect x="336" y="50" width="160" height="52" rx="10" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="416" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#7e22ce">📋 Generation结构化Report</text>
  <text x="416" y="83" text-anchor="middle" font-size="10" fill="#9333ea">🔴 必须修复</text>
  <text x="416" y="96" text-anchor="middle" font-size="10" fill="#9333ea">🟡 建议改进 / 🟢 称赞</text>
  <line x1="496" y1="76" x2="521" y2="76" stroke="#2c3e50" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- 人工Review -->
  <rect x="524" y="50" width="136" height="52" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="592" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">👀 人工Review员</text>
  <text x="592" y="88" text-anchor="middle" font-size="11" fill="#3b82f6">聚焦于 🔴 问题</text>

  <!-- 向Bottom箭头 -->
  <line x1="592" y1="102" x2="592" y2="130" stroke="#2c3e50" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- 讨论修复 -->
  <rect x="524" y="133" width="136" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="592" y="153" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">💬 讨论并修复</text>

  <!-- 菱形判断 -->
  <line x1="592" y1="173" x2="592" y2="193" stroke="#2c3e50" stroke-width="1.8" marker-end="url(#arrow)"/>
  <polygon points="592,195 632,215 592,235 552,215" fill="#f39c12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="592" y="213" text-anchor="middle" font-size="10" font-weight="bold" fill="white">需要</text>
  <text x="592" y="227" text-anchor="middle" font-size="10" font-weight="bold" fill="white">验证？</text>

  <!-- 是 → Claude Code 验证 -->
  <line x1="552" y1="215" x2="430" y2="215" stroke="#9333ea" stroke-width="1.8" marker-end="url(#arrow-purple)"/>
  <text x="491" y="208" text-anchor="middle" font-size="11" fill="#9333ea" font-weight="bold">是</text>
  <rect x="310" y="195" width="118" height="40" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="369" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="#7e22ce">🤖 Claude Code</text>
  <text x="369" y="228" text-anchor="middle" font-size="11" fill="#9333ea">验证修复</text>

  <!-- 否 → 直接 Approve -->
  <line x1="632" y1="215" x2="660" y2="215" stroke="#16a34a" stroke-width="1.8"/>
  <text x="648" y="208" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="bold">否</text>
  <line x1="660" y1="215" x2="660" y2="260" stroke="#16a34a" stroke-width="1.8"/>
  <line x1="660" y1="260" x2="430" y2="260" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- Claude Code 验证 → Merge -->
  <line x1="369" y1="235" x2="369" y2="260" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- Merge -->
  <rect x="180" y="243" width="180" height="36" rx="18" fill="#16a34a"/>
  <text x="270" y="266" text-anchor="middle" font-size="12" font-weight="bold" fill="white">✅ 人工 Approve → Merge</text>
</svg>
