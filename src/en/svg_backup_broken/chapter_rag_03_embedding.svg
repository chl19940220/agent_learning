<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/></marker>
  </defs>
  <rect width="800" height="380" rx="12" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">VectorEmbedding与RetrievalWorkflow</text>

  <!-- Index阶段 -->
  <text x="400" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#3498db">📥 Index阶段（Offline）</text>
  <rect x="30" y="70" width="120" height="50" rx="8" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="1.5"/>
  <text x="90" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#3498db">📄 文本块</text>
  <text x="90" y="108" text-anchor="middle" font-size="9" fill="#555">Chunk 1...N</text>

  <line x1="150" y1="95" x2="190" y2="95" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#a2)"/>

  <rect x="195" y="70" width="150" height="50" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.5"/>
  <text x="270" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">🧠 Embedding Model</text>
  <text x="270" y="108" text-anchor="middle" font-size="9" fill="#555">text → [0.12, -0.34, ...]</text>

  <line x1="345" y1="95" x2="385" y2="95" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#a2)"/>

  <rect x="390" y="65" width="180" height="60" rx="8" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="480" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">🗄️ Vector Database</text>
  <text x="480" y="103" text-anchor="middle" font-size="9" fill="#555">ChromaDB / FAISS / Pinecone</text>
  <text x="480" y="117" text-anchor="middle" font-size="9" fill="#555">Vector + 原文 + Metadata</text>

  <!-- Model Selection卡片 -->
  <rect x="610" y="65" width="170" height="100" rx="8" fill="#e67e22" opacity="0.08" stroke="#e67e22" stroke-width="1.5"/>
  <text x="695" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">📊 Model Selection</text>
  <text x="625" y="103" font-size="9" fill="#555">small: 1536d, $0.02/1M</text>
  <text x="625" y="118" font-size="9" fill="#555">large: 3072d, $0.13/1M</text>
  <text x="625" y="133" font-size="9" fill="#555">Local: bge-small-zh (Free)</text>
  <text x="625" y="150" font-size="9" fill="#27ae60" font-weight="bold">→ Recommendation small（性价比最优）</text>

  <!-- 分割线 -->
  <line x1="30" y1="175" x2="770" y2="175" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Retrieval阶段 -->
  <text x="400" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c">🔍 Retrieval阶段（Online）</text>

  <rect x="30" y="215" width="120" height="50" rx="8" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="90" y="237" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c">❓ UserQuery</text>
  <text x="90" y="253" text-anchor="middle" font-size="9" fill="#555">"Python GIL..."</text>

  <line x1="150" y1="240" x2="190" y2="240" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#a2)"/>

  <rect x="195" y="215" width="150" height="50" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.5"/>
  <text x="270" y="237" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">🧠 同一Model</text>
  <text x="270" y="253" text-anchor="middle" font-size="9" fill="#555">Query → QueryVector</text>

  <line x1="345" y1="240" x2="385" y2="240" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#a2)"/>

  <rect x="390" y="215" width="130" height="50" rx="8" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="455" y="237" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">🔎 Cosine Similarity</text>
  <text x="455" y="253" text-anchor="middle" font-size="9" fill="#555">Top-K 最近邻Search</text>

  <line x1="520" y1="240" x2="560" y2="240" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#a2)"/>

  <rect x="565" y="215" width="120" height="50" rx="8" fill="#2980b9" opacity="0.12" stroke="#2980b9" stroke-width="1.5"/>
  <text x="625" y="237" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">📋 相关Document</text>
  <text x="625" y="253" text-anchor="middle" font-size="9" fill="#555">score + 原文</text>

  <line x1="685" y1="240" x2="710" y2="240" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#a2)"/>

  <rect x="715" y="215" width="65" height="50" rx="8" fill="#2c3e50"/>
  <text x="748" y="237" text-anchor="middle" font-size="10" fill="white" font-weight="bold">LLM</text>
  <text x="748" y="253" text-anchor="middle" font-size="8" fill="#bdc3c7">Generation回答</text>

  <!-- Vector空间示意 -->
  <rect x="200" y="285" width="400" height="75" rx="8" fill="#2c3e50" opacity="0.04" stroke="#bdc3c7" stroke-width="1"/>
  <text x="400" y="305" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">💡 Core Concepts：语义空间</text>
  <text x="400" y="322" text-anchor="middle" font-size="10" fill="#555">"Python Programming语言" and "用 Python 写Code" → 相似的高维Vector</text>
  <text x="400" y="339" text-anchor="middle" font-size="10" fill="#555">"Python 蟒蛇" → 不同的Vector方向（虽然文字相同but语义不同）</text>
</svg>
