<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="700" height="200" fill="#f8f9fa" rx="12"/>
  <text x="350" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">LLM 的本质：PredictionBottom一个 Token</text>

  <!-- Input -->
  <rect x="30" y="70" width="140" height="60" rx="10" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <text x="100" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3498db">"今dayday气很"</text>
  <text x="100" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">Input文本</text>

  <!-- Arrow -->
  <path d="M 173 100 L 210 100" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="213" y="60" width="140" height="80" rx="12" fill="#4dabf7" opacity="0.9"/>
  <text x="283" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">🧠 LLM</text>
  <text x="283" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">PredictionBottom一个 Token</text>

  <!-- Arrow -->
  <path d="M 356 100 L 393 100" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Probability distribution -->
  <rect x="396" y="50" width="280" height="110" rx="10" fill="white" stroke="#ecf0f1" stroke-width="2"/>
  <text x="536" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#555">概率分布</text>

  <!-- Bars -->
  <rect x="415" y="115" width="50" height="35" rx="4" fill="#51cf66" opacity="0.8"/>
  <text x="440" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">70%</text>
  <text x="440" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">"好"</text>

  <rect x="480" y="125" width="50" height="25" rx="4" fill="#74c0fc" opacity="0.8"/>
  <text x="505" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3498db">15%</text>
  <text x="505" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3498db">"不错"</text>

  <rect x="545" y="130" width="50" height="20" rx="4" fill="#ffa94d" opacity="0.8"/>
  <text x="570" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e67e22">10%</text>
  <text x="570" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e67e22">"晴朗"</text>

  <rect x="610" y="143" width="50" height="7" rx="4" fill="#bdc3c7" opacity="0.8"/>
  <text x="635" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">5%</text>
  <text x="635" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">"..."</text>

  <!-- Key insight -->
  <rect x="30" y="155" width="640" height="30" rx="8" fill="#e3f2fd"/>
  <text x="350" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2980b9">💡 关键直觉：LLM 不是in"理解"然Back"回答"，while是in"根据ContextPrediction最可能的续写"</text>
</svg>
