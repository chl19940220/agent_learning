<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
  </defs>
  <rect width="800" height="440" rx="12" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">基座Model格局与四大趋势（2024—2026）</text>

  <!-- 趋势1 -->
  <rect x="30" y="55" width="365" height="110" rx="10" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="2"/>
  <text x="212" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">趋势一：Reasoning能力跃迁</text>
  <text x="212" y="100" text-anchor="middle" font-size="10" fill="#555">o1 → DeepSeek-R1 → o3/o4 → GPT-5</text>
  <text x="212" y="118" text-anchor="middle" font-size="10" fill="#555">纯 RL TrainingActivating autonomous reasoning（GRPO）</text>
  <rect x="50" y="130" width="325" height="22" rx="4" fill="#e74c3c" opacity="0.15"/>
  <text x="212" y="146" text-anchor="middle" font-size="10" fill="#e74c3c">2026year：Reasoning已成为所有主Flow Model标配</text>

  <!-- 趋势2 -->
  <rect x="405" y="55" width="365" height="110" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="587" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498db">趋势二：多Modality Fusion</text>
  <text x="587" y="100" text-anchor="middle" font-size="10" fill="#555">文本 + 图像 + 音频 + 视频</text>
  <text x="587" y="118" text-anchor="middle" font-size="10" fill="#555">GPT-4o 原生Multimodal、Gemini 2.5 Pro</text>
  <rect x="425" y="130" width="325" height="22" rx="4" fill="#3498db" opacity="0.15"/>
  <text x="587" y="146" text-anchor="middle" font-size="10" fill="#3498db">Agent from"只会读文字"to"能看能听能说"</text>

  <!-- 趋势3 -->
  <rect x="30" y="180" width="365" height="110" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="212" y="203" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">趋势三：Open Source追赶Closed Source</text>
  <text x="212" y="225" text-anchor="middle" font-size="10" fill="#555">Llama 4 · Qwen 3 · DeepSeek-V3</text>
  <text x="212" y="243" text-anchor="middle" font-size="10" fill="#555">Open SourceModelinReasoningTaskTop接近 GPT-4o</text>
  <rect x="50" y="255" width="325" height="22" rx="4" fill="#27ae60" opacity="0.15"/>
  <text x="212" y="271" text-anchor="middle" font-size="10" fill="#27ae60">Cost降低 10-100 倍，Local Deployment可行</text>

  <!-- 趋势4 -->
  <rect x="405" y="180" width="365" height="110" rx="10" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="587" y="203" text-anchor="middle" font-size="13" font-weight="bold" fill="#8e44ad">趋势四：Agent 原生能力</text>
  <text x="587" y="225" text-anchor="middle" font-size="10" fill="#555">ModelInner置Tool Call、Planning、Memory</text>
  <text x="587" y="243" text-anchor="middle" font-size="10" fill="#555">Claude 3.5 Computer Use · GPT-5 Agent Mode</text>
  <rect x="425" y="255" width="325" height="22" rx="4" fill="#8e44ad" opacity="0.15"/>
  <text x="587" y="271" text-anchor="middle" font-size="10" fill="#8e44ad">from"能力涌现"to"设计Inner置"</text>

  <!-- 选型指南 -->
  <text x="400" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Agent Developer选型指南</text>

  <rect x="30" y="330" width="180" height="90" rx="8" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="120" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c">快速原型</text>
  <text x="120" y="372" text-anchor="middle" font-size="10" fill="#555">GPT-4o / Claude 3.5</text>
  <text x="120" y="390" text-anchor="middle" font-size="10" fill="#555">最强能力，快速验证</text>
  <text x="120" y="410" text-anchor="middle" font-size="9" fill="#888">$2.5-15 / 1M tokens</text>

  <rect x="225" y="330" width="180" height="90" rx="8" fill="white" stroke="#e67e22" stroke-width="1.5"/>
  <text x="315" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">Cost敏感</text>
  <text x="315" y="372" text-anchor="middle" font-size="10" fill="#555">GPT-4o-mini / Qwen 3</text>
  <text x="315" y="390" text-anchor="middle" font-size="10" fill="#555">性价比最优</text>
  <text x="315" y="410" text-anchor="middle" font-size="9" fill="#888">$0.15-0.6 / 1M tokens</text>

  <rect x="420" y="330" width="180" height="90" rx="8" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="510" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">DataPrivacy</text>
  <text x="510" y="372" text-anchor="middle" font-size="10" fill="#555">Llama 4 / DeepSeek-V3</text>
  <text x="510" y="390" text-anchor="middle" font-size="10" fill="#555">Local Deployment，Data不出域</text>
  <text x="510" y="410" text-anchor="middle" font-size="9" fill="#888">GPU 硬件Cost</text>

  <rect x="615" y="330" width="155" height="90" rx="8" fill="white" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="692" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">需要Fine-tuning</text>
  <text x="692" y="372" text-anchor="middle" font-size="10" fill="#555">Qwen 2.5 / Llama 3</text>
  <text x="692" y="390" text-anchor="middle" font-size="10" fill="#555">LoRA + GRPO Training</text>
  <text x="692" y="410" text-anchor="middle" font-size="9" fill="#888">参考第10章</text>
</svg>
