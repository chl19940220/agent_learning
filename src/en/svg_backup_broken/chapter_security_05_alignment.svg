<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="ar5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2980b9"/>
    </marker>
  </defs>
  <rect width="800" height="420" rx="12" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Agent BehaviorAlignment与边界控制</text>

  <!-- AlignmentGoal -->
  <rect x="250" y="55" width="300" height="45" rx="22" fill="#2c3e50"/>
  <text x="400" y="83" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Agent Behavior = User意图 + SecurityConstraint</text>

  <!-- 三Layer控制 -->
  <rect x="30" y="120" width="235" height="280" rx="10" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="2"/>
  <text x="147" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">🚫 行为边界</text>

  <rect x="50" y="160" width="195" height="30" rx="6" fill="white" stroke="#e74c3c" stroke-width="1"/>
  <text x="147" y="180" text-anchor="middle" font-size="10" fill="#e74c3c">❌ 禁止区：绝对不做</text>
  <text x="147" y="205" text-anchor="middle" font-size="10" fill="#555">DeleteSystem文件</text>
  <text x="147" y="220" text-anchor="middle" font-size="10" fill="#555">访问其他User Data</text>
  <text x="147" y="235" text-anchor="middle" font-size="10" fill="#555">修改SecurityConfig</text>

  <rect x="50" y="255" width="195" height="30" rx="6" fill="white" stroke="#e67e22" stroke-width="1"/>
  <text x="147" y="275" text-anchor="middle" font-size="10" fill="#e67e22">⚠️ 审批区：需人类确认</text>
  <text x="147" y="300" text-anchor="middle" font-size="10" fill="#555">发送邮件/Message</text>
  <text x="147" y="315" text-anchor="middle" font-size="10" fill="#555">ExecutionDatabase写Manipulation</text>
  <text x="147" y="330" text-anchor="middle" font-size="10" fill="#555">DeploymentCodeto生产Environment</text>

  <rect x="50" y="345" width="195" height="30" rx="6" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="147" y="365" text-anchor="middle" font-size="10" fill="#27ae60">✅ 自主区：自由Execution</text>
  <text x="147" y="385" text-anchor="middle" font-size="10" fill="#555">Read文件、SearchInfo、计算…</text>

  <!-- 兜底机制 -->
  <rect x="283" y="120" width="235" height="280" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="400" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#3498db">🔄 兜底机制</text>

  <rect x="303" y="165" width="195" height="55" rx="8" fill="white" stroke="#3498db" stroke-width="1"/>
  <text x="400" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#3498db">最大步数Limit</text>
  <text x="400" y="205" text-anchor="middle" font-size="10" fill="#555">max_steps=20 防止无限Loop</text>

  <rect x="303" y="232" width="195" height="55" rx="8" fill="white" stroke="#3498db" stroke-width="1"/>
  <text x="400" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#3498db">Timeout保护</text>
  <text x="400" y="272" text-anchor="middle" font-size="10" fill="#555">timeout=300s 单步Timeout终止</text>

  <rect x="303" y="299" width="195" height="55" rx="8" fill="white" stroke="#3498db" stroke-width="1"/>
  <text x="400" y="319" text-anchor="middle" font-size="11" font-weight="bold" fill="#3498db">Budget控制</text>
  <text x="400" y="339" text-anchor="middle" font-size="10" fill="#555">max_cost=$5.0 费用Top限</text>

  <rect x="303" y="366" width="195" height="28" rx="6" fill="#e8f4fd" stroke="#3498db" stroke-width="1"/>
  <text x="400" y="385" text-anchor="middle" font-size="10" fill="#2980b9">Graceful Degradation → 返回部分Result</text>

  <!-- 意图确认 -->
  <rect x="536" y="120" width="235" height="280" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="653" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">🎯 意图Alignment</text>

  <rect x="556" y="165" width="195" height="55" rx="8" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="653" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">澄清模糊指令</text>
  <text x="653" y="205" text-anchor="middle" font-size="10" fill="#555">"Delete文件" → 确认哪些文件？</text>

  <rect x="556" y="232" width="195" height="55" rx="8" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="653" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">可逆性检查</text>
  <text x="653" y="272" text-anchor="middle" font-size="10" fill="#555">不可逆Manipulation → 二次确认</text>

  <rect x="556" y="299" width="195" height="55" rx="8" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="653" y="319" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">影响范围Evaluation</text>
  <text x="653" y="339" text-anchor="middle" font-size="10" fill="#555">Manipulation影响 N 条Data → 告知</text>

  <rect x="556" y="366" width="195" height="28" rx="6" fill="#e8f8e8" stroke="#27ae60" stroke-width="1"/>
  <text x="653" y="385" text-anchor="middle" font-size="10" fill="#27ae60">拒绝不道德/有害Request</text>
</svg>
