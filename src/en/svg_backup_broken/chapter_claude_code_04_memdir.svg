<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" width="620" height="300">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
  </defs>
  <rect width="620" height="300" rx="14" fill="#f0f4f8"/>
  <text x="310" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Long-Term Memory机制（memdir）</text>

  <!-- Long-Term MemoryLayer -->
  <rect x="30" y="50" width="560" height="100" rx="10" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="310" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#155724">💾 Long-Term MemoryLayer（跨会话持久）</text>

  <rect x="50" y="82" width="240" height="52" rx="8" fill="#28a745"/>
  <text x="170" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="white">~/.claude/CLAUDE.md</text>
  <text x="170" y="119" text-anchor="middle" font-size="11" fill="#d5f5e3">全局永久Memory · 所有Project始终加载</text>

  <rect x="330" y="82" width="240" height="52" rx="8" fill="#28a745"/>
  <text x="450" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Project/CLAUDE.md</text>
  <text x="450" y="119" text-anchor="middle" font-size="11" fill="#d5f5e3">Project级永久Memory · in该Project始终加载</text>

  <!-- 双向箭头 -->
  <line x1="310" y1="150" x2="310" y2="175" stroke="#2c3e50" stroke-width="2"/>
  <!-- 向Bottom箭头（加载） -->
  <line x1="290" y1="175" x2="290" y2="155" stroke="#3498db" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <text x="240" y="168" font-size="11" fill="#3498db" font-weight="bold">每次会话Start时自动加载</text>
  <!-- 向Top箭头（Write） -->
  <line x1="330" y1="155" x2="330" y2="175" stroke="#27ae60" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="335" y="168" font-size="11" fill="#27ae60" font-weight="bold">用 # 快捷键or /memory Write</text>

  <!-- 会话StateLayer -->
  <rect x="30" y="178" width="560" height="80" rx="10" fill="#eaf4fb" stroke="#3498db" stroke-width="2"/>
  <text x="310" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#2980b9">⏱️ 会话StateLayer（会话Inner临时）</text>

  <rect x="160" y="210" width="300" height="36" rx="8" fill="#3498db"/>
  <text x="310" y="228" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Context Window</text>
  <text x="310" y="242" text-anchor="middle" font-size="11" fill="#d6eaf8">whenFrontDialogue历史 · 受压缩管理</text>

  <!-- 说明 -->
  <rect x="30" y="270" width="560" height="22" rx="6" fill="#e8f4fd"/>
  <text x="310" y="285" text-anchor="middle" font-size="11" fill="#2980b9">💡 用 # 快捷键把关键Decision存入 memdir，Bottom次会话 Claude 自动加载，无需重复解释背景</text>
</svg>
