<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460">
  <defs>
    <filter id="shadow2">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3182ce"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38a169"/>
    </marker>
  </defs>
  
  <rect width="900" height="460" fill="#f0f4f8" rx="16"/>
  
  <!-- 标题 -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a365d" font-family="system-ui">SFT → GRPO 完整TrainingWorkflow</text>
  
  <!-- ========= SFT 阶段 ========= -->
  <rect x="20" y="55" width="420" height="370" rx="14" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="230" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#2b6cb0" font-family="system-ui">阶段一：SFT 监督Fine-tuning</text>
  
  <!-- TrainingData -->
  <rect x="45" y="95" width="160" height="60" rx="10" fill="#fff" stroke="#4299e1" stroke-width="1"/>
  <text x="125" y="117" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6cb0" font-family="system-ui">📋 TrainingData</text>
  <text x="125" y="137" text-anchor="middle" font-size="10" fill="#4a5568" font-family="system-ui">Agent 交互轨迹</text>
  <text x="125" y="150" text-anchor="middle" font-size="9" fill="#718096" font-family="system-ui">(500-2000 条)</text>
  
  <!-- 基座Model -->
  <rect x="240" y="95" width="175" height="60" rx="10" fill="#fff" stroke="#4299e1" stroke-width="1"/>
  <text x="328" y="117" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6cb0" font-family="system-ui">🤖 基座Model</text>
  <text x="328" y="137" text-anchor="middle" font-size="10" fill="#4a5568" font-family="system-ui">Qwen2.5-7B (冻结)</text>
  <text x="328" y="150" text-anchor="middle" font-size="9" fill="#718096" font-family="system-ui">+ LoRA r=16-32</text>
  
  <!-- 箭头toTraining -->
  <line x1="125" y1="155" x2="125" y2="175" stroke="#3182ce" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="328" y1="155" x2="328" y2="175" stroke="#3182ce" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  
  <!-- SFT Training过程 -->
  <rect x="45" y="180" width="370" height="55" rx="10" fill="#4299e1" filter="url(#shadow2)"/>
  <text x="230" y="202" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="system-ui">SFT Training (Cross-Entropy Loss)</text>
  <text x="230" y="222" text-anchor="middle" font-size="10" fill="#bee3f8" font-family="system-ui">L = -Σ log P(y_t | y_&lt;t, x)    lr=2e-4, epochs=3</text>
  
  <!-- 箭头 -->
  <line x1="230" y1="235" x2="230" y2="255" stroke="#3182ce" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  
  <!-- SFT Output -->
  <rect x="95" y="260" width="270" height="50" rx="10" fill="#fff" stroke="#4299e1" stroke-width="1.5"/>
  <text x="230" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6cb0" font-family="system-ui">SFT Model</text>
  <text x="230" y="300" text-anchor="middle" font-size="10" fill="#4a5568" font-family="system-ui">✅ 掌握 Agent Behavior格式（think/tool_call）</text>
  
  <!-- SFT Metric -->
  <rect x="45" y="325" width="370" height="85" rx="10" fill="#fff" stroke="#bee3f8" stroke-width="1"/>
  <text x="230" y="347" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6cb0" font-family="system-ui">SFT 阶段关键Metric</text>
  <text x="65" y="367" font-size="10" fill="#4a5568" font-family="system-ui">• Training损失: 持续Bottom降 → ~0.5-1.0</text>
  <text x="65" y="383" font-size="10" fill="#4a5568" font-family="system-ui">• 格式符合率: ~5% → ~85%</text>
  <text x="65" y="399" font-size="10" fill="#4a5568" font-family="system-ui">• Accuracy提升: ~30% → ~45% (有限提升)</text>
  
  <!-- ========= MiddleConnection箭头 ========= -->
  <line x1="440" y1="285" x2="475" y2="285" stroke="#4a5568" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <text x="458" y="275" text-anchor="middle" font-size="18" fill="#4a5568">→</text>
  
  <!-- ========= GRPO 阶段 ========= -->
  <rect x="460" y="55" width="420" height="370" rx="14" fill="#f0fff4" stroke="#48bb78" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="670" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#276749" font-family="system-ui">阶段二：GRPO Reinforcement Learning</text>
  
  <!-- Input -->
  <rect x="485" y="95" width="160" height="50" rx="10" fill="#fff" stroke="#48bb78" stroke-width="1"/>
  <text x="565" y="117" text-anchor="middle" font-size="12" font-weight="bold" fill="#276749" font-family="system-ui">📝 问题集</text>
  <text x="565" y="135" text-anchor="middle" font-size="10" fill="#4a5568" font-family="system-ui">GSM8K 数学题</text>
  
  <!-- SFT Model -->
  <rect x="680" y="95" width="175" height="50" rx="10" fill="#fff" stroke="#48bb78" stroke-width="1"/>
  <text x="768" y="117" text-anchor="middle" font-size="12" font-weight="bold" fill="#276749" font-family="system-ui">🤖 SFT Model</text>
  <text x="768" y="135" text-anchor="middle" font-size="10" fill="#4a5568" font-family="system-ui">作为 GRPO 的起点</text>
  
  <!-- 采样 -->
  <line x1="670" y1="145" x2="670" y2="163" stroke="#38a169" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  
  <rect x="510" y="168" width="320" height="45" rx="10" fill="#48bb78"/>
  <text x="670" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff" font-family="system-ui">采样 G=8 个回答 (temperature=0.7)</text>
  <text x="670" y="204" text-anchor="middle" font-size="10" fill="#c6f6d5" font-family="system-ui">y₁, y₂, ..., y₈ ~ π_θ(·|x)</text>
  
  <!-- Reward计算 -->
  <line x1="670" y1="213" x2="670" y2="228" stroke="#38a169" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  
  <rect x="510" y="233" width="320" height="40" rx="10" fill="#fff" stroke="#48bb78" stroke-width="1.5"/>
  <text x="670" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#276749" font-family="system-ui">🏆 RewardFunctionEvaluation</text>
  <text x="670" y="266" text-anchor="middle" font-size="10" fill="#4a5568" font-family="system-ui">r₁=1.0, r₂=0.0, r₃=1.0, ... → Accuracy+格式+效率</text>
  
  <!-- 优势计算 -->
  <line x1="670" y1="273" x2="670" y2="288" stroke="#38a169" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  
  <rect x="510" y="293" width="320" height="35" rx="10" fill="#c6f6d5" stroke="#48bb78" stroke-width="1"/>
  <text x="670" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#276749" font-family="system-ui">组InnerStandardization → Aᵢ = (rᵢ - mean) / std</text>
  <text x="670" y="323" text-anchor="middle" font-size="9" fill="#4a5568" font-family="system-ui">正确答案→正优势(强化) | Error答案→负优势(抑制)</text>
  
  <!-- Update -->
  <line x1="670" y1="328" x2="670" y2="343" stroke="#38a169" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  
  <rect x="485" y="348" width="370" height="65" rx="10" fill="#fff" stroke="#c6f6d5" stroke-width="1"/>
  <text x="670" y="368" text-anchor="middle" font-size="11" font-weight="bold" fill="#276749" font-family="system-ui">GRPO 阶段关键Metric</text>
  <text x="505" y="385" font-size="10" fill="#4a5568" font-family="system-ui">• mean_reward: 稳步Top升 (0.3 → 0.7)</text>
  <text x="505" y="400" font-size="10" fill="#4a5568" font-family="system-ui">• Accuracy: ~45% → ~60% (显著提升!)</text>
  
  <!-- Bottom说明 -->
  <text x="450" y="448" text-anchor="middle" font-size="11" fill="#718096" font-family="system-ui">图 18-2  from SFT to GRPO 的两阶段TrainingWorkflow：先学格式，再学Reasoning</text>
</svg>
