<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" width="700" height="180">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-weak" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#bdc3c7"/>
    </marker>
  </defs>
  <rect width="700" height="180" fill="#f8f9fa" rx="12"/>
  <text x="350" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">Attention Mechanism：理解Word语之间的关联</text>

  <!-- Input sequence -->
  <text x="350" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">Input序列</text>
  <rect x="40" y="65" width="60" height="40" rx="8" fill="#e3f2fd" stroke="#3498db" stroke-width="1.5"/>
  <text x="70" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3498db">它</text>

  <rect x="120" y="65" width="60" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="150" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#888">把</text>

  <rect x="200" y="65" width="60" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="230" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#888">苹果</text>

  <rect x="280" y="65" width="60" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="310" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#888">放进</text>

  <rect x="360" y="65" width="60" height="40" rx="8" fill="#d3f9d8" stroke="#27ae60" stroke-width="2.5"/>
  <text x="390" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#27ae60">篮子</text>

  <!-- Strong attention arrow -->
  <path d="M 390 65 Q 390 30 70 65" stroke="#27ae60" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="230" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">强关注（"它" = "篮子"）</text>

  <!-- Weak attention arrow -->
  <path d="M 230 65 Q 230 50 70 65" stroke="#bdc3c7" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow-weak)"/>
  <text x="150" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#bdc3c7">弱关注</text>

  <!-- Result -->
  <rect x="480" y="65" width="190" height="40" rx="10" fill="#d3f9d8" stroke="#27ae60" stroke-width="2"/>
  <text x="575" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">✅ "它" = "篮子"</text>

  <!-- Arrow to result -->
  <path d="M 423 85 L 477 85" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Explanation -->
  <rect x="40" y="125" width="620" height="40" rx="8" fill="#e8f5e9"/>
  <text x="350" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">Attention Mechanism：in处理每个Word时，DecideTop文Center哪些Word最重要</text>
  <text x="350" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Transformer 的Multi-Head Attention让ModelinGeneration每个Word时，都能关注toInput序列Center最相关的位置</text>
</svg>
