  <rect x="140" y="162" width="540" height="30" rx="6" fill="#3498db" opacity="0.08"/>
  <text x="155" y="182" font-size="12" fill="#2c3e50">HuggingGPT / JARVIS (微软) — 跨Model的TaskRouting（Skills发现雏形）</text>

  <!-- 2024: 体系化 -->
  <circle cx="100" cy="215" r="10" fill="#e67e22"/>
  <text x="120" y="220" font-size="15" font-weight="bold" fill="#e67e22">2024：体系化</text>

  <rect x="140" y="235" width="540" height="30" rx="6" fill="#e67e22" opacity="0.08"/>
  <text x="155" y="255" font-size="12" fill="#2c3e50">CRAFT (ICLR 2024) — 自动CreateandRetrieval专用Tools集</text>

