  <text x="155" y="292" font-size="12" fill="#2c3e50">Anthropic Skills — SKILL.md DeclarativeSkillsFramework</text>

  <rect x="140" y="309" width="540" height="30" rx="6" fill="#e67e22" opacity="0.08"/>
  <text x="155" y="329" font-size="12" fill="#2c3e50">A2A Protocol (Google) — Agent Card Center的Skills声明标准</text>

