  <text x="155" y="396" font-size="11" fill="#2c3e50">Claude Code Skills (Anthropic) — Open Source 16 个示范Skills | OpenAI Agents SDK — Handoff + Tool Skill Composition | add-skill CLI — 跨平台Skills安装</text>
