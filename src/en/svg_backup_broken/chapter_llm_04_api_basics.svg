<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="fa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3498db"/>
    </marker>
  </defs>
  <rect width="800" height="400" rx="12" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Model API CallsWorkflow与Best Practices</text>

  <!-- API CallsWorkflow -->
  <rect x="30" y="60" width="120" height="45" rx="8" fill="#3498db" opacity="0.9"/>
  <text x="90" y="88" text-anchor="middle" font-size="12" fill="white" font-weight="bold">应用Code</text>

  <line x1="150" y1="82" x2="190" y2="82" stroke="#3498db" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#fa)"/>

  <rect x="192" y="55" width="140" height="55" rx="8" fill="white" stroke="#3498db" stroke-width="2"/>
  <text x="262" y="77" text-anchor="middle" font-size="11" font-weight="bold" fill="#3498db">Config管理</text>
  <text x="262" y="97" text-anchor="middle" font-size="10" fill="#555">.env → API Key</text>

  <line x1="332" y1="82" x2="372" y2="82" stroke="#3498db" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#fa)"/>

  <rect x="374" y="55" width="140" height="55" rx="8" fill="white" stroke="#e67e22" stroke-width="2"/>
  <text x="444" y="77" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">HTTP Request</text>
  <text x="444" y="97" text-anchor="middle" font-size="10" fill="#555">POST /chat/completions</text>

  <line x1="514" y1="82" x2="554" y2="82" stroke="#3498db" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#fa)"/>

  <rect x="556" y="55" width="120" height="55" rx="8" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="616" y="77" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">ModelReasoning</text>
  <text x="616" y="97" text-anchor="middle" font-size="10" fill="#555">GPT-4o / Open Source</text>

  <line x1="676" y1="82" x2="716" y2="82" stroke="#3498db" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#fa)"/>

  <rect x="718" y="60" width="60" height="45" rx="8" fill="#27ae60" opacity="0.9"/>
  <text x="748" y="88" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Response</text>

  <!-- 两种Output模式 -->
  <text x="400" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">两种Output模式</text>

  <rect x="50" y="158" width="330" height="100" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="215" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498db">Sync模式</text>
  <text x="215" y="205" text-anchor="middle" font-size="10" fill="#555">Waiting完整ResponseBack一次性返回</text>
  <text x="215" y="225" text-anchor="middle" font-size="10" fill="#555">response = client.chat.completions.create(...)</text>
  <text x="215" y="245" text-anchor="middle" font-size="9" fill="#888">适合Back端处理、批量Task</text>

  <rect x="420" y="158" width="330" height="100" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="585" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">Stream式模式 (stream=True)</text>
  <text x="585" y="205" text-anchor="middle" font-size="10" fill="#555">逐 Token Real-time返回，体验更好</text>
  <text x="585" y="225" text-anchor="middle" font-size="10" fill="#555">for chunk in response: yield chunk</text>
  <text x="585" y="245" text-anchor="middle" font-size="9" fill="#888">适合聊day界面、Real-time交互</text>

  <!-- 生产必备 -->
  <text x="400" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">生产Environment必备Skills</text>

  <rect x="30" y="305" width="175" height="75" rx="8" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="117" y="328" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c">Error Handling</text>
  <text x="117" y="348" text-anchor="middle" font-size="10" fill="#555">Rate Limit → 指数退避</text>
  <text x="117" y="365" text-anchor="middle" font-size="10" fill="#555">Timeout → Retry 3 次</text>

  <rect x="220" y="305" width="175" height="75" rx="8" fill="white" stroke="#e67e22" stroke-width="1.5"/>
  <text x="307" y="328" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">Cost控制</text>
  <text x="307" y="348" text-anchor="middle" font-size="10" fill="#555">Trace Token 用量</text>
  <text x="307" y="365" text-anchor="middle" font-size="10" fill="#555">设置BudgetTop限</text>

  <rect x="410" y="305" width="175" height="75" rx="8" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <text x="497" y="328" text-anchor="middle" font-size="12" font-weight="bold" fill="#3498db">兼容性</text>
  <text x="497" y="348" text-anchor="middle" font-size="10" fill="#555">OpenAI 兼容 API 格式</text>
  <text x="497" y="365" text-anchor="middle" font-size="10" fill="#555">一套Code切换Model</text>

  <rect x="600" y="305" width="175" height="75" rx="8" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="687" y="328" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">Security</text>
  <text x="687" y="348" text-anchor="middle" font-size="10" fill="#555">.env 管理密钥</text>
  <text x="687" y="365" text-anchor="middle" font-size="10" fill="#555">不Hardcoding API Key</text>
</svg>
