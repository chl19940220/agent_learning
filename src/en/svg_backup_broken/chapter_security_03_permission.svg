<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
  </defs>
  <rect width="800" height="440" rx="12" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Agent Permission控制与沙箱隔离Architecture</text>

  <!-- 三Layer防线 -->
  <!-- OuterLayer：Network隔离 -->
  <rect x="30" y="55" width="740" height="370" rx="12" fill="#e74c3c" opacity="0.06" stroke="#e74c3c" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">🛡 第一Layer：Network与Environment隔离</text>
  <text x="400" y="96" text-anchor="middle" font-size="10" fill="#777">Docker Container / NetworkPolicy / Resources配额Limit</text>

  <!-- CenterLayer：PermissionSystem -->
  <rect x="60" y="110" width="680" height="200" rx="10" fill="#e67e22" opacity="0.08" stroke="#e67e22" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="400" y="133" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">🔐 第二Layer：Permission控制System</text>

  <!-- Permission类型 -->
  <rect x="90" y="145" width="150" height="70" rx="8" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="165" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c">文件Permission</text>
  <text x="165" y="183" text-anchor="middle" font-size="10" fill="#555">READ_FILE</text>
  <text x="165" y="198" text-anchor="middle" font-size="10" fill="#555">WRITE_FILE</text>

  <rect x="260" y="145" width="150" height="70" rx="8" fill="white" stroke="#e67e22" stroke-width="1.5"/>
  <text x="335" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">ExecutionPermission</text>
  <text x="335" y="183" text-anchor="middle" font-size="10" fill="#555">EXECUTE_CODE</text>
  <text x="335" y="198" text-anchor="middle" font-size="10" fill="#555">RUN_SHELL</text>

  <rect x="430" y="145" width="150" height="70" rx="8" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <text x="505" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#3498db">NetworkPermission</text>
  <text x="505" y="183" text-anchor="middle" font-size="10" fill="#555">HTTP_REQUEST</text>
  <text x="505" y="198" text-anchor="middle" font-size="10" fill="#555">DATABASE_ACCESS</text>

  <rect x="600" y="145" width="120" height="70" rx="8" fill="white" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="660" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">管理Permission</text>
  <text x="660" y="183" text-anchor="middle" font-size="10" fill="#555">ADMIN</text>
  <text x="660" y="198" text-anchor="middle" font-size="10" fill="#555">GRANT_PERM</text>

  <!-- 预设Role -->
  <rect x="90" y="230" width="190" height="65" rx="8" fill="#e8f8e8" stroke="#27ae60" stroke-width="1.5"/>
  <text x="185" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">👁 只读 Agent</text>
  <text x="185" y="268" text-anchor="middle" font-size="10" fill="#555">READ_FILE | HTTP_REQUEST</text>
  <text x="185" y="283" text-anchor="middle" font-size="9" fill="#888">InfoRetrieval、Question AnsweringScenario</text>

  <rect x="300" y="230" width="190" height="65" rx="8" fill="#e8f4fd" stroke="#3498db" stroke-width="1.5"/>
  <text x="395" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#3498db">✍️ 标准 Agent</text>
  <text x="395" y="268" text-anchor="middle" font-size="10" fill="#555">读/写文件 + NetworkRequest</text>
  <text x="395" y="283" text-anchor="middle" font-size="9" fill="#888">日常Development助手Scenario</text>

  <rect x="510" y="230" width="210" height="65" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="615" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">⚡ 高Permission Agent</text>
  <text x="615" y="268" text-anchor="middle" font-size="10" fill="#555">全部Permission（需审批）</text>
  <text x="615" y="283" text-anchor="middle" font-size="9" fill="#888">OperationsAutomationScenario</text>

  <!-- InnerLayer：ManipulationAudit -->
  <rect x="60" y="325" width="680" height="85" rx="10" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="348" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">📋 第三Layer：ManipulationAudit与兜底保护</text>

  <rect x="90" y="360" width="180" height="38" rx="6" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="180" y="384" text-anchor="middle" font-size="10" fill="#555">🔍 所有Manipulation记录Log</text>

  <rect x="290" y="360" width="200" height="38" rx="6" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="390" y="384" text-anchor="middle" font-size="10" fill="#555">⏱ Timeout自动终止 + RetryLimit</text>

  <rect x="510" y="360" width="210" height="38" rx="6" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="615" y="384" text-anchor="middle" font-size="10" fill="#555">🚨 敏感Manipulation需人工确认</text>
</svg>
