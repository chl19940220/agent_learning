<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
  </defs>
  <rect width="700" height="260" fill="#f0f4f8" rx="14"/>
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">SKILL.md 设计理念</text>

  <!-- 1. Declarative -->
  <rect x="20" y="48" width="320" height="90" rx="10" fill="#3498db" opacity="0.1" stroke="#3498db" stroke-width="1.5"/>
  <text x="180" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#3498db">1. 📝 Declarative</text>
  <text x="40" y="92" font-size="11" fill="#555">用 Markdown while非Code定义Skills</text>
  <text x="40" y="112" font-size="11" fill="#555">→ 降低门槛，非程序员也可Create</text>
  <text x="40" y="130" font-size="10" fill="#888">格式：标准 Markdown + YAML frontmatter</text>

  <!-- 2. Layer级化 -->
  <rect x="360" y="48" width="320" height="90" rx="10" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="520" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">2. 🏗 Layer级化</text>
  <text x="380" y="92" font-size="11" fill="#555">Skills可以嵌套</text>
  <text x="380" y="112" font-size="11" fill="#555">skills/ → writing/ → technical/</text>
  <text x="380" y="130" font-size="10" fill="#888">→ from通用to专用的SkillsLayer级</text>

  <!-- 3. ContextPerceive -->
  <rect x="20" y="150" width="320" height="90" rx="10" fill="#e67e22" opacity="0.1" stroke="#e67e22" stroke-width="1.5"/>
  <text x="180" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">3. 🎯 ContextPerceive</text>
  <text x="40" y="194" font-size="11" fill="#555">按需加载，不是所有Skills同时激活</text>
  <text x="40" y="214" font-size="11" fill="#555">→ 根据Task动态激活相关Skills</text>
  <text x="40" y="232" font-size="10" fill="#888">Optimization Token using，降低Cost</text>

  <!-- 4. 可移植 -->
  <rect x="360" y="150" width="320" height="90" rx="10" fill="#9b59b6" opacity="0.1" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="520" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#9b59b6">4. 🔄 可移植</text>
  <text x="380" y="194" font-size="11" fill="#555">不绑定特定Model</text>
  <text x="380" y="214" font-size="11" fill="#555">→ 同一 SKILL.md 可用于 Claude/GPT/Open Source</text>
  <text x="380" y="232" font-size="10" fill="#888">Skills即Document，day然Version Management</text>
</svg>
