<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
  </defs>
  <rect width="800" height="460" rx="12" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Agent Framework选择Decision指南</text>

  <!-- 四大Scenario -->
  <rect x="30" y="60" width="175" height="110" rx="10" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="2"/>
  <text x="117" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">快速原型 / MVP</text>
  <rect x="50" y="95" width="135" height="28" rx="6" fill="#e67e22" opacity="0.9"/>
  <text x="117" y="114" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OpenAI Agents SDK</text>
  <text x="117" y="140" text-anchor="middle" font-size="10" fill="#555">Learning Curve低，快速Top手</text>
  <text x="117" y="158" text-anchor="middle" font-size="10" fill="#555">适合个人Project/Demo</text>

  <rect x="215" y="60" width="175" height="110" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="302" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498db">复杂Workflow</text>
  <rect x="235" y="95" width="135" height="28" rx="6" fill="#3498db" opacity="0.9"/>
  <text x="302" y="114" text-anchor="middle" font-size="11" fill="white" font-weight="bold">LangGraph</text>
  <text x="302" y="140" text-anchor="middle" font-size="10" fill="#555">State Diagram驱动，精细控制</text>
  <text x="302" y="158" text-anchor="middle" font-size="10" fill="#555">适合需要人机交互的System</text>

  <rect x="400" y="60" width="175" height="110" rx="10" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="487" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#8e44ad">多AgentCollaboration</text>
  <rect x="420" y="95" width="135" height="28" rx="6" fill="#8e44ad" opacity="0.9"/>
  <text x="487" y="114" text-anchor="middle" font-size="11" fill="white" font-weight="bold">CrewAI / AutoGen</text>
  <text x="487" y="140" text-anchor="middle" font-size="10" fill="#555">Role扮演 / Dialogue模式</text>
  <text x="487" y="158" text-anchor="middle" font-size="10" fill="#555">适合TeamCollaboration类Task</text>

  <rect x="585" y="60" width="185" height="110" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="677" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">零Code / 业务User</text>
  <rect x="610" y="95" width="135" height="28" rx="6" fill="#27ae60" opacity="0.9"/>
  <text x="677" y="114" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Dify / Coze / n8n</text>
  <text x="677" y="140" text-anchor="middle" font-size="10" fill="#555">Visualization拖拽，无需Programming</text>
  <text x="677" y="158" text-anchor="middle" font-size="10" fill="#555">适合非技术人员</text>

  <!-- 能力对比矩阵 -->
  <text x="400" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">核心能力对比矩阵</text>

  <!-- 表头 -->
  <rect x="30" y="215" width="740" height="30" rx="0" fill="#2c3e50"/>
  <text x="110" y="235" text-anchor="middle" font-size="11" fill="white" font-weight="bold">维度</text>
  <text x="240" y="235" text-anchor="middle" font-size="11" fill="white" font-weight="bold">LangChain</text>
  <text x="355" y="235" text-anchor="middle" font-size="11" fill="white" font-weight="bold">LangGraph</text>
  <text x="465" y="235" text-anchor="middle" font-size="11" fill="white" font-weight="bold">CrewAI</text>
  <text x="575" y="235" text-anchor="middle" font-size="11" fill="white" font-weight="bold">AutoGen</text>
  <text x="695" y="235" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OAI SDK</text>

  <!-- 行1 -->
  <rect x="30" y="245" width="740" height="28" rx="0" fill="white" stroke="#ddd" stroke-width="0.5"/>
  <text x="110" y="264" text-anchor="middle" font-size="10" fill="#555">Learning Curve</text>
  <text x="240" y="264" text-anchor="middle" font-size="10" fill="#e67e22">⭐⭐⭐ Center等</text>
  <text x="355" y="264" text-anchor="middle" font-size="10" fill="#e74c3c">⭐⭐⭐⭐ 较高</text>
  <text x="465" y="264" text-anchor="middle" font-size="10" fill="#27ae60">⭐⭐ 低</text>
  <text x="575" y="264" text-anchor="middle" font-size="10" fill="#e67e22">⭐⭐⭐ Center等</text>
  <text x="695" y="264" text-anchor="middle" font-size="10" fill="#27ae60">⭐ 很低</text>

  <!-- 行2 -->
  <rect x="30" y="273" width="740" height="28" rx="0" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
  <text x="110" y="292" text-anchor="middle" font-size="10" fill="#555">多Agent</text>
  <text x="240" y="292" text-anchor="middle" font-size="10" fill="#999">有限</text>
  <text x="355" y="292" text-anchor="middle" font-size="10" fill="#27ae60">原生</text>
  <text x="465" y="292" text-anchor="middle" font-size="10" fill="#27ae60">核心</text>
  <text x="575" y="292" text-anchor="middle" font-size="10" fill="#27ae60">核心</text>
  <text x="695" y="292" text-anchor="middle" font-size="10" fill="#27ae60">原生</text>

  <!-- 行3 -->
  <rect x="30" y="301" width="740" height="28" rx="0" fill="white" stroke="#ddd" stroke-width="0.5"/>
  <text x="110" y="320" text-anchor="middle" font-size="10" fill="#555">Workflow控制</text>
  <text x="240" y="320" text-anchor="middle" font-size="10" fill="#e67e22">链式</text>
  <text x="355" y="320" text-anchor="middle" font-size="10" fill="#27ae60">图+State机</text>
  <text x="465" y="320" text-anchor="middle" font-size="10" fill="#e67e22">顺序/Layer级</text>
  <text x="575" y="320" text-anchor="middle" font-size="10" fill="#3498db">Dialogue驱动</text>
  <text x="695" y="320" text-anchor="middle" font-size="10" fill="#e67e22">Handoff</text>

  <!-- 行4 -->
  <rect x="30" y="329" width="740" height="28" rx="0" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
  <text x="110" y="348" text-anchor="middle" font-size="10" fill="#555">生态丰富度</text>
  <text x="240" y="348" text-anchor="middle" font-size="10" fill="#27ae60">⭐⭐⭐⭐⭐</text>
  <text x="355" y="348" text-anchor="middle" font-size="10" fill="#27ae60">⭐⭐⭐⭐</text>
  <text x="465" y="348" text-anchor="middle" font-size="10" fill="#e67e22">⭐⭐⭐</text>
  <text x="575" y="348" text-anchor="middle" font-size="10" fill="#e67e22">⭐⭐⭐</text>
  <text x="695" y="348" text-anchor="middle" font-size="10" fill="#e67e22">⭐⭐</text>

  <!-- Bottom建议 -->
  <rect x="30" y="380" width="740" height="65" rx="10" fill="#fff8e1" stroke="#f39c12" stroke-width="1.5"/>
  <text x="400" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">💡 选择建议</text>
  <text x="400" y="420" text-anchor="middle" font-size="10" fill="#555">初学者入门：OpenAI SDK → 进阶：LangChain → 复杂Workflow：LangGraph → 多Agent：CrewAI/AutoGen</text>
  <text x="400" y="436" text-anchor="middle" font-size="10" fill="#888">核心原则：from最简单的方案Start，按需增加复杂度。不要为了用Frameworkwhile用Framework。</text>
</svg>
