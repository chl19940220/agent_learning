<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="720" height="340">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="arrC" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#27ae60"/>
    </marker>
    <marker id="arrCR" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#e74c3c"/>
    </marker>
  </defs>

  <rect width="720" height="340" fill="#f8f9fa" rx="14"/>
  <text x="360" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Plan → Build → Verify → Fix 自验证Loop</text>
  <text x="360" y="48" text-anchor="middle" font-size="11" fill="#7f8c8d">LangChain Terminal Bench 2.0 Center贡献最大的单项改进（+7.1%）</text>

  <!-- ── Phase 1: PLAN ── -->
  <rect x="30" y="68" width="155" height="190" rx="12" fill="#e8f4fd" stroke="#3498db" stroke-width="2"/>
  <rect x="30" y="68" width="155" height="34" rx="12" fill="#3498db"/>
  <rect x="30" y="90" width="155" height="12" fill="#3498db"/>
  <text x="108" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">① PLAN</text>
  <text x="108" y="112" text-anchor="middle" font-size="10" font-weight="bold" fill="#3498db">Planning阶段</text>
  <text x="108" y="126" text-anchor="middle" font-size="9" fill="#888">ReasoningBudget：HIGH 🔥</text>
  <line x1="45" y1="134" x2="170" y2="134" stroke="#3498db" stroke-width="0.8" opacity="0.3"/>
  <text x="45" y="150" font-size="9" fill="#555">• AnalysisTask要求</text>
  <text x="45" y="165" font-size="9" fill="#555">• 列出需改的文件</text>
  <text x="45" y="180" font-size="9" fill="#555">• 制定修改方案</text>
  <text x="45" y="195" font-size="9" fill="#555">• 明确Complete标准</text>
  <rect x="45" y="210" width="125" height="38" rx="8" fill="#3498db" opacity="0.1"/>
  <text x="108" y="224" text-anchor="middle" font-size="8" fill="#3498db">充分Think，</text>
  <text x="108" y="237" text-anchor="middle" font-size="8" fill="#3498db">考虑Edge情况</text>

  <!-- Arrow 1→2 -->
  <path d="M 186 163 L 210 163" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrC)"/>

  <!-- ── Phase 2: BUILD ── -->
  <rect x="213" y="68" width="155" height="190" rx="12" fill="#f0fdf4" stroke="#27ae60" stroke-width="2"/>
  <rect x="213" y="68" width="155" height="34" rx="12" fill="#27ae60"/>
  <rect x="213" y="90" width="155" height="12" fill="#27ae60"/>
  <text x="291" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">② BUILD</text>
  <text x="291" y="112" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">构建阶段</text>
  <text x="291" y="126" text-anchor="middle" font-size="9" fill="#888">ReasoningBudget：LOW ⚡</text>
  <line x1="228" y1="134" x2="353" y2="134" stroke="#27ae60" stroke-width="0.8" opacity="0.3"/>
  <text x="228" y="150" font-size="9" fill="#555">• 按计划逐项实现</text>
  <text x="228" y="165" font-size="9" fill="#555">• 修改Code文件</text>
  <text x="228" y="180" font-size="9" fill="#555">• 记录每步变更</text>
  <text x="228" y="195" font-size="9" fill="#555">• Loop检测MonitoringCenter</text>
  <rect x="228" y="210" width="125" height="38" rx="8" fill="#27ae60" opacity="0.1"/>
  <text x="291" y="224" text-anchor="middle" font-size="8" fill="#27ae60">高效Execution，</text>
  <text x="291" y="237" text-anchor="middle" font-size="8" fill="#27ae60">无需深度Reasoning</text>

  <!-- Arrow 2→3 -->
  <path d="M 369 163 L 393 163" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrC)"/>

