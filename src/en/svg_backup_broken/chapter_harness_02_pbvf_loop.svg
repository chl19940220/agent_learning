  <text x="411" y="165" font-size="9" fill="#555">• Lint 检查无Error</text>
  <text x="411" y="180" font-size="9" fill="#555">• 防作弊：Testing未Delete</text>
  <text x="411" y="195" font-size="9" fill="#555">• 逐项核查原始需求</text>
  <rect x="411" y="210" width="125" height="38" rx="8" fill="#f39c12" opacity="0.1"/>
  <text x="474" y="224" text-anchor="middle" font-size="8" fill="#e67e22">只有全部via</text>
  <text x="474" y="237" text-anchor="middle" font-size="8" fill="#e67e22">才能声明Complete</text>

  <!-- Arrow 3→4 (pass) -->
  <path d="M 552 163 L 576 163" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrC)"/>
  <text x="564" y="155" text-anchor="middle" font-size="8" fill="#27ae60">via</text>

  <!-- ── Phase 4: FIX ── -->
  <rect x="579" y="68" width="115" height="190" rx="12" fill="#fef5f5" stroke="#e74c3c" stroke-width="2"/>
  <rect x="579" y="68" width="115" height="34" rx="12" fill="#e74c3c"/>
  <rect x="579" y="90" width="115" height="12" fill="#e74c3c"/>
  <text x="637" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">④ FIX</text>
  <text x="637" y="112" text-anchor="middle" font-size="10" font-weight="bold" fill="#e74c3c">修复阶段</text>
  <text x="637" y="126" text-anchor="middle" font-size="9" fill="#888">ReasoningBudget：HIGH 🔥</text>
  <line x1="594" y1="134" x2="679" y2="134" stroke="#e74c3c" stroke-width="0.8" opacity="0.3"/>
  <text x="594" y="150" font-size="9" fill="#555">• AnalysisFailed原因</text>
  <text x="594" y="165" font-size="9" fill="#555">• 修复Code问题</text>
  <text x="594" y="180" font-size="9" fill="#555">• 禁止删Testing作弊</text>
  <rect x="594" y="196" width="85" height="52" rx="8" fill="#e74c3c" opacity="0.1"/>
  <text x="637" y="210" text-anchor="middle" font-size="8" fill="#e74c3c">修复Back回to</text>
  <text x="637" y="223" text-anchor="middle" font-size="8" fill="#e74c3c">VERIFY 重验</text>

  <!-- Arrow: FIX → VERIFY (loop back) -->
  <path d="M 637 259 Q 637 290 474 290 Q 350 290 350 260" stroke="#e74c3c" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#arrCR)"/>
  <text x="490" y="305" text-anchor="middle" font-size="9" fill="#e74c3c">验证未via，返回修复</text>

  <!-- Success arrow to right -->
  <path d="M 474 260 Q 474 310 570 310" stroke="#27ae60" stroke-width="1.8" fill="none" marker-end="url(#arrC)"/>
  <text x="580" y="325" text-anchor="middle" font-size="9" fill="#27ae60">✅ TaskComplete</text>

  <!-- Key insight box -->
  <rect x="30" y="278" width="300" height="50" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="180" y="296" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">💡 关键洞察</text>
  <text x="180" y="312" text-anchor="middle" font-size="9" fill="#2c3e50">强制验证步骤本身，就使 LangChain</text>
  <text x="180" y="324" text-anchor="middle" font-size="9" fill="#2c3e50">Terminal Bench 2.0 提升了 +7.1 个百分点</text>
</svg>
