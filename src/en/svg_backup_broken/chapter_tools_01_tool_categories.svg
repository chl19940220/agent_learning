<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" width="700" height="340">
  <rect width="700" height="340" fill="#f8f9fa" rx="12"/>
  <text x="350" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">Agent Tools体系Classification</text>

  <!-- Center -->
  <circle cx="350" cy="170" r="42" fill="#4dabf7" opacity="0.9"/>
  <text x="350" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">🔧 Agent</text>
  <text x="350" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Tools体系</text>

  <!-- Category 1: Info获取类 - top -->
  <rect x="240" y="50" width="220" height="70" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="350" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3498db">📡 Info获取类</text>
  <text x="350" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">搜Index擎 / DatabaseQuery</text>
  <text x="350" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">文件Read / API Calls</text>
  <line x1="350" y1="122" x2="350" y2="128" stroke="#3498db" stroke-width="1.5"/>

  <!-- Category 2: 计算Execution类 - right -->
  <rect x="510" y="120" width="175" height="90" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="597" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">⚙️ 计算Execution类</text>
  <text x="597" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">数学计算器</text>
  <text x="597" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Python Code Execution器</text>
  <text x="597" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">SQL Execution器</text>
  <line x1="508" y1="165" x2="393" y2="165" stroke="#27ae60" stroke-width="1.5"/>

  <!-- Category 3: Inner容Generation类 - bottom right -->
  <rect x="460" y="245" width="210" height="75" rx="10" fill="#9b59b6" opacity="0.12" stroke="#9b59b6" stroke-width="2"/>
  <text x="565" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9b59b6">🎨 Inner容Generation类</text>
  <text x="565" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Image Generation / 文本转语音</text>
  <text x="565" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Document Generation</text>
  <line x1="460" y1="270" x2="390" y2="200" stroke="#9b59b6" stroke-width="1.5"/>

  <!-- Category 4: 交互Manipulation类 - bottom left -->
  <rect x="30" y="245" width="210" height="75" rx="10" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="2"/>
  <text x="135" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e67e22">🖱️ 交互Manipulation类</text>
  <text x="135" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">邮件发送 / 日历管理</text>
  <text x="135" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">浏览器Automation</text>
  <line x1="240" y1="270" x2="310" y2="200" stroke="#e67e22" stroke-width="1.5"/>

  <!-- Category 5: MemoryStorage类 - left -->
  <rect x="15" y="120" width="175" height="90" rx="10" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="2"/>
  <text x="102" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c">💾 MemoryStorage类</text>
  <text x="102" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Vector Database</text>
  <text x="102" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Local文件</text>
  <text x="102" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Cache</text>
  <line x1="192" y1="165" x2="307" y2="165" stroke="#e74c3c" stroke-width="1.5"/>
</svg>
