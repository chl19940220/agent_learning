  <text x="165" y="83" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff" font-family="system-ui">🔌 MCP</text>
  
  <text x="50" y="125" font-size="12" font-weight="bold" fill="#2b6cb0" font-family="system-ui">定位</text>
  <text x="50" y="142" font-size="11" fill="#4a5568" font-family="system-ui">Agent ↔ Tools的Connection标准</text>
  
  <text x="50" y="168" font-size="12" font-weight="bold" fill="#2b6cb0" font-family="system-ui">类比</text>
  <text x="50" y="185" font-size="11" fill="#4a5568" font-family="system-ui">USB Interface标准</text>
  
  <text x="50" y="211" font-size="12" font-weight="bold" fill="#2b6cb0" font-family="system-ui">核心机制</text>
  <text x="50" y="228" font-size="11" fill="#4a5568" font-family="system-ui">JSON-RPC · Tools发现</text>
  <text x="50" y="245" font-size="11" fill="#4a5568" font-family="system-ui">Request-Response模式</text>
  
  <text x="50" y="271" font-size="12" font-weight="bold" fill="#2b6cb0" font-family="system-ui">成熟度</text>
  <text x="50" y="288" font-size="13" fill="#2b6cb0" font-family="system-ui">⭐⭐⭐⭐ 生产可用</text>
  
  <rect x="50" y="305" width="230" height="30" rx="8" fill="#bee3f8"/>
  <text x="165" y="325" text-anchor="middle" font-size="11" fill="#2b6cb0" font-family="system-ui">Anthropic 主导 · 生态最大</text>
  
  <!-- A2A -->
  <rect x="315" y="55" width="270" height="300" rx="14" fill="#f0fff4" stroke="#48bb78" stroke-width="1.5" filter="url(#shadow4)"/>
  <rect x="315" y="55" width="270" height="45" rx="14" fill="#48bb78"/>
  <text x="450" y="83" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff" font-family="system-ui">🤝 A2A</text>
  
  <text x="335" y="125" font-size="12" font-weight="bold" fill="#276749" font-family="system-ui">定位</text>
  <text x="335" y="142" font-size="11" fill="#4a5568" font-family="system-ui">Agent ↔ Agent 的Collaboration标准</text>
  
  <text x="335" y="168" font-size="12" font-weight="bold" fill="#276749" font-family="system-ui">类比</text>
  <text x="335" y="185" font-size="11" fill="#4a5568" font-family="system-ui">即时通讯Protocol</text>
  
  <text x="335" y="211" font-size="12" font-weight="bold" fill="#276749" font-family="system-ui">核心机制</text>
  <text x="335" y="228" font-size="11" fill="#4a5568" font-family="system-ui">Agent Card · Task委派</text>
  <text x="335" y="245" font-size="11" fill="#4a5568" font-family="system-ui">Stream式反馈 · StateSync</text>
  
  <text x="335" y="271" font-size="12" font-weight="bold" fill="#276749" font-family="system-ui">成熟度</text>
  <text x="335" y="288" font-size="13" fill="#276749" font-family="system-ui">⭐⭐⭐ 逐步成熟</text>
  
  <rect x="335" y="305" width="230" height="30" rx="8" fill="#c6f6d5"/>
