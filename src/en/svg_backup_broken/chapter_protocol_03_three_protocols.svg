  <!-- ANP -->
  <rect x="600" y="55" width="270" height="300" rx="14" fill="#faf5ff" stroke="#9f7aea" stroke-width="1.5" filter="url(#shadow4)"/>
  <rect x="600" y="55" width="270" height="45" rx="14" fill="#9f7aea"/>
  <text x="735" y="83" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff" font-family="system-ui">🌐 ANP</text>
  
  <text x="620" y="125" font-size="12" font-weight="bold" fill="#6b46c1" font-family="system-ui">定位</text>
  <text x="620" y="142" font-size="11" fill="#4a5568" font-family="system-ui">大规模 Agent 组网Infrastructure</text>
  
  <text x="620" y="168" font-size="12" font-weight="bold" fill="#6b46c1" font-family="system-ui">类比</text>
  <text x="620" y="185" font-size="11" fill="#4a5568" font-family="system-ui">互联网 DNS + HTTPS</text>
  
  <text x="620" y="211" font-size="12" font-weight="bold" fill="#6b46c1" font-family="system-ui">核心机制</text>
  <text x="620" y="228" font-size="11" fill="#4a5568" font-family="system-ui">DID 身份 · Decentralization发现</text>
  <text x="620" y="245" font-size="11" fill="#4a5568" font-family="system-ui">EncryptionCommunication · 智能Routing</text>
  
  <text x="620" y="271" font-size="12" font-weight="bold" fill="#6b46c1" font-family="system-ui">成熟度</text>
  <text x="620" y="288" font-size="13" fill="#6b46c1" font-family="system-ui">⭐⭐ 早期阶段</text>
  
  <rect x="620" y="305" width="230" height="30" rx="8" fill="#e9d8fd"/>
  <text x="735" y="325" text-anchor="middle" font-size="11" fill="#6b46c1" font-family="system-ui">社区驱动 · 面向未来</text>
  
  <!-- Bottom关系说明 -->
  <rect x="100" y="365" width="700" height="25" rx="8" fill="#1a365d"/>
  <text x="450" y="382" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff" font-family="system-ui">互补关系: ANP(组网发现) → A2A(TaskCollaboration) → MCP(Tool Call) — 三LayerProtocol栈，各司其职</text>
