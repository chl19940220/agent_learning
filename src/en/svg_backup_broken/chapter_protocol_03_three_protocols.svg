<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <filter id="shadow4">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <rect width="900" height="400" fill="#f0f4f8" rx="16"/>
  
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a365d" font-family="system-ui">MCP vs A2A vs ANP 三Protocol Comparison</text>
  
  <!-- MCP -->
  <rect x="30" y="55" width="270" height="300" rx="14" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.5" filter="url(#shadow4)"/>
