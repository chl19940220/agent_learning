<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420">
  <rect width="760" height="420" fill="#f0f4f8" rx="14"/>
  <text x="380" y="36" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Agent Evaluation四大维度</text>

  <!-- Four Dimensions方块 -->
  <!-- 功能性 -->
  <rect x="40" y="65" width="320" height="150" rx="14" fill="#3498db" opacity="0.15"/>
  <rect x="40" y="65" width="320" height="40" rx="14" fill="#3498db"/>
  <rect x="40" y="91" width="320" height="14" fill="#3498db"/>
  <text x="200" y="92" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">📊 功能性（Functionality）</text>
  <text x="60" y="130" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• TaskComplete率（Pass Rate）</text>
  <text x="60" y="150" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• 答案准确性（Accuracy）</text>
  <text x="60" y="170" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Tool Call正确率</text>
  <text x="60" y="190" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• 边界情况处理能力</text>

  <!-- 效率 -->
  <rect x="400" y="65" width="320" height="150" rx="14" fill="#27ae60" opacity="0.15"/>
  <rect x="400" y="65" width="320" height="40" rx="14" fill="#27ae60"/>
  <rect x="400" y="91" width="320" height="14" fill="#27ae60"/>
  <text x="560" y="92" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">⚡ 效率（Efficiency）</text>
  <text x="420" y="130" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• 平均ResponseLatency（Latency）</text>
  <text x="420" y="150" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Token 消耗量</text>
  <text x="420" y="170" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Loop步数（Steps to Complete）</text>
  <text x="420" y="190" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• 每次DialogueCost（$/conversation）</text>

  <!-- Security性 -->
  <rect x="40" y="240" width="320" height="150" rx="14" fill="#e74c3c" opacity="0.15"/>
  <rect x="40" y="240" width="320" height="40" rx="14" fill="#e74c3c"/>
  <rect x="40" y="266" width="320" height="14" fill="#e74c3c"/>
  <text x="200" y="267" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">🛡️ Security性（Safety）</text>
  <text x="60" y="305" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Prompt 注入抵御率</text>
  <text x="60" y="325" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• 幻觉率（Hallucination Rate）</text>
  <text x="60" y="345" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Data ExfiltrationRiskEvaluation</text>
  <text x="60" y="365" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• 越界Manipulation检测率</text>

  <!-- User Experience -->
  <rect x="400" y="240" width="320" height="150" rx="14" fill="#9b59b6" opacity="0.15"/>
  <rect x="400" y="240" width="320" height="40" rx="14" fill="#9b59b6"/>
  <rect x="400" y="266" width="320" height="14" fill="#9b59b6"/>
  <text x="560" y="267" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">😊 User Experience（UX）</text>
  <text x="420" y="305" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• 回复自然度（Naturalness）</text>
  <text x="420" y="325" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• 交互Stream畅性</text>
  <text x="420" y="345" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Error Recovery体验</text>
  <text x="420" y="365" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• User满意度（CSAT）</text>

  <text x="380" y="410" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#95a5a6">四大维度相互关联，需要综合Evaluation才能全面衡量 Agent 表现</text>
</svg>
