<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" width="680" height="280">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="680" height="280" rx="14" fill="#f0f4f8"/>
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Mixed Usage Strategy (Recommended)</text>

  <!-- Development scenarios -->
  <rect x="260" y="48" width="160" height="36" rx="8" fill="#2c3e50"/>
  <text x="340" y="71" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Development Scenarios</text>

  <!-- 4 branches -->
  <line x1="340" y1="84" x2="340" y2="100" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="80" y1="100" x2="600" y2="100" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="80" y1="100" x2="80" y2="120" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="100" x2="260" y2="120" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="100" x2="440" y2="120" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="100" x2="600" y2="120" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Scenario labels -->
  <rect x="20" y="123" width="120" height="36" rx="6" fill="#e8f4fd" stroke="#3498db" stroke-width="1.5"/>
  <text x="80" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">Daily Dev</text>

  <rect x="200" y="123" width="120" height="36" rx="6" fill="#e8f4fd" stroke="#3498db" stroke-width="1.5"/>
  <text x="260" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">Complex Tasks</text>

  <rect x="380" y="123" width="120" height="36" rx="6" fill="#e8f4fd" stroke="#3498db" stroke-width="1.5"/>
  <text x="440" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">CI/CD Pipeline</text>

  <rect x="540" y="123" width="120" height="36" rx="6" fill="#e8f4fd" stroke="#3498db" stroke-width="1.5"/>
  <text x="600" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">Code Review</text>

  <!-- Down arrows -->
  <line x1="80" y1="159" x2="80" y2="183" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="159" x2="260" y2="183" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="159" x2="440" y2="183" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="159" x2="600" y2="183" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Tool recommendations -->
  <rect x="20" y="186" width="120" height="52" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="206" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">🖥️ Cursor</text>
  <text x="80" y="222" text-anchor="middle" font-size="10" fill="#3b82f6">IDE completion</text>
  <text x="80" y="235" text-anchor="middle" font-size="10" fill="#3b82f6">Smooth &amp; efficient</text>

  <rect x="200" y="186" width="120" height="52" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="260" y="206" text-anchor="middle" font-size="12" font-weight="bold" fill="#7e22ce">🤖 Claude Code</text>
  <text x="260" y="222" text-anchor="middle" font-size="10" fill="#9333ea">Terminal Agent</text>
  <text x="260" y="235" text-anchor="middle" font-size="10" fill="#9333ea">Autonomous execution</text>

  <rect x="380" y="186" width="120" height="52" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="440" y="206" text-anchor="middle" font-size="12" font-weight="bold" fill="#7e22ce">⚙️ Claude Code</text>
  <text x="440" y="222" text-anchor="middle" font-size="10" fill="#9333ea">Headless mode</text>
  <text x="440" y="235" text-anchor="middle" font-size="10" fill="#9333ea">Automation</text>

  <rect x="540" y="186" width="120" height="52" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="600" y="206" text-anchor="middle" font-size="12" font-weight="bold" fill="#7e22ce">📋 Claude Code</text>
  <text x="600" y="222" text-anchor="middle" font-size="10" fill="#9333ea">Structured report</text>
  <text x="600" y="235" text-anchor="middle" font-size="10" fill="#9333ea">PR review</text>

  <!-- Note -->
  <rect x="20" y="248" width="640" height="22" rx="6" fill="#e8f4fd"/>
  <text x="340" y="263" text-anchor="middle" font-size="11" fill="#2980b9">💡 Recommended: Use Cursor for daily dev, Claude Code for complex tasks and CI/CD</text>
</svg>
