<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" width="680" height="280">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="680" height="280" fill="#f0f4f8" rx="14"/>
  <text x="340" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">How to Choose a Skill Packaging Approach?</text>

  <!-- Root node -->
  <rect x="200" y="42" width="280" height="32" rx="8" fill="#2c3e50"/>
  <text x="340" y="63" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🤔 What is your skill requirement?</text>

  <!-- Branch lines -->
  <line x1="340" y1="74" x2="340" y2="90" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="100" y1="90" x2="580" y2="90" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- Branch 1 -->
  <line x1="100" y1="90" x2="100" y2="110" stroke="#3498db" stroke-width="1.5" marker-end="url(#arr4)"/>
  <rect x="20" y="112" width="160" height="48" rx="8" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="1.5"/>
  <text x="100" y="132" text-anchor="middle" font-size="11" fill="#2c3e50">Mainly domain knowledge</text>
  <text x="100" y="150" text-anchor="middle" font-size="11" fill="#2c3e50">and behavioral guidelines?</text>
  <line x1="100" y1="160" x2="100" y2="178" stroke="#3498db" stroke-width="1.5" marker-end="url(#arr4)"/>
  <rect x="20" y="180" width="160" height="32" rx="8" fill="#3498db"/>
  <text x="100" y="201" text-anchor="middle" font-size="12" font-weight="bold" fill="white">📝 Prompt-based</text>
  <text x="100" y="228" text-anchor="middle" font-size="10" fill="#3498db">Simplest</text>

  <!-- Branch 2 -->
  <line x1="290" y1="90" x2="290" y2="110" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr4)"/>
  <rect x="210" y="112" width="160" height="48" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.5"/>
  <text x="290" y="132" text-anchor="middle" font-size="11" fill="#2c3e50">Needs precise computation</text>
  <text x="290" y="150" text-anchor="middle" font-size="11" fill="#2c3e50">or API calls?</text>
  <line x1="290" y1="160" x2="290" y2="178" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr4)"/>
  <rect x="210" y="180" width="160" height="32" rx="8" fill="#27ae60"/>
  <text x="290" y="201" text-anchor="middle" font-size="12" font-weight="bold" fill="white">💻 Code-based</text>
  <text x="290" y="228" text-anchor="middle" font-size="10" fill="#27ae60">Most reliable</text>

  <!-- Branch 3 -->
  <line x1="480" y1="90" x2="480" y2="110" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arr4)"/>
  <rect x="395" y="112" width="170" height="48" rx="8" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="480" y="132" text-anchor="middle" font-size="11" fill="#2c3e50">Multi-step, conditional</text>
  <text x="480" y="150" text-anchor="middle" font-size="11" fill="#2c3e50">branches or human review?</text>
  <line x1="480" y1="160" x2="480" y2="178" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arr4)"/>
  <rect x="395" y="180" width="170" height="32" rx="8" fill="#e67e22"/>
  <text x="480" y="201" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🔄 Workflow-based</text>
  <text x="480" y="228" text-anchor="middle" font-size="10" fill="#e67e22">Most powerful</text>

  <!-- Branch 4: Hybrid -->
  <rect x="590" y="112" width="70" height="48" rx="8" fill="#9b59b6" opacity="0.12" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="625" y="137" text-anchor="middle" font-size="11" fill="#2c3e50">All of</text>
  <text x="625" y="152" text-anchor="middle" font-size="11" fill="#2c3e50">the above?</text>
  <line x1="625" y1="160" x2="625" y2="178" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arr4)"/>
  <rect x="585" y="180" width="80" height="32" rx="8" fill="#9b59b6"/>
  <text x="625" y="201" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🔀 Hybrid</text>
  <text x="625" y="228" text-anchor="middle" font-size="10" fill="#9b59b6">Most flexible</text>
</svg>
