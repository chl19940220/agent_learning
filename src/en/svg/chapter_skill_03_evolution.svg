<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="700" height="350" fill="#f0f4f8" rx="14"/>
  <text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Skill Evolution Levels</text>

  <!-- Level 5 -->
  <rect x="50" y="45" width="600" height="50" rx="8" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="80" y="68" font-size="13" font-weight="bold" fill="#9b59b6">Level 5: Self-Evolving Skills</text>
  <text x="80" y="86" font-size="11" fill="#555">Can self-improve and create new skills | e.g.: Voyager learning loop, CRAFT tool creation</text>

  <!-- Level 4 -->
  <rect x="50" y="105" width="600" height="50" rx="8" fill="#e67e22" opacity="0.15" stroke="#e67e22" stroke-width="1.5"/>
  <text x="80" y="128" font-size="13" font-weight="bold" fill="#e67e22">Level 4: Meta Skills</text>
  <text x="80" y="146" font-size="11" fill="#555">Manage and compose other skills | e.g.: Auto decompose task → select skill → orchestrate execution</text>

  <!-- Level 3 -->
  <rect x="50" y="165" width="600" height="50" rx="8" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="80" y="188" font-size="13" font-weight="bold" fill="#e74c3c">Level 3: Strategic Skills</text>
  <text x="80" y="206" font-size="11" fill="#555">Include conditional logic and branches | e.g.: Auto select analysis method by data type</text>

  <!-- Level 2 -->
  <rect x="50" y="225" width="600" height="50" rx="8" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="1.5"/>
  <text x="80" y="248" font-size="13" font-weight="bold" fill="#3498db">Level 2: Composite Skills</text>
  <text x="80" y="266" font-size="11" fill="#555">Sequential combination of multiple atomic skills | e.g.: Load data → Clean → Analyze</text>

  <!-- Level 1 -->
  <rect x="50" y="285" width="600" height="50" rx="8" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="1.5"/>
  <text x="80" y="308" font-size="13" font-weight="bold" fill="#27ae60">Level 1: Atomic Skills</text>
  <text x="80" y="326" font-size="11" fill="#555">Single tool call or simple operation | e.g.: Read file, send HTTP request, format text</text>

  <!-- Evolution arrow -->
  <text x="670" y="190" text-anchor="middle" font-size="28" fill="#bdc3c7">⬆</text>
  <text x="670" y="220" text-anchor="middle" font-size="10" fill="#888" transform="rotate(-90, 670, 220)">Increasing complexity</text>
</svg>
