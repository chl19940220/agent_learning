<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <marker id="arr-llm07a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
    <filter id="sh-llm07a">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="480" fill="#f8f9fa" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Decoder-Only Transformer: Standard Single-Layer Structure</text>
  <text x="400" y="48" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#777">Pre-Norm + Residual · GQA/MLA Attention · SwiGLU FFN (2024+ consensus)</text>

  <!-- [CN] -->
  <line x1="400" y1="70" x2="400" y2="440" stroke="#bdc3c7" stroke-width="2"/>

  <!-- Input -->
  <rect x="330" y="60" width="140" height="30" rx="6" fill="#2c3e50"/>
  <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Input x + Positional Encoding (RoPE)</text>

  <!--========= [CN] Block=========-->
  <rect x="150" y="105" width="500" height="165" rx="10" fill="#3498db" opacity="0.04" stroke="#3498db" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="175" y="122" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#2980b9">Attention Sub-layer</text>

  <!-- [CN] -->
  <text x="440" y="115" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#e74c3c">residual = x</text>
  <line x1="400" y1="90" x2="400" y2="130" stroke="#bdc3c7" stroke-width="2" marker-end="url(#arr-llm07a)"/>

  <!-- [CN] Line（ [CN] ）-->
  <line x1="400" y1="96" x2="620" y2="96" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="620" y1="96" x2="620" y2="255" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- RMSNorm -->
  <rect x="330" y="132" width="140" height="32" rx="6" fill="#9b59b6" filter="url(#sh-llm07a)"/>
  <text x="400" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">RMSNorm</text>

  <line x1="400" y1="164" x2="400" y2="185" stroke="#bdc3c7" stroke-width="2" marker-end="url(#arr-llm07a)"/>

  <!-- [CN] -->
  <rect x="290" y="187" width="220" height="50" rx="8" fill="#3498db" filter="url(#sh-llm07a)"/>
  <text x="400" y="208" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">🧠 Causal Self-Attention</text>
  <text x="400" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d4e6f9">GQA / MLA + Causal Mask</text>

  <line x1="400" y1="237" x2="400" y2="255" stroke="#bdc3c7" stroke-width="2" marker-end="url(#arr-llm07a)"/>

  <!-- [CN] -->
  <circle cx="400" cy="265" r="14" fill="white" stroke="#e74c3c" stroke-width="2"/>
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">+</text>
  <line x1="620" y1="255" x2="416" y2="260" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr-llm07a)"/>
  <text x="530" y="252" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">+ residual</text>

  <!-- ========= FFN Block ========= -->
  <rect x="150" y="290" width="500" height="130" rx="10" fill="#27ae60" opacity="0.04" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="175" y="307" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#27ae60">FFN Sub-layer</text>

  <line x1="400" y1="279" x2="400" y2="312" stroke="#bdc3c7" stroke-width="2" marker-end="url(#arr-llm07a)"/>

  <!-- [CN] 2-->
  <line x1="400" y1="284" x2="620" y2="284" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="620" y1="284" x2="620" y2="405" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- RMSNorm 2 -->
  <rect x="330" y="314" width="140" height="32" rx="6" fill="#9b59b6" filter="url(#sh-llm07a)"/>
  <text x="400" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">RMSNorm</text>

  <line x1="400" y1="346" x2="400" y2="360" stroke="#bdc3c7" stroke-width="2" marker-end="url(#arr-llm07a)"/>

  <!-- SwiGLU FFN -->
  <rect x="290" y="362" width="220" height="40" rx="8" fill="#27ae60" filter="url(#sh-llm07a)"/>
  <text x="400" y="380" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">⚡ SwiGLU FFN</text>
  <text x="400" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#d4f0e0">or MoE routes to Top-K experts</text>

  <line x1="400" y1="402" x2="400" y2="415" stroke="#bdc3c7" stroke-width="2" marker-end="url(#arr-llm07a)"/>

  <!-- [CN] 2-->
  <circle cx="400" cy="420" r="14" fill="white" stroke="#e74c3c" stroke-width="2"/>
  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">+</text>
  <line x1="620" y1="405" x2="416" y2="416" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr-llm07a)"/>

  <!-- Output -->
  <line x1="400" y1="434" x2="400" y2="452" stroke="#bdc3c7" stroke-width="2" marker-end="url(#arr-llm07a)"/>
  <rect x="330" y="452" width="140" height="24" rx="6" fill="#2c3e50"/>
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Output → Next layer</text>

  <!--Right [CN] -->
  <rect x="660" y="132" width="120" height="108" rx="6" fill="white" stroke="#9b59b6" stroke-width="1"/>
  <text x="720" y="150" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#8e44ad">Component Evolution</text>
  <text x="720" y="168" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" fill="#555">LayerNorm → RMSNorm</text>
  <text x="720" y="184" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" fill="#555">MHA → GQA → MLA</text>
  <text x="720" y="200" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" fill="#555">ReLU → SwiGLU</text>
  <text x="720" y="216" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" fill="#555">Sinusoidal → RoPE</text>
  <text x="720" y="232" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" fill="#555">Dense → MoE</text>

  <!-- LeftDescription -->
  <rect x="30" y="160" width="110" height="80" rx="6" fill="#3498db" opacity="0.06"/>
  <text x="85" y="178" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#2980b9">Pre-Norm</text>
  <text x="85" y="194" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" fill="#555">Norm before</text>
  <text x="85" y="208" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" fill="#555">attention (not after)</text>
  <text x="85" y="222" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" fill="#555">More stable training</text>

  <rect x="30" y="342" width="110" height="65" rx="6" fill="#27ae60" opacity="0.06"/>
  <text x="85" y="360" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#27ae60">SwiGLU</text>
  <text x="85" y="376" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" fill="#555">Swish + gating</text>
  <text x="85" y="392" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" fill="#555">Better than ReLU</text>

  <!-- N × -->
  <text x="730" y="380" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">× N layers</text>
  <text x="730" y="398" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#555">e.g., 80 layers (Llama 3)</text>
</svg>