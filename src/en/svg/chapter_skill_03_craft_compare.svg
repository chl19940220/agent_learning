<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" width="700" height="180">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arr6" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
    <marker id="arr6r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e74c3c"/>
    </marker>
    <marker id="arr6g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
  </defs>
  <rect width="700" height="180" fill="#f0f4f8" rx="14"/>
  <text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Traditional Approach vs CRAFT Approach</text>

  <!-- Traditional approach -->
  <rect x="20" y="42" width="320" height="55" rx="10" fill="#e74c3c" opacity="0.08" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="180" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">❌ Traditional Approach</text>
  <text x="60" y="82" font-size="11" fill="#555">Problem → Use existing tools → Stuck when no suitable tool exists</text>

  <!-- CRAFT approach -->
  <rect x="20" y="108" width="660" height="60" rx="10" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="1.5"/>
  <text x="350" y="127" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">✅ CRAFT Approach</text>
  <text x="60" y="150" font-size="11" fill="#555">Problem → First create a specialized tool for this type → Solve with new tool → Next time → Directly retrieve the created tool</text>

  <!-- Key difference annotation -->
  <rect x="380" y="42" width="300" height="55" rx="10" fill="#f39c12" opacity="0.08" stroke="#f39c12" stroke-width="1.5"/>
  <text x="530" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#f39c12">💡 Key Difference</text>
  <text x="530" y="82" text-anchor="middle" font-size="11" fill="#555">CRAFT can create new tools and reuse them</text>
</svg>
