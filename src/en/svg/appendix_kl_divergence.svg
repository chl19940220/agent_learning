<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="800" height="320" rx="12" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Intuitive Understanding of KL Divergence</text>

  <!-- Core concept -->
  <rect x="200" y="50" width="400" height="40" rx="8" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="2"/>
  <text x="400" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">D_KL(P || Q) = Information lost when approximating P with Q</text>

  <!-- Intuitive analogies -->
  <rect x="20" y="105" width="370" height="100" rx="8" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="205" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#3498db">🌤 Weather Forecast Analogy</text>
  <text x="35" y="150" font-size="11" fill="#444">P = True weather distribution (sunny 60%, rain 30%, snow 10%)</text>
  <text x="35" y="170" font-size="11" fill="#444">Q = Your forecast model (sunny 80%, rain 15%, snow 5%)</text>
  <text x="35" y="190" font-size="11" fill="#e74c3c" font-weight="bold">KL Divergence = How "inaccurate" your model is</text>

  <rect x="410" y="105" width="370" height="100" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="595" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">🧠 Three Key Intuitions</text>
  <text x="425" y="150" font-size="11" fill="#444">• KL ≥ 0, equals 0 when P = Q</text>
  <text x="425" y="170" font-size="11" fill="#444">• Asymmetric: D(P||Q) ≠ D(Q||P)</text>
  <text x="425" y="190" font-size="11" fill="#444">• Unit: bits (base-2) or nats (base-e)</text>

  <!-- Role in Agentic-RL -->
  <text x="400" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Role in Agentic-RL</text>

  <rect x="20" y="242" width="245" height="65" rx="8" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="142" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">PPO: KL Penalty Term</text>
  <text x="32" y="282" font-size="11" fill="#444">Prevents policy from drifting too far</text>
  <text x="32" y="298" font-size="11" fill="#444">β · D_KL(π_θ || π_ref)</text>

  <rect x="278" y="242" width="245" height="65" rx="8" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="2"/>
  <text x="400" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">DPO: Implicit KL Constraint</text>
  <text x="293" y="282" font-size="11" fill="#444">Implicit regularization in preference pairs</text>
  <text x="293" y="298" font-size="11" fill="#444">No explicit KL computation needed</text>

  <rect x="536" y="242" width="244" height="65" rx="8" fill="#2980b9" opacity="0.12" stroke="#2980b9" stroke-width="2"/>
  <text x="658" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">GRPO/DAPO: KL-free</text>
  <text x="549" y="282" font-size="11" fill="#444">Removes KL constraint, bolder exploration</text>
  <text x="549" y="298" font-size="11" fill="#444">Clip mechanism for stability instead</text>

</svg>
