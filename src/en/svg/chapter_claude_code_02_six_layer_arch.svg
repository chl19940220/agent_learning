<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="680" height="420">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="680" height="420" rx="14" fill="#f0f4f8"/>
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Claude Code Six-Layer Architecture</text>

  <!--L1-->
  <rect x="40" y="45" width="600" height="52" rx="8" fill="#2c3e50"/>
  <text x="340" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Layer 1: Entry Layer</text>
  <text x="340" y="83" text-anchor="middle" font-size="11" fill="#bdc3c7">main.tsx Startup / setup.ts Init · Four Entry Points: CLI / Init / MCP Server / SDK</text>
  <line x1="340" y1="97" x2="340" y2="112" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!--L2-->
  <rect x="40" y="115" width="600" height="52" rx="8" fill="#3498db"/>
  <text x="340" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Layer 2: Presentation UI Layer</text>
  <text x="340" y="153" text-anchor="middle" font-size="11" fill="#d6eaf8">React + Ink Terminal UI · 5005-line Component · Streaming / Progress / Interactive Confirm</text>
  <line x1="340" y1="167" x2="340" y2="182" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!--L3-->
  <rect x="40" y="185" width="600" height="52" rx="8" fill="#9b59b6"/>
  <text x="340" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Layer 3: Core Engine QueryEngine (~46,000 lines)</text>
  <text x="340" y="223" text-anchor="middle" font-size="11" fill="#e8daef">LLM Dialog Mgmt / Prompt Cache / Streaming / Context Compression</text>
  <line x1="340" y1="237" x2="340" y2="252" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!--L4-->
  <rect x="40" y="255" width="600" height="52" rx="8" fill="#e67e22"/>
  <text x="340" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Layer 4: Execution Layer</text>
  <text x="340" y="293" text-anchor="middle" font-size="11" fill="#fdebd0">Tool System (52 Built-in Tools) · Command System (/init /compact etc.)</text>
  <line x1="340" y1="307" x2="340" y2="322" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!--L5-->
  <rect x="40" y="325" width="600" height="52" rx="8" fill="#27ae60"/>
  <text x="340" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Layer 5: Collaboration Layer</text>
  <text x="340" y="363" text-anchor="middle" font-size="11" fill="#d5f5e3">Multi-Agent System (Sub-agent / Teammate) · CCR Remote Bridge</text>
  <line x1="340" y1="377" x2="340" y2="392" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!--L6-->
  <rect x="40" y="395" width="600" height="16" rx="8" fill="#e74c3c"/>
  <text x="340" y="407" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Layer 6: Management — Permissions / Config / Session State / Telemetry / Cost / Sandbox</text>
</svg>
