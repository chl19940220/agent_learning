<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 120" width="700" height="120">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arr5" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
  </defs>
  <rect width="700" height="120" fill="#f0f4f8" rx="14"/>
  <text x="350" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Voyager Core Learning Loop</text>

  <rect x="30" y="48" width="80" height="34" rx="8" fill="#3498db"/>
  <text x="70" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Explore</text>
  <line x1="110" y1="65" x2="140" y2="65" stroke="#3498db" stroke-width="1.5" marker-end="url(#arr5)"/>

  <rect x="142" y="48" width="80" height="34" rx="8" fill="#e67e22"/>
  <text x="182" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Attempt</text>
  <line x1="222" y1="65" x2="252" y2="65" stroke="#3498db" stroke-width="1.5" marker-end="url(#arr5)"/>

  <rect x="254" y="48" width="80" height="34" rx="8" fill="#27ae60"/>
  <text x="294" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Succeed</text>
  <line x1="334" y1="65" x2="364" y2="65" stroke="#3498db" stroke-width="1.5" marker-end="url(#arr5)"/>

  <rect x="366" y="48" width="100" height="34" rx="8" fill="#9b59b6"/>
  <text x="416" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Save as Skill</text>
  <line x1="466" y1="65" x2="496" y2="65" stroke="#3498db" stroke-width="1.5" marker-end="url(#arr5)"/>

  <rect x="498" y="48" width="90" height="34" rx="8" fill="#2c3e50"/>
  <text x="543" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Reuse Skill</text>
  <line x1="588" y1="65" x2="618" y2="65" stroke="#3498db" stroke-width="1.5" marker-end="url(#arr5)"/>

  <rect x="620" y="48" width="60" height="34" rx="8" fill="#e74c3c"/>
  <text x="650" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Explore more</text>

  <!-- Loop back -->
  <path d="M 650 82 L 650 100 L 70 100 L 70 82" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr5)"/>
  <text x="360" y="113" text-anchor="middle" font-size="10" fill="#3498db">🔄 Continuous loop — Lifelong learning</text>
</svg>
