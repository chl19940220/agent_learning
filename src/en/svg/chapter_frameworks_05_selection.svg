<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
  </defs>
  <rect width="800" height="460" rx="12" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Agent Framework Selection Decision Guide</text>

  <!-- [CN] Scenario-->
  <rect x="30" y="60" width="175" height="110" rx="10" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="2"/>
  <text x="117" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">Rapid Prototype / MVP</text>
  <rect x="50" y="95" width="135" height="28" rx="6" fill="#e67e22" opacity="0.9"/>
  <text x="117" y="114" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OpenAI Agents SDK</text>
  <text x="117" y="140" text-anchor="middle" font-size="10" fill="#555">Low learning curve, quick to start</text>
  <text x="117" y="158" text-anchor="middle" font-size="10" fill="#555">Suitable for personal projects/demos</text>

  <rect x="215" y="60" width="175" height="110" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="302" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498db">Complex Workflows</text>
  <rect x="235" y="95" width="135" height="28" rx="6" fill="#3498db" opacity="0.9"/>
  <text x="302" y="114" text-anchor="middle" font-size="11" fill="white" font-weight="bold">LangGraph</text>
  <text x="302" y="140" text-anchor="middle" font-size="10" fill="#555">State-graph-driven, fine-grained control</text>
  <text x="302" y="158" text-anchor="middle" font-size="10" fill="#555">Suitable for systems with human-in-the-loop</text>

  <rect x="400" y="60" width="175" height="110" rx="10" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="487" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#8e44ad">Multi-Agent Collaboration</text>
  <rect x="420" y="95" width="135" height="28" rx="6" fill="#8e44ad" opacity="0.9"/>
  <text x="487" y="114" text-anchor="middle" font-size="11" fill="white" font-weight="bold">CrewAI / AutoGen</text>
  <text x="487" y="140" text-anchor="middle" font-size="10" fill="#555">Role-playing / conversation mode</text>
  <text x="487" y="158" text-anchor="middle" font-size="10" fill="#555">Suitable for team collaboration tasks</text>

  <rect x="585" y="60" width="185" height="110" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="677" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">No-Code / Business Users</text>
  <rect x="610" y="95" width="135" height="28" rx="6" fill="#27ae60" opacity="0.9"/>
  <text x="677" y="114" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Dify / Coze / n8n</text>
  <text x="677" y="140" text-anchor="middle" font-size="10" fill="#555">Visual drag-and-drop, no coding needed</text>
  <text x="677" y="158" text-anchor="middle" font-size="10" fill="#555">Suitable for non-technical users</text>

  <!-- [CN] -->
  <text x="400" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Core Capability Comparison Matrix</text>

  <!-- [CN] -->
  <rect x="30" y="215" width="740" height="30" rx="0" fill="#2c3e50"/>
  <text x="110" y="235" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Dimension</text>
  <text x="240" y="235" text-anchor="middle" font-size="11" fill="white" font-weight="bold">LangChain</text>
  <text x="355" y="235" text-anchor="middle" font-size="11" fill="white" font-weight="bold">LangGraph</text>
  <text x="465" y="235" text-anchor="middle" font-size="11" fill="white" font-weight="bold">CrewAI</text>
  <text x="575" y="235" text-anchor="middle" font-size="11" fill="white" font-weight="bold">AutoGen</text>
  <text x="695" y="235" text-anchor="middle" font-size="11" fill="white" font-weight="bold">OAI SDK</text>

  <!-- [CN] 1-->
  <rect x="30" y="245" width="740" height="28" rx="0" fill="white" stroke="#ddd" stroke-width="0.5"/>
  <text x="110" y="264" text-anchor="middle" font-size="10" fill="#555">Learning Curve</text>
  <text x="240" y="264" text-anchor="middle" font-size="10" fill="#e67e22">⭐⭐⭐ Medium</text>
  <text x="355" y="264" text-anchor="middle" font-size="10" fill="#e74c3c">⭐⭐⭐⭐ High</text>
  <text x="465" y="264" text-anchor="middle" font-size="10" fill="#27ae60">⭐⭐ Low</text>
  <text x="575" y="264" text-anchor="middle" font-size="10" fill="#e67e22">⭐⭐⭐ Medium</text>
  <text x="695" y="264" text-anchor="middle" font-size="10" fill="#27ae60">⭐ Very Low</text>

  <!-- [CN] 2-->
  <rect x="30" y="273" width="740" height="28" rx="0" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
  <text x="110" y="292" text-anchor="middle" font-size="10" fill="#555">Multi-Agent</text>
  <text x="240" y="292" text-anchor="middle" font-size="10" fill="#999">Limited</text>
  <text x="355" y="292" text-anchor="middle" font-size="10" fill="#27ae60">Native</text>
  <text x="465" y="292" text-anchor="middle" font-size="10" fill="#27ae60">Core</text>
  <text x="575" y="292" text-anchor="middle" font-size="10" fill="#27ae60">Core</text>
  <text x="695" y="292" text-anchor="middle" font-size="10" fill="#27ae60">Native</text>

  <!-- [CN] 3-->
  <rect x="30" y="301" width="740" height="28" rx="0" fill="white" stroke="#ddd" stroke-width="0.5"/>
  <text x="110" y="320" text-anchor="middle" font-size="10" fill="#555">Flow Control</text>
  <text x="240" y="320" text-anchor="middle" font-size="10" fill="#e67e22">Chain</text>
  <text x="355" y="320" text-anchor="middle" font-size="10" fill="#27ae60">Graph+State Machine</text>
  <text x="465" y="320" text-anchor="middle" font-size="10" fill="#e67e22">Sequential/Hierarchical</text>
  <text x="575" y="320" text-anchor="middle" font-size="10" fill="#3498db">Conversation-driven</text>
  <text x="695" y="320" text-anchor="middle" font-size="10" fill="#e67e22">Handoff</text>

  <!-- [CN] 4-->
  <rect x="30" y="329" width="740" height="28" rx="0" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
  <text x="110" y="348" text-anchor="middle" font-size="10" fill="#555">Ecosystem Richness</text>
  <text x="240" y="348" text-anchor="middle" font-size="10" fill="#27ae60">⭐⭐⭐⭐⭐</text>
  <text x="355" y="348" text-anchor="middle" font-size="10" fill="#27ae60">⭐⭐⭐⭐</text>
  <text x="465" y="348" text-anchor="middle" font-size="10" fill="#e67e22">⭐⭐⭐</text>
  <text x="575" y="348" text-anchor="middle" font-size="10" fill="#e67e22">⭐⭐⭐</text>
  <text x="695" y="348" text-anchor="middle" font-size="10" fill="#e67e22">⭐⭐</text>

  <!--Bottom [CN] -->
  <rect x="30" y="380" width="740" height="65" rx="10" fill="#fff8e1" stroke="#f39c12" stroke-width="1.5"/>
  <text x="400" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">💡 Selection Advice</text>
  <text x="400" y="420" text-anchor="middle" font-size="10" fill="#555">Beginners: OpenAI SDK → Advanced: LangChain → Complex workflows: LangGraph → Multi-Agent: CrewAI/AutoGen</text>
  <text x="400" y="436" text-anchor="middle" font-size="10" fill="#888">Core Principle: Start with the simplest solution, add complexity as needed. Don't use a framework just for the sake of it.</text>
</svg>
