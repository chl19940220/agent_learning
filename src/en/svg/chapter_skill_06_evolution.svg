  <text x="370" y="210" font-size="11" fill="#555">Anthropic Skills — Declarative skill framework SKILL.md</text>

  <circle cx="350" cy="245" r="6" fill="#27ae60"/>
  <text x="370" y="245" font-size="11" fill="#555">A2A + add-skill — Skill discovery + cross-platform installation</text>

