  <rect width="700" height="320" fill="#f0f4f8" rx="14"/>
  <text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Skill System Development Timeline</text>

  <!-- Timeline -->
  <line x1="350" y1="42" x2="350" y2="308" stroke="#bdc3c7" stroke-width="2"/>

  <circle cx="350" cy="55" r="6" fill="#3498db"/>
  <text x="200" y="55" text-anchor="end" font-size="12" font-weight="bold" fill="#3498db">2023</text>
  <text x="370" y="55" font-size="11" fill="#555">HuggingGPT / JARVIS — Model as skill, task routing</text>

