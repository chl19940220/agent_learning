<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320">
  <rect width="760" height="320" fill="#f0f4f8" rx="14"/>
  <text x="380" y="32" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Agent Cost Optimization Strategy Matrix</text>

  <!-- Policy1 -->
  <rect x="40" y="55" width="330" height="115" rx="14" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="1.5"/>
  <text x="60" y="80" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#3498db">🎯 Intelligent Model Routing</text>
  <text x="60" y="102" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">Simple queries → GPT-4o-mini ($0.15/1M)</text>
  <text x="60" y="120" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">Complex reasoning → GPT-4o ($2.50/1M)</text>
  <text x="60" y="140" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">💰 Est. savings: 40-60% token cost</text>
  <text x="60" y="158" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#95a5a6">Low difficulty → small model, high difficulty → large model</text>

  <!-- Policy2 -->
  <rect x="390" y="55" width="330" height="115" rx="14" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.5"/>
  <text x="410" y="80" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">📦 Prompt Caching</text>
  <text x="410" y="102" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">Reuse cached replies for similar queries</text>
  <text x="410" y="120" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">Semantic Cache</text>
  <text x="410" y="140" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">💰 Est. savings: 20-40% API calls</text>
  <text x="410" y="158" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#95a5a6">Suitable for high-repetition customer service/FAQ</text>

  <!-- Policy3 -->
  <rect x="40" y="185" width="330" height="115" rx="14" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="60" y="210" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#e67e22">✂️ Token Optimization</text>
  <text x="60" y="232" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">Streamline System Prompt</text>
  <text x="60" y="250" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">Compress conversation history (summary instead of full text)</text>
  <text x="60" y="268" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">💰 Est. savings: 15-30% token usage</text>
  <text x="60" y="288" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#95a5a6">Limit tool description length · Load context on demand</text>

  <!-- Policy4 -->
  <rect x="390" y="185" width="330" height="115" rx="14" fill="#9b59b6" opacity="0.12" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="410" y="210" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#9b59b6">🔄 Loop Control</text>
  <text x="410" y="232" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">Set maximum loop steps</text>
  <text x="410" y="250" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">Infinite loop detection and early termination</text>
  <text x="410" y="268" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">💰 Est. savings: avoid 10x unexpected cost</text>
  <text x="410" y="288" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#95a5a6">Set budget cap · Monitor anomalous usage · Auto-alert</text>
</svg>
