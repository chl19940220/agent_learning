<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="680" height="320">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="680" height="320" rx="14" fill="#f8f9fa"/>
  <text x="340" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Four Types of Reasoning Modes</text>

  <!-- Deductive -->
  <rect x="20" y="50" width="150" height="120" rx="10" fill="#3498db"/>
  <text x="95" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Deductive</text>
  <text x="95" y="92" text-anchor="middle" font-size="11" fill="#d6eaf8">Reasoning</text>
  <line x1="30" y1="100" x2="160" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="95" y="116" text-anchor="middle" font-size="10" fill="white">From general to specific</text>
  <text x="95" y="132" text-anchor="middle" font-size="10" fill="#d6eaf8">"All Python functions</text>
  <text x="95" y="148" text-anchor="middle" font-size="10" fill="#d6eaf8">have a return value"</text>
  <text x="95" y="162" text-anchor="middle" font-size="10" fill="#aed6f1">→ Logically certain</text>

  <!-- Inductive -->
  <rect x="185" y="50" width="150" height="120" rx="10" fill="#27ae60"/>
  <text x="260" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Inductive</text>
  <text x="260" y="92" text-anchor="middle" font-size="11" fill="#d5f5e3">Reasoning</text>
  <line x1="195" y1="100" x2="325" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="260" y="116" text-anchor="middle" font-size="10" fill="white">From specific to general</text>
  <text x="260" y="132" text-anchor="middle" font-size="10" fill="#d5f5e3">"Seen 100 quicksort</text>
  <text x="260" y="148" text-anchor="middle" font-size="10" fill="#d5f5e3">implementations..."</text>
  <text x="260" y="162" text-anchor="middle" font-size="10" fill="#a9dfbf">→ Generalize a pattern</text>

  <!-- Abductive -->
  <rect x="350" y="50" width="150" height="120" rx="10" fill="#8e44ad"/>
  <text x="425" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Abductive</text>
  <text x="425" y="92" text-anchor="middle" font-size="11" fill="#e8daef">Reasoning</text>
  <line x1="360" y1="100" x2="490" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="425" y="116" text-anchor="middle" font-size="10" fill="white">Best explanation inference</text>
  <text x="425" y="132" text-anchor="middle" font-size="10" fill="#e8daef">"The program crashed,</text>
  <text x="425" y="148" text-anchor="middle" font-size="10" fill="#e8daef">maybe a null pointer"</text>
  <text x="425" y="162" text-anchor="middle" font-size="10" fill="#d2b4de">→ Verify hypothesis</text>

  <!-- Analogical -->
  <rect x="515" y="50" width="150" height="120" rx="10" fill="#e67e22"/>
  <text x="590" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Analogical</text>
  <text x="590" y="92" text-anchor="middle" font-size="11" fill="#fdebd0">Reasoning</text>
  <line x1="525" y1="100" x2="655" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="590" y="116" text-anchor="middle" font-size="10" fill="white">Transfer from similar problems</text>
  <text x="590" y="132" text-anchor="middle" font-size="10" fill="#fdebd0">"This problem is similar</text>
  <text x="590" y="148" text-anchor="middle" font-size="10" fill="#fdebd0">to the previous XX"</text>
  <text x="590" y="162" text-anchor="middle" font-size="10" fill="#f0b27a">→ Transfer the solution</text>

  <!-- Bottom: Agent combining modes -->
  <rect x="20" y="195" width="640" height="100" rx="10" fill="white" stroke="#bdc3c7" stroke-width="1.2"/>
  <text x="340" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Agent Combines Multiple Reasoning Modes</text>
  <text x="340" y="240" text-anchor="middle" font-size="11" fill="#7f8c8d">When facing complex problems, agents flexibly switch reasoning modes:</text>
  <text x="340" y="258" text-anchor="middle" font-size="11" fill="#3498db">Deductive</text>
  <text x="390" y="258" text-anchor="middle" font-size="11" fill="#7f8c8d">(verify logic) →</text>
  <text x="450" y="258" text-anchor="middle" font-size="11" fill="#27ae60">Inductive</text>
  <text x="500" y="258" text-anchor="middle" font-size="11" fill="#7f8c8d">(find patterns) →</text>
  <text x="560" y="258" text-anchor="middle" font-size="11" fill="#8e44ad">Abductive</text>
  <text x="615" y="258" text-anchor="middle" font-size="11" fill="#7f8c8d">(diagnose) →</text>
  <text x="560" y="275" text-anchor="middle" font-size="11" fill="#e67e22">Analogical</text>
  <text x="615" y="275" text-anchor="middle" font-size="11" fill="#7f8c8d">(transfer)</text>
  <text x="340" y="280" text-anchor="middle" font-size="11" fill="#95a5a6">Metacognition: knowing what you don't know, choosing the right reasoning style</text>
</svg>
