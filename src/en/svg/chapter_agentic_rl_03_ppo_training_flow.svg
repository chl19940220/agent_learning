<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 500" width="580" height="500">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="580" height="500" fill="#f8f9fa" rx="12"/>
  <text x="270" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">PPO Complete Training Iteration Flow</text>

  <!-- Step 1: Sampling -->
  <rect x="120" y="42" width="300" height="42" rx="10" fill="#4dabf7" opacity="0.15" stroke="#4dabf7" stroke-width="2"/>
  <text x="135" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2980b9">①</text>
  <text x="155" y="60" font-family="Arial, sans-serif" font-size="11" fill="#555">Policy model samples and generates responses</text>
  <text x="155" y="77" font-family="Arial, sans-serif" font-size="9" fill="#888">y ~ π_θ_old(·|x), record log π_θ_old(y_t|...)</text>
  <path d="M 270 86 L 270 100" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Reward -->
  <rect x="120" y="103" width="300" height="42" rx="10" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="2"/>
  <text x="135" y="121" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e67e22">②</text>
  <text x="155" y="121" font-family="Arial, sans-serif" font-size="11" fill="#555">Reward model scoring</text>
  <text x="155" y="138" font-family="Arial, sans-serif" font-size="9" fill="#888">r = R(x, y), obtain reward scalar for each response</text>
  <path d="M 270 147 L 270 161" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Critic -->
  <rect x="120" y="164" width="300" height="50" rx="10" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="2"/>
  <text x="135" y="184" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9b59b6">③</text>
  <text x="155" y="184" font-family="Arial, sans-serif" font-size="11" fill="#555">Critic model estimates state value</text>
  <text x="155" y="199" font-family="Arial, sans-serif" font-size="9" fill="#888">V_φ(s_t) estimates expected cumulative reward per time step</text>
  <text x="155" y="210" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">⚠️ Requires additional 7B+ parameter model</text>
  <path d="M 270 216 L 270 230" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: GAE -->
  <rect x="100" y="233" width="340" height="50" rx="10" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="2"/>
  <text x="115" y="253" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">④</text>
  <text x="135" y="253" font-family="Arial, sans-serif" font-size="11" fill="#555">Compute GAE advantage function</text>
  <text x="135" y="268" font-family="Arial, sans-serif" font-size="9" fill="#888">δ_t = r_t + γV(s_{t+1}) - V(s_t)</text>
  <text x="135" y="279" font-family="Arial, sans-serif" font-size="9" fill="#888">A_t = Σ(γλ)^l · δ_{t+l}, combining multi-step TD errors</text>
  <path d="M 270 285 L 270 299" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Ratio -->
  <rect x="120" y="302" width="300" height="42" rx="10" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <text x="135" y="320" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3498db">⑤</text>
  <text x="155" y="320" font-family="Arial, sans-serif" font-size="11" fill="#555">Compute importance sampling ratio</text>
  <text x="155" y="337" font-family="Arial, sans-serif" font-size="9" fill="#888">ρ_t = π_θ(y_t|...) / π_θ_old(y_t|...), measures policy change</text>
  <path d="M 270 346 L 270 360" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: Clip Update -->
  <rect x="80" y="363" width="380" height="50" rx="10" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="2"/>
  <text x="95" y="383" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e74c3c">⑥</text>
  <text x="115" y="383" font-family="Arial, sans-serif" font-size="11" fill="#555">PPO Clip loss + KL penalty</text>
  <text x="115" y="398" font-family="Arial, sans-serif" font-size="9" fill="#888">L = -min(ρ·A, clip(ρ,1-ε,1+ε)·A) + β·KL(π_θ‖π_ref)</text>
  <text x="115" y="409" font-family="Arial, sans-serif" font-size="9" fill="#888">Simultaneously update Policy θ and Critic φ</text>
  <path d="M 270 415 L 270 432" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 7: Sync -->
  <rect x="120" y="435" width="300" height="35" rx="10" fill="#2c3e50" opacity="0.1" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="135" y="457" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">⑦</text>
  <text x="155" y="457" font-family="Arial, sans-serif" font-size="11" fill="#555">Sync old policy θ_old ← θ</text>

  <!-- Loop arrow -->
  <path d="M 422 452 L 500 452 L 500 63 L 422 63" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow)"/>
  <text x="530" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c" transform="rotate(90, 530, 260)">Next Iteration</text>
</svg>
