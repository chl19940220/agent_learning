  <rect x="758" y="128" width="115" height="28" rx="8" fill="#fff" stroke="#fc8181" stroke-width="0.8"/>
  <text x="815" y="147" text-anchor="middle" font-size="11" fill="#c53030" font-family="system-ui">HumanEval</text>
  <rect x="758" y="161" width="115" height="22" rx="8" fill="#fed7d7"/>
  <text x="815" y="177" text-anchor="middle" font-size="9" fill="#c53030" font-family="system-ui">MBPP</text>
  
  <!-- Evaluation Methods Row -->
  <text x="450" y="220" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a365d" font-family="system-ui">Evaluation Methods</text>
  
  <rect x="60" y="240" width="200" height="60" rx="12" fill="#fff" stroke="#4a5568" stroke-width="1" filter="url(#shadow3)"/>
  <text x="160" y="263" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d3748" font-family="system-ui">📏 Rule-based Evaluation</text>
  <text x="160" y="283" text-anchor="middle" font-size="10" fill="#718096" font-family="system-ui">Exact match / AST match / Regex</text>
  
  <rect x="290" y="240" width="200" height="60" rx="12" fill="#fff" stroke="#4a5568" stroke-width="1" filter="url(#shadow3)"/>
  <text x="390" y="263" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d3748" font-family="system-ui">🤖 LLM-as-Judge</text>
  <text x="390" y="283" text-anchor="middle" font-size="10" fill="#718096" font-family="system-ui">Scoring / Pairwise comparison / Win Rate</text>
  
  <rect x="520" y="240" width="200" height="60" rx="12" fill="#fff" stroke="#4a5568" stroke-width="1" filter="url(#shadow3)"/>
  <text x="620" y="263" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d3748" font-family="system-ui">👤 Human Validation</text>
  <text x="620" y="283" text-anchor="middle" font-size="10" fill="#718096" font-family="system-ui">Expert review / A/B testing / Gradio</text>
  
  <!-- Recommended Combination -->
  <rect x="100" y="325" width="700" height="50" rx="12" fill="#1a365d" filter="url(#shadow3)"/>
  <text x="450" y="348" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="system-ui">✅ Recommended combo: Rule fast filter → LLM Judge batch eval → Human spot-check key cases</text>
  <text x="450" y="366" text-anchor="middle" font-size="10" fill="#a0aec0" font-family="system-ui">Three-layer progressive evaluation system, balancing efficiency and accuracy</text>
  
  <text x="450" y="393" text-anchor="middle" font-size="10" fill="#718096" font-family="system-ui">Figure 15-1  Agent Evaluation Benchmarks and Methods Landscape</text>
