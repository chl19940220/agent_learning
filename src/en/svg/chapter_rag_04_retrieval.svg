<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/></marker>
  </defs>
  <rect width="800" height="400" rx="12" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Hybrid Retrieval + Reranking + Query Expansion — Three Optimization Strategies</text>

  <!-- User query -->
  <rect x="340" y="48" width="120" height="35" rx="8" fill="#2c3e50"/>
  <text x="400" y="70" text-anchor="middle" font-size="11" fill="white" font-weight="bold">❓ User Query</text>

  <!-- Strategy 1: Hybrid Retrieval -->
  <rect x="20" y="110" width="240" height="240" rx="10" fill="#3498db" opacity="0.08" stroke="#3498db" stroke-width="2"/>
  <text x="140" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498db">Strategy 1: Hybrid Retrieval</text>

  <rect x="35" y="145" width="100" height="45" rx="6" fill="#3498db" opacity="0.2" stroke="#3498db" stroke-width="1"/>
  <text x="85" y="164" text-anchor="middle" font-size="10" font-weight="bold" fill="#3498db">🧠 Vector Search</text>
  <text x="85" y="180" text-anchor="middle" font-size="8" fill="#555">Semantic similarity</text>

  <rect x="145" y="145" width="100" height="45" rx="6" fill="#e67e22" opacity="0.2" stroke="#e67e22" stroke-width="1"/>
  <text x="195" y="164" text-anchor="middle" font-size="10" font-weight="bold" fill="#e67e22">🔤 BM25</text>
  <text x="195" y="180" text-anchor="middle" font-size="8" fill="#555">Keyword matching</text>

  <text x="140" y="210" text-anchor="middle" font-size="10" fill="#555">Weighted fusion (default 0.7:0.3)</text>
  <rect x="55" y="222" width="170" height="25" rx="4" fill="white" stroke="#3498db" stroke-width="1"/>
  <text x="140" y="239" text-anchor="middle" font-size="9" fill="#555">Reciprocal Rank Fusion</text>
  <text x="140" y="262" text-anchor="middle" font-size="9" fill="#27ae60">✅ Semantic + exact complementarity</text>
  <text x="140" y="278" text-anchor="middle" font-size="9" fill="#27ae60">✅ Significantly higher recall</text>

  <line x1="370" y1="83" x2="140" y2="110" stroke="#2c3e50" stroke-width="1.2" marker-end="url(#a3)"/>

  <!-- Strategy 2: Reranking -->
  <rect x="280" y="110" width="240" height="240" rx="10" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">Strategy 2: Reranking</text>

  <rect x="295" y="148" width="210" height="30" rx="5" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <text x="400" y="168" text-anchor="middle" font-size="9" fill="#555">Initial retrieval Top-20 candidates</text>
  <text x="400" y="195" text-anchor="middle" font-size="16" fill="#27ae60">↓</text>
  <rect x="295" y="205" width="210" height="40" rx="5" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="1"/>
  <text x="400" y="222" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">🤖 LLM Fine Reranking</text>
  <text x="400" y="237" text-anchor="middle" font-size="8" fill="#555">"Relevance of query to doc: 1-10"</text>
  <text x="400" y="258" text-anchor="middle" font-size="16" fill="#27ae60">↓</text>
  <rect x="295" y="265" width="210" height="30" rx="5" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="400" y="285" text-anchor="middle" font-size="9" fill="#555">Top-5 high-quality docs after reranking</text>
  <text x="400" y="310" text-anchor="middle" font-size="9" fill="#27ae60">✅ Significantly higher precision</text>
  <text x="400" y="326" text-anchor="middle" font-size="9" fill="#e74c3c">⚠️ Additional LLM call cost</text>

  <line x1="400" y1="83" x2="400" y2="110" stroke="#2c3e50" stroke-width="1.2" marker-end="url(#a3)"/>

  <!-- Strategy 3: Query Expansion -->
  <rect x="540" y="110" width="240" height="240" rx="10" fill="#8e44ad" opacity="0.08" stroke="#8e44ad" stroke-width="2"/>
  <text x="660" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#8e44ad">Strategy 3: Query Expansion</text>

  <rect x="560" y="150" width="200" height="28" rx="4" fill="white" stroke="#8e44ad" stroke-width="1"/>
  <text x="660" y="169" text-anchor="middle" font-size="9" fill="#555">Original: "How to fix Error 404"</text>
  <text x="660" y="195" text-anchor="middle" font-size="14" fill="#8e44ad">↓ LLM rewrite</text>
  <rect x="560" y="208" width="200" height="20" rx="3" fill="#8e44ad" opacity="0.1"/>
  <text x="660" y="222" text-anchor="middle" font-size="8" fill="#555">"HTTP 404 Not Found troubleshooting"</text>
  <rect x="560" y="232" width="200" height="20" rx="3" fill="#8e44ad" opacity="0.1"/>
  <text x="660" y="246" text-anchor="middle" font-size="8" fill="#555">"Page not found 404 fix methods"</text>
  <rect x="560" y="256" width="200" height="20" rx="3" fill="#8e44ad" opacity="0.1"/>
  <text x="660" y="270" text-anchor="middle" font-size="8" fill="#555">"Web server 404 response solutions"</text>
  <text x="660" y="298" text-anchor="middle" font-size="9" fill="#27ae60">✅ Multi-angle recall improvement</text>
  <text x="660" y="314" text-anchor="middle" font-size="9" fill="#e74c3c">⚠️ More retrieval calls needed</text>

  <line x1="430" y1="83" x2="660" y2="110" stroke="#2c3e50" stroke-width="1.2" marker-end="url(#a3)"/>

  <!-- Bottom -->
  <text x="400" y="380" text-anchor="middle" font-size="11" fill="#95a5a6">All three strategies can be stacked: Query expansion (recall) → Hybrid retrieval (complement) → Reranking (precision)</text>
</svg>
