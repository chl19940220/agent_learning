<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>

  <rect width="760" height="400" fill="#f8f9fa" rx="14"/>
  <text x="380" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Five Core Problems: What Does Harness Engineering Solve?</text>

  <!-- Problem 1: Context Anxiety -->
  <rect x="20" y="48" width="220" height="155" rx="12" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <rect x="20" y="48" width="220" height="36" rx="12" fill="#f39c12" opacity="0.85"/>
  <rect x="20" y="72" width="220" height="12" rx="0" fill="#f39c12" opacity="0.85"/>
  <text x="130" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">① Context Anxiety</text>
  <text x="130" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#e67e22">Context Anxiety</text>
  <line x1="35" y1="113" x2="225" y2="113" stroke="#f39c12" stroke-width="0.8" opacity="0.4"/>
  <text x="35" y="128" font-size="9" fill="#555">• Reasoning quality drops when usage &gt;40%</text>
  <text x="35" y="143" font-size="9" fill="#555">• Model silently skips steps without notice</text>
  <text x="35" y="158" font-size="9" fill="#555">• Prematurely declares "complete"</text>
  <rect x="35" y="170" width="170" height="22" rx="8" fill="#f39c12" opacity="0.12"/>
  <text x="120" y="185" text-anchor="middle" font-size="9" fill="#e67e22">Harness: Active compression &amp; utilization monitoring</text>

  <!-- Problem 2: Completion Bias -->
  <rect x="255" y="48" width="220" height="155" rx="12" fill="#fef5fb" stroke="#9b59b6" stroke-width="2"/>
  <rect x="255" y="48" width="220" height="36" rx="12" fill="#9b59b6" opacity="0.85"/>
  <rect x="255" y="72" width="220" height="12" rx="0" fill="#9b59b6" opacity="0.85"/>
  <text x="365" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">② Completion Bias</text>
  <text x="365" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#9b59b6">Completion Bias</text>
  <line x1="270" y1="113" x2="460" y2="113" stroke="#9b59b6" stroke-width="0.8" opacity="0.4"/>
  <text x="270" y="128" font-size="9" fill="#555">• LLM has systematic optimism bias</text>
  <text x="270" y="143" font-size="9" fill="#555">• Claims task complete without verification</text>
  <text x="270" y="158" font-size="9" fill="#555">• Deletes tests to make tests pass (cheating)</text>
  <rect x="270" y="170" width="190" height="22" rx="8" fill="#9b59b6" opacity="0.12"/>
  <text x="365" y="185" text-anchor="middle" font-size="9" fill="#9b59b6">Harness: Forced validation gating</text>

  <!-- Problem 3: Doom Loop -->
  <rect x="490" y="48" width="250" height="155" rx="12" fill="#fef2f2" stroke="#e74c3c" stroke-width="2"/>
  <rect x="490" y="48" width="250" height="36" rx="12" fill="#e74c3c" opacity="0.85"/>
  <rect x="490" y="72" width="250" height="12" rx="0" fill="#e74c3c" opacity="0.85"/>
  <text x="615" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">③ Doom Loop (Infinite Loop)</text>
  <text x="615" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#e74c3c">Infinite Loop</text>
  <line x1="505" y1="113" x2="725" y2="113" stroke="#e74c3c" stroke-width="0.8" opacity="0.4"/>
  <text x="505" y="128" font-size="9" fill="#555">• Repeats same approach without switching</text>
  <text x="505" y="143" font-size="9" fill="#555">• Real case: 47 loops / $23 in cost</text>
  <text x="505" y="158" font-size="9" fill="#555">• Meaningless retries exhaust token budget</text>
  <rect x="505" y="170" width="220" height="22" rx="8" fill="#e74c3c" opacity="0.1"/>
  <text x="615" y="185" text-anchor="middle" font-size="9" fill="#e74c3c">Harness: Loop detection + strategy switching</text>

  <!-- Problem 4: Pollution Effect -->
  <rect x="20" y="220" width="340" height="155" rx="12" fill="#eaf9f5" stroke="#1abc9c" stroke-width="2"/>
  <rect x="20" y="220" width="340" height="36" rx="12" fill="#1abc9c" opacity="0.85"/>
  <rect x="20" y="244" width="340" height="12" rx="0" fill="#1abc9c" opacity="0.85"/>
  <text x="190" y="242" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">④ Pollution Effect (Multi-Agent Pollution)</text>
  <text x="190" y="277" text-anchor="middle" font-size="10" font-weight="bold" fill="#1abc9c">Context Contamination</text>
  <line x1="35" y1="285" x2="345" y2="285" stroke="#1abc9c" stroke-width="0.8" opacity="0.4"/>
  <text x="35" y="300" font-size="9" fill="#555">• Agent A's wrong decision is passed to Agent B via messages</text>
  <text x="35" y="315" font-size="9" fill="#555">• Erroneous info treated as "fact" and amplified further</text>
  <text x="35" y="330" font-size="9" fill="#555">• Errors cascade in multi-agent systems, hard to trace source</text>
  <rect x="35" y="345" width="305" height="22" rx="8" fill="#1abc9c" opacity="0.1"/>
  <text x="188" y="360" text-anchor="middle" font-size="9" fill="#1abc9c">Harness: Context isolation + message bus validation</text>

  <!-- Problem 5: System Entropy -->
  <rect x="375" y="220" width="365" height="155" rx="12" fill="#eaf4fb" stroke="#2980b9" stroke-width="2"/>
  <rect x="375" y="220" width="365" height="36" rx="12" fill="#2980b9" opacity="0.85"/>
  <rect x="375" y="244" width="365" height="12" rx="0" fill="#2980b9" opacity="0.85"/>
  <text x="558" y="242" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">⑤ System Entropy</text>
  <text x="558" y="277" text-anchor="middle" font-size="10" font-weight="bold" fill="#2980b9">Technical Debt Accumulation</text>
  <line x1="390" y1="285" x2="725" y2="285" stroke="#2980b9" stroke-width="0.8" opacity="0.4"/>
  <text x="390" y="300" font-size="9" fill="#555">• AI generates extremely fast, bad patterns spread quickly</text>
  <text x="390" y="315" font-size="9" fill="#555">• Docs and code gradually diverge, knowledge decays</text>
  <text x="390" y="330" font-size="9" fill="#555">• New AI learns old "bad code," quality spirals downward</text>
  <rect x="390" y="345" width="330" height="22" rx="8" fill="#2980b9" opacity="0.1"/>
  <text x="558" y="360" text-anchor="middle" font-size="9" fill="#2980b9">Harness: Entropy governance agent (periodic scan + auto-fix PR)</text>

  <!-- Bottom bar -->
  <rect x="20" y="386" width="720" height="8" rx="4" fill="#ecf0f1"/>
</svg>
