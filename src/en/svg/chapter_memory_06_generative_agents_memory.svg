<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" width="520" height="340">
  <rect width="520" height="340" fill="#f8f9fa" rx="12"/>
  <text x="260" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Generative Agents — Three-Layer Memory Architecture</text>

  <!-- Layer 1: Memory Stream -->
  <rect x="30" y="48" width="460" height="80" rx="10" fill="#3498db" opacity="0.1" stroke="#3498db" stroke-width="2"/>
  <text x="50" y="70" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498db">📝 1. Memory Stream</text>
  <text x="50" y="88" font-family="Arial, sans-serif" font-size="10" fill="#555">├── Records all agent experiences (observations, conversations, actions)</text>
  <text x="50" y="104" font-family="Arial, sans-serif" font-size="10" fill="#555">├── Each memory entry has a timestamp and importance score</text>
  <text x="50" y="120" font-family="Arial, sans-serif" font-size="10" fill="#888">└── Serves as the "raw data layer" of the memory system</text>

  <!-- Layer 2: Reflection -->
  <rect x="30" y="138" width="460" height="80" rx="10" fill="#9b59b6" opacity="0.1" stroke="#9b59b6" stroke-width="2"/>
  <text x="50" y="160" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9b59b6">🧠 2. Reflection</text>
  <text x="50" y="178" font-family="Arial, sans-serif" font-size="10" fill="#555">├── Triggered periodically (when accumulated importance exceeds threshold)</text>
  <text x="50" y="194" font-family="Arial, sans-serif" font-size="10" fill="#555">├── Distills higher-level insights from recent memories</text>
  <text x="50" y="210" font-family="Arial, sans-serif" font-size="10" fill="#888">└── Reflection results are stored back in the memory stream (hierarchical)</text>

  <!-- Example -->
  <rect x="310" y="164" width="170" height="40" rx="6" fill="#9b59b6" opacity="0.08"/>
  <text x="395" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9b59b6">Observed "Klaus is painting" multiple times</text>
  <text x="395" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#9b59b6">→ "Klaus is passionate about art"</text>

  <!-- Layer 3: Retrieval -->
  <rect x="30" y="228" width="460" height="100" rx="10" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="2"/>
  <text x="50" y="250" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">🔍 3. Retrieval</text>
  <text x="50" y="268" font-family="Arial, sans-serif" font-size="10" fill="#555">├── When the agent needs to make a decision, relevant memories are retrieved</text>
  <text x="50" y="284" font-family="Arial, sans-serif" font-size="10" fill="#555">└── Retrieval uses a weighted combination of three dimensions:</text>

  <!-- Three dimensions -->
  <rect x="70" y="292" width="130" height="28" rx="6" fill="#e74c3c" opacity="0.1" stroke="#e74c3c" stroke-width="1"/>
  <text x="135" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">⏱️ Recency</text>

  <rect x="210" y="292" width="130" height="28" rx="6" fill="#f39c12" opacity="0.1" stroke="#f39c12" stroke-width="1"/>
  <text x="275" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e67e22">⭐ Importance</text>

  <rect x="350" y="292" width="130" height="28" rx="6" fill="#3498db" opacity="0.1" stroke="#3498db" stroke-width="1"/>
  <text x="415" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3498db">🎯 Relevance</text>
</svg>
