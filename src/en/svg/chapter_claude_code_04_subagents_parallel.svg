<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
  </defs>
  <rect width="640" height="340" rx="14" fill="#f0f4f8"/>
  <text x="320" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Sub-agents Parallel Task Execution</text>

  <!-- Main Agent -->
  <rect x="240" y="45" width="160" height="52" rx="10" fill="#2c3e50"/>
  <text x="320" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🧠 Main Agent</text>
  <text x="320" y="86" text-anchor="middle" font-size="11" fill="#bdc3c7">Team Lead / Coordinator</text>

  <!-- Parallel dispatch arrows -->
  <line x1="320" y1="97" x2="320" y2="115" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="320" y1="115" x2="100" y2="115" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="320" y1="115" x2="540" y2="115" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="100" y1="115" x2="100" y2="138" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="220" y1="115" x2="220" y2="138" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="320" y1="115" x2="320" y2="138" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="420" y1="115" x2="420" y2="138" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="540" y1="115" x2="540" y2="138" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="320" y="110" text-anchor="middle" font-size="11" fill="#3498db" font-weight="bold">Parallel Dispatch</text>

  <!-- Sub Agent A -->
  <rect x="40" y="140" width="120" height="60" rx="8" fill="#3498db"/>
  <text x="100" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Sub Agent A</text>
  <text x="100" y="178" text-anchor="middle" font-size="10" fill="#d6eaf8">Independent context</text>
  <text x="100" y="192" text-anchor="middle" font-size="10" fill="#d6eaf8">Review frontend changes</text>

  <!-- Sub Agent B -->
  <rect x="160" y="140" width="120" height="60" rx="8" fill="#3498db"/>
  <text x="220" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Sub Agent B</text>
  <text x="220" y="178" text-anchor="middle" font-size="10" fill="#d6eaf8">Independent context</text>
  <text x="220" y="192" text-anchor="middle" font-size="10" fill="#d6eaf8">Review backend changes</text>

  <!-- Sub Agent C -->
  <rect x="260" y="140" width="120" height="60" rx="8" fill="#3498db"/>
  <text x="320" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Sub Agent C</text>
  <text x="320" y="178" text-anchor="middle" font-size="10" fill="#d6eaf8">Independent context</text>
  <text x="320" y="192" text-anchor="middle" font-size="10" fill="#d6eaf8">Review DB migrations</text>

  <!-- Sub Agent D -->
  <rect x="360" y="140" width="120" height="60" rx="8" fill="#3498db"/>
  <text x="420" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Sub Agent D</text>
  <text x="420" y="178" text-anchor="middle" font-size="10" fill="#d6eaf8">Independent context</text>
  <text x="420" y="192" text-anchor="middle" font-size="10" fill="#d6eaf8">Review API layer</text>

  <!-- Sub Agent E -->
  <rect x="480" y="140" width="120" height="60" rx="8" fill="#3498db"/>
  <text x="540" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Sub Agent E</text>
  <text x="540" y="178" text-anchor="middle" font-size="10" fill="#d6eaf8">Independent context</text>
  <text x="540" y="192" text-anchor="middle" font-size="10" fill="#d6eaf8">Review test files</text>

  <!-- Return result arrows -->
  <line x1="100" y1="200" x2="100" y2="225" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="220" y1="200" x2="220" y2="225" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="320" y1="200" x2="320" y2="225" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="420" y1="200" x2="420" y2="225" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="540" y1="200" x2="540" y2="225" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="320" y="222" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">Return Results</text>

  <!-- Merge -->
  <line x1="100" y1="228" x2="100" y2="248" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="540" y1="228" x2="540" y2="248" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="100" y1="248" x2="540" y2="248" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="320" y1="248" x2="320" y2="268" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="180" y="270" width="280" height="44" rx="10" fill="#27ae60"/>
  <text x="320" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="white">📋 Main Agent Summary</text>
  <text x="320" y="306" text-anchor="middle" font-size="11" fill="#d5f5e3">Generate final report · Time reduced by ~60%</text>
</svg>
