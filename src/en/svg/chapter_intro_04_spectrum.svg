<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <rect width="760" height="400" fill="#f8f9fa" rx="12"/>
  <text x="380" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Traditional Programs vs Agent Use Cases</text>

  <!-- Axes -->
  <line x1="100" y1="310" x2="700" y2="310" stroke="#bdc3c7" stroke-width="2"/>
  <text x="100" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">Clear task rules</text>
  <text x="700" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">Ambiguous open tasks</text>
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">→ Task Openness</text>

  <line x1="100" y1="60" x2="100" y2="310" stroke="#bdc3c7" stroke-width="2"/>
  <text x="55" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">Low</text>
  <text x="55" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">High</text>
  <text x="30" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d" transform="rotate(-90, 30, 185)">↑ Reliability Requirement</text>

  <!-- Quadrant dividers -->
  <line x1="100" y1="185" x2="700" y2="185" stroke="#ecf0f1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="400" y1="60" x2="400" y2="310" stroke="#ecf0f1" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Quadrant labels -->
  <text x="250" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3498db" font-weight="bold">Traditional Program Domain</text>
  <text x="550" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60" font-weight="bold">Hybrid approach needed</text>
  <text x="250" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bdc3c7">Unsuitable for any approach</text>
  <text x="550" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60" font-weight="bold">Agent Domain</text>

  <!-- Data points -->
  <circle cx="150" cy="100" r="16" fill="#3498db" opacity="0.85"/>
  <text x="150" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">Compute</text>
  <text x="150" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">Payroll calculation</text>

  <circle cx="200" cy="120" r="16" fill="#3498db" opacity="0.85"/>
  <text x="200" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">Import</text>
  <text x="200" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">Data import</text>

  <circle cx="160" cy="80" r="16" fill="#3498db" opacity="0.85"/>
  <text x="160" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">Finance</text>
  <text x="160" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">Financial trading</text>

  <circle cx="600" cy="240" r="16" fill="#27ae60" opacity="0.85"/>
  <text x="600" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">Customer service</text>
  <text x="600" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Customer service dialog</text>

  <circle cx="650" cy="220" r="16" fill="#27ae60" opacity="0.85"/>
  <text x="650" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">Research</text>
  <text x="650" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Intelligent research</text>

  <circle cx="580" cy="130" r="16" fill="#e67e22" opacity="0.85"/>
  <text x="580" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">Requirements</text>
  <text x="580" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">Requirements analysis</text>

  <!-- Legend -->
  <rect x="100" y="365" width="560" height="25" rx="6" fill="#ecf0f1"/>
  <circle cx="130" cy="377" r="7" fill="#3498db" opacity="0.85"/>
  <text x="145" y="381" font-family="Arial, sans-serif" font-size="11" fill="#555">Traditional programs excel</text>
  <circle cx="280" cy="377" r="7" fill="#27ae60" opacity="0.85"/>
  <text x="295" y="381" font-family="Arial, sans-serif" font-size="11" fill="#555">Agent excels</text>
  <circle cx="420" cy="377" r="7" fill="#e67e22" opacity="0.85"/>
  <text x="435" y="381" font-family="Arial, sans-serif" font-size="11" fill="#555">Hybrid approach</text>
</svg>
