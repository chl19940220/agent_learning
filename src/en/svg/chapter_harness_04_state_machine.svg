<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="arrD" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#7f8c8d"/>
    </marker>
  </defs>

  <rect width="760" height="400" fill="#f8f9fa" rx="14"/>
  <text x="380" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">OpenAI Million-Line Experiment: Five-Layer Harness Architecture</text>
  <text x="380" y="48" text-anchor="middle" font-size="11" fill="#7f8c8d">3 engineers · 5 months · 1M lines of production code · 0 lines hand-written</text>

  <!-- Layer 1 -->
  <rect x="30" y="62" width="700" height="58" rx="10" fill="#e8f4fd" stroke="#3498db" stroke-width="2"/>
  <rect x="30" y="62" width="700" height="58" rx="10" fill="none" stroke="#3498db" stroke-width="2"/>
  <rect x="30" y="62" width="150" height="58" rx="10" fill="#3498db" opacity="0.85"/>
  <text x="105" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Layer 1</text>
  <text x="105" y="102" text-anchor="middle" font-size="10" fill="#fff">Structured Knowledge System</text>
  <text x="215" y="84" font-size="10" font-weight="bold" fill="#3498db">Progressive Disclosure</text>
  <text x="215" y="100" font-size="9" fill="#555">AGENTS.md has only index; details fetched on demand · Doc Gardener Agent maintains consistency · Repo is single source of truth</text>
  <text x="690" y="84" text-anchor="end" font-size="9" fill="#3498db">📚 Tells Agent</text>
  <text x="690" y="98" text-anchor="end" font-size="9" fill="#3498db">"What this is"</text>

  <!-- Arrow -->
  <path d="M 380 122 L 380 134" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- Layer 2 -->
  <rect x="30" y="136" width="700" height="58" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <rect x="30" y="136" width="150" height="58" rx="10" fill="#f39c12" opacity="0.85"/>
  <text x="105" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Layer 2</text>
  <text x="105" y="176" text-anchor="middle" font-size="10" fill="#fff">Enforced Architectural Constraints</text>
  <text x="215" y="158" font-size="10" font-weight="bold" fill="#e67e22">Codified layered architecture rules (Linter as Architecture Guard)</text>
  <text x="215" y="174" font-size="9" fill="#555">Custom AST Linter · CI auto-blocks violations · Types→Config→Services→API strict one-way dependency</text>
  <text x="690" y="158" text-anchor="end" font-size="9" fill="#e67e22">🚧 Tells Agent</text>
  <text x="690" y="172" text-anchor="end" font-size="9" fill="#e67e22">"What not to do"</text>

  <path d="M 380 196 L 380 208" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- Layer 3 -->
  <rect x="30" y="210" width="700" height="58" rx="10" fill="#f0fdf4" stroke="#27ae60" stroke-width="2"/>
  <rect x="30" y="210" width="150" height="58" rx="10" fill="#27ae60" opacity="0.85"/>
  <text x="105" y="234" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Layer 3</text>
  <text x="105" y="250" text-anchor="middle" font-size="10" fill="#fff">Runtime Validation &amp; Observability</text>
  <text x="215" y="232" font-size="10" font-weight="bold" fill="#27ae60">AI-Readable Observability</text>
  <text x="215" y="248" font-size="9" fill="#555">git worktree isolated instances · Machine-readable logs · Direct integration with Chrome DevTools / LogQL / PromQL</text>
  <text x="690" y="232" text-anchor="end" font-size="9" fill="#27ae60">🔍 Tells Agent</text>
  <text x="690" y="246" text-anchor="end" font-size="9" fill="#27ae60">"How to verify"</text>

  <path d="M 380 270 L 380 282" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- Layer 4 -->
  <rect x="30" y="284" width="700" height="58" rx="10" fill="#fdf2fb" stroke="#9b59b6" stroke-width="2"/>
  <rect x="30" y="284" width="150" height="58" rx="10" fill="#9b59b6" opacity="0.85"/>
  <text x="105" y="308" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Layer 4</text>
  <text x="105" y="324" text-anchor="middle" font-size="10" fill="#fff">Self-repair Loop</text>
  <text x="215" y="306" font-size="10" font-weight="bold" fill="#9b59b6">Cleanup Agent runs continuously</text>
  <text x="215" y="322" font-size="9" fill="#555">Scans code deviating from "golden standard" · Auto-submits refactor PRs · High-frequency tech debt repayment</text>
  <text x="690" y="306" text-anchor="end" font-size="9" fill="#9b59b6">🔧 Maintains</text>
  <text x="690" y="320" text-anchor="end" font-size="9" fill="#9b59b6">codebase health</text>

  <path d="M 380 344 L 380 356" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- Layer 5 -->
  <rect x="30" y="358" width="700" height="30" rx="10" fill="#fef2f2" stroke="#e74c3c" stroke-width="2"/>
  <rect x="30" y="358" width="150" height="30" rx="10" fill="#e74c3c" opacity="0.85"/>
  <text x="105" y="378" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Layer 5  AI Mutual Review (Ralph Wiggum Loop)</text>
  <text x="215" y="378" font-size="9" fill="#555">Agent A writes → Agent B reviews → Humans only intervene for architecture decisions · Daily reviews fully automated</text>
  <text x="690" y="378" text-anchor="end" font-size="9" fill="#e74c3c">👥 Cross-check for quality</text>
</svg>
