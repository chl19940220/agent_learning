<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="640" height="200" rx="14" fill="#f0f4f8"/>
  <text x="320" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Engineer Value Shift in the AI Era</text>

  <!-- Past -->
  <rect x="30" y="50" width="260" height="120" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="160" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">⏮️ Past Engineer Value</text>
  <text x="160" y="100" text-anchor="middle" font-size="12" fill="#92400e">"How fast and well</text>
  <text x="160" y="118" text-anchor="middle" font-size="12" fill="#92400e">can I write code"</text>
  <text x="160" y="148" text-anchor="middle" font-size="11" fill="#7f8c8d">Manually writing every line of code</text>
  <text x="160" y="163" text-anchor="middle" font-size="11" fill="#7f8c8d">Personal coding ability is core</text>

  <!-- Arrow -->
  <line x1="292" y1="110" x2="348" y2="110" stroke="#2c3e50" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="320" y="103" text-anchor="middle" font-size="11" fill="#2c3e50" font-weight="bold">AI Era</text>

  <!-- Future -->
  <rect x="350" y="50" width="260" height="120" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="480" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">⏭️ Future Engineer Value</text>
  <text x="480" y="100" text-anchor="middle" font-size="12" fill="#15803d">"How smart and robust</text>
  <text x="480" y="118" text-anchor="middle" font-size="12" fill="#15803d">a system can I design</text>
  <text x="480" y="133" text-anchor="middle" font-size="12" fill="#15803d">to reliably harness AI"</text>
  <text x="480" y="155" text-anchor="middle" font-size="11" fill="#7f8c8d">Design constraint systems · Build AI workflows</text>
  <text x="480" y="168" text-anchor="middle" font-size="11" fill="#7f8c8d">Establish team AI collaboration standards</text>
</svg>
