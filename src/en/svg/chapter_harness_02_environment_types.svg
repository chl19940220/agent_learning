<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="720" height="340">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="arrC" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#27ae60"/>
    </marker>
    <marker id="arrCR" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#e74c3c"/>
    </marker>
  </defs>

  <rect width="720" height="340" fill="#f8f9fa" rx="14"/>
  <text x="360" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Plan → Build → Verify → Fix Self-Verification Loop</text>
  <text x="360" y="48" text-anchor="middle" font-size="11" fill="#7f8c8d">Single biggest improvement in LangChain Terminal Bench 2.0 (+7.1%)</text>

  <!-- ── Phase 1: PLAN ── -->
  <rect x="30" y="68" width="155" height="190" rx="12" fill="#e8f4fd" stroke="#3498db" stroke-width="2"/>
  <rect x="30" y="68" width="155" height="34" rx="12" fill="#3498db"/>
  <rect x="30" y="90" width="155" height="12" fill="#3498db"/>
  <text x="108" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">① PLAN</text>
  <text x="108" y="112" text-anchor="middle" font-size="10" font-weight="bold" fill="#3498db">Plan Phase</text>
  <text x="108" y="126" text-anchor="middle" font-size="9" fill="#888">Reasoning Budget: HIGH 🔥</text>
  <line x1="45" y1="134" x2="170" y2="134" stroke="#3498db" stroke-width="0.8" opacity="0.3"/>
  <text x="45" y="150" font-size="9" fill="#555">• Analyze task requirements</text>
  <text x="45" y="165" font-size="9" fill="#555">• List files to modify</text>
  <text x="45" y="180" font-size="9" fill="#555">• Design modification plan</text>
  <text x="45" y="195" font-size="9" fill="#555">• Define completion criteria</text>
  <rect x="45" y="210" width="125" height="38" rx="8" fill="#3498db" opacity="0.1"/>
  <text x="108" y="224" text-anchor="middle" font-size="8" fill="#3498db">Think thoroughly,</text>
  <text x="108" y="237" text-anchor="middle" font-size="8" fill="#3498db">consider edge cases</text>

  <!-- Arrow 1→2 -->
  <path d="M 186 163 L 210 163" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrC)"/>

  <!-- ── Phase 2: BUILD ── -->
  <rect x="213" y="68" width="155" height="190" rx="12" fill="#f0fdf4" stroke="#27ae60" stroke-width="2"/>
  <rect x="213" y="68" width="155" height="34" rx="12" fill="#27ae60"/>
  <rect x="213" y="90" width="155" height="12" fill="#27ae60"/>
  <text x="291" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">② BUILD</text>
  <text x="291" y="112" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">Build Phase</text>
  <text x="291" y="126" text-anchor="middle" font-size="9" fill="#888">Reasoning Budget: LOW ⚡</text>
  <line x1="228" y1="134" x2="353" y2="134" stroke="#27ae60" stroke-width="0.8" opacity="0.3"/>
  <text x="228" y="150" font-size="9" fill="#555">• Implement step by step per plan</text>
  <text x="228" y="165" font-size="9" fill="#555">• Modify code files</text>
  <text x="228" y="180" font-size="9" fill="#555">• Record each change</text>
  <text x="228" y="195" font-size="9" fill="#555">• Loop detection monitoring on</text>
  <rect x="228" y="210" width="125" height="38" rx="8" fill="#27ae60" opacity="0.1"/>
  <text x="291" y="224" text-anchor="middle" font-size="8" fill="#27ae60">Execute efficiently,</text>
  <text x="291" y="237" text-anchor="middle" font-size="8" fill="#27ae60">no deep reasoning needed</text>

  <!-- Arrow 2→3 -->
  <path d="M 369 163 L 393 163" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrC)"/>

  <!-- ── Phase 3: VERIFY ── -->
  <rect x="396" y="68" width="155" height="190" rx="12" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <rect x="396" y="68" width="155" height="34" rx="12" fill="#f39c12"/>
  <rect x="396" y="90" width="155" height="12" fill="#f39c12"/>
  <text x="474" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">③ VERIFY ⚠️</text>
  <text x="474" y="112" text-anchor="middle" font-size="10" font-weight="bold" fill="#e67e22">Verify Phase (CANNOT SKIP!)</text>
  <text x="474" y="126" text-anchor="middle" font-size="9" fill="#888">Reasoning Budget: HIGH 🔥</text>
  <line x1="411" y1="134" x2="536" y2="134" stroke="#f39c12" stroke-width="0.8" opacity="0.3"/>
  <text x="411" y="150" font-size="9" fill="#555">• Run all unit tests</text>
  <text x="411" y="165" font-size="9" fill="#555">• Lint check passes</text>
  <text x="411" y="180" font-size="9" fill="#555">• Anti-cheat: tests not deleted</text>
  <text x="411" y="195" font-size="9" fill="#555">• Verify each original requirement</text>
  <rect x="411" y="210" width="125" height="38" rx="8" fill="#f39c12" opacity="0.1"/>
  <text x="474" y="224" text-anchor="middle" font-size="8" fill="#e67e22">Only when all pass</text>
  <text x="474" y="237" text-anchor="middle" font-size="8" fill="#e67e22">can declare done</text>

  <!-- Arrow 3→4 (pass) -->
  <path d="M 552 163 L 576 163" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrC)"/>
  <text x="564" y="155" text-anchor="middle" font-size="8" fill="#27ae60">Pass</text>

  <!-- ── Phase 4: FIX ── -->
  <rect x="579" y="68" width="115" height="190" rx="12" fill="#fef5f5" stroke="#e74c3c" stroke-width="2"/>
  <rect x="579" y="68" width="115" height="34" rx="12" fill="#e74c3c"/>
  <rect x="579" y="90" width="115" height="12" fill="#e74c3c"/>
  <text x="637" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">④ FIX</text>
  <text x="637" y="112" text-anchor="middle" font-size="10" font-weight="bold" fill="#e74c3c">Fix Phase</text>
  <text x="637" y="126" text-anchor="middle" font-size="9" fill="#888">Reasoning Budget: HIGH 🔥</text>
  <line x1="594" y1="134" x2="679" y2="134" stroke="#e74c3c" stroke-width="0.8" opacity="0.3"/>
  <text x="594" y="150" font-size="9" fill="#555">• Analyze failure reason</text>
  <text x="594" y="165" font-size="9" fill="#555">• Fix code issues</text>
  <text x="594" y="180" font-size="9" fill="#555">• Deleting tests is forbidden</text>
  <rect x="594" y="196" width="85" height="52" rx="8" fill="#e74c3c" opacity="0.1"/>
  <text x="637" y="210" text-anchor="middle" font-size="8" fill="#e74c3c">After fix, return to</text>
  <text x="637" y="223" text-anchor="middle" font-size="8" fill="#e74c3c">VERIFY for re-check</text>

  <!-- Arrow: FIX → VERIFY (loop back) -->
  <path d="M 637 259 Q 637 290 474 290 Q 350 290 350 260" stroke="#e74c3c" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#arrCR)"/>
  <text x="490" y="305" text-anchor="middle" font-size="9" fill="#e74c3c">Verification failed, return to fix</text>

  <!-- Success arrow to right -->
  <path d="M 474 260 Q 474 310 570 310" stroke="#27ae60" stroke-width="1.8" fill="none" marker-end="url(#arrC)"/>
  <text x="580" y="325" text-anchor="middle" font-size="9" fill="#27ae60">✅ Task Complete</text>

  <!-- Key insight box -->
  <rect x="30" y="278" width="300" height="50" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="180" y="296" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">💡 Key Insight</text>
  <text x="180" y="312" text-anchor="middle" font-size="9" fill="#2c3e50">Forcing the verification step alone improved LangChain</text>
  <text x="180" y="324" text-anchor="middle" font-size="9" fill="#2c3e50">Terminal Bench 2.0 by +7.1 percentage points</text>
</svg>
