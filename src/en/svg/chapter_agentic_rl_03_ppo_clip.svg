<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 330" width="560" height="330">
  <defs>
    <marker id="arrowBlack" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="560" height="330" fill="#f8f9fa" rx="12"/>
  <text x="280" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">PPO Clip Mechanism Illustration</text>

  <!-- Left: A > 0 -->
  <rect x="15" y="38" width="255" height="275" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="142" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">Case ①: A_t &gt; 0 (Good action, reinforce)</text>

  <!-- Axes -->
  <line x1="55" y1="250" x2="250" y2="250" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrowBlack)"/>
  <line x1="55" y1="250" x2="55" y2="80" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrowBlack)"/>
  <text x="255" y="268" font-family="Arial, sans-serif" font-size="10" fill="#555">ρ_t</text>
  <text x="32" y="82" font-family="Arial, sans-serif" font-size="10" fill="#555">L</text>

  <!-- 1-ε and 1+ε labels -->
  <line x1="120" y1="250" x2="120" y2="245" stroke="#555" stroke-width="1"/>
  <text x="120" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">1-ε</text>
  <line x1="155" y1="250" x2="155" y2="245" stroke="#555" stroke-width="1"/>
  <text x="155" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">1</text>
  <line x1="195" y1="250" x2="195" y2="245" stroke="#555" stroke-width="1"/>
  <text x="195" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">1+ε</text>

  <!-- No-clip line (blue diagonal) -->
  <line x1="70" y1="220" x2="240" y2="120" stroke="#3498db" stroke-width="2" opacity="0.5"/>
  <text x="232" y="115" font-family="Arial, sans-serif" font-size="9" fill="#3498db">No Clip</text>

  <!-- Clipped line (red) -->
  <line x1="70" y1="220" x2="195" y2="147" stroke="#e74c3c" stroke-width="2.5"/>
  <line x1="195" y1="147" x2="240" y2="147" stroke="#e74c3c" stroke-width="2.5"/>

  <!-- Clipped region label -->
  <rect x="195" y="135" width="48" height="18" rx="3" fill="#e74c3c" opacity="0.1"/>
  <text x="219" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e74c3c">Clipped</text>

  <!-- Caption -->
  <text x="142" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Gradient = 0 when ρ exceeds 1+ε</text>
  <text x="142" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#27ae60">→ Prevents over-reinforcing good actions</text>

  <!-- Right: A < 0 -->
  <rect x="290" y="38" width="255" height="275" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="417" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c">Case ②: A_t &lt; 0 (Bad action, suppress)</text>

  <!-- Axes -->
  <line x1="330" y1="250" x2="525" y2="250" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrowBlack)"/>
  <line x1="330" y1="250" x2="330" y2="80" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrowBlack)"/>
  <text x="530" y="268" font-family="Arial, sans-serif" font-size="10" fill="#555">ρ_t</text>
  <text x="307" y="82" font-family="Arial, sans-serif" font-size="10" fill="#555">L</text>

  <!-- 1-ε and 1+ε labels -->
  <line x1="395" y1="250" x2="395" y2="245" stroke="#555" stroke-width="1"/>
  <text x="395" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">1-ε</text>
  <line x1="430" y1="250" x2="430" y2="245" stroke="#555" stroke-width="1"/>
  <text x="430" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">1</text>
  <line x1="470" y1="250" x2="470" y2="245" stroke="#555" stroke-width="1"/>
  <text x="470" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">1+ε</text>

  <!-- No-clip line (blue diagonal, going up since A<0) -->
  <line x1="345" y1="130" x2="515" y2="220" stroke="#3498db" stroke-width="2" opacity="0.5"/>
  <text x="507" y="225" font-family="Arial, sans-serif" font-size="9" fill="#3498db">No Clip</text>

  <!-- Clipped line (red) -->
  <line x1="345" y1="160" x2="395" y2="160" stroke="#e74c3c" stroke-width="2.5"/>
  <line x1="395" y1="160" x2="515" y2="230" stroke="#e74c3c" stroke-width="2.5"/>

  <!-- Clipped region label -->
  <rect x="345" y="148" width="48" height="18" rx="3" fill="#e74c3c" opacity="0.1"/>
  <text x="369" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e74c3c">Clipped</text>

  <!-- Caption -->
  <text x="417" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Gradient = 0 when ρ drops below 1-ε</text>
  <text x="417" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">→ Prevents over-suppressing bad actions</text>
</svg>
