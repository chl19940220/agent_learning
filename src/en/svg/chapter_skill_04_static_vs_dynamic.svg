<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" width="700" height="230">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arr11" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="700" height="230" fill="#f0f4f8" rx="14"/>
  <text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Static Discovery vs Dynamic Discovery</text>

  <!-- Static discovery -->
  <rect x="20" y="42" width="320" height="82" rx="10" fill="#e74c3c" opacity="0.08" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="180" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">🔤 Static Discovery (Keyword Matching)</text>
  <text x="40" y="82" font-size="11" fill="#555">Query: "Analyze customer churn rate"</text>
  <text x="40" y="100" font-size="11" fill="#555">Matches: tags contain "analysis" → 3 Agents found</text>
  <text x="40" y="118" font-size="11" fill="#e74c3c">⚠️ Imprecise, may return unrelated "text analysis"</text>

  <!-- Dynamic discovery -->
  <rect x="360" y="42" width="320" height="82" rx="10" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="1.5"/>
  <text x="520" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">🧠 Dynamic Discovery (Semantic Retrieval)</text>
  <text x="380" y="82" font-size="11" fill="#555">Query: "Analyze customer churn rate"</text>
  <text x="380" y="100" font-size="11" fill="#555">Embedding vector → semantic similarity score</text>
  <text x="380" y="118" font-size="11" fill="#27ae60">✅ Precise match "customer behavior analysis" (0.92)</text>

  <!-- Comparison results -->
  <rect x="20" y="140" width="320" height="75" rx="10" fill="#e74c3c" opacity="0.05"/>
  <text x="40" y="165" font-size="11" fill="#555">Result: "Text Analysis Agent" ❌</text>
  <text x="40" y="185" font-size="11" fill="#555">Result: "Data Analysis Agent" 🤷</text>
  <text x="40" y="205" font-size="11" fill="#555">Result: "Customer Analysis Agent" ✅</text>

  <rect x="360" y="140" width="320" height="75" rx="10" fill="#27ae60" opacity="0.05"/>
  <text x="380" y="165" font-size="11" fill="#27ae60">→ "Customer Behavior Analysis" (score 0.92) ✅</text>
  <text x="380" y="185" font-size="11" fill="#888">→ "Sales Data Analysis" (score 0.71)</text>
  <text x="380" y="205" font-size="11" fill="#ccc">→ "Text Sentiment Analysis" (score 0.45) ✘</text>
</svg>
