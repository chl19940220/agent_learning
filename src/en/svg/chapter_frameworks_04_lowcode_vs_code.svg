<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="640" height="300">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="640" height="300" rx="14" fill="#f0f4f8"/>
  <text x="320" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Low-Code vs Code Development</text>

  <!-- Low-Code Platform -->
  <rect x="20" y="50" width="280" height="220" rx="12" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <rect x="20" y="50" width="280" height="40" rx="12" fill="#27ae60"/>
  <rect x="20" y="76" width="280" height="14" fill="#27ae60"/>
  <text x="160" y="76" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🎨 Low-Code Platform</text>
  <text x="160" y="92" text-anchor="middle" font-size="11" fill="#d5f5e3">Dify / Coze / n8n</text>

  <text x="40" y="118" font-size="12" fill="#27ae60" font-weight="bold">✅ Advantages</text>
  <text x="40" y="136" font-size="11" fill="#2c3e50">• Quick to start, no programming required</text>
  <text x="40" y="152" font-size="11" fill="#2c3e50">• Visual, intuitive workflow display</text>
  <text x="40" y="168" font-size="11" fill="#2c3e50">• Built-in components, ready out of the box</text>
  <text x="40" y="184" font-size="11" fill="#2c3e50">• Ideal for business users building on their own</text>

  <line x1="30" y1="196" x2="290" y2="196" stroke="#ecf0f1" stroke-width="1"/>
  <text x="40" y="214" font-size="12" fill="#e74c3c" font-weight="bold">❌ Limitations</text>
  <text x="40" y="232" font-size="11" fill="#7f8c8d">• Limited customization capability</text>
  <text x="40" y="248" font-size="11" fill="#7f8c8d">• Hard to express complex logic</text>
  <text x="40" y="264" font-size="11" fill="#7f8c8d">• Vendor lock-in risk</text>

  <!-- Code Development -->
  <rect x="340" y="50" width="280" height="220" rx="12" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <rect x="340" y="50" width="280" height="40" rx="12" fill="#3498db"/>
  <rect x="340" y="76" width="280" height="14" fill="#3498db"/>
  <text x="480" y="76" text-anchor="middle" font-size="14" font-weight="bold" fill="white">💻 Code Development</text>
  <text x="480" y="92" text-anchor="middle" font-size="11" fill="#d6eaf8">LangChain / LangGraph</text>

  <text x="360" y="118" font-size="12" fill="#3498db" font-weight="bold">✅ Advantages</text>
  <text x="360" y="136" font-size="11" fill="#2c3e50">• Fully customizable, highly flexible</text>
  <text x="360" y="152" font-size="11" fill="#2c3e50">• Handles complex business logic</text>
  <text x="360" y="168" font-size="11" fill="#2c3e50">• Better performance and scalability</text>
  <text x="360" y="184" font-size="11" fill="#2c3e50">• No vendor lock-in</text>

  <line x1="350" y1="196" x2="610" y2="196" stroke="#ecf0f1" stroke-width="1"/>
  <text x="360" y="214" font-size="12" fill="#e74c3c" font-weight="bold">❌ Limitations</text>
  <text x="360" y="232" font-size="11" fill="#7f8c8d">• Requires programming knowledge</text>
  <text x="360" y="248" font-size="11" fill="#7f8c8d">• Longer development cycle</text>
  <text x="360" y="264" font-size="11" fill="#7f8c8d">• Higher maintenance cost</text>

  <!-- Bottom Recommendation -->
  <text x="320" y="288" text-anchor="middle" font-size="11" fill="#e67e22" font-weight="bold">💡 Best Practice: Use low-code to quickly validate business value, then implement in code for precision</text>
</svg>
