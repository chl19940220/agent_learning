<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="700" height="200" fill="#f8f9fa" rx="12"/>
  <text x="350" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">Act Phase: Tool Call Execution Flow</text>

  <!-- Step 1 -->
  <rect x="20" y="55" width="120" height="55" rx="8" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="1.5"/>
  <text x="80" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">Receive Decision</text>
  <text x="80" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Action plan from</text>
  <text x="80" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">think phase</text>

  <path d="M 143 82 L 163 82" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="166" y="55" width="120" height="55" rx="8" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="1.5"/>
  <text x="226" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3498db">Parse Parameters</text>
  <text x="226" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Tool name</text>
  <text x="226" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Call arguments</text>

  <path d="M 289 82 L 309 82" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="312" y="45" width="140" height="75" rx="8" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="2"/>
  <text x="382" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9b59b6">Call Tool Function</text>
  <text x="382" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Search engine</text>
  <text x="382" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Math / API</text>
  <text x="382" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Code execution</text>

  <path d="M 455 82 L 475 82" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="478" y="55" width="120" height="55" rx="8" fill="#e67e22" opacity="0.15" stroke="#e67e22" stroke-width="1.5"/>
  <text x="538" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e67e22">Get Result</text>
  <text x="538" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Tool return value</text>
  <text x="538" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Success / Error</text>

  <path d="M 601 82 L 621 82" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <rect x="624" y="55" width="55" height="55" rx="8" fill="#4dabf7" opacity="0.15" stroke="#4dabf7" stroke-width="1.5"/>
  <text x="651" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2980b9">Feedback</text>
  <text x="651" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">to perceive</text>
  <text x="651" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">phase</text>

  <!-- Stage label -->
  <rect x="20" y="140" width="660" height="45" rx="8" fill="#f3ffe3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="350" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">🦸 Act Phase: Converts LLM decisions into real tool calls, feeds results back to the perceive phase</text>
  <text x="350" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Tool calls are the only way an Agent interacts with the external world</text>
</svg>
