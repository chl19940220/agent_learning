<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="sc" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e67e22"/>
    </marker>
  </defs>
  <rect width="800" height="360" rx="12" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Search Engine + Calculator Agent Architecture</text>

  <!-- User question -->
  <rect x="250" y="50" width="300" height="35" rx="8" fill="#2980b9" opacity="0.25" stroke="#2980b9" stroke-width="2"/>
  <text x="400" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">💬 "How far is Earth to the Moon? How many seconds for light to travel?"</text>

  <line x1="400" y1="85" x2="400" y2="110" stroke="#e67e22" stroke-width="1.5" marker-end="url(#sc)"/>

  <!-- ReAct loop -->
  <rect x="150" y="110" width="500" height="45" rx="8" fill="#e67e22" opacity="0.15" stroke="#e67e22" stroke-width="2"/>
  <text x="400" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">🧠 ReAct Reasoning Loop</text>
  <text x="400" y="147" text-anchor="middle" font-size="10" fill="#888">Thought → Action → Observation → ... → Final Answer</text>

  <!-- Step breakdown -->
  <rect x="20" y="170" width="185" height="110" rx="8" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="112" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#3498db">Step 1: Search</text>
  <text x="32" y="210" font-size="11" fill="#444">🔍 web_search(</text>
  <text x="32" y="226" font-size="11" fill="#444">  "Earth Moon distance")</text>
  <text x="32" y="248" font-size="11" fill="#27ae60">→ 384,400 km</text>
  <text x="32" y="266" font-size="10" fill="#888">Source: NASA data</text>

  <rect x="215" y="170" width="185" height="110" rx="8" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="2"/>
  <text x="307" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">Step 2: Search</text>
  <text x="227" y="210" font-size="11" fill="#444">🔍 web_search(</text>
  <text x="227" y="226" font-size="11" fill="#444">  "speed of light km/s")</text>
  <text x="227" y="248" font-size="11" fill="#27ae60">→ 299,792 km/s</text>
  <text x="227" y="266" font-size="10" fill="#888">Physical constant confirmed</text>

  <rect x="410" y="170" width="185" height="110" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="502" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">Step 3: Calculate</text>
  <text x="422" y="210" font-size="11" fill="#444">🧮 calculator(</text>
  <text x="422" y="226" font-size="11" fill="#444">  384400 / 299792)</text>
  <text x="422" y="248" font-size="11" fill="#27ae60">→ 1.282 seconds</text>
  <text x="422" y="266" font-size="10" fill="#888">Accurate to decimal</text>

  <rect x="605" y="170" width="175" height="110" rx="8" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="692" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">Step 4: Integrate</text>
  <text x="617" y="210" font-size="11" fill="#444">📝 Generate answer</text>
  <text x="617" y="230" font-size="11" fill="#444">Cite data sources</text>
  <text x="617" y="250" font-size="11" fill="#444">Show reasoning steps</text>
  <text x="617" y="266" font-size="10" fill="#888">Traceable &amp; verifiable</text>

  <!-- Tool stack -->
  <rect x="20" y="295" width="760" height="50" rx="8" fill="#e74c3c" opacity="0.08" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="400" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">The Power of Tool Combination</text>
  <text x="200" y="335" text-anchor="middle" font-size="11" fill="#555">🔍 Search Engine: retrieve real-time info</text>
  <text x="500" y="335" text-anchor="middle" font-size="11" fill="#555">🧮 Calculator: precise math reasoning</text>
  <text x="700" y="335" text-anchor="middle" font-size="11" fill="#555">Combined &gt; Single</text>
</svg>
