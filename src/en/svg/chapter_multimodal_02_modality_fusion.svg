<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <rect width="760" height="380" fill="#f0f4f8" rx="14"/>
  <text x="380" y="36" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Multimodal Agent Design Patterns</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- Left: Input modalities -->
  <rect x="30" y="70" width="120" height="40" rx="10" fill="#3498db" opacity="0.2" stroke="#3498db" stroke-width="1.5"/>
  <text x="90" y="95" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#3498db" font-weight="bold">📝 Text</text>

  <rect x="30" y="130" width="120" height="40" rx="10" fill="#27ae60" opacity="0.2" stroke="#27ae60" stroke-width="1.5"/>
  <text x="90" y="155" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#27ae60" font-weight="bold">🖼️ Image</text>

  <rect x="30" y="190" width="120" height="40" rx="10" fill="#e67e22" opacity="0.2" stroke="#e67e22" stroke-width="1.5"/>
  <text x="90" y="215" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#e67e22" font-weight="bold">🎤 Audio</text>

  <rect x="30" y="250" width="120" height="40" rx="10" fill="#9b59b6" opacity="0.2" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="90" y="275" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#9b59b6" font-weight="bold">🎬 Video</text>

  <!-- Arrows to center -->
  <line x1="150" y1="90" x2="230" y2="165" stroke="#7f8c8d" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="150" y1="150" x2="230" y2="165" stroke="#7f8c8d" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="150" y1="210" x2="230" y2="195" stroke="#7f8c8d" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="150" y1="270" x2="230" y2="195" stroke="#7f8c8d" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Center: Modality router -->
  <rect x="235" y="140" width="140" height="80" rx="14" fill="#e74c3c" opacity="0.15"/>
  <rect x="235" y="140" width="140" height="30" rx="14" fill="#e74c3c"/>
  <rect x="235" y="158" width="140" height="12" fill="#e74c3c"/>
  <text x="305" y="160" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">Modality Router</text>
  <text x="305" y="190" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">Detect input type</text>
  <text x="305" y="207" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">Select processing pipeline</text>

  <!-- Right: Processing pipelines -->
  <line x1="375" y1="155" x2="420" y2="100" stroke="#7f8c8d" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="375" y1="180" x2="420" y2="180" stroke="#7f8c8d" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="375" y1="205" x2="420" y2="260" stroke="#7f8c8d" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Text processing -->
  <rect x="425" y="75" width="150" height="50" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="1"/>
  <text x="500" y="96" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#3498db">GPT-4o-mini</text>
  <text x="500" y="114" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#7f8c8d">Text only (low cost)</text>

  <!-- Multimodal processing -->
  <rect x="425" y="155" width="150" height="50" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1"/>
  <text x="500" y="176" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">GPT-4o</text>
  <text x="500" y="194" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#7f8c8d">Image + text understanding</text>

  <!-- Audio processing -->
  <rect x="425" y="235" width="150" height="50" rx="10" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="1"/>
  <text x="500" y="256" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#e67e22">Whisper → LLM</text>
  <text x="500" y="274" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#7f8c8d">Speech-to-text → reasoning</text>

  <!-- Far right: Output -->
  <line x1="575" y1="100" x2="625" y2="180" stroke="#7f8c8d" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="575" y1="180" x2="625" y2="180" stroke="#7f8c8d" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="575" y1="260" x2="625" y2="180" stroke="#7f8c8d" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="630" y="150" width="100" height="60" rx="14" fill="#2c3e50" opacity="0.1" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="680" y="176" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Unified Response</text>
  <text x="680" y="196" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#7f8c8d">Text / Image / Audio</text>

  <!-- Bottom note -->
  <rect x="80" y="315" width="600" height="40" rx="10" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <text x="380" y="340" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#7f8c8d">💡 Recommended: extend an existing text agent with multimodal tools (Pattern 2) for incremental adoption</text>
</svg>
