  <line x1="610" y1="265" x2="650" y2="255" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arr-lc02)"/>
  <line x1="610" y1="275" x2="650" y2="295" stroke="#3498db" stroke-width="1.5" marker-end="url(#arr-lc02)"/>
