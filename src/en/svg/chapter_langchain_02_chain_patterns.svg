  </defs>

  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Four LCEL Chain Patterns</text>

  <!--=====1. [CN] =====-->
