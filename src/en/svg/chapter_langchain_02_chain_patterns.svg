  <line x1="130" y1="258" x2="170" y2="258" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr-lc02)"/>
  <line x1="130" y1="268" x2="170" y2="305" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr-lc02)"/>
  <line x1="130" y1="275" x2="170" y2="345" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr-lc02)"/>

