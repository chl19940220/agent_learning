  <text x="214" y="262" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="white">💬 Sentiment analysis</text>

  <rect x="172" y="290" width="85" height="26" rx="5" fill="#3498db" opacity="0.8"/>
  <text x="214" y="307" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="white">📝 Generate summary</text>

  <rect x="172" y="335" width="85" height="26" rx="5" fill="#27ae60" opacity="0.8"/>
  <text x="214" y="352" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="white">🔑 Extract keywords</text>

  <!-- [CN] -->
  <line x1="257" y1="258" x2="300" y2="305" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr-lc02)"/>
  <line x1="257" y1="303" x2="300" y2="305" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr-lc02)"/>
  <line x1="257" y1="348" x2="300" y2="305" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr-lc02)"/>

  <rect x="302" y="290" width="58" height="30" rx="6" fill="#8e44ad" filter="url(#sh-lc02)"/>
  <text x="331" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">{dict}</text>

  <text x="205" y="390" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#777">RunnableParallel: Multiple chains execute simultaneously, results merged as dict</text>

  <!--=====4. [CN] =====-->
  <rect x="420" y="210" width="350" height="200" rx="10" fill="#e67e22" opacity="0.06" stroke="#e67e22" stroke-width="1.5"/>
  <text x="595" y="232" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#e67e22">④ Conditional Chain: Dynamic routing</text>

  <!-- Input -->
  <rect x="435" y="260" width="70" height="30" rx="6" fill="#e67e22" filter="url(#sh-lc02)"/>
  <text x="470" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Input</text>

  <line x1="505" y1="275" x2="535" y2="275" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr-lc02)"/>

  <!-- Classifyifier -->
  <polygon points="575,250 610,275 575,300 540,275" fill="#f39c12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="575" y="272" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="bold" fill="white">Classify</text>
  <text x="575" y="283" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" font-weight="bold" fill="white">ifier</text>

