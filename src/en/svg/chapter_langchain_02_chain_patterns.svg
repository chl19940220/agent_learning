  <rect x="60" y="250" width="70" height="30" rx="6" fill="#8e44ad" filter="url(#sh-lc02)"/>
  <text x="95" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Input</text>

