  <text x="702" y="257" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="white">🔧 Tech Support</text>

  <rect x="652" y="280" width="100" height="26" rx="5" fill="#3498db" opacity="0.8"/>
  <text x="702" y="297" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="white">💼 Business Inquiry</text>

  <rect x="652" y="320" width="100" height="26" rx="5" fill="#27ae60" opacity="0.8"/>
  <text x="702" y="337" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="white">😠 Complaint Handling</text>

  <text x="595" y="374" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#777">RunnableBranch: Choose different processing branches by condition</text>
  <text x="595" y="392" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#999">⚡ Classify once then route, avoid redundant LLM calls</text>

  <!--Bottom [CN] -->
  <rect x="30" y="418" width="740" height="16" rx="4" fill="#2c3e50" opacity="0.04"/>
  <text x="400" y="430" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#555">💡 LCEL | symbol chains components: previous output becomes next input, like Unix pipes</text>
