  <rect x="30" y="210" width="350" height="200" rx="10" fill="#9b59b6" opacity="0.06" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="205" y="232" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#8e44ad">③ Parallel Chain: Multi-path processing</text>

