  <rect x="420" y="60" width="350" height="130" rx="10" fill="#27ae60" opacity="0.06" stroke="#27ae60" stroke-width="1.5"/>
  <text x="595" y="80" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">② Sequential Chain: Multi-step in series</text>

  <!-- [CN] 1-->
  <rect x="438" y="95" width="75" height="36" rx="6" fill="#27ae60" filter="url(#sh-lc02)"/>
  <text x="475" y="110" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="white">Extract keywords</text>
  <text x="475" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#d4f0e0">Chain 1</text>

  <line x1="513" y1="113" x2="540" y2="113" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr-lc02)"/>

  <!-- [CN] -->
  <rect x="542" y="95" width="85" height="36" rx="6" fill="#f39c12" filter="url(#sh-lc02)"/>
  <text x="584" y="110" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="white">🔀 Merge inputs</text>
  <text x="584" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fef0d4">Parallel</text>

  <line x1="627" y1="113" x2="654" y2="113" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr-lc02)"/>

  <!-- [CN] 2-->
  <rect x="656" y="95" width="75" height="36" rx="6" fill="#27ae60" filter="url(#sh-lc02)"/>
  <text x="693" y="110" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="white">Generate summary</text>
  <text x="693" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#d4f0e0">Chain 2</text>

  <!-- Passthrough Arrow -->
  <path d="M475,131 Q475,148 540,148 L584,148 Q620,148 620,131" fill="none" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="548" y="158" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="8" fill="#f39c12">Passthrough (original text)</text>

  <text x="595" y="178" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#777">Previous result + original input → next step</text>

