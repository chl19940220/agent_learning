<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 620" width="640" height="620">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e74c3c"/>
    </marker>
  </defs>
  <rect width="640" height="620" rx="14" fill="#f0f4f8"/>
  <text x="320" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Six-Stage Permission Decision Pipeline</text>

  <!---->
  <rect x="220" y="42" width="200" height="32" rx="16" fill="#2c3e50"/>
  <text x="320" y="63" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Tool Call Request Enters Permission System</text>
  <line x1="320" y1="74" x2="320" y2="93" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!--Stage1-->
  <rect x="80" y="96" width="480" height="52" rx="8" fill="#fff9e6" stroke="#FFC107" stroke-width="1.5"/>
  <text x="320" y="116" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">Stage 1: Static Rule Check</text>
  <text x="320" y="133" text-anchor="middle" font-size="11" fill="#7f8c8d">Check allowedTools / deniedTools in settings.json and Project-level Rules</text>
  <text x="320" y="147" text-anchor="middle" font-size="10" fill="#e67e22">→ Allow / Deny End Directly · Ask Continues</text>
  <line x1="320" y1="148" x2="320" y2="167" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!--Stage2-->
  <rect x="80" y="170" width="480" height="52" rx="8" fill="#fff9e6" stroke="#FFC107" stroke-width="1.5"/>
  <text x="320" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">Stage 2: Tool Self-check</text>
  <text x="320" y="207" text-anchor="middle" font-size="11" fill="#7f8c8d">Calls Tool checkPermissions · BashTool Analyzes Command Danger Level</text>
  <text x="320" y="221" text-anchor="middle" font-size="10" fill="#7f8c8d">Read-only Tool Checks if in Forbidden Directory</text>
  <line x1="320" y1="222" x2="320" y2="241" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!--Stage3-->
  <rect x="80" y="244" width="480" height="52" rx="8" fill="#fff9e6" stroke="#FFC107" stroke-width="1.5"/>
  <text x="320" y="264" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">Stage 3: Always Allow Mode Check</text>
  <text x="320" y="281" text-anchor="middle" font-size="11" fill="#7f8c8d">bypassPermissions Mode → Direct Allow</text>
  <text x="320" y="295" text-anchor="middle" font-size="10" fill="#7f8c8d">Read-only Tools Read/Glob/Grep → Usually Direct Allow</text>
  <line x1="320" y1="296" x2="320" y2="315" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!--Stage4-->
  <rect x="80" y="318" width="480" height="52" rx="8" fill="#fff9e6" stroke="#FFC107" stroke-width="1.5"/>
  <text x="320" y="338" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">Stage 4: Normalize Decision Result</text>
  <text x="320" y="355" text-anchor="middle" font-size="11" fill="#7f8c8d">Normalize Stage Results to Standard Format</text>
  <text x="320" y="369" text-anchor="middle" font-size="10" fill="#7f8c8d">{ decision: allow/deny/ask, reason: string }</text>
  <line x1="320" y1="370" x2="320" y2="389" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!--Stage5-->
  <rect x="80" y="392" width="480" height="52" rx="8" fill="#fff9e6" stroke="#FFC107" stroke-width="1.5"/>
  <text x="320" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">Stage 5: Outer Post-processing</text>
  <text x="320" y="429" text-anchor="middle" font-size="11" fill="#7f8c8d">dontAsk Mode: Auto-Allow Non-dangerous Operations</text>
  <text x="320" y="443" text-anchor="middle" font-size="10" fill="#7f8c8d">Headless Mode Fallback: Auto-Deny Dangerous Operations</text>
  <line x1="320" y1="444" x2="320" y2="463" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!--Stage6-->
  <rect x="80" y="466" width="480" height="52" rx="8" fill="#fce8e8" stroke="#F44336" stroke-width="1.5"/>
  <text x="320" y="486" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">Stage 6: Auto Mode AI Classifier (Internal Feature)</text>
  <text x="320" y="503" text-anchor="middle" font-size="11" fill="#7f8c8d">Requires TRANSCRIPT_CLASSIFIER Feature Gate Enabled</text>
  <text x="320" y="517" text-anchor="middle" font-size="10" fill="#7f8c8d">Uses Lightweight AI to Judge Safety (External Users Cannot Access)</text>
  <line x1="320" y1="518" x2="320" y2="537" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!---->
  <rect x="180" y="540" width="280" height="36" rx="18" fill="#2c3e50"/>
  <text x="320" y="563" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Final Decision: Execute / Deny / Popup Ask</text>

  <!--Allow-->
  <line x1="560" y1="270" x2="590" y2="270" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="595" y="274" font-size="10" fill="#27ae60" font-weight="bold">Allow</text>
  <line x1="560" y1="270" x2="560" y2="558" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="560" y1="558" x2="462" y2="558" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
</svg>
