<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 390" width="800" height="390">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>

  <rect width="800" height="390" fill="#f8f9fa" rx="14"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Five Structured Output Approaches: From Soft to Hard Constraints</text>
  <text x="400" y="46" text-anchor="middle" font-size="10" fill="#7f8c8d">Stronger constraint to the right; Approach 2 for legacy/small models; Approach 3 for cloud; Approach 4 for local</text>

  <!-- Constraint axis -->
  <line x1="20" y1="352" x2="778" y2="352" stroke="#bdc3c7" stroke-width="2"/>
  <path d="M 773 349 L 779 352 L 773 355" fill="#bdc3c7"/>
  <text x="20"  y="370" text-anchor="middle" font-size="9" fill="#e74c3c">❌ Soft Constraint</text>
  <text x="779" y="370" text-anchor="middle" font-size="9" fill="#27ae60">✅ Hard Constraint</text>
  <text x="400" y="370" text-anchor="middle" font-size="9" fill="#7f8c8d">Constraint Strength →</text>

  <!-- Approach 1: Pure Prompt -->
  <rect x="10" y="62" width="128" height="272" rx="10" fill="#fef5f5" stroke="#e74c3c" stroke-width="2"/>
  <rect x="10" y="62" width="128" height="34" rx="10" fill="#e74c3c" opacity="0.85"/>
  <rect x="10" y="84"  width="128" height="12" fill="#e74c3c" opacity="0.85"/>
  <text x="74"  y="83" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Approach 1</text>
  <text x="74"  y="108" text-anchor="middle" font-size="9" font-weight="bold" fill="#e74c3c">Pure Prompt</text>
  <text x="74"  y="122" text-anchor="middle" font-size="8" fill="#7f8c8d">❌ Not for production</text>
  <line x1="22" y1="130" x2="126" y2="130" stroke="#e74c3c" stroke-width="0.5" opacity="0.4"/>
  <text x="22"  y="146" font-size="8" fill="#555">Relies on model self-compliance</text>
  <text x="22"  y="159" font-size="8" fill="#e74c3c">• Markdown wrapping</text>
  <text x="22"  y="172" font-size="8" fill="#e74c3c">• Trailing extra text</text>
  <text x="22"  y="185" font-size="8" fill="#e74c3c">• Single quotes/comments</text>
  <text x="22"  y="198" font-size="8" fill="#e74c3c">• Type/hallucination errors</text>
  <text x="22"  y="211" font-size="8" fill="#e74c3c">• Truncated/unclosed</text>
  <rect x="18" y="294" width="112" height="32" rx="7" fill="#e74c3c" opacity="0.08"/>
  <text x="74"  y="308" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="bold">Guarantee: 0%</text>
  <text x="74"  y="320" text-anchor="middle" font-size="8" fill="#7f8c8d">Prototype only</text>
  <circle cx="74" cy="352" r="8" fill="#e74c3c" opacity="0.7"/>
  <text x="74"  y="356" text-anchor="middle" font-size="8" fill="#fff">Soft</text>

  <!-- Approach 2: jsonrepair -->
  <rect x="148" y="62" width="138" height="272" rx="10" fill="#fdf2fb" stroke="#9b59b6" stroke-width="2"/>
  <rect x="148" y="62" width="138" height="34" rx="10" fill="#9b59b6" opacity="0.85"/>
  <rect x="148" y="84"  width="138" height="12" fill="#9b59b6" opacity="0.85"/>
  <text x="217" y="83" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Approach 2 🛠</text>
  <text x="217" y="108" text-anchor="middle" font-size="9" font-weight="bold" fill="#9b59b6">jsonrepair</text>
  <text x="217" y="122" text-anchor="middle" font-size="8" fill="#7f8c8d">⚠ Format repair fallback</text>
  <line x1="160" y1="130" x2="274" y2="130" stroke="#9b59b6" stroke-width="0.5" opacity="0.4"/>
  <text x="160" y="146" font-size="8" fill="#555">pip install json-repair</text>
  <text x="160" y="159" font-size="8" fill="#27ae60">✓ Fixes single quotes/comments</text>
  <text x="160" y="172" font-size="8" fill="#27ae60">✓ Fixes truncated JSON</text>
  <text x="160" y="185" font-size="8" fill="#27ae60">✓ Fixes Markdown blocks</text>
  <text x="160" y="198" font-size="8" fill="#27ae60">✓ Fixes trailing commas</text>
  <text x="160" y="211" font-size="8" fill="#e74c3c">✗ Does NOT fix type errors</text>
  <text x="160" y="224" font-size="8" fill="#e74c3c">✗ Does NOT fix hallucinated fields</text>
  <text x="160" y="237" font-size="8" fill="#555">Use with Pydantic</text>
  <rect x="156" y="270" width="122" height="44" rx="7" fill="#9b59b6" opacity="0.08"/>
  <text x="217" y="285" text-anchor="middle" font-size="9" fill="#9b59b6" font-weight="bold">Guarantee: Format Valid</text>
  <text x="217" y="298" text-anchor="middle" font-size="8" fill="#555">Legacy API / small models</text>
  <text x="217" y="310" text-anchor="middle" font-size="8" fill="#555">No extra latency</text>
  <circle cx="217" cy="352" r="8" fill="#9b59b6" opacity="0.7"/>
  <text x="217" y="356" text-anchor="middle" font-size="8" fill="#fff">Fix</text>

  <!-- Approach 3: API Native -->
  <rect x="296" y="62" width="148" height="272" rx="10" fill="#e8f8f5" stroke="#1abc9c" stroke-width="2.5"/>
  <rect x="296" y="62" width="148" height="34" rx="10" fill="#1abc9c" opacity="0.9"/>
  <rect x="296" y="84"  width="148" height="12" fill="#1abc9c" opacity="0.9"/>
  <text x="370" y="83" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Approach 3 ⭐ Preferred</text>
  <text x="370" y="107" text-anchor="middle" font-size="9" font-weight="bold" fill="#1abc9c">API Native Structured Output</text>
  <text x="370" y="122" text-anchor="middle" font-size="8" fill="#7f8c8d">✅ Recommended for cloud models</text>
  <line x1="308" y1="130" x2="432" y2="130" stroke="#1abc9c" stroke-width="0.5" opacity="0.4"/>
  <text x="308" y="146" font-size="8" fill="#555">OpenAI .parse()</text>
  <text x="308" y="159" font-size="8" fill="#555">Claude tool_choice</text>
  <text x="308" y="172" font-size="8" fill="#555">Gemini response_schema</text>
  <line x1="308" y1="182" x2="432" y2="182" stroke="#1abc9c" stroke-width="0.5" opacity="0.3"/>
  <text x="308" y="196" font-size="8" fill="#27ae60">• Server-side constrained decoding</text>
  <text x="308" y="209" font-size="8" fill="#27ae60">• Schema serialization validation</text>
  <text x="308" y="222" font-size="8" fill="#27ae60">• 100% format guarantee</text>
  <rect x="304" y="264" width="132" height="44" rx="7" fill="#1abc9c" opacity="0.1"/>
  <text x="370" y="279" text-anchor="middle" font-size="9" fill="#1abc9c" font-weight="bold">Guarantee: 99%+</text>
  <text x="370" y="293" text-anchor="middle" font-size="8" fill="#555">GPT-4o / Claude / Gemini</text>
  <text x="370" y="305" text-anchor="middle" font-size="8" fill="#555">Latency impact: &lt;5ms</text>
  <circle cx="370" cy="352" r="8" fill="#1abc9c" opacity="0.85"/>
  <text x="370" y="356" text-anchor="middle" font-size="8" fill="#fff">Hard</text>

  <!-- Approach 4: Constrained Decoding -->
  <rect x="454" y="62" width="148" height="272" rx="10" fill="#e8f4fd" stroke="#3498db" stroke-width="2.5"/>
  <rect x="454" y="62" width="148" height="34" rx="10" fill="#3498db" opacity="0.85"/>
  <rect x="454" y="84"  width="148" height="12" fill="#3498db" opacity="0.85"/>
  <text x="528" y="83" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Approach 4 ⭐ Local</text>
  <text x="528" y="107" text-anchor="middle" font-size="9" font-weight="bold" fill="#3498db">Constrained Decoding</text>
  <text x="528" y="122" text-anchor="middle" font-size="8" fill="#7f8c8d">✅ Recommended for local/open models</text>
  <line x1="466" y1="130" x2="590" y2="130" stroke="#3498db" stroke-width="0.5" opacity="0.4"/>
  <text x="466" y="146" font-size="8" fill="#555">Outlines (any HF model)</text>
  <text x="466" y="159" font-size="8" fill="#555">vLLM guided_json</text>
  <text x="466" y="172" font-size="8" fill="#555">LM-Format-Enforcer</text>
  <line x1="466" y1="182" x2="590" y2="182" stroke="#3498db" stroke-width="0.5" opacity="0.3"/>
  <text x="466" y="196" font-size="8" fill="#27ae60">• FSM + logit masking</text>
  <text x="466" y="209" font-size="8" fill="#27ae60">• Token-level forced constraints</text>
  <text x="466" y="222" font-size="8" fill="#27ae60">• Invalid token probability → 0</text>
  <rect x="462" y="264" width="132" height="44" rx="7" fill="#3498db" opacity="0.08"/>
  <text x="528" y="279" text-anchor="middle" font-size="9" fill="#3498db" font-weight="bold">Guarantee: 100%</text>
  <text x="528" y="293" text-anchor="middle" font-size="8" fill="#555">Llama / Qwen / DeepSeek</text>
  <text x="528" y="305" text-anchor="middle" font-size="8" fill="#555">Latency: +10~30ms</text>
  <circle cx="528" cy="352" r="8" fill="#3498db" opacity="0.85"/>
  <text x="528" y="356" text-anchor="middle" font-size="8" fill="#fff">Hard</text>

  <!-- Approach 5: Pydantic + Retry -->
  <rect x="612" y="62" width="176" height="272" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <rect x="612" y="62" width="176" height="34" rx="10" fill="#f39c12" opacity="0.85"/>
  <rect x="612" y="84"  width="176" height="12" fill="#f39c12" opacity="0.85"/>
  <text x="700" y="83" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Approach 5 🛡 Fallback Validation</text>
  <text x="700" y="107" text-anchor="middle" font-size="9" font-weight="bold" fill="#e67e22">Pydantic + Retry</text>
  <text x="700" y="122" text-anchor="middle" font-size="8" fill="#7f8c8d">⚠ Stack on top of other approaches</text>
  <line x1="624" y1="130" x2="776" y2="130" stroke="#f39c12" stroke-width="0.5" opacity="0.4"/>
  <text x="624" y="146" font-size="8" fill="#555">Business logic Validator</text>
  <text x="624" y="159" font-size="8" fill="#555">Retry with error context</text>
  <text x="624" y="172" font-size="8" fill="#555">extra="forbid" anti-hallucination</text>
  <line x1="624" y1="182" x2="776" y2="182" stroke="#f39c12" stroke-width="0.5" opacity="0.3"/>
  <text x="624" y="196" font-size="8" fill="#27ae60">• Email/phone format</text>
  <text x="624" y="209" font-size="8" fill="#27ae60">• Numeric range (ge/le)</text>
  <text x="624" y="222" font-size="8" fill="#27ae60">• Enum values (Literal)</text>
  <text x="624" y="235" font-size="8" fill="#27ae60">• Custom business rules</text>
  <rect x="620" y="264" width="160" height="44" rx="7" fill="#f39c12" opacity="0.08"/>
  <text x="700" y="279" text-anchor="middle" font-size="9" fill="#e67e22" font-weight="bold">Final Guarantee: 99%+</text>
  <text x="700" y="293" text-anchor="middle" font-size="8" fill="#555">May add 1~2 extra LLM calls</text>
  <text x="700" y="305" text-anchor="middle" font-size="8" fill="#555">Always stack with Approach 3/4</text>
  <circle cx="700" cy="352" r="8" fill="#f39c12" opacity="0.85"/>
  <text x="700" y="356" text-anchor="middle" font-size="8" fill="#fff">+</text>
</svg>
