<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="520" height="400" rx="12" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="260" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">🏛️ CoALA Cognitive Architecture</text>

  <!-- Memory System module -->
  <rect x="25" y="50" width="470" height="130" rx="10" fill="#3498db" fill-opacity="0.1" stroke="#3498db" stroke-width="2"/>
  <text x="45" y="72" font-size="14" font-weight="bold" fill="#3498db">📦 Memory System</text>

  <!-- Three memory types -->
  <rect x="40" y="82" width="140" height="48" rx="8" fill="#3498db" fill-opacity="0.2" stroke="#3498db" stroke-width="1.5"/>
  <text x="110" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Working Memory</text>
  <text x="110" y="120" text-anchor="middle" font-size="10" fill="#555">Current task state, reasoning steps</text>

  <rect x="190" y="82" width="140" height="48" rx="8" fill="#9b59b6" fill-opacity="0.2" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="260" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Episodic Memory</text>
  <text x="260" y="120" text-anchor="middle" font-size="10" fill="#555">Specific event memories</text>

  <rect x="340" y="82" width="140" height="48" rx="8" fill="#27ae60" fill-opacity="0.2" stroke="#27ae60" stroke-width="1.5"/>
  <text x="410" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Semantic Memory</text>
  <text x="410" y="120" text-anchor="middle" font-size="10" fill="#555">General knowledge and concepts</text>

  <text x="110" y="165" text-anchor="middle" font-size="9" fill="#888">Working Memory</text>
  <text x="260" y="165" text-anchor="middle" font-size="9" fill="#888">Episodic Memory</text>
  <text x="410" y="165" text-anchor="middle" font-size="9" fill="#888">Semantic Memory</text>

  <!-- Decision Process module -->
  <rect x="25" y="190" width="470" height="75" rx="10" fill="#f39c12" fill-opacity="0.1" stroke="#f39c12" stroke-width="2"/>
  <text x="45" y="212" font-size="14" font-weight="bold" fill="#f39c12">⚙️ Decision Process</text>

  <!-- Four decision steps -->
  <rect x="40" y="222" width="100" height="32" rx="8" fill="#f39c12" fill-opacity="0.2" stroke="#f39c12" stroke-width="1.5"/>
  <text x="90" y="243" text-anchor="middle" font-size="11" fill="#2c3e50">🔍 Retrieve</text>

  <rect x="150" y="222" width="100" height="32" rx="8" fill="#f39c12" fill-opacity="0.2" stroke="#f39c12" stroke-width="1.5"/>
  <text x="200" y="243" text-anchor="middle" font-size="11" fill="#2c3e50">🧠 Reason</text>

  <rect x="260" y="222" width="100" height="32" rx="8" fill="#f39c12" fill-opacity="0.2" stroke="#f39c12" stroke-width="1.5"/>
  <text x="310" y="243" text-anchor="middle" font-size="11" fill="#2c3e50">📝 Learn</text>

  <rect x="370" y="222" width="100" height="32" rx="8" fill="#f39c12" fill-opacity="0.2" stroke="#f39c12" stroke-width="1.5"/>
  <text x="420" y="243" text-anchor="middle" font-size="11" fill="#2c3e50">🎯 Act</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#888"/>
    </marker>
  </defs>
  <line x1="140" y1="238" x2="148" y2="238" stroke="#888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="250" y1="238" x2="258" y2="238" stroke="#888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="360" y1="238" x2="368" y2="238" stroke="#888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Action Space module -->
  <rect x="25" y="280" width="470" height="75" rx="10" fill="#e74c3c" fill-opacity="0.1" stroke="#e74c3c" stroke-width="2"/>
  <text x="45" y="302" font-size="14" font-weight="bold" fill="#e74c3c">🚀 Action Space</text>

  <rect x="40" y="312" width="215" height="32" rx="8" fill="#e74c3c" fill-opacity="0.15" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="147" y="333" text-anchor="middle" font-size="12" fill="#2c3e50">🔄 Internal Actions (reasoning, memory updates)</text>

  <rect x="265" y="312" width="215" height="32" rx="8" fill="#e74c3c" fill-opacity="0.15" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="372" y="333" text-anchor="middle" font-size="12" fill="#2c3e50">🌐 External Actions (tools, environment)</text>

  <!-- Module connections -->
  <line x1="260" y1="180" x2="260" y2="188" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>
  <line x1="260" y1="265" x2="260" y2="278" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>

  <!-- Footer -->
  <text x="260" y="392" text-anchor="middle" font-size="10" fill="#888">Source: Sumers et al., 2023 — Cognitive Architectures for Language Agents</text>

</svg>
