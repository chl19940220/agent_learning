<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420">
  <rect width="760" height="420" fill="#f0f4f8" rx="14"/>
  <text x="380" y="36" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Four Key Dimensions of Agent Evaluation</text>

  <!-- [CN] Block-->
  <!-- [CN] -->
  <rect x="40" y="65" width="320" height="150" rx="14" fill="#3498db" opacity="0.15"/>
  <rect x="40" y="65" width="320" height="40" rx="14" fill="#3498db"/>
  <rect x="40" y="91" width="320" height="14" fill="#3498db"/>
  <text x="200" y="92" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">📊 Functionality</text>
  <text x="60" y="130" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Task completion rate (Pass Rate)</text>
  <text x="60" y="150" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Answer accuracy (Accuracy)</text>
  <text x="60" y="170" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Tool call correctness rate</text>
  <text x="60" y="190" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Edge case handling ability</text>

  <!-- [CN] -->
  <rect x="400" y="65" width="320" height="150" rx="14" fill="#27ae60" opacity="0.15"/>
  <rect x="400" y="65" width="320" height="40" rx="14" fill="#27ae60"/>
  <rect x="400" y="91" width="320" height="14" fill="#27ae60"/>
  <text x="560" y="92" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">⚡ Efficiency</text>
  <text x="420" y="130" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Average response latency (Latency)</text>
  <text x="420" y="150" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Token consumption</text>
  <text x="420" y="170" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Loop steps (Steps to Complete)</text>
  <text x="420" y="190" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Cost per conversation ($/conversation)</text>

  <!-- [CN] -->
  <rect x="40" y="240" width="320" height="150" rx="14" fill="#e74c3c" opacity="0.15"/>
  <rect x="40" y="240" width="320" height="40" rx="14" fill="#e74c3c"/>
  <rect x="40" y="266" width="320" height="14" fill="#e74c3c"/>
  <text x="200" y="267" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">🛡️ Safety</text>
  <text x="60" y="305" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Prompt injection resistance rate</text>
  <text x="60" y="325" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Hallucination rate (Hallucination Rate)</text>
  <text x="60" y="345" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Data leakage risk assessment</text>
  <text x="60" y="365" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Out-of-bounds operation detection rate</text>

  <!-- [CN] -->
  <rect x="400" y="240" width="320" height="150" rx="14" fill="#9b59b6" opacity="0.15"/>
  <rect x="400" y="240" width="320" height="40" rx="14" fill="#9b59b6"/>
  <rect x="400" y="266" width="320" height="14" fill="#9b59b6"/>
  <text x="560" y="267" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="white">😊 User Experience (UX)</text>
  <text x="420" y="305" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Response naturalness (Naturalness)</text>
  <text x="420" y="325" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Interaction fluency</text>
  <text x="420" y="345" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• Error recovery experience</text>
  <text x="420" y="365" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2c3e50">• User satisfaction (CSAT)</text>

  <text x="380" y="410" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#95a5a6">The four dimensions are interconnected; comprehensive evaluation is needed to fully measure Agent performance</text>
</svg>
