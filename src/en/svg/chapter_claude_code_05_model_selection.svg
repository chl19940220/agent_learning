<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" width="680" height="260">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9b59b6"/>
    </marker>
  </defs>
  <rect width="680" height="260" rx="14" fill="#f0f4f8"/>
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Model Selection Strategy</text>

  <!-- Task type -->
  <rect x="270" y="48" width="140" height="36" rx="8" fill="#2c3e50"/>
  <text x="340" y="71" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Task Type</text>
  <line x1="340" y1="84" x2="340" y2="105" stroke="#2c3e50" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Diamond: complexity -->
  <polygon points="340,107 410,132 340,157 270,132" fill="#f39c12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="340" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Complexity?</text>
  <text x="340" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="white"></text>

  <!-- Simple → Haiku -->
  <line x1="270" y1="132" x2="160" y2="132" stroke="#27ae60" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="215" y="125" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">Simple</text>
  <rect x="30" y="112" width="128" height="60" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="94" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">💨 Haiku</text>
  <text x="94" y="150" text-anchor="middle" font-size="11" fill="#27ae60">Most economical</text>
  <text x="94" y="165" text-anchor="middle" font-size="10" fill="#7f8c8d">Formatting/comments</text>

  <!-- Everyday → Sonnet -->
  <line x1="340" y1="157" x2="340" y2="177" stroke="#3498db" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <text x="355" y="170" font-size="11" fill="#3498db" font-weight="bold">Everyday</text>
  <rect x="270" y="180" width="140" height="60" rx="8" fill="#dbeafe" stroke="#3498db" stroke-width="1.5"/>
  <text x="340" y="201" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">⚡ Sonnet</text>
  <text x="340" y="218" text-anchor="middle" font-size="11" fill="#3498db">Default recommendation</text>
  <text x="340" y="233" text-anchor="middle" font-size="10" fill="#7f8c8d">Bug fixes/code changes</text>

  <!-- Complex → Opus -->
  <line x1="410" y1="132" x2="520" y2="132" stroke="#9b59b6" stroke-width="1.8" marker-end="url(#arrow-purple)"/>
  <text x="465" y="125" text-anchor="middle" font-size="11" fill="#9b59b6" font-weight="bold">Complex</text>
  <rect x="522" y="112" width="128" height="60" rx="8" fill="#e8daef" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="586" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#6c3483">🚀 Opus</text>
  <text x="586" y="150" text-anchor="middle" font-size="11" fill="#9b59b6">/ultraplan</text>
  <text x="586" y="165" text-anchor="middle" font-size="10" fill="#7f8c8d">Architecture/refactoring</text>

  <!-- CI/CD -->
  <rect x="270" y="48" width="0" height="0" rx="0" fill="none"/>
  <line x1="94" y1="172" x2="94" y2="220" stroke="#3498db" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="94" y1="220" x2="268" y2="220" stroke="#3498db" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <text x="180" y="215" text-anchor="middle" font-size="10" fill="#3498db">CI/CD automated review → Sonnet</text>
</svg>
