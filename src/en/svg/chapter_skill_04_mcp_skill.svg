<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arr12" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="700" height="280" fill="#f0f4f8" rx="14"/>
  <text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Relationship Between MCP and Skills</text>

  <!-- MCP Server = tool provider -->
  <rect x="30" y="42" width="300" height="35" rx="8" fill="#3498db"/>
  <text x="180" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="white">MCP Server = Tool/Resource Provider</text>

  <!-- GitHub MCP -->
  <rect x="30" y="90" width="300" height="70" rx="10" fill="#3498db" opacity="0.1" stroke="#3498db" stroke-width="1.5"/>
  <text x="180" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#3498db">github-mcp-server</text>
  <text x="50" y="132" font-size="10" fill="#555">🔧 Tools: create_issue, list_repos, create_pr</text>
  <text x="50" y="150" font-size="10" fill="#27ae60">→ As skill: "GitHub Project Management Skill"</text>

  <!-- Database MCP -->
  <rect x="30" y="172" width="300" height="70" rx="10" fill="#e67e22" opacity="0.1" stroke="#e67e22" stroke-width="1.5"/>
  <text x="180" y="194" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">database-mcp-server</text>
  <text x="50" y="214" font-size="10" fill="#555">🔧 Tools: query, insert, update, describe_table</text>
  <text x="50" y="232" font-size="10" fill="#27ae60">→ As skill: "Database Operations Skill"</text>

  <!-- MCP + A2A collaboration -->
  <rect x="370" y="42" width="310" height="200" rx="10" fill="#9b59b6" opacity="0.06" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="525" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#9b59b6">MCP + A2A Collaboration</text>

  <rect x="390" y="82" width="270" height="32" rx="6" fill="#3498db" opacity="0.15"/>
  <text x="525" y="103" text-anchor="middle" font-size="11" fill="#2c3e50">MCP: Agent ↔ Tools/Data (vertical scaling)</text>

  <rect x="390" y="122" width="270" height="32" rx="6" fill="#e67e22" opacity="0.15"/>
  <text x="525" y="143" text-anchor="middle" font-size="11" fill="#2c3e50">A2A: Agent ↔ Agent (horizontal collaboration)</text>

  <text x="525" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Combined use:</text>
  <text x="400" y="195" font-size="10" fill="#555">Agent A gets "DB query skill" via MCP</text>
  <text x="400" y="212" font-size="10" fill="#555">Agent B gets "chart generation skill" via MCP</text>
  <text x="400" y="229" font-size="10" fill="#27ae60">A and B collaborate via A2A for "analysis+viz"</text>

  <!-- Discovery flow -->
  <rect x="30" y="252" width="650" height="22" rx="6" fill="#ecf0f1"/>
  <text x="355" y="268" text-anchor="middle" font-size="11" fill="#555">📌 MCP skill discovery: Agent connects to MCP Server → gets tool list → automatically acquires "skills"</text>
</svg>
