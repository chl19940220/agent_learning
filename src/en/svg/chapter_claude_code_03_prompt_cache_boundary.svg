<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="600" height="400" rx="14" fill="#f0f4f8"/>
  <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">System Prompt Static Zone / Dynamic Zone Separation</text>

  <!---->
  <rect x="40" y="45" width="520" height="155" rx="10" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="300" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#155724">Static Zone</text>

  <rect x="60" y="78" width="480" height="28" rx="6" fill="#28a745"/>
  <text x="300" y="97" text-anchor="middle" font-size="12" fill="white">Identity: You are Claude Code...</text>

  <rect x="60" y="112" width="480" height="28" rx="6" fill="#28a745"/>
  <text x="300" y="131" text-anchor="middle" font-size="12" fill="white">System Rules: Code Standards, Security Constraints</text>

  <rect x="60" y="146" width="480" height="28" rx="6" fill="#28a745"/>
  <text x="300" y="165" text-anchor="middle" font-size="12" fill="white">Coding Standards: File Operation Principles, Tool Usage Guide</text>

  <text x="300" y="192" text-anchor="middle" font-size="11" fill="#155724">Unchanged Across Users/Sessions · ✅ Prompt Cache Caches It, Reused Next Call</text>

  <!--CACHE BOUNDARY-->
  <rect x="40" y="208" width="520" height="28" rx="6" fill="#6c757d"/>
  <text x="300" y="227" text-anchor="middle" font-size="13" font-weight="bold" fill="white">── CACHE BOUNDARY ──</text>

  <!---->
  <rect x="40" y="244" width="520" height="145" rx="10" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="300" y="267" text-anchor="middle" font-size="14" font-weight="bold" fill="#856404">Dynamic Zone</text>

  <rect x="60" y="277" width="480" height="28" rx="6" fill="#ffc107"/>
  <text x="300" y="296" text-anchor="middle" font-size="12" fill="#212529">Current Working Dir & Env Info</text>

  <rect x="60" y="311" width="480" height="28" rx="6" fill="#ffc107"/>
  <text x="300" y="330" text-anchor="middle" font-size="12" fill="#212529">Session-level Guidance (Loaded from memdir)</text>

  <rect x="60" y="345" width="480" height="28" rx="6" fill="#ffc107"/>
  <text x="300" y="364" text-anchor="middle" font-size="12" fill="#212529">MCP Tool Descriptions (Changes per Connection)</text>

  <text x="300" y="383" text-anchor="middle" font-size="11" fill="#856404">Different Each Session · ❌ Cannot Cache, Always Consumes Tokens</text>
</svg>
