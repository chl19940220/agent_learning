<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <defs>
    <style>
      text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="820" height="480" rx="16" fill="#f8f9fa"/>
  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">LangChain Core Component System</text>

  <!-- [CN] Node-->
  <rect x="300" y="55" width="220" height="44" rx="10" fill="#2c3e50"/>
  <text x="410" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="white">LangChain Core</text>

  <!-- [CN] Line [CN] 5 [CN] Node-->
  <line x1="410" y1="99" x2="410" y2="118" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="410" y1="118" x2="90" y2="118" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="410" y1="118" x2="730" y2="118" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="90" y1="118" x2="90" y2="138" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="250" y1="118" x2="250" y2="138" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="410" y1="118" x2="410" y2="138" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="570" y1="118" x2="570" y2="138" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="730" y1="118" x2="730" y2="138" stroke="#95a5a6" stroke-width="1.5"/>

  <!--5 [CN] MainModule-->
  <!-- Model I/O -->
  <rect x="20" y="138" width="140" height="40" rx="8" fill="#3498db"/>
  <text x="90" y="153" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Model I/O</text>
  <text x="90" y="169" text-anchor="middle" font-size="10" fill="#d6eaf8">Model Interaction Layer</text>

  <!-- Data Connection -->
  <rect x="180" y="138" width="140" height="40" rx="8" fill="#27ae60"/>
  <text x="250" y="153" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Data Connection</text>
  <text x="250" y="169" text-anchor="middle" font-size="10" fill="#d5f5e3">Data Connection Layer</text>

  <!-- Chains -->
  <rect x="340" y="138" width="140" height="40" rx="8" fill="#8e44ad"/>
  <text x="410" y="153" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Chains</text>
  <text x="410" y="169" text-anchor="middle" font-size="10" fill="#e8daef">Chains</text>

  <!-- Agents -->
  <rect x="500" y="138" width="140" height="40" rx="8" fill="#e67e22"/>
  <text x="570" y="153" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Agents</text>
  <text x="570" y="169" text-anchor="middle" font-size="10" fill="#fdebd0">Agents</text>

  <!-- Memory -->
  <rect x="660" y="138" width="140" height="40" rx="8" fill="#e74c3c"/>
  <text x="730" y="153" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Memory</text>
  <text x="730" y="169" text-anchor="middle" font-size="10" fill="#fadbd8">Memory</text>

  <!-- [CN] Line-->
  <line x1="90" y1="178" x2="90" y2="200" stroke="#95a5a6" stroke-width="1.2"/>
  <line x1="250" y1="178" x2="250" y2="200" stroke="#95a5a6" stroke-width="1.2"/>
  <line x1="410" y1="178" x2="410" y2="200" stroke="#95a5a6" stroke-width="1.2"/>
  <line x1="570" y1="178" x2="570" y2="200" stroke="#95a5a6" stroke-width="1.2"/>
  <line x1="730" y1="178" x2="730" y2="200" stroke="#95a5a6" stroke-width="1.2"/>

  <!--ModelI/O [CN] -->
  <rect x="18" y="200" width="144" height="100" rx="6" fill="white" stroke="#3498db" stroke-width="1.2"/>
  <text x="90" y="218" text-anchor="middle" font-size="10" fill="#2980b9">LLMs / Chat Models</text>
  <text x="90" y="218" text-anchor="middle" font-size="10" fill="#7f8c8d" dy="16">Call various language models</text>
  <line x1="30" y1="242" x2="150" y2="242" stroke="#ecf0f1" stroke-width="1"/>
  <text x="90" y="258" text-anchor="middle" font-size="10" fill="#2980b9">Prompts</text>
  <text x="90" y="258" text-anchor="middle" font-size="10" fill="#7f8c8d" dy="14">Prompt template management</text>
  <line x1="30" y1="280" x2="150" y2="280" stroke="#ecf0f1" stroke-width="1"/>
  <text x="90" y="294" text-anchor="middle" font-size="10" fill="#2980b9">Output Parsers</text>

  <!--DataConnection [CN] -->
  <rect x="178" y="200" width="144" height="130" rx="6" fill="white" stroke="#27ae60" stroke-width="1.2"/>
  <text x="250" y="218" text-anchor="middle" font-size="10" fill="#1e8449">Document Loaders</text>
  <text x="250" y="218" text-anchor="middle" font-size="10" fill="#7f8c8d" dy="14">Load various documents</text>
  <line x1="190" y1="240" x2="310" y2="240" stroke="#ecf0f1" stroke-width="1"/>
  <text x="250" y="254" text-anchor="middle" font-size="10" fill="#1e8449">Text Splitters</text>
  <text x="250" y="254" text-anchor="middle" font-size="10" fill="#7f8c8d" dy="14">Text splitting</text>
  <line x1="190" y1="276" x2="310" y2="276" stroke="#ecf0f1" stroke-width="1"/>
  <text x="250" y="290" text-anchor="middle" font-size="10" fill="#1e8449">Embedding Models</text>
  <text x="250" y="290" text-anchor="middle" font-size="10" fill="#7f8c8d" dy="14">Vector embeddings</text>
  <line x1="190" y1="312" x2="310" y2="312" stroke="#ecf0f1" stroke-width="1"/>
  <text x="250" y="322" text-anchor="middle" font-size="10" fill="#1e8449">Vector Stores</text>

  <!--Chains [CN] -->
  <rect x="338" y="200" width="144" height="100" rx="6" fill="white" stroke="#8e44ad" stroke-width="1.2"/>
  <text x="410" y="218" text-anchor="middle" font-size="10" fill="#7d3c98">LLMChain</text>
  <text x="410" y="218" text-anchor="middle" font-size="10" fill="#7f8c8d" dy="14">Most basic chain</text>
  <line x1="350" y1="240" x2="470" y2="240" stroke="#ecf0f1" stroke-width="1"/>
  <text x="410" y="254" text-anchor="middle" font-size="10" fill="#7d3c98">ConversationChain</text>
  <text x="410" y="254" text-anchor="middle" font-size="10" fill="#7f8c8d" dy="14">Conversation chain</text>
  <line x1="350" y1="276" x2="470" y2="276" stroke="#ecf0f1" stroke-width="1"/>
  <text x="410" y="290" text-anchor="middle" font-size="10" fill="#7d3c98">LCEL Chains</text>
  <text x="410" y="290" text-anchor="middle" font-size="10" fill="#7f8c8d" dy="14">New declarative syntax</text>

  <!--Agents [CN] -->
  <rect x="498" y="200" width="144" height="100" rx="6" fill="white" stroke="#e67e22" stroke-width="1.2"/>
  <text x="570" y="218" text-anchor="middle" font-size="10" fill="#ca6f1e">Tools</text>
  <text x="570" y="218" text-anchor="middle" font-size="10" fill="#7f8c8d" dy="14">Tool definition</text>
  <line x1="510" y1="240" x2="630" y2="240" stroke="#ecf0f1" stroke-width="1"/>
  <text x="570" y="254" text-anchor="middle" font-size="10" fill="#ca6f1e">AgentExecutor</text>
  <text x="570" y="254" text-anchor="middle" font-size="10" fill="#7f8c8d" dy="14">Execution environment</text>
  <line x1="510" y1="276" x2="630" y2="276" stroke="#ecf0f1" stroke-width="1"/>
  <text x="570" y="290" text-anchor="middle" font-size="10" fill="#ca6f1e">Agent Types</text>
  <text x="570" y="290" text-anchor="middle" font-size="10" fill="#7f8c8d" dy="14">ReAct, OpenAI, etc.</text>

  <!--Memory [CN] -->
  <rect x="658" y="200" width="144" height="80" rx="6" fill="white" stroke="#e74c3c" stroke-width="1.2"/>
  <text x="730" y="218" text-anchor="middle" font-size="10" fill="#c0392b">ConversationBuffer</text>
  <text x="730" y="218" text-anchor="middle" font-size="10" fill="#7f8c8d" dy="14">Conversation history memory</text>
  <line x1="670" y1="240" x2="790" y2="240" stroke="#ecf0f1" stroke-width="1"/>
  <text x="730" y="254" text-anchor="middle" font-size="10" fill="#c0392b">VectorStoreMemory</text>
  <text x="730" y="254" text-anchor="middle" font-size="10" fill="#7f8c8d" dy="14">Vector memory</text>

  <!-- LCEL Description -->
  <rect x="200" y="380" width="420" height="50" rx="10" fill="#eaf4fb" stroke="#3498db" stroke-width="1.5"/>
  <text x="410" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">💡 LCEL Pipeline Syntax (Recommended)</text>
  <text x="410" y="420" text-anchor="middle" font-size="11" fill="#5d6d7e">chain = prompt | llm | output_parser  (| symbol connects components)</text>
</svg>
