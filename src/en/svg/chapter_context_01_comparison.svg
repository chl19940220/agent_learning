<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8eef5;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="900" height="420" fill="url(#bgGrad)" rx="12"/>

  <text x="450" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">Prompt Engineering vs Context Engineering</text>

  <!-- Prompt Engineering Box -->
  <rect x="40" y="60" width="380" height="330" rx="14" fill="white" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="60" width="380" height="40" rx="14" fill="#e74c3c"/>
  <rect x="40" y="86" width="380" height="14" fill="#e74c3c"/>
  <text x="230" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="white">Prompt Engineering</text>

  <text x="60" y="125" font-family="system-ui, sans-serif" font-size="12" fill="#555" font-weight="bold">Focus: How to "say" it</text>

  <rect x="60" y="140" width="340" height="55" rx="8" fill="#fff5f5" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4"/>
  <text x="80" y="160" font-family="monospace" font-size="11" fill="#c53030">System: "You are a data analyst,</text>
  <text x="80" y="178" font-family="monospace" font-size="11" fill="#c53030">please analyze step by step..."</text>

  <text x="60" y="215" font-family="system-ui, sans-serif" font-size="11" fill="#666">• Optimize wording and formatting</text>
  <text x="60" y="235" font-family="system-ui, sans-serif" font-size="11" fill="#666">• CoT / Few-shot / Role setting</text>
  <text x="60" y="255" font-family="system-ui, sans-serif" font-size="11" fill="#666">• Typically static templates</text>
  <text x="60" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#666">• Acts on a single LLM call</text>
  <text x="60" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#666">• Input size: hundreds to thousands of tokens</text>

  <rect x="60" y="315" width="340" height="28" rx="6" fill="#fff5f5"/>
  <text x="230" y="334" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e74c3c" font-weight="bold">Analogy: Skill of describing symptoms to a doctor</text>
  <text x="230" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20">🗣️</text>

  <!-- Arrow -->
  <text x="440" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#999">→</text>
  <text x="440" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#999">Evolution</text>

  <!-- Context Engineering Box -->
  <rect x="480" y="60" width="380" height="330" rx="14" fill="white" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
  <rect x="480" y="60" width="380" height="40" rx="14" fill="#3498db"/>
  <rect x="480" y="86" width="380" height="14" fill="#3498db"/>
  <text x="670" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="white">Context Engineering</text>

  <text x="500" y="125" font-family="system-ui, sans-serif" font-size="12" fill="#555" font-weight="bold">Focus: What the LLM "sees"</text>

  <rect x="500" y="140" width="340" height="55" rx="8" fill="#ebf8ff" stroke="#3498db" stroke-width="1" stroke-dasharray="4"/>
  <text x="520" y="158" font-family="monospace" font-size="10" fill="#2b6cb0">System + task state + notes + history summary</text>
  <text x="520" y="174" font-family="monospace" font-size="10" fill="#2b6cb0">+ tool results + RAG knowledge + user message</text>

  <text x="500" y="215" font-family="system-ui, sans-serif" font-size="11" fill="#666">• Information selection, compression, and organization</text>
  <text x="500" y="235" font-family="system-ui, sans-serif" font-size="11" fill="#666">• GSSC pipeline / Attention budget</text>
  <text x="500" y="255" font-family="system-ui, sans-serif" font-size="11" fill="#666">• Dynamically adjusts as task executes</text>
  <text x="500" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#666">• Manages the entire Agent lifecycle</text>
  <text x="500" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#666">• Input size: thousands to hundreds of thousands of tokens</text>

  <rect x="500" y="315" width="340" height="28" rx="6" fill="#ebf8ff"/>
  <text x="670" y="334" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3498db" font-weight="bold">Analogy: Preparing complete medical records for a doctor</text>
  <text x="670" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20">📋</text>
</svg>
