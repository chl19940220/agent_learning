<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" width="700" height="240">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arr14" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="700" height="240" fill="#f0f4f8" rx="14"/>
  <text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">CRAFT Method Principles</text>

  <!-- Traditional approach -->
  <rect x="20" y="42" width="660" height="45" rx="10" fill="#e74c3c" opacity="0.08" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="90" y="62" font-size="13" font-weight="bold" fill="#e74c3c">❌ Traditional Approach:</text>
  <text x="220" y="62" font-size="12" fill="#555">Problem → LLM directly generates code to solve → May contain errors</text>
  <text x="220" y="80" font-size="10" fill="#888">(Long code, prone to bugs)</text>

  <!-- CRAFT approach -->
  <rect x="20" y="98" width="660" height="85" rx="10" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="1.5"/>
  <text x="90" y="118" font-size="13" font-weight="bold" fill="#27ae60">✅ CRAFT Approach:</text>
  <text x="40" y="142" font-size="12" fill="#555">Problem → Phase 1: Create tool (LLM analyzes problem pattern, abstracts into reusable function, validates with tests)</text>
  <text x="100" y="165" font-size="12" fill="#555">→ Phase 2: Use tool (retrieve from tool library, compose tools to solve)</text>

  <!-- Key insight -->
  <rect x="20" y="195" width="660" height="35" rx="8" fill="#f39c12" opacity="0.1" stroke="#f39c12" stroke-width="1"/>
  <text x="350" y="217" text-anchor="middle" font-size="12" font-weight="bold" fill="#f39c12">💡 Key insight: "Abstraction" reduces LLM errors — creating a "sum" tool + calling it is more reliable than writing a long sum snippet directly</text>
</svg>
