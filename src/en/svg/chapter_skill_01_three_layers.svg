<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="700" height="280" fill="#f0f4f8" rx="14"/>
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Skill System Three-Layer Architecture</text>

  <!-- Skill management layer -->
  <rect x="50" y="48" width="600" height="62" rx="10" fill="#9b59b6" opacity="0.12" stroke="#9b59b6" stroke-width="2"/>
  <text x="350" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#9b59b6">Skill Management Layer</text>
  <text x="160" y="96" text-anchor="middle" font-size="11" fill="#555">🗂 Skill Registry</text>
  <text x="310" y="96" text-anchor="middle" font-size="11" fill="#555">🔍 Skill Discovery</text>
  <text x="460" y="96" text-anchor="middle" font-size="11" fill="#555">🎯 Skill Selection</text>
  <text x="600" y="96" text-anchor="middle" font-size="11" fill="#555">📋 Version Management</text>

  <!-- Skill definition layer -->
  <rect x="50" y="120" width="600" height="72" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="350" y="142" text-anchor="middle" font-size="14" font-weight="bold" fill="#3498db">Skill Definition Layer</text>
  <rect x="80" y="153" width="160" height="28" rx="6" fill="#3498db" opacity="0.2"/>
  <text x="160" y="172" text-anchor="middle" font-size="11" fill="#2c3e50">📝 Prompt-based</text>
  <rect x="270" y="153" width="160" height="28" rx="6" fill="#3498db" opacity="0.2"/>
  <text x="350" y="172" text-anchor="middle" font-size="11" fill="#2c3e50">💻 Code-based</text>
  <rect x="460" y="153" width="170" height="28" rx="6" fill="#3498db" opacity="0.2"/>
  <text x="545" y="172" text-anchor="middle" font-size="11" fill="#2c3e50">🔄 Workflow-based</text>

  <!-- Base tool layer -->
  <rect x="50" y="202" width="600" height="62" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="350" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">Base Tool Layer</text>
  <text x="130" y="250" text-anchor="middle" font-size="11" fill="#555">🔍 search</text>
  <text x="260" y="250" text-anchor="middle" font-size="11" fill="#555">📄 read_file</text>
  <text x="400" y="250" text-anchor="middle" font-size="11" fill="#555">🗃 sql_query</text>
  <text x="540" y="250" text-anchor="middle" font-size="11" fill="#555">📊 plot_chart</text>
  <text x="630" y="250" text-anchor="middle" font-size="11" fill="#555">...</text>
</svg>
