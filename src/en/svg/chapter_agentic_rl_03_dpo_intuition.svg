<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" width="600" height="260">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e74c3c"/>
    </marker>
  </defs>
  <rect width="600" height="260" fill="#f8f9fa" rx="12"/>
  <text x="300" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">DPO Core Intuition: Simplification from RLHF to DPO</text>

  <!-- RLHF pipeline (top) -->
  <text x="300" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3498db">Traditional RLHF (Two Steps)</text>

  <rect x="30" y="60" width="150" height="35" rx="8" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="1.5"/>
  <text x="105" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">Step 1: Train Reward Model</text>

  <path d="M 182 78 L 210 78" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="215" y="60" width="165" height="35" rx="8" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="297" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9b59b6">Step 2: PPO + Reward</text>

  <path d="M 382 78 L 410 78" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="415" y="60" width="155" height="35" rx="8" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="1.5"/>
  <text x="492" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Optimized π_θ</text>

  <!-- Big arrow (simplification) -->
  <path d="M 300 105 L 300 140" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="345" y="128" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e74c3c">Math simplification ✨</text>

  <!-- DPO pipeline (bottom) -->
  <text x="300" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e67e22">DPO (Single Step)</text>

  <rect x="80" y="170" width="185" height="35" rx="8" fill="#e67e22" opacity="0.15" stroke="#e67e22" stroke-width="1.5"/>
  <text x="172" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">Preference data (y_w ≻ y_l)</text>

  <path d="M 267 188 L 310 188" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="315" y="170" width="185" height="35" rx="8" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="1.5"/>
  <text x="407" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Directly optimize π_θ</text>

  <!-- Key insight -->
  <rect x="80" y="220" width="440" height="30" rx="8" fill="#e74c3c" opacity="0.08" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="300" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#e74c3c">Key Insight: The optimal reward function can be implicitly expressed via log probability ratio of π_θ and π_ref</text>
</svg>
