<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eef1f8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="16" fill="url(#gradBg)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#2d3748">Three-Stage Training Data Pipeline</text>

  <!-- Stage 1: Pre-training -->
  <g filter="url(#shadow)">
    <rect x="40" y="75" width="250" height="280" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="40" y="75" width="250" height="52" rx="14" fill="url(#grad1)"/>
    <rect x="40" y="113" width="250" height="14" fill="url(#grad1)"/>
    <text x="165" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="white">Stage 1: Pre-training</text>
    
    <!-- Data icon -->
    <g transform="translate(85, 150)">
      <rect width="160" height="36" rx="6" fill="#eef0ff" stroke="#667eea" stroke-width="1"/>
      <text x="80" y="23" text-anchor="middle" font-size="12" font-weight="600" fill="#667eea">📚 Massive unlabeled text</text>
    </g>
    
    <text x="165" y="215" text-anchor="middle" font-size="13" fill="#4a5568">Web pages, books, code, papers</text>
    
    <!-- Stats -->
    <g transform="translate(65, 240)">
      <rect width="200" height="24" rx="4" fill="#f0f0ff"/>
      <text x="100" y="17" text-anchor="middle" font-size="12" font-weight="600" fill="#667eea">Data: 1T—15T tokens</text>
    </g>
    <g transform="translate(65, 270)">
      <rect width="200" height="24" rx="4" fill="#f0f0ff"/>
      <text x="100" y="17" text-anchor="middle" font-size="12" font-weight="600" fill="#667eea">Goal: Language ability + world knowledge</text>
    </g>
    <g transform="translate(65, 300)">
      <rect width="200" height="24" rx="4" fill="#f8f8ff"/>
      <text x="100" y="17" text-anchor="middle" font-size="11" fill="#718096">Quality: Medium (quantity first)</text>
    </g>
  </g>

  <!-- Arrow 1 -->
  <g>
    <line x1="295" y1="215" x2="325" y2="215" stroke="#a0aec0" stroke-width="2.5" marker-end="url(#arrowhead)"/>
    <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#a0aec0"/></marker></defs>
  </g>

  <!-- Stage 2: SFT -->
  <g filter="url(#shadow)">
    <rect x="330" y="75" width="250" height="280" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="330" y="75" width="250" height="52" rx="14" fill="url(#grad2)"/>
    <rect x="330" y="113" width="250" height="14" fill="url(#grad2)"/>
    <text x="455" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="white">Stage 2: SFT Fine-tuning</text>
    
    <g transform="translate(375, 150)">
      <rect width="160" height="36" rx="6" fill="#fff0f5" stroke="#f5576c" stroke-width="1"/>
      <text x="80" y="23" text-anchor="middle" font-size="12" font-weight="600" fill="#e53e6b">✍️ Instruction-answer pairs</text>
    </g>
    
    <text x="455" y="215" text-anchor="middle" font-size="13" fill="#4a5568">Human annotation / strong model distillation</text>
    
    <g transform="translate(355, 240)">
      <rect width="200" height="24" rx="4" fill="#fff0f5"/>
      <text x="100" y="17" text-anchor="middle" font-size="12" font-weight="600" fill="#e53e6b">Data: 1K—100K samples</text>
    </g>
    <g transform="translate(355, 270)">
      <rect width="200" height="24" rx="4" fill="#fff0f5"/>
      <text x="100" y="17" text-anchor="middle" font-size="12" font-weight="600" fill="#e53e6b">Goal: Behavior format + task capability</text>
    </g>
    <g transform="translate(355, 300)">
      <rect width="200" height="24" rx="4" fill="#fff8fa"/>
      <text x="100" y="17" text-anchor="middle" font-size="11" fill="#718096">Quality: Very high (quality first)</text>
    </g>
  </g>

  <!-- Arrow 2 -->
  <g>
    <line x1="585" y1="215" x2="615" y2="215" stroke="#a0aec0" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Stage 3: RL -->
  <g filter="url(#shadow)">
    <rect x="620" y="75" width="250" height="280" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="620" y="75" width="250" height="52" rx="14" fill="url(#grad3)"/>
    <rect x="620" y="113" width="250" height="14" fill="url(#grad3)"/>
    <text x="745" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="white">Stage 3: RL Reinforcement Learning</text>
    
    <g transform="translate(665, 150)">
      <rect width="160" height="36" rx="6" fill="#f0faff" stroke="#4facfe" stroke-width="1"/>
      <text x="80" y="23" text-anchor="middle" font-size="12" font-weight="600" fill="#2b8fd6">🎯 Questions + reward signals</text>
    </g>
    
    <text x="745" y="215" text-anchor="middle" font-size="13" fill="#4a5568">Rule reward / model reward</text>
    
    <g transform="translate(645, 240)">
      <rect width="200" height="24" rx="4" fill="#f0faff"/>
      <text x="100" y="17" text-anchor="middle" font-size="12" font-weight="600" fill="#2b8fd6">Data: 10K—1M questions</text>
    </g>
    <g transform="translate(645, 270)">
      <rect width="200" height="24" rx="4" fill="#f0faff"/>
      <text x="100" y="17" text-anchor="middle" font-size="12" font-weight="600" fill="#2b8fd6">Goal: Beyond imitation, emerge strategies</text>
    </g>
    <g transform="translate(645, 300)">
      <rect width="200" height="24" rx="4" fill="#f8fcff"/>
      <text x="100" y="17" text-anchor="middle" font-size="11" fill="#718096">Quality: Question quality + reward design</text>
    </g>
  </g>

  <!-- Bottom annotation -->
  <g transform="translate(100, 385)">
    <rect width="700" height="28" rx="14" fill="#f0f4ff" stroke="#cbd5e0" stroke-width="0.5"/>
    <text x="350" y="19" text-anchor="middle" font-size="12" font-weight="500" fill="#4a5568">💡 Data differs by 3-4 orders of magnitude, but each stage has an optimal "sweet spot" — more is not always better; it's about highest quality at the right scale</text>
  </g>
</svg>
