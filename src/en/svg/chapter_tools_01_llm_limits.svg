<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
  </defs>
  <rect width="700" height="280" fill="#f8f9fa" rx="12"/>
  <text x="350" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">Three Innate Limitations of LLMs → Tools to the Rescue!</text>

  <!-- LLM center -->
  <rect x="260" y="55" width="180" height="50" rx="10" fill="#e74c3c" opacity="0.85"/>
  <text x="350" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">🧠 Three Innate LLM Limitations</text>

  <!-- Three limitations -->
  <rect x="30" y="140" width="180" height="55" rx="10" fill="#ffe3e3" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="120" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c">📅 Knowledge Cutoff</text>
  <text x="120" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Unaware of latest prices/news</text>

  <rect x="260" y="140" width="180" height="55" rx="10" fill="#ffe3e3" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="350" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c">🚫 Cannot Take Action</text>
  <text x="350" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Can't send emails or manage files</text>

  <rect x="490" y="140" width="180" height="55" rx="10" fill="#ffe3e3" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="580" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c">📡 No Real-Time Data</text>
  <text x="580" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Can't check weather or book flights</text>

  <!-- Arrows from LLM to limitations -->
  <path d="M 300 105 L 170 138" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 350 105 L 350 138" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 400 105 L 530 138" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrows to solution -->
  <path d="M 120 197 L 310 235" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 350 197 L 350 235" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 580 197 L 390 235" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Solution -->
  <rect x="200" y="238" width="300" height="32" rx="10" fill="#27ae60" opacity="0.9"/>
  <text x="350" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">🔧 Tools to the Rescue!</text>
</svg>
