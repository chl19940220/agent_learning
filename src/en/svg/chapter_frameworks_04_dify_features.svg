<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="600" height="200" rx="12" fill="#f8f9fa"/>
  <!-- Root Node -->
  <rect x="20" y="80" width="130" height="40" rx="8" fill="#2c3e50"/>
  <text x="85" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Dify Key Features</text>
  <text x="85" y="112" text-anchor="middle" font-size="10" fill="#bdc3c7">Low-Code Agent Platform</text>
  <!-- Trunk -->
  <line x1="150" y1="100" x2="190" y2="100" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="190" y1="20" x2="190" y2="180" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="190" y1="20" x2="220" y2="20" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="190" y1="60" x2="220" y2="60" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="190" y1="100" x2="220" y2="100" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="190" y1="140" x2="220" y2="140" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="190" y1="180" x2="220" y2="180" stroke="#7f8c8d" stroke-width="2"/>

  <!-- Branch 1 -->
  <rect x="220" y="8" width="360" height="24" rx="6" fill="#3498db" opacity="0.15"/>
  <rect x="220" y="8" width="4" height="24" rx="2" fill="#3498db"/>
  <text x="236" y="24" font-size="12" fill="#2980b9">🎨 Visual Workflow Editor</text>

  <!-- Branch 2 -->
  <rect x="220" y="48" width="360" height="24" rx="6" fill="#9b59b6" opacity="0.15"/>
  <rect x="220" y="48" width="4" height="24" rx="2" fill="#9b59b6"/>
  <text x="236" y="64" font-size="12" fill="#8e44ad">📚 Built-in RAG Knowledge Base</text>

  <!-- Branch 3 -->
  <rect x="220" y="88" width="360" height="24" rx="6" fill="#27ae60" opacity="0.15"/>
  <rect x="220" y="88" width="4" height="24" rx="2" fill="#27ae60"/>
  <text x="236" y="104" font-size="12" fill="#27ae60">🤖 Multi-model support (GPT-4, Claude, Llama, etc.)</text>

  <!-- Branch 4 -->
  <rect x="220" y="128" width="360" height="24" rx="6" fill="#e67e22" opacity="0.15"/>
  <rect x="220" y="128" width="4" height="24" rx="2" fill="#e67e22"/>
  <text x="236" y="144" font-size="12" fill="#e67e22">🔌 API and SDK Export</text>

  <!-- Branch 5 -->
  <rect x="220" y="168" width="360" height="24" rx="6" fill="#e74c3c" opacity="0.15"/>
  <rect x="220" y="168" width="4" height="24" rx="2" fill="#e74c3c"/>
  <text x="236" y="184" font-size="12" fill="#e74c3c">🏠 Supports private deployment</text>
</svg>
