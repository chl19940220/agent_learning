<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="800" height="380" rx="12" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Tool Learning: Three Landmark Papers</text>

  <!-- Toolformer -->
  <rect x="20" y="55" width="245" height="200" rx="8" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="2"/>
  <text x="142" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">Toolformer (2023)</text>
  <text x="142" y="96" text-anchor="middle" font-size="10" fill="#888">Meta AI · Self-taught tool use</text>
  <line x1="35" y1="104" x2="250" y2="104" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4"/>
  <text x="35" y="122" font-size="11" fill="#444">Core idea:</text>
  <text x="35" y="140" font-size="11" fill="#444">• LLM auto-annotates training data</text>
  <text x="35" y="158" font-size="11" fill="#444">• Inserts API calls into text</text>
  <text x="35" y="176" font-size="11" fill="#444">• Filters via loss function</text>
  <rect x="35" y="188" width="215" height="22" rx="4" fill="#e74c3c" opacity="0.15"/>
  <text x="142" y="204" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="bold">Breakthrough: No manual annotation</text>
  <text x="35" y="228" font-size="11" fill="#444">Supported tools: calculator, search,</text>
  <text x="35" y="244" font-size="11" fill="#444">calendar, translation, QA</text>

  <!-- ToolkenGPT -->
  <rect x="278" y="55" width="245" height="200" rx="8" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="400" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#3498db">ToolkenGPT (2023)</text>
  <text x="400" y="96" text-anchor="middle" font-size="10" fill="#888">Tool call = Token generation</text>
  <line x1="293" y1="104" x2="508" y2="104" stroke="#3498db" stroke-width="1" stroke-dasharray="4"/>
  <text x="293" y="122" font-size="11" fill="#444">Core idea:</text>
  <text x="293" y="140" font-size="11" fill="#444">• Each tool = one special Token</text>
  <text x="293" y="158" font-size="11" fill="#444">• Tool embedding vector learning</text>
  <text x="293" y="176" font-size="11" fill="#444">• Seamlessly fused into generation</text>
  <rect x="293" y="188" width="215" height="22" rx="4" fill="#3498db" opacity="0.15"/>
  <text x="400" y="204" text-anchor="middle" font-size="10" fill="#3498db" font-weight="bold">Breakthrough: Tools = Vocabulary extension</text>
  <text x="293" y="228" font-size="11" fill="#444">Advantage: supports parallel calls</text>
  <text x="293" y="244" font-size="11" fill="#444">New tools only need embedding training</text>

  <!-- TALM -->
  <rect x="536" y="55" width="244" height="200" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="658" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">TALM / ART (2023)</text>
  <text x="658" y="96" text-anchor="middle" font-size="10" fill="#888">Augmented tool reasoning</text>
  <line x1="549" y1="104" x2="765" y2="104" stroke="#27ae60" stroke-width="1" stroke-dasharray="4"/>
  <text x="549" y="122" font-size="11" fill="#444">Core idea:</text>
  <text x="549" y="140" font-size="11" fill="#444">• Few-shot tool examples</text>
  <text x="549" y="158" font-size="11" fill="#444">• Automatic task decomposition</text>
  <text x="549" y="176" font-size="11" fill="#444">• Tool call chain planning</text>
  <rect x="549" y="188" width="215" height="22" rx="4" fill="#27ae60" opacity="0.15"/>
  <text x="658" y="204" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Breakthrough: No fine-tuning needed</text>
  <text x="549" y="228" font-size="11" fill="#444">Advantage: high generalizability</text>
  <text x="549" y="244" font-size="11" fill="#444">Complements GPT-4 Function Calling</text>

  <!-- Development timeline -->
  <rect x="20" y="270" width="760" height="95" rx="8" fill="#8e44ad" opacity="0.08" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="400" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#8e44ad">Tool Learning Development Timeline</text>

  <rect x="40" y="305" width="200" height="45" rx="6" fill="#e74c3c" opacity="0.12"/>
  <text x="140" y="323" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">Phase 1: Self-supervised Learning</text>
  <text x="140" y="340" text-anchor="middle" font-size="10" fill="#666">Toolformer auto-annotation</text>

  <text x="260" y="328" font-size="14" fill="#888">→</text>

  <rect x="280" y="305" width="200" height="45" rx="6" fill="#3498db" opacity="0.12"/>
  <text x="380" y="323" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">Phase 2: Native Integration</text>
  <text x="380" y="340" text-anchor="middle" font-size="10" fill="#666">ToolkenGPT tokenization</text>

  <text x="500" y="328" font-size="14" fill="#888">→</text>

  <rect x="520" y="305" width="240" height="45" rx="6" fill="#27ae60" opacity="0.12"/>
  <text x="640" y="323" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">Phase 3: Standardization (2024+)</text>
  <text x="640" y="340" text-anchor="middle" font-size="10" fill="#666">Function Calling + MCP Protocol</text>
</svg>
