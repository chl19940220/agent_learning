<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#2c3e50">Agent Memory System — Three-Layer Architecture</text>

  <!-- Working Memory -->
  <rect x="280" y="55" width="240" height="100" rx="10" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="2"/>
  <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">Working Memory (Scratchpad)</text>
  <text x="400" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">• Reasoning steps for current task</text>
  <text x="400" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">• Intermediate computation results</text>
  <text x="400" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">⚡ Temporary; cleared after task completes</text>

  <!-- Short-term Memory -->
  <rect x="160" y="180" width="480" height="110" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="400" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3498db">Short-Term Memory (Conversation History)</text>
  <text x="220" y="226" font-family="Arial, sans-serif" font-size="11" fill="#555">• Message history of current session</text>
  <text x="220" y="244" font-family="Arial, sans-serif" font-size="11" fill="#555">• Sliding window (last N turns)</text>
  <text x="220" y="262" font-family="Arial, sans-serif" font-size="11" fill="#555">• Summary compression (saves Tokens)</text>
  <text x="480" y="226" font-family="Arial, sans-serif" font-size="11" fill="#555">• Capacity limited by Context Window</text>
  <text x="480" y="244" font-family="Arial, sans-serif" font-size="11" fill="#555">• Disappears when session ends</text>
  <text x="480" y="262" font-family="Arial, sans-serif" font-size="11" fill="#555">🔵 Persists throughout current session</text>

  <!-- Long-term Memory -->
  <rect x="40" y="315" width="720" height="105" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#27ae60">Long-Term Memory (Vector Database)</text>
  <text x="80" y="362" font-family="Arial, sans-serif" font-size="11" fill="#555">• User preferences and personal info</text>
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="11" fill="#555">• Historical conversation summaries</text>
  <text x="80" y="398" font-family="Arial, sans-serif" font-size="11" fill="#555">• User documents and knowledge base</text>
  <text x="300" y="362" font-family="Arial, sans-serif" font-size="11" fill="#555">• Important decisions and conclusions</text>
  <text x="300" y="380" font-family="Arial, sans-serif" font-size="11" fill="#555">• Semantic retrieval (vector similarity)</text>
  <text x="300" y="398" font-family="Arial, sans-serif" font-size="11" fill="#555">• Persistent storage (cross-session)</text>
  <text x="560" y="362" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">• ChromaDB / Pinecone</text>
  <text x="560" y="380" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">• FAISS / Qdrant</text>
  <text x="560" y="398" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">💾 Stored permanently</text>

  <!-- Arrows showing layer relationship -->
  <path d="M 400 156 L 400 177" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#darr)"/>
  <path d="M 400 291 L 400 312" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#darr)"/>

  <!-- Labels on arrows -->
  <text x="415" y="170" font-family="Arial, sans-serif" font-size="10" fill="#999">Important info sinks downward</text>
  <text x="415" y="305" font-family="Arial, sans-serif" font-size="10" fill="#999">Semantic retrieval pulls upward</text>

  <defs>
    <marker id="darr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
</svg>
