<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300">
  <rect width="700" height="300" fill="#f8f9fa" rx="12"/>
  <text x="350" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Automated Evaluation Pipeline</text>

  <!-- Step 1 -->
  <rect x="30" y="65" width="150" height="80" rx="10" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <text x="105" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3498db">① Test Dataset</text>
  <text x="105" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Input prompts</text>
  <text x="105" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Expected outputs</text>

  <path d="M182 105 L210 105" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="212" y="65" width="150" height="80" rx="10" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="2"/>
  <text x="287" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9b59b6">② Agent Run</text>
  <text x="287" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Execute on each</text>
  <text x="287" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">test case</text>

  <path d="M364 105 L392 105" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="394" y="65" width="150" height="80" rx="10" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="2"/>
  <text x="469" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">③ Auto Scoring</text>
  <text x="469" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Rule match /</text>
  <text x="469" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">LLM Judge</text>

  <path d="M546 105 L574 105" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="576" y="65" width="100" height="80" rx="10" fill="#e67e22" opacity="0.15" stroke="#e67e22" stroke-width="2"/>
  <text x="626" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e67e22">④ Report</text>
  <text x="626" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Score + CI</text>
  <text x="626" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">regression</text>

  <!-- Benefits -->
  <rect x="30" y="175" width="640" height="100" rx="10" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="350" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Why Automated Evaluation?</text>
  <text x="120" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">⚡ Speed: 1000x faster than human</text>
  <text x="350" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">📊 Scale: evaluate every commit</text>
  <text x="570" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">🔄 CI/CD: gate deployments</text>
  <text x="350" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Recommended: rule-based for correctness · LLM Judge for quality · human for edge cases</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
</svg>
