<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="800" height="360" rx="12" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Tool · Skill · Sub Agent: Three-Layer Capability Abstraction</text>

  <!-- Three-column comparison -->
  <!-- Tool -->
  <rect x="20" y="55" width="245" height="200" rx="8" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="142" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#3498db">🔧 Tool</text>
  <text x="142" y="100" text-anchor="middle" font-size="11" fill="#888">Minimal execution unit</text>
  <line x1="35" y1="108" x2="250" y2="108" stroke="#3498db" stroke-width="1" stroke-dasharray="4"/>
  <text x="35" y="128" font-size="11" fill="#444">Granularity: single API / function</text>
  <text x="35" y="148" font-size="11" fill="#444">Decision: none (passively called)</text>
  <text x="35" y="168" font-size="11" fill="#444">State: stateless</text>
  <text x="35" y="188" font-size="11" fill="#444">Analogy: a knife, a wok</text>
  <rect x="35" y="200" width="215" height="40" rx="4" fill="#3498db" opacity="0.15"/>
  <text x="142" y="217" text-anchor="middle" font-size="10" fill="#3498db">Typical use case</text>
  <text x="142" y="233" text-anchor="middle" font-size="10" fill="#555">Search, compute, API call</text>

  <!-- Skill -->
  <rect x="278" y="55" width="245" height="200" rx="8" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="2"/>
  <text x="400" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#e67e22">⚡ Skill</text>
  <text x="400" y="100" text-anchor="middle" font-size="11" fill="#888">Tool + strategy + knowledge</text>
  <line x1="293" y1="108" x2="508" y2="108" stroke="#e67e22" stroke-width="1" stroke-dasharray="4"/>
  <text x="293" y="128" font-size="11" fill="#444">Granularity: a set of tools + Prompt</text>
  <text x="293" y="148" font-size="11" fill="#444">Decision: limited (predefined flow)</text>
  <text x="293" y="168" font-size="11" fill="#444">State: lightweight</text>
  <text x="293" y="188" font-size="11" fill="#444">Analogy: Sichuan cooking skill</text>
  <rect x="293" y="200" width="215" height="40" rx="4" fill="#e67e22" opacity="0.15"/>
  <text x="400" y="217" text-anchor="middle" font-size="10" fill="#e67e22">Typical use case</text>
  <text x="400" y="233" text-anchor="middle" font-size="10" fill="#555">Data analysis, code review, report generation</text>

  <!-- Sub Agent -->
  <rect x="536" y="55" width="244" height="200" rx="8" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="658" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#8e44ad">🤖 Sub Agent</text>
  <text x="658" y="100" text-anchor="middle" font-size="11" fill="#888">Independent reasoning loop</text>
  <line x1="549" y1="108" x2="765" y2="108" stroke="#8e44ad" stroke-width="1" stroke-dasharray="4"/>
  <text x="549" y="128" font-size="11" fill="#444">Granularity: full Agent instance</text>
  <text x="549" y="148" font-size="11" fill="#444">Decision: autonomous (reasoning loop)</text>
  <text x="549" y="168" font-size="11" fill="#444">State: full context</text>
  <text x="549" y="188" font-size="11" fill="#444">Analogy: a professional chef</text>
  <rect x="549" y="200" width="215" height="40" rx="4" fill="#8e44ad" opacity="0.15"/>
  <text x="658" y="217" text-anchor="middle" font-size="10" fill="#8e44ad">Typical use case</text>
  <text x="658" y="233" text-anchor="middle" font-size="10" fill="#555">Complex research, multi-step projects</text>

  <!-- Decision guide -->
  <rect x="20" y="270" width="760" height="75" rx="8" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="1.5"/>
  <text x="400" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">Architecture Selection Guide</text>
  <text x="142" y="315" text-anchor="middle" font-size="11" fill="#555">Single operation → Tool</text>
  <text x="142" y="333" text-anchor="middle" font-size="10" fill="#888">Low cost, controllable</text>
  <text x="400" y="315" text-anchor="middle" font-size="11" fill="#555">Domain task → Skill</text>
  <text x="400" y="333" text-anchor="middle" font-size="10" fill="#888">High reusability, composable</text>
  <text x="658" y="315" text-anchor="middle" font-size="11" fill="#555">Autonomous decision → Sub Agent</text>
  <text x="658" y="333" text-anchor="middle" font-size="10" fill="#888">Flexible but higher cost</text>

</svg>
