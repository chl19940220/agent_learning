<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="a6" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/></marker>
  </defs>
  <rect width="800" height="380" rx="12" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Five Dimensions of Tool Design Best Practices</text>

  <!-- Center -->
  <circle cx="400" cy="195" r="55" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <text x="400" y="188" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498db">🔧 High-Quality</text>
  <text x="400" y="206" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498db">Agent Tools</text>

  <!-- Dimension 1: Type Annotations -->
  <rect x="50" y="50" width="180" height="65" rx="8" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="2"/>
  <text x="140" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c">📝 1. Type Annotations</text>
  <text x="140" y="90" text-anchor="middle" font-size="9" fill="#555">Pydantic models for parameters</text>
  <text x="140" y="103" text-anchor="middle" font-size="9" fill="#555">LLM picks tools by documentation</text>
  <line x1="230" y1="95" x2="350" y2="170" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Dimension 2: Input Validation -->
  <rect x="570" y="50" width="180" height="65" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="660" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">✅ 2. Input Validation</text>
  <text x="660" y="90" text-anchor="middle" font-size="9" fill="#555">Validate parameter format and range</text>
  <text x="660" y="103" text-anchor="middle" font-size="9" fill="#555">Prevent invalid input from crashing</text>
  <line x1="570" y1="95" x2="450" y2="170" stroke="#27ae60" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Dimension 3: Error Handling -->
  <rect x="20" y="240" width="180" height="65" rx="8" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="110" y="262" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">🛡️ 3. Error Handling</text>
  <text x="110" y="280" text-anchor="middle" font-size="9" fill="#555">Return clear error messages</text>
  <text x="110" y="293" text-anchor="middle" font-size="9" fill="#555">Help model self-correct</text>
  <line x1="200" y1="262" x2="350" y2="218" stroke="#8e44ad" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Dimension 4: Timeout & Retry -->
  <rect x="600" y="240" width="180" height="65" rx="8" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="2"/>
  <text x="690" y="262" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">⏱️ 4. Timeout &amp; Retry</text>
  <text x="690" y="280" text-anchor="middle" font-size="9" fill="#555">Set reasonable timeout values</text>
  <text x="690" y="293" text-anchor="middle" font-size="9" fill="#555">Exponential backoff retry strategy</text>
  <line x1="600" y1="262" x2="450" y2="218" stroke="#e67e22" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Dimension 5: Single Responsibility -->
  <rect x="310" y="295" width="180" height="65" rx="8" fill="#2980b9" opacity="0.12" stroke="#2980b9" stroke-width="2"/>
  <text x="400" y="317" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">🎯 5. Single Responsibility</text>
  <text x="400" y="335" text-anchor="middle" font-size="9" fill="#555">One tool does one thing</text>
  <text x="400" y="348" text-anchor="middle" font-size="9" fill="#555">Model can freely compose small tools</text>
  <line x1="400" y1="295" x2="400" y2="250" stroke="#2980b9" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Bottom -->
  <text x="400" y="375" text-anchor="middle" font-size="10" fill="#95a5a6">❌ Bad: search_and_analyze_and_summarize() → ✅ Good: search() + analyze() + summarize()</text>
</svg>
