<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#f0f4f8"/>
      <stop offset="100%" style="stop-color:#e8eef5"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a365d" font-family="system-ui">Agentic-RL Training Architecture Overview</text>

  <!-- Left: Prompt Approach -->
  <rect x="30" y="70" width="260" height="420" rx="14" fill="#fff5f5" stroke="#fc8181" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#c53030" font-family="system-ui">Prompt Approach</text>

  <rect x="55" y="120" width="210" height="50" rx="10" fill="#fff" stroke="#fc8181" stroke-width="1"/>
  <text x="160" y="150" text-anchor="middle" font-size="13" fill="#2d3748" font-family="system-ui">General Base Model (GPT-4/Qwen)</text>

  <text x="160" y="195" text-anchor="middle" font-size="20" fill="#c53030">＋</text>

  <rect x="55" y="210" width="210" height="50" rx="10" fill="#fff" stroke="#fc8181" stroke-width="1"/>
  <text x="160" y="240" text-anchor="middle" font-size="13" fill="#2d3748" font-family="system-ui">Carefully Designed Prompt</text>

  <text x="160" y="285" text-anchor="middle" font-size="20" fill="#c53030">＋</text>

  <rect x="55" y="300" width="210" height="50" rx="10" fill="#fff" stroke="#fc8181" stroke-width="1"/>
  <text x="160" y="330" text-anchor="middle" font-size="13" fill="#2d3748" font-family="system-ui">Tool Definitions / Examples</text>

  <text x="160" y="380" text-anchor="middle" font-size="20" fill="#c53030">↓</text>

  <rect x="55" y="395" width="210" height="50" rx="10" fill="#fed7d7" stroke="#fc8181" stroke-width="1.5"/>
  <text x="160" y="415" text-anchor="middle" font-size="12" font-weight="bold" fill="#c53030" font-family="system-ui">Ceiling = Base Model Capability</text>
  <text x="160" y="435" text-anchor="middle" font-size="11" fill="#742a2a" font-family="system-ui">Cannot optimize for specific tasks</text>

  <!-- Middle arrow -->
  <text x="340" y="290" text-anchor="middle" font-size="28" fill="#4a5568">→</text>

  <!-- Right: Agentic-RL Approach -->
  <rect x="380" y="70" width="490" height="420" rx="14" fill="#f0fff4" stroke="#68d391" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="625" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#276749" font-family="system-ui">Agentic-RL Approach</text>

  <!-- SFT Phase -->
  <rect x="405" y="120" width="200" height="150" rx="12" fill="#fff" stroke="#4299e1" stroke-width="1.5"/>
  <text x="505" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6cb0" font-family="system-ui">Phase 1: SFT</text>
  <text x="505" y="170" text-anchor="middle" font-size="11" fill="#4a5568" font-family="system-ui">Supervised Fine-tuning + LoRA</text>

  <rect x="420" y="185" width="170" height="24" rx="6" fill="#ebf8ff" stroke="#4299e1" stroke-width="0.5"/>
  <text x="505" y="202" text-anchor="middle" font-size="10" fill="#2b6cb0" font-family="system-ui">📋 High-quality Agent Trajectory Data</text>

  <rect x="420" y="215" width="170" height="24" rx="6" fill="#ebf8ff" stroke="#4299e1" stroke-width="0.5"/>
  <text x="505" y="232" text-anchor="middle" font-size="10" fill="#2b6cb0" font-family="system-ui">🎯 Learn Agent Behavior Format</text>

  <rect x="420" y="245" width="170" height="18" rx="6" fill="#bee3f8"/>
  <text x="505" y="258" text-anchor="middle" font-size="10" fill="#2b6cb0" font-family="system-ui">Imitate "the right way to do things"</text>

  <!-- Arrow -->
  <line x1="605" y1="195" x2="640" y2="195" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- GRPO Phase -->
  <rect x="645" y="120" width="200" height="150" rx="12" fill="#fff" stroke="#48bb78" stroke-width="1.5"/>
  <text x="745" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#276749" font-family="system-ui">Phase 2: GRPO</text>
  <text x="745" y="170" text-anchor="middle" font-size="11" fill="#4a5568" font-family="system-ui">Reinforcement Learning Optimization</text>

  <rect x="660" y="185" width="170" height="24" rx="6" fill="#f0fff4" stroke="#48bb78" stroke-width="0.5"/>
  <text x="745" y="202" text-anchor="middle" font-size="10" fill="#276749" font-family="system-ui">🏆 Reward Function Evaluation</text>

  <rect x="660" y="215" width="170" height="24" rx="6" fill="#f0fff4" stroke="#48bb78" stroke-width="0.5"/>
  <text x="745" y="232" text-anchor="middle" font-size="10" fill="#276749" font-family="system-ui">🔄 Group Comparison Optimization</text>

  <rect x="660" y="245" width="170" height="18" rx="6" fill="#c6f6d5"/>
  <text x="745" y="258" text-anchor="middle" font-size="10" fill="#276749" font-family="system-ui">Beyond imitation, explore optimal policy</text>

  <!-- Six core capabilities -->
  <text x="625" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#276749" font-family="system-ui">Six Core Capabilities Improved by Training</text>

  <rect x="405" y="315" width="140" height="30" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="0.5"/>
  <text x="475" y="335" text-anchor="middle" font-size="11" fill="#276749" font-family="system-ui">🎯 Instruction Following</text>

  <rect x="555" y="315" width="140" height="30" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="0.5"/>
  <text x="625" y="335" text-anchor="middle" font-size="11" fill="#276749" font-family="system-ui">🔧 Tool Use</text>

  <rect x="705" y="315" width="140" height="30" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="0.5"/>
  <text x="775" y="335" text-anchor="middle" font-size="11" fill="#276749" font-family="system-ui">🧠 Multi-step Reasoning</text>

  <rect x="405" y="355" width="140" height="30" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="0.5"/>
  <text x="475" y="375" text-anchor="middle" font-size="11" fill="#276749" font-family="system-ui">🔄 Self-correction</text>

  <rect x="555" y="355" width="140" height="30" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="0.5"/>
  <text x="625" y="375" text-anchor="middle" font-size="11" fill="#276749" font-family="system-ui">🔍 Exploration Strategy</text>

  <rect x="705" y="355" width="140" height="30" rx="8" fill="#c6f6d5" stroke="#48bb78" stroke-width="0.5"/>
  <text x="775" y="375" text-anchor="middle" font-size="11" fill="#276749" font-family="system-ui">⚡ Efficiency Optimization</text>

  <!-- Final result -->
  <rect x="455" y="405" width="340" height="55" rx="12" fill="#276749" filter="url(#shadow)"/>
  <text x="625" y="428" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="system-ui">✅ Capabilities Internalized into Model Weights</text>
  <text x="625" y="448" text-anchor="middle" font-size="11" fill="#c6f6d5" font-family="system-ui">Continuously improvable · Efficient inference · Deep task customization</text>

  <!-- Bottom caption -->
  <text x="450" y="508" text-anchor="middle" font-size="11" fill="#718096" font-family="system-ui">Fig 18-1  Agentic-RL Training Architecture: From Prompt Approach to Two-phase SFT+GRPO Training</text>
</svg>
