<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" width="760" height="330">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <linearGradient id="gbf16" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#5dade2;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="ggrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e67e22;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f0a04b;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="goptim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f1948a;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="gact" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#58d68d;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <rect width="760" height="330" fill="#f8f9fa" rx="14"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">7B Parameter Model — Mixed Precision Training Memory Estimation</text>

  <!-- ── Bar 1: Parameters 14 GB ── -->
  <text x="200" y="68" text-anchor="end" font-size="11" fill="#2c3e50">Model Parameters</text>
  <text x="200" y="80" text-anchor="end" font-size="9" fill="#7f8c8d">BF16, 2 bytes/param</text>
  <rect x="205" y="58" width="56" height="28" rx="5" fill="url(#gbf16)"/>
  <text x="268" y="77" font-size="10" font-weight="bold" fill="#3498db">14 GB</text>
  <text x="360" y="77" font-size="9" fill="#555">= 7B × 2 bytes</text>

  <!-- ── Bar 2: Gradients 28 GB ── -->
  <text x="200" y="112" text-anchor="end" font-size="11" fill="#2c3e50">Gradients</text>
  <text x="200" y="124" text-anchor="end" font-size="9" fill="#7f8c8d">FP32, 4 bytes/param</text>
  <rect x="205" y="102" width="112" height="28" rx="5" fill="url(#ggrad)"/>
  <text x="324" y="121" font-size="10" font-weight="bold" fill="#e67e22">28 GB</text>
  <text x="415" y="121" font-size="9" fill="#555">= 7B × 4 bytes</text>

  <!-- ── Bar 3: Optimizer states 56 GB ── -->
  <text x="200" y="156" text-anchor="end" font-size="11" fill="#2c3e50">Optimizer States</text>
  <text x="200" y="168" text-anchor="end" font-size="9" fill="#7f8c8d">Adam m + v, FP32</text>
  <rect x="205" y="146" width="224" height="28" rx="5" fill="url(#goptim)"/>
  <text x="318" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">56 GB  ← Largest Overhead</text>

  <!-- ── Bar 4: Activations 8~40 GB ── -->
  <text x="200" y="200" text-anchor="end" font-size="11" fill="#2c3e50">Activations</text>
  <text x="200" y="212" text-anchor="end" font-size="9" fill="#7f8c8d">Depends on sequence length</text>
  <rect x="205" y="190" width="32" height="28" rx="5" fill="url(#gact)" opacity="0.7"/>
  <rect x="205" y="190" width="160" height="28" rx="5" fill="none" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="374" y="209" font-size="9" fill="#27ae60">8 ~ 40 GB (depends on batch/seq/layers)</text>

  <!-- Total row -->
  <line x1="205" y1="234" x2="750" y2="234" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="205" y="238" width="540" height="32" rx="6" fill="#2c3e50" opacity="0.07" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="215" y="258" font-size="11" font-weight="bold" fill="#2c3e50">Total (Minimum)</text>
  <text x="460" y="258" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">≈ 106 ~ 138 GB</text>

  <!-- A100 80GB marker: 80GB = 320px, x = 205+320 = 525 -->
  <line x1="525" y1="52" x2="525" y2="234" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="528" y="52" width="90" height="38" rx="6" fill="#e74c3c" opacity="0.85"/>
  <text x="573" y="67" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">A100 Limit</text>
  <text x="573" y="82" text-anchor="middle" font-size="10" fill="#fff">80 GB</text>

  <!-- X-axis scale -->
  <line x1="205" y1="280" x2="750" y2="280" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="205" y1="276" x2="205" y2="281" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="205" y="293" text-anchor="middle" font-size="9" fill="#7f8c8d">0</text>

  <line x1="285" y1="276" x2="285" y2="281" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="285" y="293" text-anchor="middle" font-size="9" fill="#7f8c8d">20 GB</text>

  <line x1="365" y1="276" x2="365" y2="281" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="365" y="293" text-anchor="middle" font-size="9" fill="#7f8c8d">40 GB</text>

  <line x1="445" y1="276" x2="445" y2="281" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="445" y="293" text-anchor="middle" font-size="9" fill="#7f8c8d">60 GB</text>

  <line x1="525" y1="276" x2="525" y2="281" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="525" y="293" text-anchor="middle" font-size="9" fill="#e74c3c">80 GB</text>

  <!-- Row labels -->
  <text x="100" y="258" font-size="9" fill="#7f8c8d">Memory Component</text>

  <!-- Bottom conclusion -->
  <text x="380" y="318" text-anchor="middle" font-size="10" fill="#e74c3c">A single A100 (80 GB) cannot train a 7B model alone → Distributed training is the only way</text>
</svg>
