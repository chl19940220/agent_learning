<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
  </defs>
  <rect width="600" height="320" rx="14" fill="#f0f4f8"/>
  <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Parallel Decomposition of Complex Research Tasks</text>

  <!-- Main Agent -->
  <rect x="200" y="45" width="200" height="52" rx="10" fill="#2c3e50"/>
  <text x="300" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🧠 Main Agent</text>
  <text x="300" y="86" text-anchor="middle" font-size="11" fill="#bdc3c7">Research distributed transaction solutions</text>

  <!-- Fork -->
  <line x1="300" y1="97" x2="300" y2="115" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="100" y1="115" x2="500" y2="115" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="100" y1="115" x2="100" y2="138" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="300" y1="115" x2="300" y2="138" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="500" y1="115" x2="500" y2="138" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="300" y="112" text-anchor="middle" font-size="11" fill="#3498db" font-weight="bold">Parallel</text>

  <!-- Sub Agent 1 -->
  <rect x="20" y="140" width="160" height="80" rx="8" fill="#3498db"/>
  <text x="100" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Sub Agent 1</text>
  <text x="100" y="178" text-anchor="middle" font-size="10" fill="#d6eaf8">Deep research on Saga pattern</text>
  <text x="100" y="192" text-anchor="middle" font-size="10" fill="#d6eaf8">Principles, pros &amp; cons</text>
  <text x="100" y="206" text-anchor="middle" font-size="10" fill="#d6eaf8">Applicable scenarios</text>

  <!-- Sub Agent 2 -->
  <rect x="220" y="140" width="160" height="80" rx="8" fill="#3498db"/>
  <text x="300" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Sub Agent 2</text>
  <text x="300" y="178" text-anchor="middle" font-size="10" fill="#d6eaf8">Deep research on TCC pattern</text>
  <text x="300" y="192" text-anchor="middle" font-size="10" fill="#d6eaf8">Principles, pros &amp; cons</text>
  <text x="300" y="206" text-anchor="middle" font-size="10" fill="#d6eaf8">Applicable scenarios</text>

  <!-- Sub Agent 3 -->
  <rect x="420" y="140" width="160" height="80" rx="8" fill="#3498db"/>
  <text x="500" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Sub Agent 3</text>
  <text x="500" y="178" text-anchor="middle" font-size="10" fill="#d6eaf8">Deep research on 2PC protocol</text>
  <text x="500" y="192" text-anchor="middle" font-size="10" fill="#d6eaf8">Principles, pros &amp; cons</text>
  <text x="500" y="206" text-anchor="middle" font-size="10" fill="#d6eaf8">Applicable scenarios</text>

  <!-- Merge -->
  <line x1="100" y1="220" x2="100" y2="248" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="300" y1="220" x2="300" y2="248" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="500" y1="220" x2="500" y2="248" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="100" y1="248" x2="500" y2="248" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="300" y1="248" x2="300" y2="268" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="140" y="270" width="320" height="36" rx="10" fill="#27ae60"/>
  <text x="300" y="288" text-anchor="middle" font-size="12" font-weight="bold" fill="white">📊 Main Agent Consolidates &amp; Compares</text>
  <text x="300" y="302" text-anchor="middle" font-size="10" fill="#d5f5e3">Provide technology selection advice based on project needs</text>
</svg>
