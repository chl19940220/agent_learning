<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="800" height="440" rx="12" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Foundation Model Landscape and Four Major Trends (2024—2026)</text>

  <!-- [CN] 1-->
  <rect x="30" y="55" width="365" height="110" rx="10" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="2"/>
  <text x="212" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">Trend 1: Reasoning Capability Leap</text>
  <text x="212" y="100" text-anchor="middle" font-size="10" fill="#555">o1 → DeepSeek-R1 → o3/o4 → GPT-5</text>
  <text x="212" y="118" text-anchor="middle" font-size="10" fill="#555">Pure RL training activates autonomous reasoning (GRPO)</text>
  <rect x="50" y="130" width="325" height="22" rx="4" fill="#e74c3c" opacity="0.15"/>
  <text x="212" y="146" text-anchor="middle" font-size="10" fill="#e74c3c">2026: Reasoning has become standard in all mainstream models</text>

  <!-- [CN] 2-->
  <rect x="405" y="55" width="365" height="110" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="587" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498db">Trend 2: Multimodal Fusion</text>
  <text x="587" y="100" text-anchor="middle" font-size="10" fill="#555">Text + Image + Audio + Video</text>
  <text x="587" y="118" text-anchor="middle" font-size="10" fill="#555">GPT-4o native multimodal, Gemini 2.5 Pro</text>
  <rect x="425" y="130" width="325" height="22" rx="4" fill="#3498db" opacity="0.15"/>
  <text x="587" y="146" text-anchor="middle" font-size="10" fill="#3498db">Agents go from "text-only" to "see, hear, and speak"</text>

  <!-- [CN] 3-->
  <rect x="30" y="180" width="365" height="110" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="212" y="203" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">Trend 3: Open Source Catching Up</text>
  <text x="212" y="225" text-anchor="middle" font-size="10" fill="#555">Llama 4 · Qwen 3 · DeepSeek-V3</text>
  <text x="212" y="243" text-anchor="middle" font-size="10" fill="#555">Open source models approach GPT-4o on reasoning tasks</text>
  <rect x="50" y="255" width="325" height="22" rx="4" fill="#27ae60" opacity="0.15"/>
  <text x="212" y="271" text-anchor="middle" font-size="10" fill="#27ae60">Cost reduced 10-100x, local deployment feasible</text>

  <!-- [CN] 4-->
  <rect x="405" y="180" width="365" height="110" rx="10" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="587" y="203" text-anchor="middle" font-size="13" font-weight="bold" fill="#8e44ad">Trend 4: Agent-Native Capabilities</text>
  <text x="587" y="225" text-anchor="middle" font-size="10" fill="#555">Models have built-in tool calls, planning, memory</text>
  <text x="587" y="243" text-anchor="middle" font-size="10" fill="#555">Claude 3.5 Computer Use · GPT-5 Agent Mode</text>
  <rect x="425" y="255" width="325" height="22" rx="4" fill="#8e44ad" opacity="0.15"/>
  <text x="587" y="271" text-anchor="middle" font-size="10" fill="#8e44ad">From "emergent capabilities" to "designed-in capabilities"</text>

  <!-- [CN] -->
  <text x="400" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Agent Developer Selection Guide</text>

  <rect x="30" y="330" width="180" height="90" rx="8" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="120" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c">Quick prototype</text>
  <text x="120" y="372" text-anchor="middle" font-size="10" fill="#555">GPT-4o / Claude 3.5</text>
  <text x="120" y="390" text-anchor="middle" font-size="10" fill="#555">Best capability, quick validation</text>
  <text x="120" y="410" text-anchor="middle" font-size="9" fill="#888">$2.5-15 / 1M tokens</text>

  <rect x="225" y="330" width="180" height="90" rx="8" fill="white" stroke="#e67e22" stroke-width="1.5"/>
  <text x="315" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">Cost-sensitive</text>
  <text x="315" y="372" text-anchor="middle" font-size="10" fill="#555">GPT-4o-mini / Qwen 3</text>
  <text x="315" y="390" text-anchor="middle" font-size="10" fill="#555">Best price-performance</text>
  <text x="315" y="410" text-anchor="middle" font-size="9" fill="#888">$0.15-0.6 / 1M tokens</text>

  <rect x="420" y="330" width="180" height="90" rx="8" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="510" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">Data privacy</text>
  <text x="510" y="372" text-anchor="middle" font-size="10" fill="#555">Llama 4 / DeepSeek-V3</text>
  <text x="510" y="390" text-anchor="middle" font-size="10" fill="#555">Local deployment, data stays in-house</text>
  <text x="510" y="410" text-anchor="middle" font-size="9" fill="#888">GPU hardware cost</text>

  <rect x="615" y="330" width="155" height="90" rx="8" fill="white" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="692" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">Needs fine-tuning</text>
  <text x="692" y="372" text-anchor="middle" font-size="10" fill="#555">Qwen 2.5 / Llama 3</text>
  <text x="692" y="390" text-anchor="middle" font-size="10" fill="#555">LoRA + GRPO training</text>
  <text x="692" y="410" text-anchor="middle" font-size="9" fill="#888">See Chapter 10</text>
</svg>
