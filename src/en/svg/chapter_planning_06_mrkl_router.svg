<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="500" height="380">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
  </defs>
  <rect width="500" height="380" fill="#f8f9fa" rx="12"/>
  <text x="250" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">MRKL: Router + Expert Module Architecture</text>

  <!-- User Input -->
  <rect x="175" y="50" width="150" height="40" rx="10" fill="#4dabf7" opacity="0.2" stroke="#4dabf7" stroke-width="2"/>
  <text x="250" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2980b9">📝 User Input</text>

  <!-- Arrow down -->
  <path d="M 250 92 L 250 120" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Router -->
  <rect x="150" y="123" width="200" height="50" rx="10" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="2"/>
  <text x="250" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9b59b6">🧠 Router (LLM)</text>
  <text x="250" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Analyze input type, route to the right expert</text>

  <!-- Arrows to experts -->
  <path d="M 170 175 L 80 210" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 210 175 L 190 210" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 290 175 L 310 210" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 330 175 L 420 210" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Expert 1: Math -->
  <rect x="20" y="213" width="120" height="55" rx="10" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="1.5"/>
  <text x="80" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">🔢 Math Expert</text>
  <text x="80" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Calculator</text>

  <!-- Expert 2: Knowledge -->
  <rect x="150" y="213" width="120" height="55" rx="10" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="1.5"/>
  <text x="210" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e67e22">🔍 Knowledge Expert</text>
  <text x="210" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Search engine</text>

  <!-- Expert 3: Code -->
  <rect x="280" y="213" width="120" height="55" rx="10" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="340" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c">💻 Code Expert</text>
  <text x="340" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Python executor</text>

  <!-- Expert 4: LLM -->
  <rect x="410" y="213" width="75" height="55" rx="10" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="1.5"/>
  <text x="447" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3498db">💬 Common sense</text>
  <text x="447" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">LLM itself</text>

  <!-- Arrows down to aggregation -->
  <path d="M 80 270 L 210 300" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 210 270 L 220 300" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 340 270 L 260 300" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 447 270 L 280 300" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Aggregation -->
  <rect x="155" y="300" width="190" height="40" rx="10" fill="#27ae60" opacity="0.2" stroke="#27ae60" stroke-width="2"/>
  <text x="250" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">📋 Aggregate Answer</text>

  <!-- Note -->
  <text x="250" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Routes to predefined expert modules based on input type (hard-coded routing)</text>
</svg>
