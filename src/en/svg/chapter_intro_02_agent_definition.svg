<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4dabf7"/>
    </marker>
  </defs>
  <rect width="700" height="320" fill="#f8f9fa" rx="12"/>
  <text x="350" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Four Key Elements of the Agent Definition</text>

  <!-- Center target -->
  <circle cx="350" cy="175" r="45" fill="#4dabf7" opacity="0.9"/>
  <text x="350" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">🎯 Specific</text>
  <text x="350" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Goal</text>

  <!-- Autonomy - top left -->
  <rect x="50" y="60" width="160" height="80" rx="10" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="2"/>
  <text x="130" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">🧠 Autonomy</text>
  <text x="130" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Doesn't need humans to</text>
  <text x="130" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">guide step by step</text>
  <path d="M 210 115 L 308 155" stroke="#e74c3c" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.7"/>

  <!-- Perception - top right -->
  <rect x="490" y="60" width="160" height="80" rx="10" fill="#9b59b6" opacity="0.12" stroke="#9b59b6" stroke-width="2"/>
  <text x="570" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9b59b6">👁️ Perception</text>
  <text x="570" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Receives external</text>
  <text x="570" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">information input</text>
  <path d="M 490 115 L 392 155" stroke="#9b59b6" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.7"/>

  <!-- Reasoning - bottom left -->
  <rect x="50" y="210" width="160" height="80" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="130" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#27ae60">💡 Reasoning</text>
  <text x="130" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Analyze information</text>
  <text x="130" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Formulate plans</text>
  <path d="M 210 235 L 308 195" stroke="#27ae60" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.7"/>

  <!-- Action - bottom right -->
  <rect x="490" y="210" width="160" height="80" rx="10" fill="#f39c12" opacity="0.12" stroke="#f39c12" stroke-width="2"/>
  <text x="570" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f39c12">💪 Action</text>
  <text x="570" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Execute operations</text>
  <text x="570" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Change the environment</text>
  <path d="M 490 235 L 392 195" stroke="#f39c12" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.7"/>
</svg>
