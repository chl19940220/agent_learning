<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <marker id="arr-ev03" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
    <filter id="sh-ev03">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="350" fill="#f8f9fa" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Prompt Tuning Iterative Loop</text>
  <text x="400" y="48" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#777">Systematic four-step iteration method to continuously improve Agent performance</text>

  <!-- Central Loop -->
  <!-- Step 1: Define Problem -->
  <rect x="300" y="70" width="200" height="65" rx="10" fill="#e74c3c" filter="url(#sh-ev03)"/>
  <text x="400" y="92" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">① 🔍 Identify Problem</text>
  <text x="400" y="110" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#f5c6cb">On which tasks does the</text>
  <text x="400" y="126" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#f5c6cb">Agent perform poorly? Collect failure cases</text>

  <!-- Step 2: Analyze Root Cause -->
  <rect x="560" y="170" width="200" height="65" rx="10" fill="#e67e22" filter="url(#sh-ev03)"/>
  <text x="660" y="192" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">② 🔬 Analyze Root Cause</text>
  <text x="660" y="210" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#fde2c4">Unclear instructions? Insufficient context?</text>
  <text x="660" y="226" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#fde2c4">Wrong format? Identify root cause</text>

  <!-- Step 3: Modify Prompt -->
  <rect x="300" y="260" width="200" height="65" rx="10" fill="#27ae60" filter="url(#sh-ev03)"/>
  <text x="400" y="282" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">③ ✏️ Modify Prompt</text>
  <text x="400" y="300" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#d4f0e0">Targeted adjustment of specific parts</text>
  <text x="400" y="316" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#d4f0e0">Change only one variable at a time</text>

  <!-- Step 4: Comparative Evaluation -->
  <rect x="40" y="170" width="200" height="65" rx="10" fill="#3498db" filter="url(#sh-ev03)"/>
  <text x="140" y="192" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">④ 📊 Comparative Evaluation</text>
  <text x="140" y="210" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#d4e6f9">Use benchmarks to verify improvement</text>
  <text x="140" y="226" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#d4e6f9">Compare A/B version results</text>

  <!-- Arrow：1 → 2 -->
  <path d="M500,102 Q535,102 555,150 L558,168" fill="none" stroke="#e74c3c" stroke-width="2" marker-end="url(#arr-ev03)"/>

  <!-- Arrow：2 → 3 -->
  <path d="M660,235 Q660,255 555,270 L500,280" fill="none" stroke="#e67e22" stroke-width="2" marker-end="url(#arr-ev03)"/>

  <!-- Arrow：3 → 4 -->
  <path d="M300,293 Q260,293 245,260 L242,235" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-ev03)"/>

  <!-- Arrow：4 → 1（[CN]） -->
  <path d="M140,170 Q140,130 240,100 L298,88" fill="none" stroke="#3498db" stroke-width="2" marker-end="url(#arr-ev03)"/>

  <!-- Center: Loop Marker -->
  <circle cx="400" cy="195" r="30" fill="#2c3e50" opacity="0.9"/>
  <text x="400" y="192" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="white">🔄 Iterate</text>
  <text x="400" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#bdc3c7">Until satisfied</text>

  <!-- Bottom-right Tip -->
  <rect x="560" y="270" width="210" height="60" rx="6" fill="white" stroke="#f39c12" stroke-width="1"/>
  <text x="665" y="290" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" font-weight="bold" fill="#f39c12">📌 Tuning Principles</text>
  <text x="665" y="306" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#555">• Change only one variable at a time</text>
  <text x="665" y="320" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#555">• Let data speak, not intuition</text>
</svg>