<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320">
  <rect width="760" height="320" fill="#f0f4f8" rx="14"/>
  <text x="380" y="36" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Agent Service Containerized Deployment Flow</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- Stage 1: Development -->
  <rect x="30" y="70" width="130" height="80" rx="14" fill="#3498db" opacity="0.15"/>
  <rect x="30" y="70" width="130" height="30" rx="14" fill="#3498db"/>
  <rect x="30" y="88" width="130" height="12" fill="#3498db"/>
  <text x="95" y="90" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">1. Development</text>
  <text x="95" y="118" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">app.py</text>
  <text x="95" y="136" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">requirements.txt</text>

  <line x1="160" y1="110" x2="190" y2="110" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2: Dockerfile -->
  <rect x="195" y="70" width="130" height="80" rx="14" fill="#27ae60" opacity="0.15"/>
  <rect x="195" y="70" width="130" height="30" rx="14" fill="#27ae60"/>
  <rect x="195" y="88" width="130" height="12" fill="#27ae60"/>
  <text x="260" y="90" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">2. Build</text>
  <text x="260" y="118" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">Dockerfile</text>
  <text x="260" y="136" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">Multi-stage build</text>

  <line x1="325" y1="110" x2="355" y2="110" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 3: Compose -->
  <rect x="360" y="70" width="130" height="80" rx="14" fill="#e67e22" opacity="0.15"/>
  <rect x="360" y="70" width="130" height="30" rx="14" fill="#e67e22"/>
  <rect x="360" y="88" width="130" height="12" fill="#e67e22"/>
  <text x="425" y="90" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">3. Orchestration</text>
  <text x="425" y="118" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">docker-compose.yml</text>
  <text x="425" y="136" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">API + Redis + Nginx</text>

  <line x1="490" y1="110" x2="520" y2="110" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 4: Deployment -->
  <rect x="525" y="70" width="130" height="80" rx="14" fill="#9b59b6" opacity="0.15"/>
  <rect x="525" y="70" width="130" height="30" rx="14" fill="#9b59b6"/>
  <rect x="525" y="88" width="130" height="12" fill="#9b59b6"/>
  <text x="590" y="90" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="white">4. Deploy</text>
  <text x="590" y="118" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">docker compose up</text>
  <text x="590" y="136" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#2c3e50">Health check + monitoring</text>

  <!-- Bottom: Container Orchestration Details -->
  <rect x="80" y="190" width="600" height="100" rx="14" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <text x="380" y="210" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Docker Compose Service Orchestration</text>

  <!-- Agent API -->
  <rect x="110" y="225" width="140" height="45" rx="10" fill="#3498db" opacity="0.2" stroke="#3498db" stroke-width="1"/>
  <text x="180" y="245" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#3498db">🤖 Agent API</text>
  <text x="180" y="262" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#7f8c8d">FastAPI + Uvicorn</text>

  <!-- Redis -->
  <rect x="310" y="225" width="140" height="45" rx="10" fill="#e74c3c" opacity="0.2" stroke="#e74c3c" stroke-width="1"/>
  <text x="380" y="245" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#e74c3c">💾 Redis</text>
  <text x="380" y="262" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#7f8c8d">Session + cache</text>

  <!-- Nginx -->
  <rect x="510" y="225" width="140" height="45" rx="10" fill="#27ae60" opacity="0.2" stroke="#27ae60" stroke-width="1"/>
  <text x="580" y="245" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">🌐 Nginx</text>
  <text x="580" y="262" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#7f8c8d">Reverse proxy + rate limiting</text>

  <!-- Connections -->
  <line x1="250" y1="248" x2="310" y2="248" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4"/>
  <line x1="450" y1="248" x2="510" y2="248" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4"/>
</svg>
