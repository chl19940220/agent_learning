<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 130" width="720" height="130" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="720" height="130" rx="12" fill="#f8f9fa"/>
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Function Calling Complete Flow</text>

  <!-- Step 1 -->
  <rect x="16" y="40" width="118" height="72" rx="8" fill="#3498db" opacity="0.12"/>
  <rect x="16" y="40" width="118" height="6" rx="4" fill="#3498db"/>
  <text x="75" y="66" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">Step 1</text>
  <text x="75" y="82" text-anchor="middle" font-size="11" fill="#2c3e50">Define Tools</text>
  <text x="75" y="97" text-anchor="middle" font-size="10" fill="#7f8c8d">JSON Schema</text>
  <text x="75" y="109" text-anchor="middle" font-size="10" fill="#7f8c8d">describe functions</text>

  <line x1="134" y1="76" x2="150" y2="76" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="152" y="40" width="118" height="72" rx="8" fill="#9b59b6" opacity="0.12"/>
  <rect x="152" y="40" width="118" height="6" rx="4" fill="#9b59b6"/>
  <text x="211" y="66" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">Step 2</text>
  <text x="211" y="82" text-anchor="middle" font-size="11" fill="#2c3e50">LLM Reasoning</text>
  <text x="211" y="97" text-anchor="middle" font-size="10" fill="#7f8c8d">Analyze request</text>
  <text x="211" y="109" text-anchor="middle" font-size="10" fill="#7f8c8d">Decide to call</text>

  <line x1="270" y1="76" x2="286" y2="76" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="288" y="40" width="118" height="72" rx="8" fill="#27ae60" opacity="0.12"/>
  <rect x="288" y="40" width="118" height="6" rx="4" fill="#27ae60"/>
  <text x="347" y="66" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">Step 3</text>
  <text x="347" y="82" text-anchor="middle" font-size="11" fill="#2c3e50">App Execution</text>
  <text x="347" y="97" text-anchor="middle" font-size="10" fill="#7f8c8d">Parse parameters</text>
  <text x="347" y="109" text-anchor="middle" font-size="10" fill="#7f8c8d">Invoke function</text>

  <line x1="406" y1="76" x2="422" y2="76" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="424" y="40" width="118" height="72" rx="8" fill="#e67e22" opacity="0.12"/>
  <rect x="424" y="40" width="118" height="6" rx="4" fill="#e67e22"/>
  <text x="483" y="66" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">Step 4</text>
  <text x="483" y="82" text-anchor="middle" font-size="11" fill="#2c3e50">Return Result</text>
  <text x="483" y="97" text-anchor="middle" font-size="10" fill="#7f8c8d">tool message</text>
  <text x="483" y="109" text-anchor="middle" font-size="10" fill="#7f8c8d">return result</text>

  <line x1="542" y1="76" x2="558" y2="76" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="560" y="40" width="144" height="72" rx="8" fill="#e74c3c" opacity="0.12"/>
  <rect x="560" y="40" width="144" height="6" rx="4" fill="#e74c3c"/>
  <text x="632" y="66" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c">Step 5</text>
  <text x="632" y="82" text-anchor="middle" font-size="11" fill="#2c3e50">Final Reply</text>
  <text x="632" y="97" text-anchor="middle" font-size="10" fill="#7f8c8d">Based on tool results</text>
  <text x="632" y="109" text-anchor="middle" font-size="10" fill="#7f8c8d">natural language reply</text>
</svg>
