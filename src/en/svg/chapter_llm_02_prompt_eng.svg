<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="pa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3498db"/>
    </marker>
  </defs>
  <rect width="800" height="380" rx="12" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Prompt Engineering: Message Structure and Role Division</text>

  <!-- [CN] -->
  <rect x="30" y="60" width="235" height="140" rx="10" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="2"/>
  <text x="147" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">🎭 System Message</text>
  <text x="147" y="108" text-anchor="middle" font-size="11" fill="#555">Set the Agent's identity and behavior rules</text>
  <rect x="50" y="120" width="195" height="65" rx="6" fill="white" stroke="#e74c3c" stroke-width="1"/>
  <text x="147" y="140" text-anchor="middle" font-size="10" fill="#c0392b" font-style="italic">"You are a senior data analyst,</text>
  <text x="147" y="156" text-anchor="middle" font-size="10" fill="#c0392b" font-style="italic">skilled at explaining complex concepts in plain language.</text>
  <text x="147" y="172" text-anchor="middle" font-size="10" fill="#c0392b" font-style="italic">Always provide data sources."</text>

  <rect x="283" y="60" width="235" height="140" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#3498db">👤 User Message</text>
  <text x="400" y="108" text-anchor="middle" font-size="11" fill="#555">User's input and questions</text>
  <rect x="303" y="120" width="195" height="65" rx="6" fill="white" stroke="#3498db" stroke-width="1"/>
  <text x="400" y="140" text-anchor="middle" font-size="10" fill="#2980b9" font-style="italic">"Help me analyze the past three months'</text>
  <text x="400" y="156" text-anchor="middle" font-size="10" fill="#2980b9" font-style="italic">user growth trends,</text>
  <text x="400" y="172" text-anchor="middle" font-size="10" fill="#2980b9" font-style="italic">and identify key inflection points."</text>

  <rect x="536" y="60" width="235" height="140" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="653" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">🤖 Assistant Message</text>
  <text x="653" y="108" text-anchor="middle" font-size="11" fill="#555">Model's reply (also used for Few-shot)</text>
  <rect x="556" y="120" width="195" height="65" rx="6" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="653" y="140" text-anchor="middle" font-size="10" fill="#27ae60" font-style="italic">"Based on data analysis,</text>
  <text x="653" y="156" text-anchor="middle" font-size="10" fill="#27ae60" font-style="italic">user growth inflected on Feb 15,</text>
  <text x="653" y="172" text-anchor="middle" font-size="10" fill="#27ae60" font-style="italic">mainly due to the marketing campaign launch..."</text>

  <!-- [CN] -->
  <line x1="265" y1="130" x2="281" y2="130" stroke="#3498db" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#pa)"/>
  <line x1="518" y1="130" x2="534" y2="130" stroke="#3498db" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#pa)"/>

  <!--PromptEngineering [CN] -->
  <text x="400" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Core Prompt Techniques</text>

  <rect x="30" y="245" width="175" height="115" rx="8" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="117" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c">Role setting</text>
  <text x="117" y="290" text-anchor="middle" font-size="10" fill="#555">Define professional identity</text>
  <text x="117" y="307" text-anchor="middle" font-size="10" fill="#555">Set output style</text>
  <text x="117" y="324" text-anchor="middle" font-size="10" fill="#555">Limit answer scope</text>
  <text x="117" y="348" text-anchor="middle" font-size="9" fill="#888">Impact: ★★★★★</text>

  <rect x="220" y="245" width="175" height="115" rx="8" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <text x="307" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#3498db">Instruction clarity</text>
  <text x="307" y="290" text-anchor="middle" font-size="10" fill="#555">Clarify task goal</text>
  <text x="307" y="307" text-anchor="middle" font-size="10" fill="#555">Specify output format</text>
  <text x="307" y="324" text-anchor="middle" font-size="10" fill="#555">Add constraints</text>
  <text x="307" y="348" text-anchor="middle" font-size="9" fill="#888">Impact: ★★★★★</text>

  <rect x="410" y="245" width="175" height="115" rx="8" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="497" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">Context injection</text>
  <text x="497" y="290" text-anchor="middle" font-size="10" fill="#555">Provide background info</text>
  <text x="497" y="307" text-anchor="middle" font-size="10" fill="#555">Few-shot examples</text>
  <text x="497" y="324" text-anchor="middle" font-size="10" fill="#555">Reference doc snippets</text>
  <text x="497" y="348" text-anchor="middle" font-size="9" fill="#888">Impact: ★★★★</text>

  <rect x="600" y="245" width="175" height="115" rx="8" fill="white" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="687" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">Output control</text>
  <text x="687" y="290" text-anchor="middle" font-size="10" fill="#555">JSON / Markdown</text>
  <text x="687" y="307" text-anchor="middle" font-size="10" fill="#555">Word limit</text>
  <text x="687" y="324" text-anchor="middle" font-size="10" fill="#555">Language/tone requirements</text>
  <text x="687" y="348" text-anchor="middle" font-size="9" fill="#888">Impact: ★★★</text>
</svg>
