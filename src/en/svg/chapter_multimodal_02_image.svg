<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="800" height="380" rx="12" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Vision Model Capability Boundaries &amp; Image Generation</text>

  <!-- Capability assessment -->
  <text x="400" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">GPT-4o Vision Capability Assessment</text>

  <rect x="30" y="75" width="120" height="60" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.5"/>
  <text x="90" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">Scene Description</text>
  <text x="90" y="116" text-anchor="middle" font-size="10" fill="#27ae60">⭐⭐⭐⭐⭐</text>
  <text x="90" y="130" text-anchor="middle" font-size="8" fill="#888">Most mature</text>

  <rect x="160" y="75" width="120" height="60" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.5"/>
  <text x="220" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">Text Recognition</text>
  <text x="220" y="116" text-anchor="middle" font-size="10" fill="#27ae60">⭐⭐⭐⭐</text>
  <text x="220" y="130" text-anchor="middle" font-size="8" fill="#888">Handwriting weaker</text>

  <rect x="290" y="75" width="120" height="60" rx="8" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="350" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#e67e22">Chart Analysis</text>
  <text x="350" y="116" text-anchor="middle" font-size="10" fill="#e67e22">⭐⭐⭐⭐</text>
  <text x="350" y="130" text-anchor="middle" font-size="8" fill="#888">Dense data weaker</text>

  <rect x="420" y="75" width="120" height="60" rx="8" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="480" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#e67e22">Spatial Reasoning</text>
  <text x="480" y="116" text-anchor="middle" font-size="10" fill="#e67e22">⭐⭐⭐</text>
  <text x="480" y="130" text-anchor="middle" font-size="8" fill="#888">Distance inaccurate</text>

  <rect x="550" y="75" width="120" height="60" rx="8" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="610" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#e74c3c">Counting</text>
  <text x="610" y="116" text-anchor="middle" font-size="10" fill="#e74c3c">⭐⭐</text>
  <text x="610" y="130" text-anchor="middle" font-size="8" fill="#888">&gt;10 error-prone</text>

  <rect x="680" y="75" width="95" height="60" rx="8" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="727" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#e74c3c">Specialized Domain</text>
  <text x="727" y="116" text-anchor="middle" font-size="10" fill="#e74c3c">⭐⭐⭐</text>
  <text x="727" y="130" text-anchor="middle" font-size="8" fill="#888">Not replacing experts</text>

  <!-- Two technologies -->
  <rect x="30" y="155" width="365" height="200" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="212" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#3498db">🔍 Image Understanding (GPT-4o Vision)</text>

  <rect x="50" y="195" width="325" height="35" rx="6" fill="white" stroke="#3498db" stroke-width="1"/>
  <text x="212" y="218" text-anchor="middle" font-size="10" fill="#555">Input: image URL / Base64 encoding</text>

  <rect x="50" y="240" width="325" height="35" rx="6" fill="white" stroke="#3498db" stroke-width="1"/>
  <text x="212" y="263" text-anchor="middle" font-size="10" fill="#555">Capabilities: scene description, OCR, chart data extraction</text>

  <rect x="50" y="285" width="325" height="35" rx="6" fill="white" stroke="#3498db" stroke-width="1"/>
  <text x="212" y="308" text-anchor="middle" font-size="10" fill="#555">Tip: detail=low/high controls precision and cost</text>

  <rect x="50" y="330" width="325" height="18" rx="4" fill="#e8f4fd"/>
  <text x="212" y="344" text-anchor="middle" font-size="9" fill="#3498db">Agent use cases: invoice extraction, screenshot-to-code, chart analysis</text>

  <!-- Image generation -->
  <rect x="405" y="155" width="365" height="200" rx="10" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="587" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#8e44ad">🎨 Image Generation (DALL-E 3)</text>

  <rect x="425" y="195" width="325" height="35" rx="6" fill="white" stroke="#8e44ad" stroke-width="1"/>
  <text x="587" y="218" text-anchor="middle" font-size="10" fill="#555">Input: text description → auto-enhanced prompt</text>

  <rect x="425" y="240" width="325" height="35" rx="6" fill="white" stroke="#8e44ad" stroke-width="1"/>
  <text x="587" y="263" text-anchor="middle" font-size="10" fill="#555">Sizes: 1024×1024 / 1792×1024 / 1024×1792</text>

  <rect x="425" y="285" width="325" height="35" rx="6" fill="white" stroke="#8e44ad" stroke-width="1"/>
  <text x="587" y="308" text-anchor="middle" font-size="10" fill="#555">Style: vivid (vibrant) / natural (realistic)</text>

  <rect x="425" y="330" width="325" height="18" rx="4" fill="#f0e6f6"/>
  <text x="587" y="344" text-anchor="middle" font-size="9" fill="#8e44ad">Agent use cases: slide illustrations, product prototypes, creative design</text>
</svg>
