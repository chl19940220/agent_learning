<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 580" width="520" height="580">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="520" height="580" rx="14" fill="#f0f4f8"/>
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Main Chain: Full Journey of One Request</text>

  <!---->
  <rect x="160" y="45" width="200" height="36" rx="18" fill="#2c3e50"/>
  <text x="260" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="white">User Types in Terminal and Presses Enter</text>
  <line x1="260" y1="81" x2="260" y2="100" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!--main.tsx-->
  <rect x="60" y="103" width="400" height="52" rx="8" fill="#3498db"/>
  <text x="260" y="123" text-anchor="middle" font-size="12" font-weight="bold" fill="white">main.tsx Parallel Init</text>
  <text x="260" y="140" text-anchor="middle" font-size="10" fill="#d6eaf8">Pull Env Info · Load CLAUDE.md · Init MCP · Prepare Tool List</text>
  <line x1="260" y1="155" x2="260" y2="174" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!--QueryEngine-->
  <rect x="60" y="177" width="400" height="40" rx="8" fill="#9b59b6"/>
  <text x="260" y="197" text-anchor="middle" font-size="12" font-weight="bold" fill="white">QueryEngine.submitMessage()</text>
  <text x="260" y="211" text-anchor="middle" font-size="10" fill="#e8daef">Session-level Stateful Object, Maintains Full Dialog History</text>
  <line x1="260" y1="217" x2="260" y2="236" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!--System Prompt-->
  <rect x="60" y="239" width="400" height="40" rx="8" fill="#9b59b6"/>
  <text x="260" y="259" text-anchor="middle" font-size="12" font-weight="bold" fill="white">fetchSystemPromptParts()</text>
  <text x="260" y="273" text-anchor="middle" font-size="10" fill="#e8daef">Assemble System Prompt: Static Zone + Dynamic Zone</text>
  <line x1="260" y1="279" x2="260" y2="298" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!--processUserInput-->
  <rect x="60" y="301" width="400" height="40" rx="8" fill="#9b59b6"/>
  <text x="260" y="321" text-anchor="middle" font-size="12" font-weight="bold" fill="white">processUserInput()</text>
  <text x="260" y="335" text-anchor="middle" font-size="10" fill="#e8daef">Format Messages, Inject CLAUDE.md as XML Tags</text>
  <line x1="260" y1="341" x2="260" y2="360" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!--TAOR-->
  <rect x="60" y="363" width="400" height="100" rx="8" fill="#e67e22"/>
  <text x="260" y="383" text-anchor="middle" font-size="12" font-weight="bold" fill="white">query.ts Main Loop (TAOR Agent Loop)</text>
  <text x="260" y="400" text-anchor="middle" font-size="10" fill="#fdebd0">Think: Send to Claude API, Get Streaming Response</text>
  <text x="260" y="415" text-anchor="middle" font-size="10" fill="#fdebd0">Act: Parse Tool Call, Send to Tool System</text>
  <text x="260" y="430" text-anchor="middle" font-size="10" fill="#fdebd0">Gate: Permission Decision (Allow / Deny / Ask)</text>
  <text x="260" y="445" text-anchor="middle" font-size="10" fill="#fdebd0">Observe: Inject Tool Results into Dialog Context, Repeat</text>
  <line x1="260" y1="463" x2="260" y2="482" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!--compact/memory-->
  <rect x="60" y="485" width="400" height="36" rx="8" fill="#27ae60"/>
  <text x="260" y="505" text-anchor="middle" font-size="12" font-weight="bold" fill="white">compact / memory Management</text>
  <text x="260" y="519" text-anchor="middle" font-size="10" fill="#d5f5e3">Context Utilization > 40% Triggers Compression</text>
  <line x1="260" y1="521" x2="260" y2="540" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!---->
  <rect x="160" y="543" width="200" height="30" rx="15" fill="#2c3e50"/>
  <text x="260" y="563" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Presentation Layer Renders Response</text>
</svg>
