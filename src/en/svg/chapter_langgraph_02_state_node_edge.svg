<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <marker id="arrow-lg02" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
    <marker id="arrow-blue-lg02" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
    <marker id="arrow-green-lg02" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
    <filter id="shadow-lg02">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">LangGraph Three Core Concepts: State · Node · Edge</text>

  <!-- ===== State Region ===== -->
  <rect x="30" y="55" width="230" height="340" rx="10" fill="#3498db" opacity="0.08" stroke="#3498db" stroke-width="2"/>
  <text x="145" y="80" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#2980b9">📦 State</text>
  <text x="145" y="98" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#555">Data hub, all nodes share read/write</text>

  <!--State [CN] -->
  <rect x="50" y="115" width="190" height="36" rx="6" fill="white" stroke="#3498db" stroke-width="1.5" filter="url(#shadow-lg02)"/>
  <text x="145" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2980b9">TypedDict</text>
  <text x="145" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#777">Define fields and types</text>

  <rect x="50" y="162" width="190" height="36" rx="6" fill="white" stroke="#3498db" stroke-width="1.5" filter="url(#shadow-lg02)"/>
  <text x="145" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2980b9">Annotated + Reducer</text>
  <text x="145" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#777">Define field merge strategy</text>

  <rect x="50" y="209" width="190" height="36" rx="6" fill="white" stroke="#3498db" stroke-width="1.5" filter="url(#shadow-lg02)"/>
  <text x="145" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2980b9">MessagesState</text>
  <text x="145" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#777">Built-in message list (recommended)</text>

  <rect x="50" y="256" width="190" height="36" rx="6" fill="white" stroke="#3498db" stroke-width="1.5" filter="url(#shadow-lg02)"/>
  <text x="145" y="271" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2980b9">Checkpoint</text>
  <text x="145" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#777">Persistent snapshots, checkpoint recovery</text>

  <!--State [CN] -->
  <rect x="50" y="303" width="190" height="40" rx="6" fill="#2c3e50"/>
  <text x="60" y="319" font-family="Courier New, monospace" font-size="9" fill="#98c379">messages: Annotated[</text>
  <text x="60" y="335" font-family="Courier New, monospace" font-size="9" fill="#98c379">  list, add_messages]</text>

  <!--State→Node/Edge [CN] Line-->
  <text x="145" y="370" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#2980b9">⚡ Nodes read/write State</text>
  <text x="145" y="385" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#2980b9">⚡ Edges route based on State</text>

  <!-- ===== Node Region ===== -->
  <rect x="285" y="55" width="230" height="340" rx="10" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="80" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#27ae60">⚙️ Node</text>
  <text x="400" y="98" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#555">Processing unit, executes specific logic</text>

  <!--Node [CN] -->
  <rect x="305" y="115" width="190" height="42" rx="6" fill="white" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow-lg02)"/>
  <text x="400" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">🤖 Agent Node</text>
  <text x="400" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#777">Call LLM for decisions</text>

  <rect x="305" y="168" width="190" height="42" rx="6" fill="white" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow-lg02)"/>
  <text x="400" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">🔧 Tool Node</text>
  <text x="400" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#777">Execute tool calls</text>

  <rect x="305" y="221" width="190" height="42" rx="6" fill="white" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow-lg02)"/>
  <text x="400" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">📝 Custom Node</text>
  <text x="400" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#777">Any Python function</text>

  <!--Node [CN] -->
  <rect x="305" y="278" width="190" height="60" rx="6" fill="#27ae60" opacity="0.06"/>
  <text x="400" y="296" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#27ae60">📌 Key Rules</text>
  <text x="400" y="312" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#555">Input: State → Output: State update</text>
  <text x="400" y="328" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#555">Reducer determines merge method</text>

  <!--Node [CN] -->
  <rect x="305" y="348" width="190" height="40" rx="6" fill="#2c3e50"/>
  <text x="315" y="364" font-family="Courier New, monospace" font-size="9" fill="#c678dd">def</text>
  <text x="335" y="364" font-family="Courier New, monospace" font-size="9" fill="#61afef"> node</text>
  <text x="365" y="364" font-family="Courier New, monospace" font-size="9" fill="#98c379">(state) -> dict</text>
  <text x="315" y="380" font-family="Courier New, monospace" font-size="9" fill="#98c379">  return {"messages": [r]}</text>

  <!-- ===== Edge Region ===== -->
  <rect x="540" y="55" width="230" height="340" rx="10" fill="#e67e22" opacity="0.08" stroke="#e67e22" stroke-width="2"/>
  <text x="655" y="80" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#e67e22">🔀 Edge</text>
  <text x="655" y="98" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#555">Connects nodes, controls execution flow</text>

  <!--Edge [CN] -->
  <rect x="560" y="115" width="190" height="50" rx="6" fill="white" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow-lg02)"/>
  <text x="655" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e67e22">➡️ Normal Edge</text>
  <text x="655" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#777">add_edge(A, B)</text>
  <text x="655" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999">Fixed route: after A completes, always goes to B</text>

  <rect x="560" y="178" width="190" height="50" rx="6" fill="white" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow-lg02)"/>
  <text x="655" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e67e22">🔀 Conditional Edge</text>
  <text x="655" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#777">add_conditional_edges()</text>
  <text x="655" y="223" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999">Dynamic routing: determine destination based on State</text>

  <rect x="560" y="241" width="190" height="42" rx="6" fill="white" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow-lg02)"/>
  <text x="655" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e67e22">🏁 START / END</text>
  <text x="655" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#777">Entry and exit nodes of the graph</text>

  <!--Edge [CN] -->
  <rect x="570" y="298" width="170" height="85" rx="8" fill="#e67e22" opacity="0.06"/>
  <text x="655" y="316" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#e67e22">Typical combination patterns</text>

  <!-- [CN] Diagram [CN] -->
  <circle cx="600" cy="342" r="10" fill="#3498db"/>
  <text x="600" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">S</text>

  <circle cx="655" cy="342" r="10" fill="#27ae60"/>
  <text x="655" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">A</text>

  <circle cx="710" cy="325" r="10" fill="#e67e22"/>
  <text x="710" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">T</text>

  <circle cx="710" cy="362" r="10" fill="#e74c3c"/>
  <text x="710" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">E</text>

  <!-- [CN] Arrow-->
  <line x1="611" y1="342" x2="643" y2="342" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow-lg02)"/>
  <line x1="665" y1="336" x2="698" y2="327" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow-lg02)"/>
  <line x1="665" y1="348" x2="698" y2="358" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow-lg02)"/>
  <path d="M710,315 Q710,300 670,300 Q645,300 645,332" fill="none" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow-lg02)"/>

  <!-- [CN] Arrow：State→Node-->
  <line x1="260" y1="175" x2="283" y2="175" stroke="#3498db" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-blue-lg02)"/>

  <!-- [CN] Arrow：Node→Edge-->
  <line x1="515" y1="175" x2="538" y2="175" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-green-lg02)"/>
</svg>