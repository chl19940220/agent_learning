<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" width="1100" height="420">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="1100" height="420" fill="#f8f9fa" rx="12"/>
  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#2c3e50">AI Interaction Evolution Timeline</text>

  <!-- Timeline axis -->
  <line x1="60" y1="100" x2="1040" y2="100" stroke="#bdc3c7" stroke-width="3"/>
  <path d="M 1035 95 L 1045 100 L 1035 105 z" fill="#bdc3c7"/>

  <!-- 1966 -->
  <circle cx="80" cy="100" r="10" fill="#3498db"/>
  <text x="80" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3498db">1966</text>
  <rect x="35" y="115" width="90" height="60" rx="8" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="1.5"/>
  <text x="80" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3498db">ELIZA</text>
  <text x="80" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">First chatbot</text>
  <text x="80" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">(pattern matching)</text>

  <!-- 1995 -->
  <circle cx="190" cy="100" r="10" fill="#e67e22"/>
  <text x="190" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e67e22">1995</text>
  <rect x="143" y="115" width="94" height="60" rx="8" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="190" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e67e22">ALICE</text>
  <text x="190" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Rule-driven</text>
  <text x="190" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Dialogue System</text>

  <!-- 2011 -->
  <circle cx="310" cy="100" r="10" fill="#9b59b6"/>
  <text x="310" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9b59b6">2011</text>
  <rect x="263" y="115" width="94" height="60" rx="8" fill="#9b59b6" opacity="0.12" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="310" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9b59b6">Siri / Cortana</text>
  <text x="310" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Voice Assistant</text>
  <text x="310" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Era</text>

  <!-- 2016 -->
  <circle cx="430" cy="100" r="10" fill="#e74c3c"/>
  <text x="430" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c">2016</text>
  <rect x="383" y="115" width="94" height="60" rx="8" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="430" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e74c3c">Customer Service Bot</text>
  <text x="430" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Intent Recognition</text>
  <text x="430" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Dialogue System</text>

  <!-- 2022 -->
  <circle cx="550" cy="100" r="10" fill="#27ae60"/>
  <text x="550" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">2022</text>
  <rect x="503" y="115" width="94" height="60" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.5"/>
  <text x="550" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">ChatGPT</text>
  <text x="550" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">LLM-driven</text>
  <text x="550" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Conversational AI</text>

  <!-- 2023 -->
  <circle cx="660" cy="100" r="10" fill="#1abc9c"/>
  <text x="660" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1abc9c">2023</text>
  <rect x="613" y="115" width="94" height="60" rx="8" fill="#1abc9c" opacity="0.12" stroke="#1abc9c" stroke-width="1.5"/>
  <text x="660" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1abc9c">AutoGPT</text>
  <text x="660" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Agent concept</text>
  <text x="660" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">explosion</text>

  <!-- 2024 -->
  <circle cx="770" cy="100" r="10" fill="#f39c12"/>
  <text x="770" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f39c12">2024</text>
  <rect x="723" y="115" width="94" height="60" rx="8" fill="#f39c12" opacity="0.12" stroke="#f39c12" stroke-width="1.5"/>
  <text x="770" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f39c12">Multimodal</text>
  <text x="770" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Multi-Agent Systems</text>
  <text x="770" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Ecosystem maturation</text>

  <!-- 2025 -->
  <circle cx="880" cy="100" r="10" fill="#8e44ad"/>
  <text x="880" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8e44ad">2025</text>
  <rect x="833" y="115" width="94" height="60" rx="8" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="880" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8e44ad">Reasoning Agent</text>
  <text x="880" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">DeepSeek-R1</text>
  <text x="880" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Claude 3.5 rises</text>

  <!-- 2026 -->
  <circle cx="990" cy="100" r="10" fill="#c0392b"/>
  <text x="990" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c0392b">2026</text>
  <rect x="943" y="115" width="94" height="60" rx="8" fill="#c0392b" opacity="0.12" stroke="#c0392b" stroke-width="1.5"/>
  <text x="990" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c0392b">OpenClaw</text>
  <text x="990" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Agent OS</text>
  <text x="990" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Era begins</text>

  <!-- Evolution arrow labels -->
  <text x="550" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">Rule matching → Intent recognition → Language understanding → Autonomous action → Deep reasoning → Agent OS</text>

  <!-- Five generation boxes -->
  <rect x="30" y="268" width="155" height="110" rx="10" fill="#e74c3c" opacity="0.1" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="107" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c">Generation 1</text>
  <text x="107" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Rule-based Bot</text>
  <text x="107" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Keyword matching</text>
  <text x="107" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">No understanding</text>
  <text x="107" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">1966 - 2010</text>

  <rect x="200" y="268" width="155" height="110" rx="10" fill="#e67e22" opacity="0.1" stroke="#e67e22" stroke-width="1.5"/>
  <text x="277" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e67e22">Generation 2</text>
  <text x="277" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Intent RecognitionSystem</text>
  <text x="277" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">NLP + slot filling</text>
  <text x="277" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Limited understanding</text>
  <text x="277" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">2011 - 2021</text>

  <rect x="370" y="268" width="155" height="110" rx="10" fill="#3498db" opacity="0.1" stroke="#3498db" stroke-width="1.5"/>
  <text x="447" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3498db">Generation 3</text>
  <text x="447" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">LLM Conversational AI</text>
  <text x="447" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Strong language understanding</text>
  <text x="447" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">But cannot execute actions</text>
  <text x="447" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">2022 - 2022</text>

  <rect x="540" y="268" width="155" height="110" rx="10" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="617" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">Generation 4</text>
  <text x="617" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">AI Agent</text>
  <text x="617" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Understand + Reason + Act</text>
  <text x="617" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Autonomously complete complex tasks</text>
  <text x="617" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">2023 - 2024</text>

  <rect x="710" y="268" width="360" height="110" rx="10" fill="#8e44ad" opacity="0.1" stroke="#8e44ad" stroke-width="2"/>
  <text x="890" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8e44ad">Generation 5 🚀</text>
  <text x="890" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Deep Reasoning Agent / Agent OS</text>
  <text x="890" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">DeepSeek-R1 · Claude 3.5 · Gemini 2.0</text>
  <text x="890" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">OpenClaw · Autonomous planning · Cross-system collaboration</text>
  <text x="890" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">2025 onward</text>
</svg>
