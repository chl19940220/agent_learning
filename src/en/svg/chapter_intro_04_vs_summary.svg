/<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="760" height="200">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="760" height="200" fill="#f8f9fa" rx="12"/>
  <text x="380" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">Summary: Traditional Program vs Agent</text>

  <!-- [CN] -->
  <rect x="30" y="50" width="320" height="130" rx="12" fill="#e3f2fd" stroke="#3498db" stroke-width="2"/>
  <text x="190" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2980b9">💻 Traditional Program</text>
  <text x="55" y="100" font-family="Arial, sans-serif" font-size="12" fill="#555">📋 Programmer writes logic</text>
  <path d="M 190 105 L 190 115" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="55" y="130" font-family="Arial, sans-serif" font-size="12" fill="#555">📏 Fixed execution path</text>
  <path d="M 190 135 L 190 145" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="55" y="160" font-family="Arial, sans-serif" font-size="12" fill="#555">📥 Formatted input</text>
  <path d="M 190 165 L 190 175" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="55" y="175" font-family="Arial, sans-serif" font-size="12" fill="#555">⚡ Efficient, predictable</text>

  <!-- [CN] -->
  <text x="380" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">⟷</text>
  <text x="380" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Not a replacement</text>
  <text x="380" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">relationship, but</text>
  <text x="380" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#e67e22">complementary!</text>

  <!-- Agent -->
  <rect x="410" y="50" width="320" height="130" rx="12" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
  <text x="570" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">🧠 Agent</text>
  <text x="435" y="100" font-family="Arial, sans-serif" font-size="12" fill="#555">🧠 AI reasons the logic itself</text>
  <path d="M 570 105 L 570 115" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="435" y="130" font-family="Arial, sans-serif" font-size="12" fill="#555">🔀 Dynamic execution path</text>
  <path d="M 570 135 L 570 145" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="435" y="160" font-family="Arial, sans-serif" font-size="12" fill="#555">💬 Natural language input</text>
  <path d="M 570 165 L 570 175" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="435" y="175" font-family="Arial, sans-serif" font-size="12" fill="#555">🎯 Flexible, creative</text>
</svg>
