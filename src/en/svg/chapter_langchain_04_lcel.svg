<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="lp" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3498db"/>
    </marker>
  </defs>
  <rect width="800" height="340" rx="12" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">LCEL Pipeline Architecture: Data Flow × Composition Patterns</text>

  <!-- [CN] Flow-->
  <rect x="30" y="55" width="110" height="50" rx="8" fill="#3498db" opacity="0.25" stroke="#3498db" stroke-width="2"/>
  <text x="85" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#3498db">Prompt</text>
  <text x="85" y="93" text-anchor="middle" font-size="10" fill="#666">Template filling</text>

  <line x1="140" y1="80" x2="168" y2="80" stroke="#3498db" stroke-width="2" marker-end="url(#lp)"/>
  <text x="154" y="73" text-anchor="middle" font-size="14" fill="#3498db" font-weight="bold">|</text>

  <rect x="170" y="55" width="110" height="50" rx="8" fill="#e67e22" opacity="0.25" stroke="#e67e22" stroke-width="2"/>
  <text x="225" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">LLM</text>
  <text x="225" y="93" text-anchor="middle" font-size="10" fill="#666">Model inference</text>

  <line x1="280" y1="80" x2="308" y2="80" stroke="#e67e22" stroke-width="2" marker-end="url(#lp)"/>
  <text x="294" y="73" text-anchor="middle" font-size="14" fill="#e67e22" font-weight="bold">|</text>

  <rect x="310" y="55" width="110" height="50" rx="8" fill="#27ae60" opacity="0.25" stroke="#27ae60" stroke-width="2"/>
  <text x="365" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">Parser</text>
  <text x="365" y="93" text-anchor="middle" font-size="10" fill="#666">Output parsing</text>

  <line x1="420" y1="80" x2="448" y2="80" stroke="#27ae60" stroke-width="2" marker-end="url(#lp)"/>
  <text x="434" y="73" text-anchor="middle" font-size="14" fill="#27ae60" font-weight="bold">|</text>

  <rect x="450" y="55" width="110" height="50" rx="8" fill="#8e44ad" opacity="0.25" stroke="#8e44ad" stroke-width="2"/>
  <text x="505" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">Result</text>
  <text x="505" y="93" text-anchor="middle" font-size="10" fill="#666">Structured output</text>

  <!-- [CN] -->
  <rect x="590" y="50" width="190" height="60" rx="8" fill="#2980b9" opacity="0.12" stroke="#2980b9" stroke-width="1.5"/>
  <text x="685" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">Auto-gained capabilities</text>
  <text x="685" y="88" text-anchor="middle" font-size="10" fill="#555">stream | batch | async</text>
  <text x="685" y="102" text-anchor="middle" font-size="10" fill="#555">retry | fallback</text>

  <!--Core [CN] -->
  <text x="400" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Runnable Protocol Core Components</text>

  <rect x="20" y="150" width="185" height="90" rx="8" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="112" y="173" text-anchor="middle" font-size="12" font-weight="bold" fill="#3498db">RunnablePassthrough</text>
  <text x="32" y="195" font-size="11" fill="#444">• Pass input as-is</text>
  <text x="32" y="215" font-size="11" fill="#444">• Preserve original data</text>
  <text x="32" y="232" font-size="10" fill="#888">Best for: parallel processing branches</text>

  <rect x="215" y="150" width="185" height="90" rx="8" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="2"/>
  <text x="307" y="173" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">RunnableLambda</text>
  <text x="227" y="195" font-size="11" fill="#444">• Wraps Python functions</text>
  <text x="227" y="215" font-size="11" fill="#444">• Insert custom logic</text>
  <text x="227" y="232" font-size="10" fill="#888">Best for: data preprocessing</text>

  <rect x="410" y="150" width="185" height="90" rx="8" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <text x="502" y="173" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">RunnableParallel</text>
  <text x="422" y="195" font-size="11" fill="#444">• Execute multiple chains in parallel</text>
  <text x="422" y="215" font-size="11" fill="#444">• Merge output results</text>
  <text x="422" y="232" font-size="10" fill="#888">Best for: multi-path queries</text>

  <rect x="605" y="150" width="175" height="90" rx="8" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="692" y="173" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">RunnableBranch</text>
  <text x="617" y="195" font-size="11" fill="#444">• Conditional routing</text>
  <text x="617" y="215" font-size="11" fill="#444">• Dynamically select branch</text>
  <text x="617" y="232" font-size="10" fill="#888">Best for: routing after intent classification</text>

  <!-- Unix pipe analogy -->
  <rect x="20" y="255" width="760" height="70" rx="8" fill="#e74c3c" opacity="0.08" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="400" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">Unix pipe analogy</text>
  <text x="140" y="303" text-anchor="middle" font-size="12" fill="#555" font-family="monospace">cat file | grep "err"</text>
  <text x="400" y="303" text-anchor="middle" font-size="12" fill="#e74c3c">≈</text>
  <text x="600" y="303" text-anchor="middle" font-size="12" fill="#555" font-family="monospace">prompt | llm | parser</text>
</svg>