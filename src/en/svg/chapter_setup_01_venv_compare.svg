<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" width="680" height="260">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="680" height="260" rx="14" fill="#f0f4f8"/>
  <text x="340" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Virtual Environment Solutions Comparison</text>

  <!-- No virtual environment -->
  <rect x="20" y="50" width="200" height="180" rx="10" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
  <rect x="20" y="50" width="200" height="36" rx="10" fill="#e74c3c"/>
  <rect x="20" y="72" width="200" height="14" fill="#e74c3c"/>
  <text x="120" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="white">❌ No Virtual Environment</text>
  <text x="120" y="106" text-anchor="middle" font-size="11" fill="#2c3e50" font-weight="bold">system Python</text>
  <text x="120" y="124" text-anchor="middle" font-size="11" fill="#e74c3c">langchain==0.1.0 ← Project A</text>
  <text x="120" y="140" text-anchor="middle" font-size="11" fill="#e74c3c">langchain==0.2.5 ← Project B</text>
  <rect x="80" y="148" width="80" height="18" rx="4" fill="#fadbd8"/>
  <text x="120" y="161" text-anchor="middle" font-size="11" fill="#e74c3c" font-weight="bold">⚠️ Version conflict!</text>
  <text x="120" y="185" text-anchor="middle" font-size="11" fill="#e74c3c">openai==0.28.0 ← old project</text>
  <text x="120" y="201" text-anchor="middle" font-size="11" fill="#e74c3c">openai==1.0.0  ← new project</text>
  <rect x="80" y="208" width="80" height="18" rx="4" fill="#fadbd8"/>
  <text x="120" y="221" text-anchor="middle" font-size="11" fill="#e74c3c" font-weight="bold">⚠️ Version conflict!</text>

  <!-- With virtual environment -->
  <rect x="240" y="50" width="420" height="180" rx="10" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <rect x="240" y="50" width="420" height="36" rx="10" fill="#27ae60"/>
  <rect x="240" y="72" width="420" height="14" fill="#27ae60"/>
  <text x="450" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="white">✅ With Virtual Environments (Isolated)</text>

  <!-- Project A -->
  <rect x="255" y="95" width="185" height="120" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="347" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">project_a/</text>
  <text x="347" y="133" text-anchor="middle" font-size="11" fill="#7f8c8d">.venv/ ← isolated env</text>
  <text x="347" y="151" text-anchor="middle" font-size="11" fill="#27ae60">langchain==0.1.0</text>
  <text x="347" y="169" text-anchor="middle" font-size="11" fill="#27ae60">openai==0.28.0</text>
  <rect x="295" y="178" width="104" height="18" rx="4" fill="#d5f5e3"/>
  <text x="347" y="191" text-anchor="middle" font-size="11" fill="#1e8449" font-weight="bold">✅ No conflict</text>

  <!-- Project B -->
  <rect x="455" y="95" width="185" height="120" rx="8" fill="#eaf4fb" stroke="#3498db" stroke-width="1"/>
  <text x="547" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">project_b/</text>
  <text x="547" y="133" text-anchor="middle" font-size="11" fill="#7f8c8d">.venv/ ← isolated env</text>
  <text x="547" y="151" text-anchor="middle" font-size="11" fill="#3498db">langchain==0.2.5</text>
  <text x="547" y="169" text-anchor="middle" font-size="11" fill="#3498db">openai==1.0.0</text>
  <rect x="495" y="178" width="104" height="18" rx="4" fill="#d6eaf8"/>
  <text x="547" y="191" text-anchor="middle" font-size="11" fill="#2980b9" font-weight="bold">✅ No conflict</text>

  <!-- Bottom recommendation -->
  <text x="340" y="245" text-anchor="middle" font-size="12" fill="#2c3e50">Recommended: <tspan font-weight="bold" fill="#27ae60">uv</tspan> (fastest) &gt; <tspan fill="#8e44ad">conda</tspan> (data science) &gt; <tspan fill="#3498db">venv</tspan> (built-in)</text>
</svg>
