<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320">
  <rect width="760" height="320" fill="#f0f4f8" rx="14"/>
  <text x="380" y="36" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">AI Coding Assistant Code Understanding Flow</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="cfa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- Input -->
  <rect x="30" y="110" width="100" height="80" rx="14" fill="#2c3e50" opacity="0.1" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="80" y="143" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">📂 Code Repo</text>
  <text x="80" y="163" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#7f8c8d">.py .ts .java</text>
  <text x="80" y="178" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#7f8c8d">README configs</text>

  <line x1="130" y1="150" x2="160" y2="150" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#cfa)"/>

  <!-- Step 1: File index -->
  <rect x="165" y="75" width="120" height="60" rx="12" fill="#3498db" opacity="0.15"/>
  <rect x="165" y="75" width="120" height="25" rx="12" fill="#3498db"/>
  <rect x="165" y="90" width="120" height="10" fill="#3498db"/>
  <text x="225" y="93" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="white">File Index</text>
  <text x="225" y="118" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#2c3e50">AST parsing + embedding</text>

  <!-- Step 2: Dependency analysis -->
  <rect x="165" y="165" width="120" height="60" rx="12" fill="#27ae60" opacity="0.15"/>
  <rect x="165" y="165" width="120" height="25" rx="12" fill="#27ae60"/>
  <rect x="165" y="180" width="120" height="10" fill="#27ae60"/>
  <text x="225" y="183" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="white">Dependency Analysis</text>
  <text x="225" y="208" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#2c3e50">Call graph + module relations</text>

  <line x1="285" y1="105" x2="325" y2="140" stroke="#7f8c8d" stroke-width="1.2" marker-end="url(#cfa)"/>
  <line x1="285" y1="195" x2="325" y2="160" stroke="#7f8c8d" stroke-width="1.2" marker-end="url(#cfa)"/>

  <!-- Step 3: Context building -->
  <rect x="330" y="115" width="130" height="70" rx="12" fill="#e67e22" opacity="0.15"/>
  <rect x="330" y="115" width="130" height="28" rx="12" fill="#e67e22"/>
  <rect x="330" y="131" width="130" height="12" fill="#e67e22"/>
  <text x="395" y="134" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="white">Context Building</text>
  <text x="395" y="160" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#2c3e50">Relevant code retrieval</text>
  <text x="395" y="176" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#2c3e50">Context window management</text>

  <line x1="460" y1="150" x2="490" y2="150" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#cfa)"/>

  <!-- Step 4: LLM understanding -->
  <rect x="495" y="115" width="120" height="70" rx="12" fill="#9b59b6" opacity="0.15"/>
  <rect x="495" y="115" width="120" height="28" rx="12" fill="#9b59b6"/>
  <rect x="495" y="131" width="120" height="12" fill="#9b59b6"/>
  <text x="555" y="134" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="white">LLM Understanding</text>
  <text x="555" y="160" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#2c3e50">Code explain/refactor</text>
  <text x="555" y="176" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#2c3e50">Bug detection/fix</text>

  <line x1="615" y1="150" x2="645" y2="150" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#cfa)"/>

  <!-- Output -->
  <rect x="650" y="110" width="80" height="80" rx="14" fill="#e74c3c" opacity="0.1" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="690" y="143" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#e74c3c">✨ Output</text>
  <text x="690" y="163" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#7f8c8d">Code completion</text>
  <text x="690" y="178" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#7f8c8d">Refactor suggestions</text>

  <!-- Bottom note -->
  <rect x="100" y="265" width="560" height="35" rx="10" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <text x="380" y="287" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#7f8c8d">Key: Semantic understanding of code relies on AST structured parsing + vector retrieval + LLM reasoning</text>
</svg>
