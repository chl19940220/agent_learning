<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrDP" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>

  <rect width="760" height="340" fill="#f8f9fa" rx="14"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Data Parallelism (DP): Data Sharding + Ring-AllReduce Gradient Aggregation</text>

  <!-- ══ Left: DP overview ══ -->
  <!-- Training data -->
  <rect x="20" y="48" width="230" height="24" rx="6" fill="#95a5a6" opacity="0.3"/>
  <text x="135" y="64" text-anchor="middle" font-size="11" fill="#2c3e50">Full Training Data (N batches)</text>

  <!-- Distribution arrows -->
  <path d="M 90 73 L 60 106" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrGray)"/>
  <path d="M 180 73 L 210 106" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrGray)"/>
  <text x="40" y="95" font-size="9" fill="#3498db">Batch A</text>
  <text x="192" y="95" font-size="9" fill="#3498db">Batch B</text>

  <!-- GPU 0 -->
  <rect x="16" y="108" width="108" height="84" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="70" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#3498db">GPU 0</text>
  <rect x="26" y="134" width="88" height="18" rx="4" fill="#3498db" opacity="0.22"/>
  <text x="70" y="147" text-anchor="middle" font-size="9" fill="#2c3e50">Full model copy</text>
  <text x="70" y="166" text-anchor="middle" font-size="9" fill="#7f8c8d">Forward + Backward</text>
  <text x="70" y="182" text-anchor="middle" font-size="9" fill="#e74c3c">Gradient ∇L_A</text>

  <!-- GPU 1 -->
  <rect x="145" y="108" width="108" height="84" rx="10" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="2"/>
  <text x="199" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#3498db">GPU 1</text>
  <rect x="155" y="134" width="88" height="18" rx="4" fill="#3498db" opacity="0.22"/>
  <text x="199" y="147" text-anchor="middle" font-size="9" fill="#2c3e50">Full model copy</text>
  <text x="199" y="166" text-anchor="middle" font-size="9" fill="#7f8c8d">Forward + Backward</text>
  <text x="199" y="182" text-anchor="middle" font-size="9" fill="#e74c3c">Gradient ∇L_B</text>

  <!-- AllReduce bidirectional arrows -->
  <path d="M 128 186 Q 134 210 196 210" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrRed)"/>
  <path d="M 138 189 Q 132 212 70 212" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrRed)"/>
  <rect x="78" y="216" width="112" height="20" rx="6" fill="#e74c3c" opacity="0.1" stroke="#e74c3c" stroke-width="1"/>
  <text x="134" y="230" text-anchor="middle" font-size="9" fill="#e74c3c">AllReduce: Average gradients</text>

  <!-- Parameter update -->
  <path d="M 70 238 L 70 256" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrGray)"/>
  <path d="M 199 238 L 199 256" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrGray)"/>
  <rect x="26" y="258" width="88" height="20" rx="4" fill="#27ae60" opacity="0.2"/>
  <text x="70" y="272" text-anchor="middle" font-size="9" fill="#27ae60">✓ Param update</text>
  <rect x="155" y="258" width="88" height="20" rx="4" fill="#27ae60" opacity="0.2"/>
  <text x="199" y="272" text-anchor="middle" font-size="9" fill="#27ae60">✓ Param update</text>

  <!-- Divider -->
  <line x1="285" y1="42" x2="285" y2="320" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- ══ Right: Ring-AllReduce ══ -->
  <text x="530" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Ring-AllReduce Communication</text>
  <text x="530" y="64" text-anchor="middle" font-size="9" fill="#7f8c8d">Gradients passed around ring; after N rounds each GPU has full average gradient</text>

  <!-- 4 GPU circles — wider spacing -->
  <!-- center 530,185; radius 90 -->
  <!-- top: 530,95  right: 620,185  bottom: 530,275  left: 440,185 -->
  <circle cx="530" cy="95" r="34" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <text x="530" y="91" text-anchor="middle" font-size="10" font-weight="bold" fill="#3498db">GPU 0</text>
  <text x="530" y="105" text-anchor="middle" font-size="9" fill="#555">∇_0</text>

  <circle cx="625" cy="185" r="34" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <text x="625" y="181" text-anchor="middle" font-size="10" font-weight="bold" fill="#3498db">GPU 1</text>
  <text x="625" y="195" text-anchor="middle" font-size="9" fill="#555">∇_1</text>

  <circle cx="530" cy="275" r="34" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <text x="530" y="271" text-anchor="middle" font-size="10" font-weight="bold" fill="#3498db">GPU 2</text>
  <text x="530" y="285" text-anchor="middle" font-size="9" fill="#555">∇_2</text>

  <circle cx="435" cy="185" r="34" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <text x="435" y="181" text-anchor="middle" font-size="10" font-weight="bold" fill="#3498db">GPU 3</text>
  <text x="435" y="195" text-anchor="middle" font-size="9" fill="#555">∇_3</text>

  <!-- Ring clockwise arrows -->
  <path d="M 558 80 Q 618 100 614 150" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrDP)"/>
  <path d="M 626 220 Q 614 268 562 272" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrDP)"/>
  <path d="M 498 272 Q 448 265 440 222" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrDP)"/>
  <path d="M 435 148 Q 444 96 498 88" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrDP)"/>

  <!-- Center label -->
  <text x="530" y="181" text-anchor="middle" font-size="9" fill="#3498db" font-weight="bold">Clockwise</text>
  <text x="530" y="193" text-anchor="middle" font-size="9" fill="#3498db">gradient shards</text>

  <!-- Bottom note — within canvas -->
  <rect x="295" y="308" width="455" height="24" rx="7" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="522" y="319" text-anchor="middle" font-size="9" fill="#2c3e50">Communication ≈ 2P (independent of GPU count)</text>
  <text x="522" y="328" text-anchor="middle" font-size="8" fill="#27ae60">✓ Ideal linear scaling: 1000 GPUs communicate same as 2 GPUs</text>
</svg>
