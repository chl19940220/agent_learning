<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="a5" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/></marker>
  </defs>
  <rect width="800" height="400" rx="12" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Three Reflection Frameworks: Reflexion / Self-Refine / CRITIC</text>

  <!-- Reflexion -->
  <rect x="20" y="50" width="240" height="310" rx="10" fill="#3498db" opacity="0.08" stroke="#3498db" stroke-width="2"/>
  <text x="140" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498db">🔄 Reflexion</text>
  <text x="140" y="92" text-anchor="middle" font-size="9" fill="#7f8c8d">Language reinforcement learning</text>

  <rect x="70" y="105" width="140" height="28" rx="5" fill="#3498db"/><text x="140" y="123" text-anchor="middle" font-size="10" fill="white">Execute task</text>
  <text x="140" y="148" text-anchor="middle" font-size="14" fill="#3498db">↓</text>
  <rect x="70" y="155" width="140" height="28" rx="5" fill="#e74c3c" opacity="0.8"/><text x="140" y="173" text-anchor="middle" font-size="10" fill="white">❌ Task failed</text>
  <text x="140" y="198" text-anchor="middle" font-size="14" fill="#3498db">↓</text>
  <rect x="45" y="205" width="190" height="35" rx="5" fill="#3498db" opacity="0.2" stroke="#3498db" stroke-width="1"/>
  <text x="140" y="220" text-anchor="middle" font-size="10" fill="#3498db" font-weight="bold">📝 Write reflection notes</text>
  <text x="140" y="234" text-anchor="middle" font-size="8" fill="#555">Stored in long-term memory</text>
  <text x="140" y="258" text-anchor="middle" font-size="14" fill="#3498db">↓</text>
  <rect x="45" y="265" width="190" height="28" rx="5" fill="#27ae60" opacity="0.2" stroke="#27ae60" stroke-width="1"/>
  <text x="140" y="283" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">🔁 Retry (with reflection)</text>
  <text x="140" y="310" text-anchor="middle" font-size="9" fill="#27ae60">HumanEval: 80% → 91%</text>
  <text x="140" y="330" text-anchor="middle" font-size="9" fill="#555">✨ No model weight updates</text>
  <text x="140" y="345" text-anchor="middle" font-size="9" fill="#555">✨ Experience reusable across tasks</text>

  <!-- Self-Refine -->
  <rect x="280" y="50" width="240" height="310" rx="10" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">🔍 Self-Refine</text>
  <text x="400" y="92" text-anchor="middle" font-size="9" fill="#7f8c8d">Same LLM self-iterates</text>

  <rect x="330" y="105" width="140" height="28" rx="5" fill="#27ae60"/><text x="400" y="123" text-anchor="middle" font-size="10" fill="white">🖊 Generate draft</text>
  <text x="400" y="148" text-anchor="middle" font-size="14" fill="#27ae60">↓</text>
  <rect x="330" y="155" width="140" height="28" rx="5" fill="#e67e22"/><text x="400" y="173" text-anchor="middle" font-size="10" fill="white">🔎 Self-critique</text>
  <text x="400" y="198" text-anchor="middle" font-size="14" fill="#27ae60">↓</text>
  <rect x="330" y="205" width="140" height="28" rx="5" fill="#27ae60" opacity="0.6"/><text x="400" y="223" text-anchor="middle" font-size="10" fill="white">✏️ Revise based on critique</text>
  <text x="400" y="248" text-anchor="middle" font-size="14" fill="#27ae60">↓</text>
  <rect x="310" y="255" width="180" height="28" rx="5" fill="#27ae60" opacity="0.2" stroke="#27ae60" stroke-width="1"/>
  <text x="400" y="273" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">🔁 Loop until satisfied</text>
  <text x="400" y="300" text-anchor="middle" font-size="9" fill="#27ae60">~20% average improvement</text>
  <text x="400" y="320" text-anchor="middle" font-size="9" fill="#555">✨ Simplest approach</text>
  <text x="400" y="335" text-anchor="middle" font-size="9" fill="#555">✨ Same model plays dual roles</text>

  <!-- CRITIC -->
  <rect x="540" y="50" width="240" height="310" rx="10" fill="#8e44ad" opacity="0.08" stroke="#8e44ad" stroke-width="2"/>
  <text x="660" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#8e44ad">🔧 CRITIC</text>
  <text x="660" y="92" text-anchor="middle" font-size="9" fill="#7f8c8d">Tool-assisted verification</text>

  <rect x="590" y="105" width="140" height="28" rx="5" fill="#8e44ad"/><text x="660" y="123" text-anchor="middle" font-size="10" fill="white">🖊 Generate output</text>
  <text x="660" y="148" text-anchor="middle" font-size="14" fill="#8e44ad">↓</text>
  <rect x="590" y="155" width="140" height="28" rx="5" fill="#e67e22"/><text x="660" y="173" text-anchor="middle" font-size="10" fill="white">🔎 Self-critique</text>
  <text x="660" y="198" text-anchor="middle" font-size="14" fill="#8e44ad">↓</text>
  <rect x="565" y="205" width="190" height="35" rx="5" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1"/>
  <text x="660" y="220" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="bold">🛠 Tool verification</text>
  <text x="660" y="234" text-anchor="middle" font-size="8" fill="#555">Run tests / search to verify</text>
  <text x="660" y="258" text-anchor="middle" font-size="14" fill="#8e44ad">↓</text>
  <rect x="565" y="265" width="190" height="28" rx="5" fill="#8e44ad" opacity="0.2" stroke="#8e44ad" stroke-width="1"/>
  <text x="660" y="283" text-anchor="middle" font-size="10" fill="#8e44ad" font-weight="bold">🔁 Refine from tool feedback</text>
  <text x="660" y="310" text-anchor="middle" font-size="9" fill="#27ae60">Objective feedback is more reliable</text>
  <text x="660" y="330" text-anchor="middle" font-size="9" fill="#555">✨ Introduces external validation</text>
  <text x="660" y="345" text-anchor="middle" font-size="9" fill="#555">✨ Best for code / fact-checking</text>

  <!-- Bottom -->
  <text x="400" y="385" text-anchor="middle" font-size="11" fill="#95a5a6">The three approaches progress from "pure language reflection" to "tool-assisted verification" for increasing reliability</text>
</svg>
