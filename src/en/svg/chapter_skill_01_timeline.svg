<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="720" height="440">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
  </defs>
  <rect width="720" height="440" fill="#f0f4f8" rx="14"/>
  <text x="360" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Skill System Development Timeline</text>

  <!-- Main timeline axis -->
  <line x1="100" y1="55" x2="100" y2="420" stroke="#bdc3c7" stroke-width="3"/>

  <!-- 2023: Initial Exploration -->
  <circle cx="100" cy="70" r="10" fill="#3498db"/>
  <text x="120" y="75" font-size="15" font-weight="bold" fill="#3498db">2023: Initial Exploration</text>

  <rect x="140" y="88" width="540" height="30" rx="6" fill="#3498db" opacity="0.08"/>
  <text x="155" y="108" font-size="12" fill="#2c3e50">Voyager (NVIDIA) — First proposed Agent skill library concept (code skills in Minecraft)</text>

  <rect x="140" y="125" width="540" height="30" rx="6" fill="#3498db" opacity="0.08"/>
  <text x="155" y="145" font-size="12" fill="#2c3e50">Semantic Kernel (Microsoft) — Plugin/Skill encapsulation paradigm (enterprise-grade)</text>

  <rect x="140" y="162" width="540" height="30" rx="6" fill="#3498db" opacity="0.08"/>
  <text x="155" y="182" font-size="12" fill="#2c3e50">HuggingGPT / JARVIS (Microsoft) — Cross-model task routing (early skill discovery)</text>

  <!-- 2024: Systematization -->
  <circle cx="100" cy="215" r="10" fill="#e67e22"/>
  <text x="120" y="220" font-size="15" font-weight="bold" fill="#e67e22">2024: Systematization</text>

  <rect x="140" y="235" width="540" height="30" rx="6" fill="#e67e22" opacity="0.08"/>
  <text x="155" y="255" font-size="12" fill="#2c3e50">CRAFT (ICLR 2024) — Automatic creation and retrieval of specialized toolsets</text>

  <rect x="140" y="272" width="540" height="30" rx="6" fill="#e67e22" opacity="0.08"/>
  <text x="155" y="292" font-size="12" fill="#2c3e50">Anthropic Skills — SKILL.md declarative skill framework</text>

  <rect x="140" y="309" width="540" height="30" rx="6" fill="#e67e22" opacity="0.08"/>
  <text x="155" y="329" font-size="12" fill="#2c3e50">A2A Protocol (Google) — Skill declaration standard in Agent Card</text>

  <!-- 2025: Ecosystem -->
  <circle cx="100" cy="362" r="10" fill="#27ae60"/>
  <text x="120" y="367" font-size="15" font-weight="bold" fill="#27ae60">2025: Ecosystem</text>

  <rect x="140" y="378" width="540" height="26" rx="6" fill="#27ae60" opacity="0.08"/>
  <text x="155" y="396" font-size="11" fill="#2c3e50">Claude Code Skills (Anthropic) — 16 open-source demo skills | OpenAI Agents SDK — Handoff + Tool skill composition | add-skill CLI — cross-platform skill installation</text>
</svg>
