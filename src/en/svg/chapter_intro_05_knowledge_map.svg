  <!-- [CN] Line-->
  <line x1="420" y1="94" x2="420" y2="110" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="75" y1="110" x2="765" y2="110" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="75"  y1="110" x2="75"  y2="128" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="209" y1="110" x2="209" y2="128" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="343" y1="110" x2="343" y2="128" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="477" y1="110" x2="477" y2="128" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="611" y1="110" x2="611" y2="128" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="765" y1="110" x2="765" y2="128" stroke="#95a5a6" stroke-width="1.5"/>

  <!--6 [CN] Node， [CN] 120px， [CN] 14px， [CN] x=15 [CN] -->
  <rect x="15"  y="128" width="120" height="40" rx="8" fill="#3498db"/>
  <text x="75"  y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1.1 Evolution</text>
  <text x="75"  y="159" text-anchor="middle" font-size="10" fill="#d6eaf8">Rule→Intent→LLM→Agent</text>

  <rect x="149" y="128" width="120" height="40" rx="8" fill="#27ae60"/>
  <text x="209" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1.2 Core Definition</text>
  <text x="209" y="159" text-anchor="middle" font-size="10" fill="#d5f5e3">LLM+Prompt+Tools+Memory</text>

  <rect x="283" y="128" width="120" height="40" rx="8" fill="#8e44ad"/>
  <text x="343" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1.3 Core Architecture</text>
  <text x="343" y="159" text-anchor="middle" font-size="10" fill="#e8daef">Perceive→Think→Act loop</text>

  <rect x="417" y="128" width="120" height="40" rx="8" fill="#e67e22"/>
  <text x="477" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1.4 vs Traditional Programs</text>
  <text x="477" y="159" text-anchor="middle" font-size="10" fill="#fdebd0">Deterministic vs Autonomous</text>

  <rect x="551" y="128" width="120" height="40" rx="8" fill="#e74c3c"/>
  <text x="611" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1.5 Use Cases</text>
  <text x="611" y="159" text-anchor="middle" font-size="10" fill="#fadbd8">Coding/Data/Education/Office...</text>

  <rect x="705" y="128" width="120" height="40" rx="8" fill="#16a085"/>
  <text x="765" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1.6 History</text>
  <text x="765" y="159" text-anchor="middle" font-size="10" fill="#d1f2eb">Symbolism→LLM Era</text>

  <!-- [CN] Description-->
  <rect x="30" y="195" width="780" height="65" rx="10" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <text x="420" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Core Formula</text>
  <text x="420" y="235" text-anchor="middle" font-size="13" fill="#8e44ad" font-weight="bold">Agent = LLM + Prompt + Tools + Memory + Orchestration</text>
  <text x="420" y="252" text-anchor="middle" font-size="11" fill="#7f8c8d">Perceive env → LLM reason → Call tools → Observe → Loop until goal met</text>
