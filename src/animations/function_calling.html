<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Function Calling — 交互式演示</title>
<style>
:root {
  --bg: #060b18;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border-bright: rgba(255,255,255,0.15);
  --user-color: #38bdf8;
  --user-bg: rgba(56,189,248,0.08);
  --user-border: rgba(56,189,248,0.3);
  --llm-color: #a78bfa;
  --llm-bg: rgba(167,139,250,0.08);
  --llm-border: rgba(167,139,250,0.3);
  --tool-color: #34d399;
  --tool-bg: rgba(52,211,153,0.08);
  --tool-border: rgba(52,211,153,0.3);
  --text: #e2e8f0;
  --text-muted: #64748b;
  --text-dim: #94a3b8;
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ── 粒子画布背景 ── */
#bgCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── 主容器 ── */
.app {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px 60px;
}

/* ── 标题区 ── */
.hero {
  text-align: center;
  margin-bottom: 36px;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(167,139,250,0.12);
  border: 1px solid rgba(167,139,250,0.25);
  border-radius: 100px;
  padding: 4px 14px;
  font-size: 12px;
  color: #a78bfa;
  letter-spacing: 0.5px;
  margin-bottom: 16px;
}
.hero h1 {
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #38bdf8 0%, #a78bfa 50%, #f472b6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
}
.hero p {
  color: var(--text-dim);
  font-size: 14px;
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ── 控制栏 ── */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  border: none;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  letter-spacing: 0.3px;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: white;
  opacity: 0;
  transition: opacity 0.2s;
}
.btn:hover::after { opacity: 0.06; }
.btn:active { transform: scale(0.97); }

.btn-play {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  box-shadow: 0 4px 20px rgba(99,102,241,0.35);
}
.btn-play:hover { box-shadow: 0 6px 28px rgba(99,102,241,0.5); transform: translateY(-1px); }
.btn-play:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-reset {
  background: var(--surface);
  border: 1px solid var(--border-bright);
  color: var(--text-dim);
}
.btn-reset:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }

.speed-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 6px 14px;
}
.speed-wrap label { font-size: 12px; color: var(--text-muted); }
.speed-wrap select {
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  outline: none;
}
.speed-wrap select option { background: #1e293b; }

/* ── 步骤时间轴 ── */
.timeline {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin-bottom: 28px;
  position: relative;
}
.tl-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  position: relative;
  z-index: 1;
}
.tl-dot {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--border-bright);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.tl-dot::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid transparent;
  transition: all 0.4s;
}
.tl-label {
  font-size: 10px;
  color: var(--text-muted);
  text-align: center;
  max-width: 70px;
  line-height: 1.3;
  transition: color 0.3s;
}
.tl-line {
  width: 60px;
  height: 2px;
  background: var(--border);
  margin-bottom: 22px;
  position: relative;
  overflow: hidden;
}
.tl-line::after {
  content: '';
  position: absolute;
  left: -100%;
  top: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, #6366f1, transparent);
  transition: left 0.6s ease;
}
.tl-line.active::after { left: 100%; }

.tl-item.active .tl-dot {
  border-color: #6366f1;
  background: rgba(99,102,241,0.15);
  color: #a5b4fc;
  box-shadow: 0 0 0 4px rgba(99,102,241,0.15), 0 0 20px rgba(99,102,241,0.3);
}
.tl-item.active .tl-dot::after { border-color: rgba(99,102,241,0.3); }
.tl-item.active .tl-label { color: #a5b4fc; }
.tl-item.done .tl-dot {
  border-color: #22c55e;
  background: rgba(34,197,94,0.12);
  color: #4ade80;
}
.tl-item.done .tl-label { color: #4ade80; }

/* ── 三栏主舞台 ── */
.stage {
  display: grid;
  grid-template-columns: 1fr 1.4fr 1fr;
  gap: 16px;
  position: relative;
  align-items: start;
}

/* SVG 箭头层 */
.arrows-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
  overflow: visible;
}

/* ── 列 ── */
.col {
  display: flex;
  flex-direction: column;
  gap: 0;
  min-height: 500px;
}

.col-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-radius: var(--radius) var(--radius) 0 0;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.3px;
  border: 1px solid transparent;
  border-bottom: none;
  position: relative;
  overflow: hidden;
}
.col-header::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.06;
}
.col-header .icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.col-user .col-header {
  background: linear-gradient(135deg, rgba(14,30,60,0.9), rgba(15,35,70,0.9));
  border-color: var(--user-border);
  color: var(--user-color);
}
.col-user .col-header .icon { background: rgba(56,189,248,0.15); }

.col-llm .col-header {
  background: linear-gradient(135deg, rgba(30,15,60,0.9), rgba(40,20,80,0.9));
  border-color: var(--llm-border);
  color: var(--llm-color);
}
.col-llm .col-header .icon { background: rgba(167,139,250,0.15); }

.col-tool .col-header {
  background: linear-gradient(135deg, rgba(5,30,20,0.9), rgba(8,40,25,0.9));
  border-color: var(--tool-border);
  color: var(--tool-color);
}
.col-tool .col-header .icon { background: rgba(52,211,153,0.15); }

.col-body {
  flex: 1;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border: 1px solid transparent;
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  min-height: 460px;
  position: relative;
}
.col-user .col-body { border-color: var(--user-border); background: rgba(56,189,248,0.02); }
.col-llm .col-body  { border-color: var(--llm-border);  background: rgba(167,139,250,0.02); }
.col-tool .col-body { border-color: var(--tool-border); background: rgba(52,211,153,0.02); }

/* ── 消息卡片 ── */
.msg {
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 12.5px;
  line-height: 1.65;
  border: 1px solid transparent;
  position: relative;
  opacity: 0;
  transform: translateY(16px) scale(0.97);
  transition: opacity 0.45s cubic-bezier(0.4,0,0.2,1),
              transform 0.45s cubic-bezier(0.4,0,0.2,1),
              box-shadow 0.3s;
  overflow: hidden;
}
.msg::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  border-radius: 3px 0 0 3px;
}
.msg.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.msg.highlight {
  box-shadow: 0 0 0 2px rgba(255,255,255,0.1), 0 8px 32px rgba(0,0,0,0.3);
}

.msg-user {
  background: var(--user-bg);
  border-color: var(--user-border);
  color: #bae6fd;
}
.msg-user::before { background: var(--user-color); }

.msg-llm {
  background: var(--llm-bg);
  border-color: var(--llm-border);
  color: #ddd6fe;
}
.msg-llm::before { background: var(--llm-color); }

.msg-tool {
  background: var(--tool-bg);
  border-color: var(--tool-border);
  color: #a7f3d0;
}
.msg-tool::before { background: var(--tool-color); }

.msg-code {
  background: rgba(15,23,42,0.8);
  border-color: rgba(255,255,255,0.08);
  color: #a5b4fc;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace;
  font-size: 11px;
}
.msg-code::before { background: #475569; }

.msg-final {
  background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(139,92,246,0.12));
  border-color: rgba(139,92,246,0.4);
  color: #e0e7ff;
}
.msg-final::before { background: linear-gradient(180deg, #6366f1, #8b5cf6); }

.msg-label {
  font-size: 9.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  opacity: 0.55;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.step-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  font-size: 10px;
  font-weight: 800;
  flex-shrink: 0;
}

pre {
  margin: 0;
  white-space: pre-wrap;
  word-break: break-all;
  font-size: 10.5px;
  line-height: 1.6;
}

/* 打字机光标 */
.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: currentColor;
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.8s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── 步骤说明条 ── */
.step-info {
  margin-top: 20px;
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  min-height: 64px;
  transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  overflow: hidden;
}
.step-info::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 4px 0 0 4px;
  background: var(--border-bright);
  transition: background 0.4s;
}
.step-info.s1::before { background: var(--user-color); }
.step-info.s2::before { background: var(--llm-color); }
.step-info.s3::before { background: var(--tool-color); }
.step-info.s4::before { background: var(--llm-color); }
.step-info.s5::before { background: #f472b6; }

.si-num {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 14px;
  flex-shrink: 0;
  transition: all 0.4s;
}
.si-content { flex: 1; }
.si-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 3px;
  color: var(--text);
}
.si-desc {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
}

/* ── SVG 箭头动画 ── */
@keyframes dashMove {
  to { stroke-dashoffset: -20; }
}
@keyframes dotTravel {
  0%   { offset-distance: 0%;   opacity: 1; }
  90%  { opacity: 1; }
  100% { offset-distance: 100%; opacity: 0; }
}

.arrow-path {
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: 0;
  transition: opacity 0.4s;
}
.arrow-path.show {
  opacity: 1;
  stroke-dasharray: 6 4;
  animation: dashMove 0.6s linear infinite;
}
.arrow-head {
  opacity: 0;
  transition: opacity 0.4s;
}
.arrow-head.show { opacity: 1; }

.travel-dot {
  r: 4;
  opacity: 0;
}

/* ── 进度条 ── */
.progress-bar {
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 24px;
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6366f1, #8b5cf6, #ec4899);
  border-radius: 2px;
  width: 0%;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}

/* ── 完成状态 ── */
.done-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(6,11,24,0.85);
  backdrop-filter: blur(4px);
  border-radius: var(--radius);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  z-index: 20;
}
.done-overlay.show { display: flex; }
.done-icon {
  font-size: 48px;
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.done-text {
  font-size: 16px;
  font-weight: 700;
  color: #4ade80;
}
.done-sub {
  font-size: 12px;
  color: var(--text-muted);
}

/* ── 响应式 ── */
@media (max-width: 768px) {
  .stage { grid-template-columns: 1fr; }
  .tl-line { width: 30px; }
  .tl-label { display: none; }
  .arrows-layer { display: none; }
}

/* ── 光晕效果 ── */
.glow-user { filter: drop-shadow(0 0 8px rgba(56,189,248,0.4)); }
.glow-llm  { filter: drop-shadow(0 0 8px rgba(167,139,250,0.4)); }
.glow-tool { filter: drop-shadow(0 0 8px rgba(52,211,153,0.4)); }

/* 脉冲动画 */
@keyframes pulse-ring {
  0%   { transform: scale(1);   opacity: 0.6; }
  100% { transform: scale(1.8); opacity: 0; }
}
.pulse {
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 2px solid currentColor;
  animation: pulse-ring 1s ease-out infinite;
  pointer-events: none;
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="app">

  <!-- 标题 -->
  <div class="hero">
    <div class="hero-badge">
      <span>⚡</span>
      <span>Interactive Demo</span>
    </div>
    <h1>Function Calling 完整通信协议</h1>
    <p>模型不执行函数——它只输出结构化调用指令，执行由应用代码完成。<br>观看一次完整的「查天气 → 条件发邮件」两步工具调用全过程。</p>
  </div>

  <!-- 进度条 -->
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- 步骤时间轴 -->
  <div class="timeline" id="timeline">
    <div class="tl-item" id="tl1">
      <div class="tl-dot">1</div>
      <div class="tl-label">定义工具<br>发送请求</div>
    </div>
    <div class="tl-line" id="tll1"></div>
    <div class="tl-item" id="tl2">
      <div class="tl-dot">2</div>
      <div class="tl-label">LLM<br>决策</div>
    </div>
    <div class="tl-line" id="tll2"></div>
    <div class="tl-item" id="tl3">
      <div class="tl-dot">3</div>
      <div class="tl-label">执行<br>工具</div>
    </div>
    <div class="tl-line" id="tll3"></div>
    <div class="tl-item" id="tl4">
      <div class="tl-dot">4</div>
      <div class="tl-label">二次<br>决策</div>
    </div>
    <div class="tl-line" id="tll4"></div>
    <div class="tl-item" id="tl5">
      <div class="tl-dot">5</div>
      <div class="tl-label">生成<br>回答</div>
    </div>
  </div>

  <!-- 控制栏 -->
  <div class="controls">
    <button class="btn btn-play" id="btnPlay">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M3 2l9 5-9 5V2z"/></svg>
      开始演示
    </button>
    <button class="btn btn-reset" id="btnReset">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 7a6 6 0 1 0 1.5-4M1 3v4h4"/></svg>
      重置
    </button>
    <div class="speed-wrap">
      <label>速度</label>
      <select id="speedSel">
        <option value="1.5">慢速</option>
        <option value="1" selected>正常</option>
        <option value="0.5">快速</option>
      </select>
    </div>
  </div>

  <!-- 三栏舞台 -->
  <div class="stage" id="stage">

    <!-- SVG 箭头层 -->
    <svg class="arrows-layer" id="arrowsSvg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="ah-user" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
        </marker>
        <marker id="ah-llm" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
        </marker>
        <marker id="ah-tool" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
        </marker>
      </defs>
    </svg>

    <!-- 用户列 -->
    <div class="col col-user">
      <div class="col-header">
        <div class="icon">👤</div>
        <span>用户 / 应用代码</span>
      </div>
      <div class="col-body" id="colUser"></div>
    </div>

    <!-- LLM 列 -->
    <div class="col col-llm">
      <div class="col-header">
        <div class="icon">🧠</div>
        <span>LLM (GPT-4o)</span>
      </div>
      <div class="col-body" id="colLlm"></div>
    </div>

    <!-- 工具列 -->
    <div class="col col-tool">
      <div class="col-header">
        <div class="icon">⚡</div>
        <span>工具执行引擎</span>
      </div>
      <div class="col-body" id="colTool"></div>
    </div>

  </div><!-- /stage -->

  <!-- 步骤说明 -->
  <div class="step-info" id="stepInfo">
    <div class="si-num" style="background:rgba(100,116,139,0.15);color:#64748b;">?</div>
    <div class="si-content">
      <div class="si-title" style="color:#64748b;">准备就绪</div>
      <div class="si-desc">点击「开始演示」，观看 Agent 自动完成「查天气 → 条件发邮件」的完整两步工具调用过程。</div>
    </div>
  </div>

</div><!-- /app -->

<script>
/* ════════════════════════════════════════
   粒子背景
════════════════════════════════════════ */
(function initParticles() {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = ['rgba(56,189,248,', 'rgba(167,139,250,', 'rgba(52,211,153,', 'rgba(244,114,182,'];

  for (let i = 0; i < 55; i++) {
    particles.push({
      x: Math.random() * 1200,
      y: Math.random() * 800,
      r: Math.random() * 1.5 + 0.3,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: Math.random() * 0.4 + 0.1,
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color + p.alpha + ')';
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ════════════════════════════════════════
   工具函数
════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const colUser = $('colUser'), colLlm = $('colLlm'), colTool = $('colTool');
const arrowsSvg = $('arrowsSvg');
const stepInfo  = $('stepInfo');
const progressFill = $('progressFill');

let speedMul = 1;
$('speedSel').addEventListener('change', e => { speedMul = parseFloat(e.target.value); });

function delay(ms) {
  return new Promise(r => setTimeout(r, ms * speedMul));
}

/* 打字机效果 */
function typeText(el, text, msPerChar = 18) {
  return new Promise(resolve => {
    const hasHtml = /<[a-z][\s\S]*>/i.test(text);
    // For HTML content, extract plain text for typing effect, then swap to full HTML at the end
    const tmp = document.createElement('div');
    tmp.innerHTML = text;
    const plainText = hasHtml ? tmp.textContent : text;

    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.appendChild(cursor);
    const iv = setInterval(() => {
      if (i < plainText.length) {
        cursor.insertAdjacentText('beforebegin', plainText[i++]);
      } else {
        clearInterval(iv);
        cursor.remove();
        // If original content had HTML, replace plain text with properly rendered HTML
        if (hasHtml) {
          el.innerHTML = text;
        }
        resolve();
      }
    }, msPerChar * speedMul);
  });
}

/* 添加消息卡片 */
function addMsg(col, cls, labelIcon, labelText, badgeNum, badgeColor, content, useTyping = false) {
  const el = document.createElement('div');
  el.className = `msg ${cls}`;

  let labelHtml = '';
  if (labelText) {
    labelHtml = `<div class="msg-label">
      ${badgeNum ? `<span class="step-badge" style="background:${badgeColor};color:#fff;">${badgeNum}</span>` : ''}
      ${labelIcon ? `<span>${labelIcon}</span>` : ''}
      <span>${labelText}</span>
    </div>`;
  }

  const contentEl = document.createElement('div');
  el.innerHTML = labelHtml;
  el.appendChild(contentEl);
  col.appendChild(el);

  requestAnimationFrame(() => {
    el.classList.add('visible');
    setTimeout(() => el.classList.add('highlight'), 100);
    setTimeout(() => el.classList.remove('highlight'), 800);
  });

  if (useTyping && typeof content === 'string') {
    return typeText(contentEl, content, 16).then(() => el);
  } else {
    if (typeof content === 'string') {
      contentEl.innerHTML = content;
    } else {
      contentEl.appendChild(content);
    }
    return Promise.resolve(el);
  }
}

/* 代码块 */
function codeBlock(code) {
  const pre = document.createElement('pre');
  pre.textContent = code;
  return pre;
}

/* 更新步骤说明 */
const stepColors = {
  1: { bg: 'rgba(56,189,248,0.15)',  color: '#38bdf8', cls: 's1' },
  2: { bg: 'rgba(167,139,250,0.15)', color: '#a78bfa', cls: 's2' },
  3: { bg: 'rgba(52,211,153,0.15)',  color: '#34d399', cls: 's3' },
  4: { bg: 'rgba(167,139,250,0.15)', color: '#a78bfa', cls: 's4' },
  5: { bg: 'rgba(244,114,182,0.15)', color: '#f472b6', cls: 's5' },
};

function setStep(num, title, desc) {
  const sc = stepColors[num];
  stepInfo.className = `step-info ${sc.cls}`;
  stepInfo.innerHTML = `
    <div class="si-num" style="background:${sc.bg};color:${sc.color};">${num}</div>
    <div class="si-content">
      <div class="si-title">${title}</div>
      <div class="si-desc">${desc}</div>
    </div>`;
  progressFill.style.width = (num / 5 * 100) + '%';

  // 更新时间轴
  for (let i = 1; i <= 5; i++) {
    const tl = $(`tl${i}`);
    tl.classList.remove('active', 'done');
    if (i < num) tl.classList.add('done');
    if (i === num) tl.classList.add('active');
    if (i < 5) {
      const line = $(`tll${i}`);
      line.classList.toggle('active', i < num);
    }
  }
}

/* ════════════════════════════════════════
   SVG 箭头绘制
════════════════════════════════════════ */
function getColCenter(col) {
  const stageRect = $('stage').getBoundingClientRect();
  const colRect   = col.getBoundingClientRect();
  return {
    x: colRect.left - stageRect.left + colRect.width / 2,
    top: colRect.top - stageRect.top,
    bottom: colRect.bottom - stageRect.top,
  };
}

function getMsgMidY(msgEl) {
  const stageRect = $('stage').getBoundingClientRect();
  const r = msgEl.getBoundingClientRect();
  return r.top - stageRect.top + r.height / 2;
}

let arrowCount = 0;

function drawArrow(x1, y1, x2, y2, colorClass, markerEnd) {
  const id = 'ap' + (++arrowCount);
  const svg = arrowsSvg;

  // 曲线控制点
  const dx = x2 - x1;
  const dy = y2 - y1;
  const cx1 = x1 + dx * 0.4;
  const cy1 = y1 + dy * 0.1 - 20;
  const cx2 = x1 + dx * 0.6;
  const cy2 = y2 - dy * 0.1 - 20;

  const d = `M ${x1} ${y1} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}`;

  // 路径
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('id', id);
  path.setAttribute('d', d);
  path.setAttribute('class', `arrow-path ${colorClass}`);
  path.setAttribute('stroke', colorClass === 'u2l' ? '#38bdf8' : colorClass === 'l2t' || colorClass === 't2l' ? '#34d399' : '#a78bfa');
  path.setAttribute('marker-end', `url(#${markerEnd})`);
  svg.appendChild(path);

  // 飞行点
  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('r', '4');
  dot.setAttribute('fill', path.getAttribute('stroke'));
  dot.setAttribute('opacity', '0');
  svg.appendChild(dot);

  // 触发显示
  requestAnimationFrame(() => path.classList.add('show'));

  // 飞行动画
  return new Promise(resolve => {
    const dur = 700 * speedMul;
    const start = performance.now();
    const pathLen = path.getTotalLength();

    function animate(now) {
      const t = Math.min((now - start) / dur, 1);
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      const pt = path.getPointAtLength(ease * pathLen);
      dot.setAttribute('cx', pt.x);
      dot.setAttribute('cy', pt.y);
      dot.setAttribute('opacity', t < 0.9 ? '0.9' : String(1 - (t - 0.9) / 0.1));
      if (t < 1) requestAnimationFrame(animate);
      else resolve();
    }
    dot.setAttribute('opacity', '0.9');
    requestAnimationFrame(animate);
  });
}
