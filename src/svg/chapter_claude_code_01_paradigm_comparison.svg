<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
  </defs>
  <rect width="760" height="300" rx="14" fill="#f0f4f8"/>

  <!-- 标题 -->
  <text x="380" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">AI 编程范式对比</text>

  <!-- 上半部分：传统补全范式 -->
  <rect x="20" y="45" width="720" height="100" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="380" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">传统补全范式（Copilot / Cursor）</text>
  <text x="380" y="82" text-anchor="middle" font-size="11" fill="#7f8c8d">被动响应 · 局部感知 · 单步操作</text>

  <!-- 传统范式节点 -->
  <rect x="50" y="95" width="140" height="36" rx="8" fill="#f39c12"/>
  <text x="120" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="white">用户写代码</text>

  <line x1="190" y1="113" x2="230" y2="113" stroke="#f39c12" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="232" y="95" width="180" height="36" rx="8" fill="#f39c12"/>
  <text x="322" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="white">AI 预测下一行/函数</text>

  <line x1="412" y1="113" x2="452" y2="113" stroke="#f39c12" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="454" y="95" width="160" height="36" rx="8" fill="#f39c12"/>
  <text x="534" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="white">用户接受/拒绝</text>

  <line x1="614" y1="113" x2="654" y2="113" stroke="#f39c12" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="656" y="95" width="60" height="36" rx="8" fill="#e67e22"/>
  <text x="686" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="white">重复</text>

  <!-- 下半部分：Agent范式 -->
  <rect x="20" y="165" width="720" height="120" rx="10" fill="#eaf4fb" stroke="#3498db" stroke-width="1.5"/>
  <text x="380" y="185" text-anchor="middle" font-size="13" font-weight="bold" fill="#2980b9">Agent 范式（Claude Code）</text>
  <text x="380" y="202" text-anchor="middle" font-size="11" fill="#7f8c8d">主动规划 · 全局感知 · 多步操作</text>

  <!-- Agent范式节点 -->
  <rect x="30" y="212" width="110" height="36" rx="8" fill="#3498db"/>
  <text x="85" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="white">用户描述目标</text>

  <line x1="140" y1="230" x2="160" y2="230" stroke="#3498db" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="162" y="212" width="110" height="36" rx="8" fill="#3498db"/>
  <text x="217" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="white">AI 制定计划</text>

  <line x1="272" y1="230" x2="292" y2="230" stroke="#3498db" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="294" y="212" width="120" height="36" rx="8" fill="#3498db"/>
  <text x="354" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="white">AI 调用工具执行</text>

  <line x1="414" y1="230" x2="434" y2="230" stroke="#3498db" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="436" y="212" width="110" height="36" rx="8" fill="#3498db"/>
  <text x="491" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="white">AI 验证结果</text>

  <line x1="546" y1="230" x2="566" y2="230" stroke="#3498db" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="568" y="212" width="130" height="36" rx="8" fill="#27ae60"/>
  <text x="633" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="white">循环直到完成</text>

  <!-- 循环箭头 -->
  <path d="M 698 230 Q 720 230 720 260 Q 720 280 633 280 Q 354 280 354 260 Q 354 250 354 248" stroke="#27ae60" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
</svg>
