<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 580" width="520" height="580">
  <defs>
    <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2c3e50"/>
    </marker>
  </defs>
  <rect width="520" height="580" rx="14" fill="#f0f4f8"/>
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">运行主链路：一次请求的完整旅程</text>

  <!-- 用户输入 -->
  <rect x="160" y="45" width="200" height="36" rx="18" fill="#2c3e50"/>
  <text x="260" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="white">用户在终端输入并按 Enter</text>
  <line x1="260" y1="81" x2="260" y2="100" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- main.tsx 初始化 -->
  <rect x="60" y="103" width="400" height="52" rx="8" fill="#3498db"/>
  <text x="260" y="123" text-anchor="middle" font-size="12" font-weight="bold" fill="white">main.tsx 并行初始化</text>
  <text x="260" y="140" text-anchor="middle" font-size="10" fill="#d6eaf8">拉取环境信息 · 加载 CLAUDE.md · 初始化 MCP · 准备工具列表</text>
  <line x1="260" y1="155" x2="260" y2="174" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- QueryEngine -->
  <rect x="60" y="177" width="400" height="40" rx="8" fill="#9b59b6"/>
  <text x="260" y="197" text-anchor="middle" font-size="12" font-weight="bold" fill="white">QueryEngine.submitMessage()</text>
  <text x="260" y="211" text-anchor="middle" font-size="10" fill="#e8daef">会话级有状态对象，维护完整对话历史</text>
  <line x1="260" y1="217" x2="260" y2="236" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- System Prompt -->
  <rect x="60" y="239" width="400" height="40" rx="8" fill="#9b59b6"/>
  <text x="260" y="259" text-anchor="middle" font-size="12" font-weight="bold" fill="white">fetchSystemPromptParts()</text>
  <text x="260" y="273" text-anchor="middle" font-size="10" fill="#e8daef">拼装 System Prompt：静态区 + 动态区</text>
  <line x1="260" y1="279" x2="260" y2="298" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- processUserInput -->
  <rect x="60" y="301" width="400" height="40" rx="8" fill="#9b59b6"/>
  <text x="260" y="321" text-anchor="middle" font-size="12" font-weight="bold" fill="white">processUserInput()</text>
  <text x="260" y="335" text-anchor="middle" font-size="10" fill="#e8daef">整理消息格式，注入 CLAUDE.md 为 XML 标签</text>
  <line x1="260" y1="341" x2="260" y2="360" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- TAOR 主循环 -->
  <rect x="60" y="363" width="400" height="100" rx="8" fill="#e67e22"/>
  <text x="260" y="383" text-anchor="middle" font-size="12" font-weight="bold" fill="white">query.ts 主循环（TAOR Agent Loop）</text>
  <text x="260" y="400" text-anchor="middle" font-size="10" fill="#fdebd0">Think：发送给 Claude API，获取流式响应</text>
  <text x="260" y="415" text-anchor="middle" font-size="10" fill="#fdebd0">Act：解析工具调用，发送到 Tool System</text>
  <text x="260" y="430" text-anchor="middle" font-size="10" fill="#fdebd0">Gate：权限系统裁决（Allow / Deny / Ask）</text>
  <text x="260" y="445" text-anchor="middle" font-size="10" fill="#fdebd0">Observe：工具结果注入对话上下文，Repeat</text>
  <line x1="260" y1="463" x2="260" y2="482" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- compact/memory -->
  <rect x="60" y="485" width="400" height="36" rx="8" fill="#27ae60"/>
  <text x="260" y="505" text-anchor="middle" font-size="12" font-weight="bold" fill="white">compact / memory 管理</text>
  <text x="260" y="519" text-anchor="middle" font-size="10" fill="#d5f5e3">上下文利用率 &gt; 40% 触发压缩</text>
  <line x1="260" y1="521" x2="260" y2="540" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 展示层渲染 -->
  <rect x="160" y="543" width="200" height="30" rx="15" fill="#2c3e50"/>
  <text x="260" y="563" text-anchor="middle" font-size="12" font-weight="bold" fill="white">展示层渲染最终响应</text>
</svg>
