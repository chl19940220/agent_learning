<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 310" width="520" height="310">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="520" height="310" fill="#f8f9fa" rx="12"/>
  <text x="260" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">GRPO 训练架构（显存 ≈ 1.5× 模型大小）</text>

  <!-- Policy Model -->
  <rect x="100" y="48" width="140" height="60" rx="10" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <text x="170" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498db">Policy 模型 (7B+)</text>
  <text x="170" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">需训练 ✏️</text>

  <!-- Reference Model -->
  <rect x="290" y="48" width="140" height="60" rx="10" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="2"/>
  <text x="360" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">参考模型 (7B+)</text>
  <text x="360" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">已冻结 🔒</text>

  <!-- No Critic badge -->
  <rect x="30" y="56" width="55" height="44" rx="8" fill="#e74c3c" opacity="0.1" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="57" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#e74c3c">无需</text>
  <text x="57" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#e74c3c">Critic ✅</text>

  <!-- Arrows down from Policy -->
  <path d="M 120 110 L 95 136" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 170 110 L 195 136" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 220 110 L 295 136" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow from Reference -->
  <path d="M 360 110 L 420 136" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- G outputs -->
  <rect x="50" y="139" width="70" height="25" rx="6" fill="#4dabf7" opacity="0.15"/>
  <text x="85" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2980b9">输出 y₁</text>

  <rect x="160" y="139" width="70" height="25" rx="6" fill="#4dabf7" opacity="0.15"/>
  <text x="195" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2980b9">输出 y₂</text>

  <text x="258" y="156" font-family="Arial, sans-serif" font-size="10" fill="#888">...</text>

  <rect x="275" y="139" width="70" height="25" rx="6" fill="#4dabf7" opacity="0.15"/>
  <text x="310" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2980b9">输出 y_G</text>

  <rect x="385" y="139" width="80" height="25" rx="6" fill="#27ae60" opacity="0.1"/>
  <text x="425" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">KL 惩罚</text>

  <!-- Arrows to rewards -->
  <path d="M 85 166 L 85 186" stroke="#7f8c8d" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M 195 166 L 195 186" stroke="#7f8c8d" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M 310 166 L 310 186" stroke="#7f8c8d" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Rewards -->
  <rect x="50" y="189" width="70" height="25" rx="6" fill="#f39c12" opacity="0.15"/>
  <text x="85" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">奖励 r₁</text>

  <rect x="160" y="189" width="70" height="25" rx="6" fill="#f39c12" opacity="0.15"/>
  <text x="195" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">奖励 r₂</text>

  <text x="258" y="206" font-family="Arial, sans-serif" font-size="10" fill="#888">...</text>

  <rect x="275" y="189" width="70" height="25" rx="6" fill="#f39c12" opacity="0.15"/>
  <text x="310" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">奖励 r_G</text>

  <!-- Merge to normalization -->
  <path d="M 85 216 L 195 240" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="4,3"/>
  <path d="M 195 216 L 200 240" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="4,3"/>
  <path d="M 310 216 L 220 240" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Group normalization -->
  <rect x="90" y="242" width="260" height="28" rx="8" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="220" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9b59b6">组内标准化 → Â_i = (r_i - μ_r) / σ_r</text>

  <!-- Arrow to update -->
  <path d="M 220 272 L 220 290" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="220" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c">更新 Policy（无需更新 Critic）</text>
</svg>
