name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.52/mdbook-v0.4.52-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          mv mdbook /usr/local/bin/

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-mdbook-katex

      - name: Install mdbook-katex
        run: |
          if ! command -v mdbook-katex &> /dev/null; then
            cargo install mdbook-katex --locked
          else
            echo "mdbook-katex already cached"
          fi

      - name: Build with mdBook
        run: |
          # Build Chinese version
          mdbook build

          # Build English version
          # mdbook v0.4.52 removed --config flag, use temporary book.toml swap instead
          cp book.toml book.toml.zh_bak
          cp book-en.toml book.toml
          mdbook build
          cp book.toml.zh_bak book.toml
          rm -f book.toml.zh_bak

          # Copy root index.html for language detection & redirection
          cp root-index.html ./book/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
