<!--
  ⚠️  此文件（index.html）是旧版根页面，已被 root-index.html 取代。
  CI 部署时（deploy.yml）会将 root-index.html 复制为 book/index.html 使用。
  本文件不再被任何构建流程引用，可安全删除。
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Agent Development from Scratch / 从零开始学 Agent</title>

  <!-- JS 禁用时默认重定向到中文版 -->
  <noscript>
    <meta http-equiv="refresh" content="0; url=./zh/">
  </noscript>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.10);
      padding: 3rem 3.5rem;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }

    .logo {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.4rem;
      line-height: 1.4;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 2rem;
    }

    /* 加载动画 */
    .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 3px solid #e0e7ff;
      border-top-color: #3783eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .redirect-msg {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 2rem;
    }

    /* 手动选择按钮 */
    .lang-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .lang-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.6rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      border: 2px solid transparent;
    }

    .lang-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    .lang-btn-zh {
      background: #3783eb;
      color: #fff;
    }

    .lang-btn-en {
      background: #fff;
      color: #3783eb;
      border-color: #3783eb;
    }

    .divider {
      margin: 1.8rem 0 1.2rem;
      border: none;
      border-top: 1px solid #eee;
    }

    .manual-hint {
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🤖</div>
    <h1>从零开始学 Agent<br>Learn Agent Development from Scratch</h1>
    <p class="subtitle">Detecting your language preference...</p>

    <div class="spinner" id="spinner"></div>
    <p class="redirect-msg" id="redirect-msg">正在跳转 / Redirecting...</p>

    <div class="lang-buttons">
      <a href="./zh/" class="lang-btn lang-btn-zh">🇨🇳 中文版</a>
      <a href="./en/" class="lang-btn lang-btn-en">🇺🇸 English</a>
    </div>

    <hr class="divider">
    <p class="manual-hint">Or click a button above to choose manually.</p>
  </div>

  <script>
    (function () {
      var lang = navigator.language || navigator.userLanguage || '';
      var target = lang.toLowerCase().startsWith('zh') ? './zh/' : './en/';

      // 更新提示文字
      var msg = document.getElementById('redirect-msg');
      if (msg) {
        msg.textContent = lang.toLowerCase().startsWith('zh')
          ? '检测到中文，正在跳转到中文版...'
          : 'Detected English preference, redirecting to English version...';
      }

      // 短暂延迟后跳转，让用户看到加载动画
      setTimeout(function () {
        window.location.replace(target);
      }, 800);
    })();
  </script>
</body>
</html>
