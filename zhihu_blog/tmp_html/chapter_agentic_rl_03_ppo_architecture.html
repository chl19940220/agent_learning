<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: white;
    width: 100%;
    height: 100%;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 30px;
  }
  .svg-wrap {
    width: 100%;
    max-width: 1340px;
  }
  .svg-wrap svg {
    width: 100% !important;
    height: auto !important;
  }
</style>
</head>
<body>
<div class="svg-wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 280" width="550" height="280">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="550" height="280" fill="#f8f9fa" rx="12"/>
  <text x="275" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">PPO 训练架构（显存 ≈ 3× 模型大小）</text>

  <!-- Policy Model -->
  <rect x="30" y="50" width="140" height="70" rx="10" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <text x="100" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498db">Policy 模型</text>
  <text x="100" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">(7B+)</text>
  <text x="100" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">需训练 ✏️</text>

  <!-- Critic Model -->
  <rect x="205" y="50" width="140" height="70" rx="10" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="2"/>
  <text x="275" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9b59b6">Critic 模型</text>
  <text x="275" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">(7B+)</text>
  <text x="275" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">需训练 ✏️</text>

  <!-- Reference Model -->
  <rect x="380" y="50" width="140" height="70" rx="10" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="2"/>
  <text x="450" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">参考模型</text>
  <text x="450" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">(7B+)</text>
  <text x="450" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">已冻结 🔒</text>

  <!-- Arrows down -->
  <path d="M 100 122 L 100 150" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 275 122 L 275 150" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 450 122 L 450 150" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Functions -->
  <rect x="40" y="153" width="120" height="28" rx="6" fill="#3498db" opacity="0.1"/>
  <text x="100" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">生成动作 a</text>

  <rect x="215" y="153" width="120" height="28" rx="6" fill="#9b59b6" opacity="0.1"/>
  <text x="275" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9b59b6">估计 V(s)</text>

  <rect x="390" y="153" width="120" height="28" rx="6" fill="#27ae60" opacity="0.1"/>
  <text x="450" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">计算 KL 惩罚</text>

  <!-- Merge -->
  <path d="M 100 183 L 190 210" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 275 183 L 225 210" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- GAE + Update -->
  <rect x="115" y="210" width="180" height="25" rx="6" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="1"/>
  <text x="205" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#e67e22">计算 GAE 优势</text>

  <path d="M 205 237 L 205 253" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="115" y="255" width="180" height="20" rx="6" fill="#e74c3c" opacity="0.1"/>
  <text x="205" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">更新 Policy + Critic</text>
</svg>

</div>
</body>
</html>
