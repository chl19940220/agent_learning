<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" width="580" height="360">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect width="580" height="360" fill="#f8f9fa" rx="12"/>
  <text x="290" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">DPO 训练架构（无需奖励模型 + 无需 Critic）</text>

  <!-- 输入：偏好数据 -->
  <rect x="190" y="45" width="200" height="45" rx="10" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="2"/>
  <text x="290" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e67e22">偏好对数据集 𝒟</text>
  <text x="290" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">(x, y_w, y_l) — 每条含一好一差</text>

  <!-- 分叉箭头 -->
  <path d="M 230 92 L 145 120" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 350 92 L 435 120" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Policy Model -->
  <rect x="50" y="122" width="180" height="65" rx="10" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="2"/>
  <text x="140" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498db">Policy 模型 π_θ</text>
  <text x="140" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">可训练参数</text>
  <text x="140" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">需训练 ✏️</text>

  <!-- Reference Model -->
  <rect x="350" y="122" width="180" height="65" rx="10" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="2"/>
  <text x="440" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27ae60">参考模型 π_ref</text>
  <text x="440" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">SFT 模型副本</text>
  <text x="440" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">已冻结 🔒</text>

  <!-- 计算 log 概率 -->
  <path d="M 140 189 L 140 212" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 440 189 L 440 212" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="50" y="215" width="180" height="38" rx="6" fill="#3498db" opacity="0.08"/>
  <text x="140" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">log π_θ(y_w|x)</text>
  <text x="140" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">log π_θ(y_l|x)</text>

  <rect x="350" y="215" width="180" height="38" rx="6" fill="#27ae60" opacity="0.08"/>
  <text x="440" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">log π_ref(y_w|x)</text>
  <text x="440" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">log π_ref(y_l|x)</text>

  <!-- 合并箭头 -->
  <path d="M 140 255 L 230 280" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 440 255 L 350 280" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 隐式奖励差 -->
  <rect x="140" y="282" width="300" height="30" rx="8" fill="#9b59b6" opacity="0.15" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="290" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9b59b6">隐式奖励差 Δ = β·[log(π_θ/π_ref)(y_w) − log(π_θ/π_ref)(y_l)]</text>

  <path d="M 290 314 L 290 332" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 损失 -->
  <rect x="150" y="334" width="280" height="22" rx="6" fill="#e74c3c" opacity="0.1"/>
  <text x="290" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e74c3c">L_DPO = −log σ(Δ)  →  更新 π_θ</text>
</svg>
