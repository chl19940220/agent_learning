<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8eef5;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <rect width="900" height="420" fill="url(#bgGrad)" rx="12"/>
  
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">提示工程 vs 上下文工程</text>
  
  <!-- Prompt Engineering Box -->
  <rect x="40" y="60" width="380" height="330" rx="14" fill="white" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="60" width="380" height="40" rx="14" fill="#e74c3c"/>
  <rect x="40" y="86" width="380" height="14" fill="#e74c3c"/>
  <text x="230" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="white">Prompt Engineering 提示工程</text>
  
  <text x="60" y="125" font-family="system-ui, sans-serif" font-size="12" fill="#555" font-weight="bold">关注：如何"说"</text>
  
  <rect x="60" y="140" width="340" height="55" rx="8" fill="#fff5f5" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4"/>
  <text x="80" y="160" font-family="monospace" font-size="11" fill="#c53030">System: "你是一个数据分析师，</text>
  <text x="80" y="178" font-family="monospace" font-size="11" fill="#c53030">请一步步分析并给出结论..."</text>
  
  <text x="60" y="215" font-family="system-ui, sans-serif" font-size="11" fill="#666">• 优化措辞和格式</text>
  <text x="60" y="235" font-family="system-ui, sans-serif" font-size="11" fill="#666">• CoT / Few-shot / 角色设定</text>
  <text x="60" y="255" font-family="system-ui, sans-serif" font-size="11" fill="#666">• 通常是静态模板</text>
  <text x="60" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#666">• 作用于单次 LLM 调用</text>
  <text x="60" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#666">• 输入大小：几百~几千 tokens</text>
  
  <rect x="60" y="315" width="340" height="28" rx="6" fill="#fff5f5"/>
  <text x="230" y="334" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e74c3c" font-weight="bold">类比：跟医生描述症状的技巧</text>
  <text x="230" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20">🗣️</text>
  
  <!-- Arrow -->
  <text x="440" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#999">→</text>
  <text x="440" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#999">演进</text>
  
  <!-- Context Engineering Box -->
  <rect x="480" y="60" width="380" height="330" rx="14" fill="white" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
  <rect x="480" y="60" width="380" height="40" rx="14" fill="#3498db"/>
  <rect x="480" y="86" width="380" height="14" fill="#3498db"/>
  <text x="670" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="white">Context Engineering 上下文工程</text>
  
  <text x="500" y="125" font-family="system-ui, sans-serif" font-size="12" fill="#555" font-weight="bold">关注：让 LLM "看到"什么</text>
  
  <rect x="500" y="140" width="340" height="55" rx="8" fill="#ebf8ff" stroke="#3498db" stroke-width="1" stroke-dasharray="4"/>
  <text x="520" y="158" font-family="monospace" font-size="10" fill="#2b6cb0">System + 任务状态 + 笔记 + 历史摘要</text>
  <text x="520" y="174" font-family="monospace" font-size="10" fill="#2b6cb0">+ 工具结果 + RAG知识 + 用户消息</text>
  
  <text x="500" y="215" font-family="system-ui, sans-serif" font-size="11" fill="#666">• 信息选择、压缩与组织</text>
  <text x="500" y="235" font-family="system-ui, sans-serif" font-size="11" fill="#666">• GSSC 流水线 / 注意力预算</text>
  <text x="500" y="255" font-family="system-ui, sans-serif" font-size="11" fill="#666">• 随任务执行动态调整</text>
  <text x="500" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#666">• 管理 Agent 整个生命周期</text>
  <text x="500" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#666">• 输入大小：几千~几十万 tokens</text>
  
  <rect x="500" y="315" width="340" height="28" rx="6" fill="#ebf8ff"/>
  <text x="670" y="334" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3498db" font-weight="bold">类比：为医生准备完整的病历资料</text>
  <text x="670" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20">📋</text>
</svg>
