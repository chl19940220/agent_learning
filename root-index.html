<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>从零开始学 Agent | Learn Agent Development from Scratch</title>
  <!-- JS 禁用时默认重定向到中文版 -->
  <noscript>
    <meta http-equiv="refresh" content="0; url=./zh/">
  </noscript>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    .logo {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      color: #f1f5f9;
    }
    .subtitle {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(99, 179, 237, 0.2);
      border-top-color: #63b3ed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.2rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .redirect-msg {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    .lang-links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .lang-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .lang-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    .lang-btn-zh {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
    }
    .lang-btn-en {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
    }
    .divider {
      margin: 2rem auto;
      width: 60px;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .footer {
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
  <script>
    // 根据浏览器语言偏好自动重定向
    (function() {
      var lang = navigator.language || navigator.userLanguage || '';
      var target = lang.toLowerCase().startsWith('zh') ? './zh/' : './en/';
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <div class="container">
    <div class="logo">🤖</div>
    <h1>从零开始学 Agent</h1>
    <p class="subtitle">Learn Agent Development from Scratch</p>
    <div class="spinner"></div>
    <p class="redirect-msg">正在根据浏览器语言自动跳转…<br>Redirecting based on your browser language…</p>
    <div class="lang-links">
      <a href="./zh/" class="lang-btn lang-btn-zh">🇨🇳 简体中文</a>
      <a href="./en/" class="lang-btn lang-btn-en">🇺🇸 English</a>
    </div>
    <div class="divider"></div>
    <p class="footer">
      如未自动跳转，请手动点击上方链接 ·
      If not redirected, click a link above
    </p>
  </div>
</body>
</html>
