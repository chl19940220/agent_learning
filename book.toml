[book]
authors = ["Agent Learning Team"]
language = "zh-CN"
src = "src"
title = "从零开始学 Agent"

[build]
build-dir = "book"

[preprocessor.katex]
after = ["links"]

[output.html]
mathjax-support = false
default-theme = "light"
preferred-dark-theme = "navy"
additional-css = ["theme/custom.css"]
no-section-label = true


